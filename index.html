              ${arRows.length === 0
                ? `<tr><td colspan="13"><div class="empty"><div class="empty-icon">📋</div><p>尚無應收帳款資料</p></div></td></tr>`
                : arRows.map(r => {
                    const isOverdue = r.status !== '已收款' && r.payment_due_date && new Date(r.payment_due_date) < new Date();
                    const statusNorm = r.status || '待開發票';
                    const arCustInfo = arVendorMap[r.customer_name] || null;
                    const arCustDisplay = arCustInfo?.company_name || r.customer_name || '—';
                    const arRowYm = (r.billing_month||'').replace('-','');
                    return `<tr data-ar-id="${r.id}" data-ym="${arRowYm}" data-cust="${arCustDisplay}" data-status="${statusNorm}" data-amount="${r.amount||0}" style="${isOverdue?'background:#fff8f8':''}">
                      <td><strong style="font-size:12px">${arCustDisplay}</strong></td>
                      <td style="font-size:12px;color:var(--accent-dark);font-weight:600">${r.billing_month||'—'}</td>
                      <td style="font-size:12px">${(() => {
                        // 優先讀 note 裡的 [結帳區間：...] 前綴
                        const nm = (r.note||'').match(/^\[結帳區間：([^\]]+)\]/);
                        if (nm) return nm[1];
                        return r.shipment_date?.slice?.(0,10) || '—';
                      })()}</td>
                      <td><strong>$${(r.amount||0).toLocaleString()}</strong></td>
                      <td style="font-size:12px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${r.item_desc||''}">${r.item_desc||'—'}</td>
                      <td style="font-size:12px;color:var(--muted)">${r.invoice_no||'—'}</td>
                      <td style="font-size:12px;color:var(--muted)">${r.invoice_date?.slice?.(0,10)||'—'}</td>
                      <td style="text-align:center">
                        ${r.attachment_url
                          ? `<a href="${r.attachment_url}" target="_blank" title="${r.attachment_name||'請款單'}" style="font-size:16px;color:var(--accent)">📎</a>`
                          : `<span style="color:var(--muted);font-size:11px">—</span>`}
                      </td>
                      <td><span class="tag ${SC[statusNorm]||'tag-grey'}">${statusNorm}</span></td>
                      <td style="font-size:12px;${isOverdue?'color:var(--danger);font-weight:600':''}">${r.payment_due_date?.slice?.(0,10)||'—'}${isOverdue?' ⚠️':''}</td>
                      <td style="font-size:12px;color:${r.payment_date?'var(--success)':'var(--muted)'}">
                        ${r.payment_date ? `✅ ${r.payment_date.slice(0,10)}` : '—'}
                      </td>
                      <td>
                        ${r.payment_screenshot_url
                          ? `<img src="${r.payment_screenshot_url}" style="width:48px;height:36px;object-fit:cover;border-radius:4px;cursor:pointer;border:1px solid var(--border)"
                               onclick="window._showImgPreview('${r.payment_screenshot_url}')" title="點擊放大">`
                          : `<span style="color:var(--muted);font-size:12px">—</span>`}
                      </td>
                      ${isAdmin?`<td><div class="action-btns">
                        <button class="btn-table" data-action="edit-ar" data-id="${r.id}"
                          style="background:#e3f2fd;color:#1565c0">編輯</button>
                        <button class="btn-table" data-action="ar-payment" data-id="${r.id}"
                          style="background:#f3e5f5;color:#6a1b9a">💰 收款</button>
                        <button class="btn-table danger" data-action="del-ar" data-id="${r.id}">刪除</button>
                      </div></td>`:''}
                    </tr>`;
                  }).join('')}
              </tbody>
            </table>
          </div>
        </div>
        <div class="card" style="align-self:start">
          <div style="font-weight:600;margin-bottom:12px;font-size:13px">客戶統計</div>
          ${Object.entries(custMap).map(([name, info]) => `
            <div style="padding:10px 0;border-bottom:1px solid var(--border)">
              <!-- 簡稱 + 本月應收總額 -->
              <div style="display:flex;justify-content:space-between;align-items:center;gap:6px">
                <span style="font-weight:700;font-size:13px">${name}</span>
                <span style="font-weight:700;color:var(--info);white-space:nowrap">$${info.total.toLocaleString()}</span>
              </div>
              <!-- 公司全名 -->
              ${info.company_name && info.company_name !== name ? `
              <div style="font-size:11px;color:var(--muted);margin-top:2px;word-break:break-all">${info.company_name}</div>` : ''}
              <!-- 統編 -->
              ${info.tax_id ? `
              <div style="font-size:11px;color:var(--muted);margin-top:1px">統編：${info.tax_id}</div>` : ''}
              <!-- 已開票明細 -->
              ${info.invoiceAmounts.length ? `
              <div style="margin-top:5px;padding:5px 8px;background:#f0f4ff;border-radius:5px;font-size:11px">
                <div style="color:var(--accent-dark);font-weight:600;margin-bottom:3px">發票金額</div>
                ${info.invoiceAmounts.map(iv => `
                  <div style="display:flex;justify-content:space-between;color:var(--muted)">
                    <span>${iv.invoice_no}${iv.billing_month ? ' <span style="color:#aaa">('+iv.billing_month+')</span>' : ''}</span>
                    <span style="color:var(--accent-dark);font-weight:600">$${iv.amount.toLocaleString()}</span>
                  </div>`).join('')}
              </div>` : ''}
              <!-- 待收 / 已收 -->
              <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:5px">
                <span>已開發票：$${info.invoiced.toLocaleString()}</span>
                <span style="color:${info.total-info.received>0?'var(--warning)':'var(--success)'}">
                  ${info.total-info.received>0?'待收':'✓ 已收'}：$${(info.total-info.received).toLocaleString()}
                </span>
              </div>
            </div>`).join('')}
          ${Object.keys(custMap).length === 0 ? '<div style="color:var(--muted);font-size:13px;text-align:center;padding:16px 0">尚無資料</div>' : ''}
          <div style="display:flex;justify-content:space-between;padding:8px 0;margin-top:4px">
            <span style="font-weight:600">合計待收</span>
            <span style="font-weight:700;color:${arPending>0?'var(--warning)':'var(--success)'}">$${arPending.toLocaleString()}</span>
          </div>
        </div>
      </div>`;
    })() : ''}

    `;
}

// 餐費預算：可按員工個別設定，預設 3000/月
function getMealBudgetForEmployee(name) {
  var budgets = JSON.parse(localStorage.getItem('meal_budgets_per_employee') || '{}');
  if (budgets[name] !== undefined) return parseInt(budgets[name]);
  return parseInt(localStorage.getItem('meal_budget_default') || '3000');
}
function setMealBudgetForEmployee(name, val) {
  var budgets = JSON.parse(localStorage.getItem('meal_budgets_per_employee') || '{}');
  budgets[name] = parseInt(val) || 3000;
  localStorage.setItem('meal_budgets_per_employee', JSON.stringify(budgets));
}
function getDefaultMealBudget() {
  return parseInt(localStorage.getItem('meal_budget_default') || '3000');
}
function setDefaultMealBudget(val) {
  localStorage.setItem('meal_budget_default', String(parseInt(val) || 3000));
}

// 往來銀行輸入模糊搜尋 → 帶出代碼
window._bankNameInput = function(inputEl) {
  var q = inputEl.value.trim();
  var listEl = document.getElementById('v-bank-suggestions');
  if (!listEl) return;
  if (q.length < 2) { listEl.innerHTML=''; listEl.style.display='none'; return; }
  // 支援多關鍵字（空格分隔），每個關鍵字都要出現在銀行名或分行名中
  var keywords = q.split(/\s+/).filter(Boolean);
  var results = TW_BRANCH_DATA.list.filter(function(r){
    return keywords.every(function(kw){
      return r.bank.includes(kw) || r.branch.includes(kw);
    });
  }).slice(0,15);
  if (results.length === 0) { listEl.innerHTML=''; listEl.style.display='none'; return; }
  listEl.innerHTML = results.map(function(r){
    return '<div style="padding:6px 10px;cursor:pointer;font-size:13px;border-bottom:1px solid #f0f0f0" '
      + 'onmousedown="window._selectBankSuggestion(\''+r.code+'\',\''+r.bank+r.branch+'\')" '
      + 'onmouseover="this.style.background=\'#f0fafa\'" onmouseout="this.style.background=\'\'">'
      + r.bank + ' <span style="color:var(--accent)">' + r.branch + '</span>'
      + ' <span style="float:right;color:var(--muted);font-size:11px">' + r.code + '</span></div>';
  }).join('');
  listEl.style.display='block';
};

window._selectBankSuggestion = function(code, name) {
  var bankInput = document.getElementById('v-bank');
  var codeInput = document.getElementById('v-bank-code');
  if (bankInput) bankInput.value = name;
  if (codeInput) codeInput.value = code;
  var listEl = document.getElementById('v-bank-suggestions');
  if (listEl) { listEl.innerHTML=''; listEl.style.display='none'; }
};

// 帳號輸入清理：全形→半形、刪除符號和空格
window._cleanBankAccount = function(inputEl) {
  var v = inputEl.value;
  v = v.replace(/[！-～]/g, function(c){ return String.fromCharCode(c.charCodeAt(0)-0xFEE0); });
  v = v.replace(/[^0-9A-Za-z]/g, '');
  inputEl.value = v;
};

window._cleanPhone = function(inputEl) {
  var v = inputEl.value;
  // 全形數字/符號→半形
  v = v.replace(/[！-～]/g, function(c){ return String.fromCharCode(c.charCodeAt(0)-0xFEE0); });
  // 全形空格→半形
  v = v.replace(/　/g, ' ');
  inputEl.value = v;
};

// ── State ──
let salesCharts = {};
let salesActiveYear = new Date().getFullYear();
let salesActiveTab = 'dashboard'; // 'dashboard' | 'input' | 'project'
let salesInputYear = new Date().getFullYear();
let salesInputMonth = new Date().getMonth(); // 0-based, display month

// ── Helpers ──
function salesFmt(n) {
  if (!n && n !== 0) return '-';
  return Math.round(n).toLocaleString();
}
function salesFmtFull(n) { return (n||0).toLocaleString(); }

function salesGetCNYRate(year, month) {
  const rates = JSON.parse(localStorage.getItem('sales_cny_rates')||'{}');
  return parseFloat(rates[`${year}-${month}`] || '4.6');
}

// Get daily value: from localStorage override first, then SALES_DAILY
function salesGetDay(year, platform, month1, day) {
  const k = `sd_${year}_${platform}_${month1}_${day}`;
  const v = localStorage.getItem(k);
  if (v !== null) return parseFloat(v)||0;
  return SALES_DAILY[platform]?.[year]?.[month1]?.[day-1] ?? 0;
}
function salesSetDay(year, platform, month1, day, val) {
  localStorage.setItem(`sd_${year}_${platform}_${month1}_${day}`, val);
}

function salesGetMonthSum(year, platform, month1) {
  const daysInMonth = salesDaysInMonth(year, month1);
  let sum = 0;
  for (let d = 1; d <= daysInMonth; d++) {
    let v = salesGetDay(year, platform, month1, d);
    if (platform === '淘寶') v = Math.round(v * salesGetCNYRate(year, month1-1));
    sum += v;
  }
  return sum;
}

function salesGetPlatformMonthly(year, platform) {
  return Array.from({length:12}, (_,m) => salesGetMonthSum(year, platform, m+1));
}
function salesGetMonthlyTotal(year, month1) {
  return SALES_PLATFORMS.reduce((s,p) => s + salesGetMonthSum(year,p,month1), 0);
}
function salesGetYearTotal(year) {
  return SALES_PLATFORMS.reduce((s,p) => {
    let pt = 0;
    for (let m=1;m<=12;m++) pt += salesGetMonthSum(year,p,m);
    return s + pt;
  }, 0);
}
function salesGetPlatformTotal(year, platform) {
  let t=0;
  for(let m=1;m<=12;m++) t+=salesGetMonthSum(year,platform,m);
  return t;
}
function salesDaysInMonth(year, month1) {
  return new Date(year, month1, 0).getDate();
}

// ── 專案業績 helpers ──
function projGetYearData(year) {
  const yStr = String(year);
  const base = PROJ_RAW[yStr] || {};
  const result = {};

  // ── 從 PROJ_RAW 建立基礎資料（含 localStorage 覆蓋）──
  for (const [name, data] of Object.entries(base)) {
    const monthly = data.monthly.map((v, m) => {
      const k = `proj_${year}_${name}_${m}`;
      const ov = localStorage.getItem(k);
      return ov !== null ? (parseFloat(ov)||0) : (v||0);
    });
    result[name] = { ...data, monthly };
  }

  // ── 2026 起：從 AR 應收帳款整合業績 ──
  if (year >= 2026) {
    // 載入全部 AR（loadAccounting 只讀當月，這裡用快取的全部 AR）
    const allAR = state.data.accounting?.ar_all || state.data.accounting?.ar || [];
    for (const rec of allAR) {
      // 只取目標年度
      const bm = rec.billing_month || rec.shipment_date?.slice(0,7);
      if (!bm || !bm.startsWith(yStr)) continue;
      const month0 = parseInt(bm.slice(5,7)) - 1; // 0-based
      if (month0 < 0 || month0 > 11) continue;
      const amount = parseFloat(rec.amount) || 0;
      if (!amount) continue;
      // 客戶名稱：優先用 customer_name，對應廠商 company_name 或 name
      const custRaw = rec.customer_name || '';
      // 嘗試從 vendors 找正式名稱（company_name 或 name）
      const vendors = state.data.accounting?.vendors || [];
      const vendor = vendors.find(v =>
        v.company_name === custRaw || v.name === custRaw ||
        (v.company_name && custRaw.includes(v.company_name)) ||
        (v.name && custRaw.includes(v.name))
      );
      const custName = vendor?.name || custRaw;
      if (!custName) continue;

      if (!result[custName]) {
        // 新客戶：嘗試從 PROJ_RAW 找代號和類型
        const rawEntry = Object.values(base).find(e =>
          e.code && (custRaw.includes(e.code) || custName === custRaw)
        );
        result[custName] = {
          code: rawEntry?.code || '',
          type: rawEntry?.type || 'CSR',
          monthly: Array(12).fill(0),
          fromAR: true
        };
      }
      // 累加到對應月份（AR 金額直接當業績，不覆蓋 localStorage 手動輸入）
      const manualKey = `proj_${year}_${custName}_${month0}`;
      if (localStorage.getItem(manualKey) === null) {
        result[custName].monthly[month0] = (result[custName].monthly[month0] || 0) + amount;
      }
    }
  }

  return result;
}
function projGetMonthTotal(year, month0) {
  const data = projGetYearData(year);
  return Object.values(data).reduce((s, c) => s + (c.monthly[month0]||0), 0);
}
function projGetYearTotal(year) {
  const data = projGetYearData(year);
  return Object.values(data).reduce((s, c) => s + c.monthly.reduce((a,b)=>a+b,0), 0);
}
function projMonthInput(inp) {
  var year = parseInt(inp.dataset.projYear);
  var name = inp.dataset.projName;
  var month0 = parseInt(inp.dataset.projMonth);
  var val = parseFloat(inp.value) || 0;
  projSetMonth(year, name, month0, val);
  inp.style.border = '1px solid ' + (inp.value !== '' ? '#b2dfdb' : '#ececec');
  var row = inp.closest('tr');
  if (row) {
    var total = 0;
    row.querySelectorAll('input[data-proj-month]').forEach(function(i) { total += parseFloat(i.value)||0; });
    var lastTd = row.querySelector('td:last-child');
    if (lastTd) lastTd.textContent = total > 0 ? salesFmt(total) : '-';
  }
}
function projSetMonth(year, name, month0, val) {
  localStorage.setItem(`proj_${year}_${name}_${month0}`, val);
}
function projGetCSRTotal(year) {
  const data = projGetYearData(year);
  return Object.values(data).filter(c=>c.type==='CSR').reduce((s,c)=>s+c.monthly.reduce((a,b)=>a+b,0),0);
}
function projGetPROTotal(year) {
  const data = projGetYearData(year);
  return Object.values(data).filter(c=>c.type==='PRO'||c.type==='UNK').reduce((s,c)=>s+c.monthly.reduce((a,b)=>a+b,0),0);
}
function projMonthlyTotals(year) {
  return Array.from({length:12}, (_,m) => projGetMonthTotal(year, m));
}

function salesGetGoal(year) {
  const y = year || salesActiveYear || new Date().getFullYear();
  // 先找年度目標，找不到再 fallback 到舊的通用目標
  const yearKey = 'sales_goal_' + y;
  const stored = localStorage.getItem(yearKey);
  if (stored) return parseInt(stored);
  const legacy = localStorage.getItem('sales_goal');
  return legacy ? parseInt(legacy) : 20000000;
}
function salesSetGoalForYear(year, g) {
  const y = year || salesActiveYear || new Date().getFullYear();
  localStorage.setItem('sales_goal_' + y, g);
}

async function loadSales() {
  if (!state.data.sales) {
    state.data.sales = {};

}

function renderSalesProjectContent() {
  const data = projGetYearData(salesActiveYear);
  const clients = Object.entries(data).filter(([,c]) => c.monthly.some(v=>v>0) || salesActiveYear>=2025);
  // Sort by year total desc
  const sorted = clients.map(([name, c]) => ({name, ...c, total: c.monthly.reduce((a,b)=>a+b,0)})).sort((a,b)=>b.total-a.total);

  const csrClients = sorted.filter(c=>c.type==='CSR');
  const proClients = sorted.filter(c=>c.type==='PRO'||c.type==='UNK');

  const renderGroup = (groupName, groupClients, borderColor) => {
    if (groupClients.length === 0) return '';
    const groupTotal = groupClients.reduce((s,c)=>s+c.total,0);
    const monthlyTot = Array.from({length:12}, (_,m) => groupClients.reduce((s,c)=>s+(c.monthly[m]||0),0));
    const rows = groupClients.filter(c=>c.total>0||salesActiveYear>=2026).map(c => {
      const cells = c.monthly.map(function(v,mi) {
        var hasVal = v > 0;
        var bg  = hasVal ? '#fff' : '#f7f7f7';
        var col = hasVal ? '#888' : '#f7f7f7'; // 有值灰字，無值隱形
        return '<td style="padding:2px 3px;">'
          + '<input type="number" min="0" value="' + (hasVal ? v : '') + '"'
          + ' data-proj-year="' + salesActiveYear + '"'
          + ' data-proj-name="' + c.name + '"'
          + ' data-proj-month="' + mi + '"'
          + ' style="width:100%;padding:2px 4px;border:1px solid #e0e0e0;border-radius:4px;font-size:11px;text-align:right;box-sizing:border-box;background:' + bg + ';color:' + col + ';"'
          + ' oninput="projMonthInput(this);(function(inp){inp.style.background=\'#fff\';inp.style.color=\'#888\';})(this)">'
          + '</td>';
      }).join('');
      const typeTag = c.type==='CSR'?`<span style="font-size:9px;background:#e0f2f1;color:#00695c;border-radius:3px;padding:1px 4px;margin-left:4px;">CSR</span>`:
        (c.type==='PRO'?`<span style="font-size:9px;background:#fff3e0;color:#e65100;border-radius:3px;padding:1px 4px;margin-left:4px;">PRO</span>`:'');
      return `<tr>
        <td style="padding:3px 8px;font-size:12px;white-space:nowrap;">${c.name}${typeTag}</td>
        ${cells}
        <td style="text-align:right;padding:3px 8px;font-size:12px;font-weight:700;color:${borderColor};">${c.total>0?salesFmt(c.total):'-'}</td>
      </tr>`;
    }).join('');
    const footerCells = monthlyTot.map(v=>`<td style="text-align:center;padding:3px 5px;font-size:11px;font-weight:700;">${v>0?salesFmt(v):'-'}</td>`).join('');
    return `
      <div style="margin-bottom:16px;background:#fff;border-radius:14px;box-shadow:0 2px 8px rgba(0,0,0,0.07);border:1px solid #e0f2f1;overflow:hidden;">
        <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px 10px;border-bottom:1px solid #e0f2f1;background:#f8fffe;">
          <span style="font-weight:700;font-size:13px;color:#2d4a4a;">${groupName}</span>
          <span style="font-size:13px;color:${borderColor};font-weight:800;">合計 ${salesFmtFull(Math.round(groupTotal))}</span>
        </div>
        <div style="overflow-x:auto;padding:12px 16px 14px;">
          <table style="border-collapse:collapse;table-layout:fixed;width:max-content;">
            <colgroup>
              <col style="width:120px;">
              ${SALES_MONTHS_LABEL.map(()=>'<col style="width:72px;">').join('')}
              <col style="width:80px;">
            </colgroup>
            <thead><tr style="background:#e0f2f1;">
              <th style="padding:5px 8px;font-size:12px;text-align:left;">客戶</th>
              ${SALES_MONTHS_LABEL.map(l=>`<th style="padding:5px 4px;font-size:11px;text-align:center;">${l}</th>`).join('')}
              <th style="padding:5px 8px;font-size:11px;text-align:right;">合計</th>
            </tr></thead>
            <tbody>${rows}</tbody>
            <tfoot><tr style="background:#e8f5e9;">
              <td style="padding:3px 8px;font-size:12px;font-weight:700;">小計</td>
              ${footerCells}
              <td style="text-align:right;padding:3px 8px;font-size:12px;font-weight:700;color:${borderColor};">${salesFmt(groupTotal)}</td>
            </tr></tfoot>
          </table>
        </div>
      </div>`;
  };

  return `<div style="padding:12px 4px 8px;display:flex;flex-direction:column;gap:4px;">
    ${renderGroup('📦 經銷客戶（CSR）', csrClients, '#c2d6d6')}
    ${renderGroup('🔧 專案客戶（PRO）', proClients, '#0a0f0f')}
  </div>`;
}

// ══ INPUT - Daily grid per platform ══
function renderSalesInput() {
  if (!SALES_YEARS.includes(salesInputYear)) salesInputYear = new Date().getFullYear();
  const month1 = salesInputMonth + 1; // 1-based
  const daysInMonth = salesDaysInMonth(salesInputYear, month1);
  const salesEditable = canEditSales();

  const yearBtns = SALES_YEARS.map(y =>
    `<button data-sales-input-year="${y}" style="padding:4px 11px;border-radius:6px;border:none;cursor:pointer;font-weight:600;font-size:12px;
      background:${salesInputYear===y?'#00897b':'#e0f2f1'};color:${salesInputYear===y?'#fff':'#00695c'};">${y}</button>`
  ).join('');

  const monthBtns = SALES_MONTHS_LABEL.map((ml,mi) =>
    `<button data-sales-input-month="${mi}" style="padding:4px 10px;border-radius:6px;border:none;cursor:pointer;font-weight:600;font-size:12px;
      background:${salesInputMonth===mi?'#00897b':'#e0f2f1'};color:${salesInputMonth===mi?'#fff':'#00695c'};">${ml}</button>`
  ).join('');

  // 淘寶匯率 (current month)
  const cnyRatesObj = JSON.parse(localStorage.getItem('sales_cny_rates')||'{}');
  const cnyRate = parseFloat(cnyRatesObj[`${salesInputYear}-${salesInputMonth}`] || '4.6');
  const cnySection = `<div style="display:flex;align-items:center;gap:8px;background:#fff;border:1px solid #b2dfdb;border-radius:8px;padding:8px 14px;">
    <span style="font-size:12px;color:#607d8b;white-space:nowrap;">💱 淘寶匯率（${salesInputYear}年${month1}月）</span>
    <input type="number" step="0.01" value="${cnyRate}"
      style="width:70px;padding:4px 7px;border:1px solid #b2dfdb;border-radius:5px;font-size:13px;text-align:center;"
      onchange="salesSetRate(${salesInputYear},${salesInputMonth},this.value)">
    <span style="font-size:12px;color:#9ca3af;">CNY × ? = TWD</span>
  </div>`;

  // 欄寬定義 px
  const COL_W = 90; // 每個平台欄寬
  const DATE_W = 58;
  const TOTAL_W = 88;
  // 體驗店額外欄：付款方式 + 是否擺攤
  const EXP_COLS = ['現金','刷卡','LinePay','擺攤'];
  const EXP_W = 70;

  // col headers
  const colHeaders = SALES_PLATFORMS.map((p,i) =>
    `<th style="width:${COL_W}px;min-width:${COL_W}px;padding:6px 4px;font-size:12px;text-align:center;white-space:nowrap;border-right:1px solid #c8e6e3;">
      ${p}${p==='淘寶'?`<div style="font-size:10px;color:#b2dfdb;font-weight:400;">CNY ×${cnyRate}</div>`:''}
    </th>`
  ).join('');

  const expHeaders = EXP_COLS.map(c =>
    `<th style="width:${EXP_W}px;min-width:${EXP_W}px;padding:6px 4px;font-size:11px;text-align:center;color:#607d8b;border-right:1px solid #c8e6e3;">${c}</th>`
  ).join('');

  // Pre-compute totals
  const platformMonthTotals = SALES_PLATFORMS.map(p => salesGetMonthSum(salesInputYear, p, month1));
  const grandTotal = platformMonthTotals.reduce((a,b)=>a+b,0);

  const rows = [];
  for (let d = 1; d <= daysInMonth; d++) {
    const isToday = (new Date().getFullYear()===salesInputYear && new Date().getMonth()===salesInputMonth && new Date().getDate()===d);
    const dow = ['日','一','二','三','四','五','六'][new Date(salesInputYear, salesInputMonth, d).getDay()];
    const isWeekend = [0,6].includes(new Date(salesInputYear, salesInputMonth, d).getDay());
    const dayTotal = SALES_PLATFORMS.reduce((s,p)=>{
      let v = salesGetDay(salesInputYear,p,month1,d);
      if (p==='淘寶') v=Math.round(v*salesGetCNYRate(salesInputYear,salesInputMonth));
      return s+v;
    },0);

    const inputCells = SALES_PLATFORMS.map((p) => {
      const storeKey = 'sd_' + salesInputYear + '_' + p + '_' + month1 + '_' + d;
      const rawStored = localStorage.getItem(storeKey);
      const raw = rawStored !== null ? parseFloat(rawStored) : salesGetDay(salesInputYear, p, month1, d);
      const isTB = p === '淘寶';
      const isExp = p === '體驗店'; // 體驗店由右側付款方式加總，不可手動輸入
      const twdVal = isTB && raw ? Math.round(raw*salesGetCNYRate(salesInputYear,salesInputMonth)) : 0;
      const twdHint = isTB && raw ? ` title="TWD≈${salesFmtFull(twdVal)}"` : '';
      const hasVal2 = raw > 0;
      const bgCol  = hasVal2 ? '#fff' : '#f7f7f7';
      const txtCol = hasVal2 ? '#888' : '#f7f7f7';
      const dispVal = raw ? String(raw) : '';
      // 體驗店：永遠唯讀，但樣式與其他平台一致（白底灰字）
      const isReadonly = !salesEditable || isExp;
      const bgFinal = hasVal2 ? '#fff' : '#f7f7f7';
      const colFinal = hasVal2 ? '#888' : '#f7f7f7';
      return `<td style="padding:2px 3px;border-right:1px solid #e8f5e9;">
        <input type="number" min="0" value="${dispVal}"${twdHint}
          data-sy="${salesInputYear}" data-sp="${p}" data-sm="${month1}" data-sd="${d}"
          style="width:${COL_W-6}px;padding:3px 4px;border:1px solid #e0e0e0;border-radius:4px;font-size:12px;text-align:right;box-sizing:border-box;background:${bgFinal};color:${colFinal};${isReadonly?'cursor:not-allowed;':''}"
          ${isReadonly ? 'readonly' : 'oninput="salesDayInput(this)"'}>
      </td>`;
    }).join('');

    // 體驗店：付款方式 + 擺攤
    const expKey = `sexp_${salesInputYear}_${month1}_${d}`;
    const expData = JSON.parse(localStorage.getItem(expKey)||'{"cash":0,"card":0,"linepay":0,"stall":false}');
    const expReadonly = salesEditable ? '' : 'readonly';
    const expDisabledStyle = salesEditable ? '' : 'background:#f5f5f5;color:#aaa;cursor:not-allowed;';
    const expCells = `
      <td style="padding:2px 3px;border-right:1px solid #e8f5e9;">
        <input type="number" min="0" value="${expData.cash||''}" placeholder="現金"
          style="width:${EXP_W-6}px;padding:3px 4px;border:1px solid #ececec;border-radius:4px;font-size:12px;text-align:right;${expDisabledStyle}"
          ${salesEditable?`oninput="salesExpInput('${expKey}','cash',this.value)"`:expReadonly}>
      </td>
      <td style="padding:2px 3px;border-right:1px solid #e8f5e9;">
        <input type="number" min="0" value="${expData.card||''}" placeholder="刷卡"
          style="width:${EXP_W-6}px;padding:3px 4px;border:1px solid #ececec;border-radius:4px;font-size:12px;text-align:right;${expDisabledStyle}"
          ${salesEditable?`oninput="salesExpInput('${expKey}','card',this.value)"`:expReadonly}>
      </td>
      <td style="padding:2px 3px;border-right:1px solid #e8f5e9;">
        <input type="number" min="0" value="${expData.linepay||''}" placeholder="LinePay"
          style="width:${EXP_W-6}px;padding:3px 4px;border:1px solid #ececec;border-radius:4px;font-size:12px;text-align:right;${expDisabledStyle}"
          ${salesEditable?`oninput="salesExpInput('${expKey}','linepay',this.value)"`:expReadonly}>
      </td>
      <td style="padding:2px 3px;text-align:center;border-right:1px solid #e8f5e9;">
        <input type="checkbox" ${expData.stall?'checked':''} style="width:16px;height:16px;accent-color:#00897b;${salesEditable?'cursor:pointer;':'cursor:not-allowed;opacity:0.5;'}"
          ${salesEditable?`onchange="salesExpInput('${expKey}','stall',this.checked)"`:' disabled'}>
      </td>`;

    rows.push(`<tr style="background:${isToday?'#fffde7':isWeekend?'#fff5f5':'#fff'};" id="srow_${d}">
      <td style="padding:4px 6px;font-size:12px;text-align:center;white-space:nowrap;color:${isWeekend?'#ef5350':'#555'};font-weight:${isToday?'700':'400'};border-right:1px solid #c8e6e3;">${d}<span style="font-size:10px;margin-left:2px;color:${isWeekend?'#ef5350':'#9ca3af'};">${dow}</span></td>
      ${inputCells}
      ${expCells}
      <td data-sday-total="${d}" style="padding:4px 6px;font-size:12px;font-weight:600;text-align:right;color:#00897b;white-space:nowrap;">${dayTotal?salesFmtFull(dayTotal):'-'}</td>
    </tr>`);
  }

  // footer
  const footerCells = SALES_PLATFORMS.map((p,i) => {
    const twdVal = platformMonthTotals[i];
    if (p === '淘寶') {
      // compute raw CNY total
      const rate = salesGetCNYRate(salesInputYear, salesInputMonth);
      const cnyRaw = rate > 0 ? Math.round(twdVal / rate) : 0;
      return `<td data-splatform-total="${p}" style="padding:5px 6px;font-size:11px;font-weight:700;text-align:right;color:#00695c;border-right:1px solid #80cbc4;">
        <div>${salesFmtFull(twdVal)}</div>
        <div style="font-size:10px;color:#9ca3af;font-weight:400;">CNY ${salesFmtFull(cnyRaw)}</div>
      </td>`;
    }
    return `<td data-splatform-total="${p}" style="padding:5px 6px;font-size:12px;font-weight:700;text-align:right;color:#00695c;border-right:1px solid #80cbc4;">${salesFmtFull(twdVal)}</td>`;
  }).join('');

  // 體驗店月加總：現金/刷卡/LinePay/擺攤次數
  let expCashTotal=0, expCardTotal=0, expLinePayTotal=0, expStallCount=0;
  for (let d=1;d<=daysInMonth;d++) {
    const k = `sexp_${salesInputYear}_${month1}_${d}`;
    const e = JSON.parse(localStorage.getItem(k)||'{"cash":0,"card":0,"linepay":0,"stall":false}');
    expCashTotal   += parseFloat(e.cash)||0;
    expCardTotal   += parseFloat(e.card)||0;
    expLinePayTotal+= parseFloat(e.linepay)||0;
    if (e.stall) expStallCount++;
  }
  const expFooter = `
    <td style="padding:5px 6px;font-size:12px;font-weight:700;text-align:right;color:#00695c;border-right:1px solid #80cbc4;">${salesFmtFull(expCashTotal)}</td>
    <td style="padding:5px 6px;font-size:12px;font-weight:700;text-align:right;color:#00695c;border-right:1px solid #80cbc4;">${salesFmtFull(expCardTotal)}</td>
    <td style="padding:5px 6px;font-size:12px;font-weight:700;text-align:right;color:#00695c;border-right:1px solid #80cbc4;">${salesFmtFull(expLinePayTotal)}</td>
    <td style="padding:5px 6px;font-size:12px;font-weight:700;text-align:center;color:#00695c;">${expStallCount}天</td>`;

  return `<div>

// ── Daily input handler ──
function salesDayInput(input) {
  const year = parseInt(input.dataset.sy);
  const platform = input.dataset.sp;
  const month1 = parseInt(input.dataset.sm);
  const day = parseInt(input.dataset.sd);
  const rawVal = input.value;
  const val = parseFloat(rawVal) || 0;
  salesSetDay(year, platform, month1, day, val);
  if (rawVal !== '' && parseFloat(rawVal) > 0) {
    input.style.background = '#fff';
    input.style.color = '#888';
  } else {
    input.style.background = '#f7f7f7';
    input.style.color = '#f7f7f7';
  }

  // Update day row total
  const dayRow = document.getElementById(`srow_${day}`);
  if (dayRow) {
    const dayTotal = SALES_PLATFORMS.reduce((s,p) => {
      let v = salesGetDay(year, p, month1, day);
      if (p==='淘寶') v = Math.round(v*salesGetCNYRate(year, month1-1));
      return s+v;
    }, 0);
    const dtEl = dayRow.querySelector(`[data-sday-total="${day}"]`);
    if (dtEl) dtEl.textContent = dayTotal ? salesFmtFull(dayTotal) : '-';
  }

  // Update platform column total
  const platTotal = salesGetMonthSum(year, platform, month1);
  const ptEl = document.querySelector(`[data-splatform-total="${platform}"]`);
  if (ptEl) ptEl.textContent = salesFmtFull(platTotal);
  const phEl = document.querySelector(`[data-splatform-header="${platform}"]`);
  if (phEl) phEl.textContent = platTotal > 0 ? salesFmtFull(platTotal) : '-';

  // Update grand total
  const grandTotal = SALES_PLATFORMS.reduce((s,p)=>s+salesGetMonthSum(year,p,month1),0);
  const gtEl = document.querySelector('[data-splatform-total="__grand"]');
  if (gtEl) gtEl.textContent = salesFmtFull(grandTotal);
}

// ── 體驗店付款明細輸入 ──
function salesExpInput(key, field, val) {
  const data = JSON.parse(localStorage.getItem(key)||'{"cash":0,"card":0,"linepay":0,"stall":false}');
  if (field === 'stall') data.stall = !!val;
  else data[field] = parseFloat(val)||0;
  localStorage.setItem(key, JSON.stringify(data));
  // Auto-sum cash+card+linepay -> 體驗店 cell for that day
  const parts = key.split('_'); // sexp_year_month1_day
  const year = parseInt(parts[1]);
  const month1 = parseInt(parts[2]);
  const day = parseInt(parts[3]);
  const dayTotal = (parseFloat(data.cash)||0) + (parseFloat(data.card)||0) + (parseFloat(data.linepay)||0);
  salesSetDay(year, '體驗店', month1, day, dayTotal);
  const srow = document.getElementById('srow_' + day);
  if (srow) {
    srow.querySelectorAll('input[data-sp]').forEach(function(inp) {
      if (inp.dataset.sp === '體驗店') {
        inp.value = dayTotal > 0 ? dayTotal : '';
        inp.style.border = '1px solid ' + (dayTotal > 0 ? '#b2dfdb' : '#ececec');
      }
    });
    var allPlatTotal = SALES_PLATFORMS.reduce(function(s,p) {
      var v = salesGetDay(year, p, month1, day);
      if (p==='淘寶') v = Math.round(v*salesGetCNYRate(year, month1-1));
      return s+v;
    }, 0);
    var dtEl = srow.querySelector('[data-sday-total="' + day + '"]');
    if (dtEl) dtEl.textContent = allPlatTotal ? salesFmtFull(allPlatTotal) : '-';
  }
  // Update monthly totals in tfoot
  var dim = new Date(year, month1, 0).getDate();
  var cashT=0, cardT=0, linePayT=0, stallC=0;
  for (var d=1;d<=dim;d++) {
    var e = JSON.parse(localStorage.getItem('sexp_'+year+'_'+month1+'_'+d)||'{"cash":0,"card":0,"linepay":0,"stall":false}');
    cashT    += parseFloat(e.cash)||0;
    cardT    += parseFloat(e.card)||0;
    linePayT += parseFloat(e.linepay)||0;
    if (e.stall) stallC++;
  }
  var tfoot = document.querySelector('tfoot tr');
  if (tfoot) {
    var tds = tfoot.querySelectorAll('td');
    var base = 1 + SALES_PLATFORMS.length;
    if (tds[base])   tds[base].textContent   = salesFmtFull(cashT);
    if (tds[base+1]) tds[base+1].textContent = salesFmtFull(cardT);
    if (tds[base+2]) tds[base+2].textContent = salesFmtFull(linePayT);
    if (tds[base+3]) tds[base+3].textContent = stallC + '天';
  }
  // Update 體驗店 header cell total
  var expPlatTotal = salesGetMonthSum(year, '體驗店', month1);
  var expPhEl = document.querySelector('[data-splatform-header="體驗店"]');
  if (expPhEl) expPhEl.textContent = expPlatTotal > 0 ? salesFmtFull(expPlatTotal) : '-';
  var expPtEl = document.querySelector('[data-splatform-total="體驗店"]');
  if (expPtEl) expPtEl.textContent = salesFmtFull(expPlatTotal);
  // Update grand total
  var grandT = SALES_PLATFORMS.reduce(function(s,p){ return s+salesGetMonthSum(year,p,month1); }, 0);
  var gtEl2 = document.querySelector('[data-splatform-total="__grand"]');
  if (gtEl2) gtEl2.textContent = salesFmtFull(grandT);
}

function salesInitCharts() {
  if (typeof Chart === 'undefined' || salesActiveTab !== 'dashboard') return;
  Object.values(salesCharts).forEach(c => { try { c.destroy(); } catch(e){} });
  salesCharts = {};
  const year = salesActiveYear;

  const mcEl = document.getElementById('salesMonthlyChart');
  if (mcEl) {
    salesCharts.monthly = new Chart(mcEl, {
      type:'bar',
      data:{ labels:SALES_MONTHS_LABEL, datasets:SALES_PLATFORMS.map((p,i)=>({
        label:p, data:salesGetPlatformMonthly(year,p),
        backgroundColor:SALES_COLORS[i]+'aa', borderColor:SALES_COLORS[i], borderWidth:1, stack:'a'
      }))},
      options:{responsive:true,maintainAspectRatio:true,
        plugins:{legend:{display:false},tooltip:{mode:'index'}},
        scales:{x:{stacked:true,grid:{display:false}},y:{stacked:true,ticks:{callback:v=>(v/10000).toFixed(1)+'萬'}}}}
    });
  }
  const pieEl = document.getElementById('salesPieChart');
  if (pieEl) {
    const pieData = SALES_PLATFORMS.map(p=>salesGetPlatformTotal(year,p));
    const pieTotal = pieData.reduce((a,b)=>a+b,0);
    const pieLabels = SALES_PLATFORMS.filter((_,i)=>pieData[i]>0);
    const pieColors = SALES_COLORS.filter((_,i)=>pieData[i]>0);
    const pieFiltered = pieData.filter(v=>v>0);
    salesCharts.pie = new Chart(pieEl, {
      type:'doughnut',
      data:{labels:pieLabels,datasets:[{data:pieFiltered,backgroundColor:pieColors,borderWidth:2,borderColor:'#fff'}]},
      options:{responsive:true,maintainAspectRatio:true,cutout:'58%',
        plugins:{
          legend:{position:'right',labels:{font:{size:11},boxWidth:10,padding:8}},
          tooltip:{callbacks:{label:ctx=>`${ctx.label}: ${(ctx.parsed/(pieTotal||1)*100).toFixed(1)}%`}}
        }
      }
    });
  }
  const plEl = document.getElementById('salesPlatformChart');
  if (plEl) {
    salesCharts.platform = new Chart(plEl, {
      type:'line',
      data:{labels:SALES_MONTHS_LABEL,datasets:SALES_PLATFORMS.map((p,i)=>({
        label:p,data:salesGetPlatformMonthly(year,p),borderColor:SALES_COLORS[i],backgroundColor:SALES_COLORS[i]+'22',borderWidth:2,pointRadius:3,tension:0.3,fill:false
      }))},
      options:{responsive:true,maintainAspectRatio:true,
        plugins:{legend:{display:false}},
        scales:{x:{grid:{display:false}},y:{ticks:{callback:v=>(v/10000).toFixed(1)+'萬'}}}}
    });
  }
  const cmpEl = document.getElementById('salesCompareChart');
  if (cmpEl) {
    const cmpColors=['#b2dfdb','#f48fb1','#ffe082','#a5d6a7'];
    salesCharts.compare = new Chart(cmpEl, {
      type:'line',
      data:{labels:SALES_MONTHS_LABEL,datasets:SALES_YEARS.map((y,i)=>({
        label:String(y)+'年',data:Array.from({length:12},(_,m)=>salesGetMonthlyTotal(y,m+1)),
        borderColor:cmpColors[i],backgroundColor:cmpColors[i]+'33',borderWidth:y===year?3:1.5,pointRadius:y===year?4:2,tension:0.3,fill:false
      }))},
      options:{responsive:true,maintainAspectRatio:true,
        plugins:{legend:{position:'top',labels:{boxWidth:12,font:{size:11},padding:16}}},
        scales:{x:{grid:{display:false}},y:{ticks:{callback:v=>salesFmt(v)}}}}
    });
  }
  // 初始化跨年比較選中狀態
  window._salesCmpMode = window._salesCmpMode || '__total__';
  window._salesPlatformMode = window._salesPlatformMode || '__all__';
}

// ── 各平台月份明細切換 ──
window.salesSwitchPlatformChart = function(platform) {
  window._salesPlatformMode = platform;
  const ch = salesCharts.platform;
  if (!ch) return;
  ch.data.datasets.forEach((ds, i) => {
    ds.hidden = (platform !== '__all__' && ds.label !== platform);
    ds.fill = (platform !== '__all__');
  });
  ch.update();
};

// ── 跨年比較切換 ──
window.salesSwitchCompareChart = function(mode) {
  window._salesCmpMode = mode;
  // 更新按鈕樣式
  ['__total__',...SALES_PLATFORMS].forEach(k => {
    const btn = document.getElementById('cmp-btn-' + k);
    if (btn) {
      const active = k === mode;
      btn.style.background = active ? '#2d4a4a' : '#fff';
      btn.style.color = active ? '#fff' : '#555';
      btn.style.border = active ? 'none' : '1px solid #e0e0e0';
    }
  });
  const ch = salesCharts.compare;
  if (!ch) return;
  const year = salesActiveYear;
  const cmpColors=['#b2dfdb','#f48fb1','#ffe082','#a5d6a7'];
  if (mode === '__total__') {
    ch.data.datasets = SALES_YEARS.map((y,i)=>({
      label:String(y)+'年',
      data:Array.from({length:12},(_,m)=>salesGetMonthlyTotal(y,m+1)),
      borderColor:cmpColors[i],backgroundColor:cmpColors[i]+'33',
      borderWidth:y===year?3:1.5,pointRadius:y===year?4:2,tension:0.3,fill:false
    }));
  } else {
    ch.data.datasets = SALES_YEARS.map((y,i)=>({
      label:String(y)+'年',
      data:salesGetPlatformMonthly(y,mode),
      borderColor:cmpColors[i],backgroundColor:cmpColors[i]+'33',
      borderWidth:y===year?3:1.5,pointRadius:y===year?4:2,tension:0.3,fill:false
    }));
  }
  ch.update();
}

function salesSetGoal(v) {
  const g = parseInt(v)||20000000;
  salesSetGoalForYear(salesActiveYear, g);
  state.data.sales = state.data.sales || {};
  renderApp();
  requestAnimationFrame(salesInitCharts);
}
function salesSaveGoalNoRedraw(v) {
  const g = (parseInt(v)||2000) * 10000;
  salesSetGoalForYear(salesActiveYear, g);
  state.data.sales = state.data.sales || {};
  // Update progress bar in place without full re-render
  const yearTotal = salesGetYearTotal(salesActiveYear);
  const pct = Math.min(100, Math.round(yearTotal / g * 100));
  const bar = document.getElementById('sales-goal-bar');
  const pctEl = document.getElementById('sales-goal-pct');
  const infoEl = document.getElementById('sales-goal-info');
  if (bar) { bar.style.width = pct + '%'; bar.style.background = pct>=100?'#69f0ae':pct>=70?'#ffeb3b':'#a5d6a7'; }
  if (pctEl) pctEl.textContent = pct + '%';
  if (infoEl) infoEl.textContent = '目標 ' + salesFmtFull(g) + ' 元';
}
function salesSetGoalWan(v) {
  const g = (parseInt(v)||2000) * 10000;
  salesSetGoalForYear(salesActiveYear, g);
  state.data.sales = state.data.sales || {};
  renderApp();
  requestAnimationFrame(salesInitCharts);
}
function salesSetRate(year, month, val) {
  const rates = JSON.parse(localStorage.getItem('sales_cny_rates')||'{}');

}

window.applyPermGroup = async function(userId, groupName) {
  let newPerms = [];
  if (groupName !== '清除') {
    const group = PERMISSION_GROUPS[groupName];
    if (!group) return;
    newPerms = [...group.pages];
  }
  const { error } = await db.from('profiles').update({ permissions: newPerms }).eq('id', userId);
  if (error) { showToast('更新失敗：'+error.message, 'error'); return; }
  const user = (state.data.users||[]).find(u=>u.id===userId);
  if (user) user.permissions = newPerms;
  showToast(groupName === '清除' ? '已清除所有權限' : `已套用「${groupName}」群組權限`);
  renderApp();
};

window.toggleUserPerm = async function(userId, pageKey, currentlyHas) {
  const user = (state.data.users||[]).find(u=>u.id===userId);
  if (!user) return;
  let perms = Array.isArray(user.permissions) ? [...user.permissions] : [];
  if (currentlyHas) {
    perms = perms.filter(p => p !== pageKey);
  } else {
    if (!perms.includes(pageKey)) perms.push(pageKey);
  }
  const { error } = await db.from('profiles').update({ permissions: perms }).eq('id', userId);
  if (error) { showToast('更新失敗：'+error.message, 'error'); return; }
  user.permissions = perms;
  renderApp();
};

// 層級色彩設定
const IP_LEVEL_STYLES = [
  { bg:'#e8f5f4', text:'#00695c', label:'大', size:14, weight:700 }, // level 0 (大分類)
  { bg:'#f0f7f6', text:'#37474f', label:'中', size:13, weight:600 }, // level 1 (中分類)
  { bg:'#fafafa', text:'#546e7a', label:'角', size:13, weight:500 }, // level 2 (角色/IP)
  { bg:'#ffffff', text:'#546e7a', label:'系', size:12, weight:400 }, // series
];

// 摺疊狀態
const ipMgrCollapsed = {};

function renderIPManager() {
  const tree = state.data.ipTree || [];

  function renderMgrNode(node, depth) {
    const st = IP_LEVEL_STYLES[Math.min(depth, 2)];
    const hasChildren = node.children?.length > 0;
    const hasSeries = node.series?.length > 0;
    // 預設折疊（undefined = 未點過 = 折疊；false = 用戶展開）
    const isCollapsed = ipMgrCollapsed[node.id] !== false;
    const accentColor = node.color || null;
    // 顏色邏輯：只有代碼 badge 跟著自訂顏色，底色/文字固定
    const nodeBg    = st.bg;
    const nodeText  = st.text;
    const borderColor = depth===0 ? '#4db6ac' : depth===1 ? '#b2dfdb' : '#e0e0e0';
    const defaultCodeBg = depth===0 ? '#4db6ac' : depth===1 ? '#80cbc4' : '#90a4ae';
    const codeBg    = (depth === 2 && accentColor) ? accentColor : defaultCodeBg;
    // hover 顏色依層級
    const hoverBg   = depth===0 ? 'rgba(77,182,172,.10)' : depth===1 ? 'rgba(77,182,172,.06)' : 'rgba(0,0,0,.03)';

    const escapedName = node.name.replace(/'/g,"\\'").replace(/"/g,'&quot;');

    return `<div class="ip-mgr-node" data-id="${node.id}" data-depth="${depth}" style="margin-bottom:3px">
      <div style="display:flex;align-items:center;gap:6px;padding:8px 12px;background:${nodeBg};border-radius:6px;border-left:4px solid ${borderColor};cursor:default;transition:background .15s"
           onmouseenter="this.style.background='${hoverBg}'" onmouseleave="this.style.background='${nodeBg}'"
           ondragover="ipDragOver(event,this)" ondrop="ipDrop(event,this,'${node.id}')" ondragenter="this.style.outline='2px dashed var(--accent)'" ondragleave="this.style.outline=''">
        <!-- 摺疊按鈕 -->
        ${hasChildren||hasSeries ? `<span onclick="ipToggleCollapse('${node.id}')" style="cursor:pointer;font-size:11px;color:${nodeText};opacity:.7;min-width:14px;text-align:center">${isCollapsed?'▶':'▼'}</span>` : '<span style="min-width:14px"></span>'}
        <!-- 層級標籤 -->
        <span style="font-size:10px;background:rgba(0,0,0,.06);color:${nodeText};padding:1px 5px;border-radius:3px;min-width:22px;text-align:center">${st.label}</span>
        <!-- 代碼（自訂顏色只改這裡） -->
        ${node.code?`<span style="font-size:11px;font-weight:700;background:${codeBg};color:#fff;padding:2px 6px;border-radius:4px">${node.code}</span>`:''}
        <!-- 名稱 -->
        <span style="font-size:${st.size}px;font-weight:${st.weight};color:${nodeText};flex:1">${node.name}</span>
        <!-- 狀態 -->
        <span style="font-size:10px;padding:1px 6px;border-radius:3px;background:${node.is_active?'#c8e6c9':'#eeeeee'};color:${node.is_active?'#2e7d32':'#757575'}">${node.is_active?'啟用':'停用'}</span>
        <!-- 顏色點（level 2 才顯示）：顯示目前代碼的顏色 -->
        ${depth===2?`<span onclick="ipMgrSetColor('${node.id}','${escapedName}','${node.color||''}')" style="width:16px;height:16px;border-radius:50%;background:${codeBg};border:2px solid rgba(0,0,0,.15);cursor:pointer;flex-shrink:0" title="設定代碼顏色"></span>`:''}
        <!-- 操作 -->
        <div class="action-btns" style="flex-shrink:0">
          <button class="btn-table" onclick="ipMgrToggle('${node.id}',${node.is_active})">${node.is_active?'停用':'啟用'}</button>
          ${depth < 2 ? `<button class="btn-table" onclick="ipMgrAddChild('${node.id}','${escapedName}',${depth+1})">+ 子項</button>` : ''}
          ${depth === 2 ? `<button class="btn-table" onclick="ipMgrAddSeriesTo('${node.id}','${escapedName}')">+ 系列</button>` : ''}
          <button class="btn-table" onclick="ipMgrEdit('${node.id}','${escapedName}','${node.code||''}')">編輯</button>
          ${!hasChildren&&!hasSeries ? `<button class="btn-table danger" onclick="ipMgrDelete('${node.id}','${escapedName}')">刪除</button>` : ''}
        </div>
      </div>
      <!-- 子節點 -->
      ${!isCollapsed ? `<div style="margin-left:20px;margin-top:2px">
        ${hasChildren ? node.children.map(c=>renderMgrNode(c,depth+1)).join('') : ''}
        ${hasSeries ? node.series.map(s=>{
          const es = s.name.replace(/'/g,"\\'");
          return `<div style="display:flex;align-items:center;gap:8px;padding:6px 12px;background:#ffffff;border-radius:4px;margin-bottom:2px;border-left:3px solid #e0e0e0;transition:background .15s"
            onmouseenter="this.style.background='rgba(0,0,0,.03)'" onmouseleave="this.style.background='#ffffff'">
            <span style="font-size:10px;color:var(--muted);background:#eeeeee;padding:1px 5px;border-radius:3px">系</span>
            <span style="font-size:12px;flex:1;color:var(--text)">${s.name}</span>
            <button class="btn-table" onclick="ipMgrEditSeries('${s.id}','${es}')">編輯</button>
            <button class="btn-table danger" onclick="ipMgrDeleteSeries('${s.id}','${es}')">刪除</button>
          </div>`;
        }).join('') : ''}
      </div>` : ''}
    </div>`;
  }

  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div style="font-size:12px;color:var(--muted);display:flex;align-items:center;gap:12px;flex-wrap:wrap">
        <span style="display:inline-flex;align-items:center;gap:4px"><span style="display:inline-block;width:8px;height:8px;background:#4db6ac;border-radius:2px"></span>大分類</span>
        <span style="display:inline-flex;align-items:center;gap:4px"><span style="display:inline-block;width:8px;height:8px;background:#80cbc4;border-radius:2px"></span>中分類</span>
        <span style="display:inline-flex;align-items:center;gap:4px"><span style="display:inline-block;width:8px;height:8px;background:#90a4ae;border-radius:2px"></span>角色/IP <span style="color:#aaa">（點●自訂代碼顏色）</span></span>
        <span style="display:inline-flex;align-items:center;gap:4px"><span style="display:inline-block;width:8px;height:8px;background:#e0e0e0;border-radius:2px"></span>系列</span>
      </div>
      <button class="btn btn-primary" onclick="ipMgrAddRoot()">+ 新增大分類</button>
    </div>
    <div id="ip-mgr-tree">
      ${tree.length === 0 ? '<div class="card"><div class="empty"><div class="empty-icon">🏷️</div><p>尚無分類</p></div></div>' :
        tree.map(n=>renderMgrNode(n,0)).join('')}
    </div>`;
}

function renderApprovals() {
  const list = state.data.approvalRequests || [];
  const tab  = state.data.approvalsTab || 'pending';

  const tabs = [
    { key:'pending',  label:'⏳ 待審核' },
    { key:'approved', label:'✅ 已核准' },
    { key:'rejected', label:'❌ 已退回' },
  ];

  const filtered = list.filter(r => r.status === tab);

  const typeLabel = { price_change:'價格變動', stock_adjust:'庫存調整', casting_restock:'鑄件補貨單' };
  const itemLabel = { casting:'鑄件', part:'零件', product:'商品', casting_restock_order:'補貨單' };

  const rows = filtered.map(r => {
    const chg = r.change_data || {};
    const cur  = r.current_data || {};
    const chgText = r.request_type === 'price_change'
      ? [
          cur.unit_price != null || chg.unit_price != null
            ? `單價：${cur.unit_price!=null?'$'+cur.unit_price:'—'} → ${chg.unit_price!=null?'$'+chg.unit_price:'—'}`
            : null,
          cur.mold_fee != null || chg.mold_fee != null
            ? `模具工錢：${cur.mold_fee!=null?'$'+cur.mold_fee:'—'} → ${chg.mold_fee!=null?'$'+chg.mold_fee:'—'}`
            : null,
        ].filter(Boolean).join('；')
      : (r.note || '');

    const statusColor = { pending:'#f57c00', approved:'#2e7d32', rejected:'#c62828' };
    const statusLabel = { pending:'待審核', approved:'已核准', rejected:'已退回' };

    return `
    <tr>
      <td>${new Date(r.created_at).toLocaleDateString('zh-TW')}</td>
      <td><span style="background:#e8f5f4;color:#00695c;border-radius:4px;padding:2px 8px;font-size:12px">${typeLabel[r.request_type]||r.request_type}</span></td>
      <td><span style="color:var(--muted);font-size:12px">${itemLabel[r.item_type]||r.item_type}</span> ${r.item_name||'—'}</td>
      <td style="font-size:13px;color:#444">${chgText}</td>
      <td style="font-size:12px;color:var(--muted)">${r.note||'—'}</td>
      <td><span style="background:${statusColor[r.status]||'#90a4ae'}22;color:${statusColor[r.status]||'#90a4ae'};border-radius:4px;padding:2px 8px;font-size:12px;font-weight:600">${statusLabel[r.status]||r.status}</span></td>
      ${r.status==='pending' ? `
      <td style="white-space:nowrap">
        <button class="btn-table" style="background:#e0f2f1;color:#2e7d32;margin-right:4px" data-action="approve-request" data-id="${r.id}">核准</button>
        <button class="btn-table" style="background:#ffebee;color:#c62828" data-action="reject-request" data-id="${r.id}">退回</button>
      </td>` : `<td style="font-size:12px;color:var(--muted)">${r.review_note||'—'}</td>`}
    </tr>`;
  }).join('');

  return `
  <div class="tabs" style="margin-bottom:16px">
    ${tabs.map(t=>`<div class="tab ${tab===t.key?'active':''}" data-approvals-tab="${t.key}">${t.label}${t.key==='pending'&&list.filter(x=>x.status==='pending').length>0?` <span style="background:var(--danger);color:#fff;border-radius:10px;font-size:11px;padding:1px 6px;margin-left:4px">${list.filter(x=>x.status==='pending').length}</span>`:''}</div>`).join('')}
  </div>
  ${filtered.length === 0 ? '<div class="empty"><p>暫無資料</p></div>' : `
  <table class="data-table">
    <thead><tr>
      <th>申請日期</th><th>類型</th><th>對象</th><th>變更內容</th><th>說明</th><th>狀態</th><th>操作 / 備註</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`}`;
}

async function loadApprovals() {
  const { data } = await db.from('approval_requests').select('*').order('created_at', { ascending: false });
  state.data.approvalRequests = data || [];
}

async function approveRequest(id) {
  const req = (state.data.approvalRequests||[]).find(r=>r.id===id);
  if (!req) return;
  // Apply the change
  if (req.request_type === 'price_change') {
    const update = {};
    if (req.change_data?.unit_price !== undefined) update.unit_price = req.change_data.unit_price;
    if (req.change_data?.mold_fee   !== undefined) update.mold_fee   = req.change_data.mold_fee;
    const table = req.item_type === 'casting' ? 'castings' : req.item_type === 'part' ? 'parts' : 'products';
    const {error} = await db.from(table).update(update).eq('id', req.item_id);
    if (error) { showToast('套用價格失敗：'+error.message,'error'); return; }
  }
  await db.from('approval_requests').update({ status:'approved', reviewed_at: new Date().toISOString() }).eq('id', id);
  showToast('✅ 已核准，價格已更新');
  await loadApprovals();
  if (req.item_type === 'casting') await loadCastings();
  renderApp();
}

async function rejectRequest(id) {
  showModal('退回原因', `
    <div class="form-group">
      <label>退回說明（選填）</label>
      <textarea class="form-control" id="reject-note" rows="3" placeholder="請說明退回原因..."></textarea>
    </div>
  `, [
    { label:'確認退回', primary: false, onclick: async () => {
      const note = document.getElementById('reject-note')?.value.trim() || '';
      await db.from('approval_requests').update({ status:'rejected', review_note: note||null, reviewed_at: new Date().toISOString() }).eq('id', id);
      showToast('已退回此申請');
      closeModal();
      await loadApprovals(); renderApp();
    }},
    { label:'取消', onclick: closeModal },
  ]);
}

function renderSettingsVendors() {
  var showInactive = state.data.vendorShowInactive || false;
  var vendorSort = state.data.vendorSort || 'asc'; // asc/desc by 編號
  var allVendors = (state.data.accounting && state.data.accounting.vendors) ? state.data.accounting.vendors : [];
  var vendors = allVendors.filter(function(v) { return showInactive || v.is_active !== false; });
  // 依編號排序：前綴字母 A→Z，同前綴再按數字大小；沒有 code 的排最後
  function parseCode(code) {
    if (!code || String(code).trim() === '') return { prefix: 'ZZZZZ', num: 99999 };
    var m = String(code).trim().match(/^([A-Za-z]*)(\d+)$/);
    if (m) return { prefix: m[1].toUpperCase(), num: parseInt(m[2]) };
    return { prefix: String(code).trim().toUpperCase(), num: 0 };
  }
  vendors = vendors.slice().sort(function(a, b) {
    var ca = parseCode(a.code);
    var cb = parseCode(b.code);
    if (ca.prefix !== cb.prefix) {
      var cmp = ca.prefix.localeCompare(cb.prefix);
      return vendorSort === 'asc' ? cmp : -cmp;
    }
    if (ca.num !== cb.num) return vendorSort === 'asc' ? ca.num - cb.num : cb.num - ca.num;
    return 0;
  });
  var rows = vendors.map(function(v, i) {
    var isActive = v.is_active !== false;
    var typeLabel = v.type === 'client' ? '客戶' : '廠商';
    return '<tr data-vendor-id="' + v.id + '" style="border-bottom:1px solid var(--border);background:var(--card);transition:background .15s;" onmouseover="this.style.background=\'#f0fafa\'" onmouseout="this.style.background=\'var(--card)\'">'
      + '<td style="padding:6px 4px;text-align:center;cursor:grab;color:var(--muted);width:24px;"><span class="drag-handle" title="拖曳排序">⠿</span></td>'
      + '<td style="padding:6px 8px;font-size:12px;color:var(--muted);text-align:center;width:50px;">' + (v.code || (i+1)) + '</td>'
      + '<td style="padding:6px 8px;font-size:13px;font-weight:500;">' + (v.company_name||'') + '</td>'
      + '<td style="padding:6px 8px;font-size:12px;color:var(--muted);">' + (v.name||'') + '</td>'
      + '<td style="padding:6px 8px;font-size:12px;">' + (v.tax_id||'') + '</td>'
      + '<td style="padding:6px 8px;font-size:12px;">' + typeLabel + '</td>'
      + '<td style="padding:6px 8px;font-size:12px;">' + (v.contact_name||'') + '</td>'
      + '<td style="padding:6px 8px;font-size:12px;">' + (v.contact_phone||'') + '</td>'
      + '<td style="padding:6px 8px;font-size:12px;">' + (v.bank_name||'') + (v.bank_code ? '<br><span style="color:var(--accent);font-size:11px;font-weight:600">'+v.bank_code+'</span>' : '') + '</td>'
      + '<td style="padding:6px 8px;font-size:12px;">' + (v.bank_account||'') + '</td>'
      + '<td style="padding:6px 8px;font-size:12px;color:var(--muted);">' + (v.email||'') + '</td>'
      + '<td style="padding:6px 8px;white-space:nowrap;">'
        + '<button class="btn btn-outline" style="font-size:11px;padding:2px 8px;margin-right:4px;" onclick="modalEditVendorById(\'' + v.id + '\')">編輯</button>'
        + '<button class="btn btn-outline" style="font-size:11px;padding:2px 8px;color:' + (isActive?'#ef4444':'#22c55e') + ';" onclick="toggleVendorActive(\'' + v.id + '\',' + (isActive?'true':'false') + ')">' + (isActive?'停用':'啟用') + '</button>'
      + '</td>'
      + '</tr>';
  }).join('');
  var sortIcon = vendorSort === 'asc' ? ' ▲' : ' ▼';
  return '<div class="card">'
    + '<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">'
    + '<span style="font-weight:600;font-size:14px;">廠商列表</span>'
    + '<span style="font-size:12px;color:var(--muted);">共 ' + vendors.length + ' 筆</span>'
    + '<button class="btn btn-primary" style="font-size:12px;padding:4px 12px;" onclick="modalAddVendor()">+ 新增廠商</button>'
    + '<label style="font-size:12px;color:var(--muted);cursor:pointer;margin-left:auto;"><input type="checkbox"' + (showInactive ? ' checked' : '') + ' onchange="state.data.vendorShowInactive=this.checked;renderApp()"> 顯示停用</label>'
    + '</div><div style="overflow-x:auto;">'
    + '<table style="width:100%;border-collapse:collapse;">'
    + '<thead><tr style="border-bottom:2px solid var(--border);background:var(--surface);">'
    + '<th style="width:24px;"></th>'
    + '<th style="padding:6px 8px;text-align:center;font-size:12px;color:var(--muted);width:50px;cursor:pointer;user-select:none;" onclick="window._toggleVendorSort()">編號' + sortIcon + '</th>'
    + '<th style="padding:6px 8px;text-align:left;font-size:12px;color:var(--muted);">公司全名</th>'
    + '<th style="padding:6px 8px;text-align:left;font-size:12px;color:var(--muted);">公司簡稱</th>'

    + '</table></div></div>';
}

          + '</td></tr>';
      }).join('');
  return '<div class="card">'
    + '<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">'
    + '<span style="font-weight:600;font-size:14px">📋 AP 固定範本</span>'
    + '<span style="font-size:12px;color:var(--muted)">設定每月固定廠商的帶入方式與付款條件</span>'
    + '<button class="btn btn-primary" style="font-size:12px;padding:4px 12px;margin-left:auto" onclick="window._addAPTemplate()">+ 新增</button>'
    + '</div>'
    + '<table style="width:100%;border-collapse:collapse">'
    + '<thead><tr style="border-bottom:2px solid var(--border);background:var(--surface)">'
    + '<th style="padding:8px;text-align:left;font-size:12px;color:var(--muted)">廠商</th>'
    + '<th style="padding:8px;text-align:left;font-size:12px;color:var(--muted)">品項說明</th>'
    + '<th style="padding:8px;text-align:left;font-size:12px;color:var(--muted)">成本分類</th>'
    + '<th style="padding:8px;text-align:left;font-size:12px;color:var(--muted)">付款條件</th>'
    + '<th style="padding:8px;text-align:left;font-size:12px;color:var(--muted)">帶入金額</th>'
    + '<th style="padding:8px"></th>'
    + '</tr></thead>'
    + '<tbody>' + rows + '</tbody>'
    + '</table></div>';
}

window._addAPTemplate = function() {
  showModal('新增 AP 範本', _aptFormHtml(), [
    { label:'儲存', primary:true, onclick: function() {
      var vid = document.getElementById('apt-vendor-id').value;
      if (!vid) { showToast('請選擇廠商', 'error'); return; }
      var vendors = (state.data.accounting && state.data.accounting.vendors) || [];
      var v = vendors.find(function(x){ return String(x.id) === String(vid); });
      var amtMode = document.getElementById('apt-amount-mode').value;
      if (!state.data.apTemplates) state.data.apTemplates = [];
      state.data.apTemplates.push({
        vendor_id: vid,
        vendor_name: v ? (v.company_name||v.name) : '',
        item_desc: document.getElementById('apt-desc').value.trim(),
        cost_category: document.getElementById('apt-cost-cat').value || null,
        pay_term: document.getElementById('apt-pay-term').value || null,
        amount_mode: amtMode,
        default_amount: amtMode === 'fixed' ? (parseInt(document.getElementById('apt-amount').value)||0) : 0,
      });
      localStorage.setItem('story_ap_templates', JSON.stringify(state.data.apTemplates));
      closeModal(); renderApp(); showToast('範本已儲存');
    }},
    { label:'取消', onclick: closeModal }
  ]);
};

window._editAPTemplate = function(i) {

  var curVendor = vendors.find(function(v){ return String(v.id)===String(t.vendor_id); });

    { label:'儲存', primary:true, onclick: function() {
      var vid = document.getElementById('apt-vendor-id').value;
      if (!vid) { showToast('請選擇廠商', 'error'); return; }
      var vendors2 = (state.data.accounting && state.data.accounting.vendors) || [];
      var v = vendors2.find(function(x){ return String(x.id) === String(vid); });
      var amtMode = document.getElementById('apt-amount-mode').value;
      state.data.apTemplates[i] = {
        vendor_id: vid,
        vendor_name: v ? (v.company_name||v.name) : '',

window._aptVendorSearch = function(inputEl) {
  var q = inputEl.value.trim();
  var listEl = document.getElementById('apt-vendor-suggestions');
  var hiddenEl = document.getElementById('apt-vendor-id');
  if (hiddenEl) hiddenEl.value = ''; // 清除已選
  if (!listEl) return;
  if (!q) { listEl.innerHTML=''; listEl.style.display='none'; return; }
  var vendors = (state.data.accounting && state.data.accounting.vendors) || [];
  var keywords = q.split(/\s+/).filter(Boolean);
  var results = vendors.filter(function(v){
    if (v.is_active === false || v.is_active === 0) return false;
    var name = (v.company_name||'') + (v.name||'');
    return keywords.every(function(kw){ return name.includes(kw); });
  }).slice(0, 15);
  if (results.length === 0) { listEl.innerHTML='<div style="padding:8px 10px;font-size:12px;color:var(--muted)">找不到廠商</div>'; listEl.style.display='block'; return; }
  listEl.innerHTML = results.map(function(v){
    var name = v.company_name || v.name;
    var short = (v.name && v.name !== v.company_name) ? ' <span style="color:var(--muted);font-size:11px">('+v.name+')</span>' : '';
    return '<div style="padding:7px 10px;cursor:pointer;font-size:13px;border-bottom:1px solid #f0f0f0" '
      + 'onmousedown="window._aptVendorSelect(\''+v.id+'\',\''+name.replace(/'/g,"\\'")+'\')" '
      + 'onmouseover="this.style.background=\'#f0fafa\'" onmouseout="this.style.background=\'\'">'
      + name + short + '</div>';
  }).join('');
  listEl.style.display = 'block';
};

window._aptVendorSelect = function(id, name) {
  var searchEl = document.getElementById('apt-vendor-search');
  var hiddenEl = document.getElementById('apt-vendor-id');
  var listEl   = document.getElementById('apt-vendor-suggestions');
  if (searchEl) searchEl.value = name;
  if (hiddenEl) hiddenEl.value = id;
  if (listEl)   { listEl.innerHTML=''; listEl.style.display='none'; }
};

window._delAPTemplate = function(i) {
  if (!confirm('確定刪除此範本？')) return;
  state.data.apTemplates.splice(i, 1);
  localStorage.setItem('story_ap_templates', JSON.stringify(state.data.apTemplates));
  renderApp();
  showToast('已刪除');
};

// 套用 AP 範本：帶入上月同廠商金額，逐筆草稿確認
window._applyAPTemplate = function() {
  var templates = state.data.apTemplates || [];
  if (templates.length === 0) {
    alert('尚無範本，請先至「系統設定 → AP範本」設定固定廠商');
    return;
  }
  var ap = (state.data.accounting && state.data.accounting.ap) || [];
  var vendors = (state.data.accounting && state.data.accounting.vendors) || [];

  // 取得目前選擇月份
  var now2 = new Date();
  var defaultYm = now2.getFullYear().toString() + String(now2.getMonth()+1).padStart(2,'0');
  var selectedYm = state.data.accounting.ym || defaultYm;

  // 計算上月 YYYYMM
  var y = parseInt(selectedYm.slice(0,4));
  var m = parseInt(selectedYm.slice(4,6));
  m -= 1; if (m < 1) { m = 12; y -= 1; }
  var prevYm = y.toString() + String(m).padStart(2,'0');
  var prevYmDash = y.toString() + '-' + String(m).padStart(2,'0'); // YYYY-MM

  // 已存在當月的廠商（避免重複）
  var existingVendorIds = new Set(
    ap.filter(function(r){
      var rYm = (r.billing_month||r.item_date||'').slice(0,7).replace('-','');
      return rYm === selectedYm;
    }).map(function(r){ return String(r.vendor_id||''); })
  );

  // 建立草稿清單
  var drafts = templates.map(function(t) {
    var v = vendors.find(function(x){ return String(x.id) === String(t.vendor_id); });
    var vname = v ? (v.company_name||v.name) : t.vendor_name;
    var amtMode = t.amount_mode || 'last_month';
    var amount = 0;
    if (amtMode === 'fixed') {
      amount = t.default_amount || 0;
    } else if (amtMode === 'zero') {
      amount = 0;
    } else {
      // 帶入上月同廠商金額
      var prevRecord = ap.find(function(r){
        var rYm = (r.billing_month||r.item_date||'').slice(0,7).replace('-','');
        return rYm === prevYm && String(r.vendor_id) === String(t.vendor_id);
      });
      amount = prevRecord ? (prevRecord.amount||0) : (t.default_amount||0);
    }
    // 計算預計付款日
    var payTerm = t.pay_term || '';
    var dueDateStr = '';
    if (payTerm) {
      var selY = parseInt(selectedYm.slice(0,4));
      var selM = parseInt(selectedYm.slice(4,6)) - 1; // 0-indexed
      if (payTerm==='M1') selM+=1;
      else if (payTerm==='M2') selM+=2;
      else if (payTerm==='M3') selM+=3;
      if (selM>11){ selY+=Math.floor(selM/12); selM=selM%12; }
      dueDateStr = selY+'-'+String(selM+1).padStart(2,'0')+'-10';
    }
    return {
      vendor_id: t.vendor_id, vendor_name: vname, item_desc: t.item_desc||'',
      amount: amount, cost_category: t.cost_category||'', pay_term: payTerm,
      due_date: dueDateStr, alreadyExists: existingVendorIds.has(String(t.vendor_id))
    };
  });

  // 顯示確認 modal，逐筆草稿
  var draftRows = drafts.map(function(d, i) {
    return '<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)">'
      + '<input type="checkbox" id="apt-chk-' + i + '" ' + (d.alreadyExists ? '' : 'checked') + ' style="width:16px;height:16px">'
      + '<span style="min-width:120px;font-size:13px;font-weight:500">' + d.vendor_name + '</span>'
      + '<input class="form-control" id="apt-amount-' + i + '" type="number" value="' + d.amount + '" style="width:100px;font-size:13px">'
      + '<input class="form-control" id="apt-desc-' + i + '" value="' + (d.item_desc||'') + '" placeholder="品項說明" style="flex:1;font-size:12px">'
      + (d.alreadyExists ? '<span style="font-size:11px;color:#f59e0b">⚠ 當月已有記錄</span>' : '')
      + '</div>';
  }).join('');

  showModal('套用 AP 範本 — ' + selectedYm,
    '<div style="font-size:12px;color:var(--muted);margin-bottom:12px">勾選要新增的廠商，確認金額後按「確認新增」</div>'
    + '<div style="display:flex;gap:8px;padding:4px 0;font-size:11px;color:var(--muted);font-weight:600">'
    + '<span style="width:16px"></span><span style="min-width:120px">廠商</span><span style="width:100px">金額</span><span style="flex:1">品項說明</span></div>'
    + draftRows,
    [{
      label: '確認新增', primary: true,
      onclick: async function() {
        var toInsert = [];
        drafts.forEach(function(d, i) {
          var chk = document.getElementById('apt-chk-' + i);
          if (!chk || !chk.checked) return;
          var amount = parseInt(document.getElementById('apt-amount-' + i)?.value) || 0;
          var desc = document.getElementById('apt-desc-' + i)?.value.trim() || '';
          toInsert.push({
            vendor_id: d.vendor_id, vendor_name: d.vendor_name, applicant_name: d.vendor_name,
            amount: amount, item_desc: desc,
            billing_month: prevYmDash,
            year_month: selectedYm,
            cost_category: d.cost_category || null,
            pay_term: d.pay_term || null,
            payment_due_date: d.due_date || null,
            created_by: state.user?.id || null,
            updated_at: new Date().toISOString(),
          });
        });
        if (toInsert.length === 0) { alert('請至少勾選一筆'); return; }
        closeModal();
        var inserted = 0;
        for (var k = 0; k < toInsert.length; k++) {
          var row = toInsert[k];
          var { error } = await db.from('accounts_payable').insert(row);
          if (!error) inserted++;
        }
        await loadAccounting(); renderApp();
        showToast('已新增 ' + inserted + ' 筆 AP 記錄');
      }
    }, { label:'取消', onclick: closeModal }]
  );
};
