async function handleAction(action, id, dataset) {
  switch(action) {
    case 'edit-todo': {
      if (!(state.data.users||[]).length) await loadUsers();
      const t = (state.data.todos||[]).find(t=>t.id===id);
      if (t) modalAddTodo(t);
      break;
    }

    case 'done-todo':
      await db.from('todos').update({ status:'完成', completed_at: new Date().toISOString() }).eq('id', id);
      showToast('已標記完成！');
      await loadTodos(); renderApp();
      break;

    case 'del-todo':
      if (!confirm('確定要刪除這筆待辦事項？')) return;
      await db.from('todos').delete().eq('id', id);
      showToast('待辦事項已刪除');
      await loadTodos(); renderApp();
      break;

    case 'reply-cs':
      await db.from('cs_records').update({ reply_status:'已回覆', replied_by: state.user?.id, replied_at: new Date().toISOString() }).eq('id', id);
      showToast('已標記為已回覆');
      await loadCS(); renderApp();
      break;

    case 'close-cs':
      await db.from('cs_records').update({ reply_status:'已結案' }).eq('id', id);
      showToast('已結案');
      await loadCS(); renderApp();
      break;

    case 'approve-request':
      await approveRequest(id);
      break;

    case 'reject-request':
      await rejectRequest(id);
      break;

    case 'approve-restock':
      await db.from('restock_orders').update({ status:'覆核通過', reviewer_id: state.user?.id, reviewed_at: new Date().toISOString() }).eq('id', id);
      showToast('補貨單已覆核通過！');
      await loadRestock(); renderApp();
      break;

    case 'reject-restock':
      await db.from('restock_orders').update({ status:'退回', reviewer_id: state.user?.id, reviewed_at: new Date().toISOString() }).eq('id', id);
      showToast('補貨單已退回');
      await loadRestock(); renderApp();
      break;

    case 'approve-casting-restock': {
      const order = (state.data.castingRestock||[]).find(r=>r.id===id);
      if (!order) { showToast('找不到補貨單','error'); break; }
      const items = order.casting_restock_items || [];
      const rows = items.map(it => `<tr>
        <td>${it.castings?.name||'—'}</td>
        <td style="text-align:center"><span style="background:${it.item_type==='remelt'?'#fff8e1':'#e8f5f4'};color:${it.item_type==='remelt'?'#e65100':'#00695c'};padding:2px 8px;border-radius:4px;font-size:12px">${it.item_type==='remelt'?'🔸 改蠟':'⚪ 下臘'}</span></td>
        <td style="text-align:center">${it.item_type==='remelt'?`改為 #${it.remelt_size||'?'}`:`${it.wax_qty||1} 支`}</td>
        <td style="text-align:center;color:var(--danger)">${it.short_qty!=null?`缺 ${it.short_qty}`:'—'}</td>
        <td style="font-size:12px;color:var(--muted)">${it.note||'—'}</td>
      </tr>`).join('');
      showModal(`✅ 確認核准：${order.order_no||''}`, `
        <div style="display:flex;gap:16px;margin-bottom:12px;font-size:13px;flex-wrap:wrap">
          <div>日期：<strong>${order.order_date||'—'}</strong></div>
          <div>截止：<strong>${order.deadline||'—'}</strong></div>
          <div>明細：<strong>${items.length} 項</strong></div>
        </div>
        <table class="data-table">
          <thead><tr><th>鑄件</th><th>類型</th><th>數量/說明</th><th>缺少</th><th>備註</th></tr></thead>
          <tbody>${rows||'<tr><td colspan="5" style="text-align:center;color:var(--muted)">無明細</td></tr>'}</tbody>
        </table>
        ${order.note?`<div style="margin-top:10px;font-size:13px;color:var(--muted)">整單備註：${order.note}</div>`:''}
        <div style="margin-top:12px;padding:10px;background:#e0f2f1;border-radius:6px;font-size:13px;color:#2e7d32">
          核准後狀態將改為「製作中」
        </div>
      `, [
        { label:'確認核准', primary:true, onclick: async () => {
          await db.from('casting_restock_orders').update({
            status: '製作中',
            reviewed_by: state.user?.id,
            reviewed_at: new Date().toISOString()
          }).eq('id', id);
          await db.from('approval_requests').update({
            status: 'approved',
            reviewed_at: new Date().toISOString()
          }).eq('item_id', id).eq('request_type','casting_restock');
          showToast('✅ 鑄件補貨單已核准，進入製作中');
          closeModal();
          await loadRestock(); await loadApprovals(); renderApp();
        }},
        { label:'取消', onclick: closeModal },
      ]);
      break;
    }

    case 'reject-casting-restock': {
      showModal('退回鑄件補貨單', `
        <div class="form-group">
          <label>退回說明</label>
          <textarea class="form-control" id="cr-reject-note" rows="3" placeholder="請說明退回原因…"></textarea>
        </div>
      `, [
        { label:'確認退回', primary:false, onclick: async () => {
          const note = document.getElementById('cr-reject-note')?.value.trim()||'';
          await db.from('casting_restock_orders').update({
            status: '已退回',
            reviewed_by: state.user?.id,
            reviewed_at: new Date().toISOString(),
            note: note||null
          }).eq('id', id);
          await db.from('approval_requests').update({
            status: 'rejected',
            review_note: note||null,
            reviewed_at: new Date().toISOString()
          }).eq('item_id', id).eq('request_type','casting_restock');
          showToast('已退回補貨單');
          closeModal(); await loadRestock(); await loadApprovals(); renderApp();
        }},
        { label:'取消', onclick: closeModal },
      ]);
      break;
    }

    case 'complete-casting-restock': {
      await db.from('casting_restock_orders').update({ status: '已完成' }).eq('id', id);
      showToast('✅ 鑄件補貨單已完成');
      await loadRestock(); renderApp();
      break;
    }

    // ── 廠商 ──
    case 'edit-vendor': {
      const v = (state.data.accounting?.vendors||[]).find(x => x.id === id);
      if (v) modalEditVendor(v);
      break;
    }

    case 'toggle-vendor-active': {
      const active = dataset.active === '1'; // 目前是啟用 → 要停用
      await db.from('vendors').update({ is_active: !active }).eq('id', id);
      showToast(active ? '已停用廠商' : '✅ 已啟用廠商');
      await loadAccounting(); renderApp();
      break;
    }

    case 'del-vendor': {
      if (!confirm('確定要永久刪除這筆廠商資料？此操作無法復原。')) break;
      const { error } = await db.from('vendors').delete().eq('id', id);
      if (error) { showToast('刪除失敗：' + error.message, 'error'); break; }
      showToast('已刪除廠商');
      await loadAccounting(); renderApp();
      break;
    }

    // ── 會計月結 ──
    case 'edit-ap': {
      const rec = (state.data.accounting?.ap || []).find(r => r.id === id);
      if (rec) await modalAddAcct('應付帳款', rec);
      break;
    }

    case 'edit-meal': {
      const rec = (state.data.accounting?.meal || []).find(r => r.id === id);
      if (rec) await modalAddAcct('餐費發票', rec);
      break;
    }

    case 'edit-advance': {
      const rec = (state.data.accounting?.advance || []).find(r => r.id === id);
      if (rec) await modalAddAcct('代墊金額', rec);
      break;
    }

    case 'ap-mark-paid': {
      const today = new Date().toISOString().slice(0,10);
      if (!confirm(`確定將此筆標記為已付款（${today}）？`)) break;
      const { error } = await db.from('accounts_payable').update({
        is_paid: true,
        paid_at: `${today}T00:00:00`,
        updated_at: new Date().toISOString(),
      }).eq('id', id);
      if (error) { showToast('標記失敗：' + error.message, 'error'); break; }
      showToast('✅ 已標記為付款完成');
      await loadAccounting(); renderApp();
      break;
    }

    case 'ap-log': {
      const { data: logs, error: logErr } = await db.from('ap_change_logs')
        .select('*').eq('ap_id', id).order('changed_at', { ascending: false });
      if (logErr) { showToast('無法載入紀錄：' + logErr.message, 'error'); break; }
      const rec = (state.data.accounting?.ap || []).find(r => r.id === id);
      const title = `操作紀錄 — ${rec?.vendor_name||rec?.applicant_name||''}`;
      const actionLabel = { create:'新增', update:'修改', upload_invoice:'上傳發票', upload_statement:'上傳請款單', upload_screenshot:'上傳匯款截圖', mark_paid:'標記付款' };
      showModal(title, `
        <div style="font-size:13px">
          ${!logs?.length ? '<div style="color:var(--muted);text-align:center;padding:20px">尚無操作紀錄</div>' :
          logs.map(log => `
            <div style="padding:10px 0;border-bottom:1px solid var(--border)">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
                <span style="font-weight:600;color:var(--accent-dark)">${actionLabel[log.action]||log.action}</span>
                <span style="font-size:11px;color:var(--muted)">${log.changed_at?.slice(0,16).replace('T',' ')}</span>
              </div>
              <div style="color:var(--muted);font-size:12px">👤 ${log.changed_by_name||'—'}</div>
              ${log.description ? `<div style="margin-top:4px;font-size:12px;color:var(--text)">${log.description}</div>` : ''}
              ${log.diff ? (() => {
                try {
                  const diffs = typeof log.diff === 'string' ? JSON.parse(log.diff) : log.diff;
                  if (!Array.isArray(diffs) || !diffs.length) return '';
                  const fieldLabel = { vendor_name:'廠商', item_date:'發票日期', billing_month:'請款月份', amount:'金額', item_desc:'品項', invoice_no:'發票號碼', subject:'信件主旨', payment_due_date:'預計付款日', paid_at:'付款日', remarks:'備注' };

                  `</div>`;

          <tbody>${rows||'<tr><td colspan="5" style="text-align:center;color:var(--muted)">無明細</td></tr>'}</tbody>
        </table>

    // ── 商品補貨單 ──
    case 'edit-product-restock': {

    case 'view-product-restock': {

      if (!order) { showToast('找不到補貨單','error'); break; }
      const items = order.restock_order_items || [];
      const rows = items.map(it=>`<tr>
        <td>${it.products?.name||it.product_name||'—'}</td>

        <div style="display:flex;gap:16px;margin-bottom:12px;font-size:13px;flex-wrap:wrap">

          <div>截止：<strong>${order.deadline||'—'}</strong></div>
          <div>狀態：<span class="tag ${order.status==='審核通過'?'tag-green':order.status==='退回'?'tag-red':'tag-orange'}">${order.status||'待審核'}</span></div>
        </div>
        <table class="data-table">
          <thead><tr><th>商品</th><th style="text-align:center">數量</th><th>備註</th></tr></thead>
          <tbody>${rows||'<tr><td colspan="3" style="text-align:center;color:var(--muted)">無明細</td></tr>'}</tbody>
        </table>

      `,[{label:'關閉',onclick:closeModal}]);
      break;
    }
    case 'approve-product-restock': {
      const order = (state.data.restock||[]).find(r=>r.id===id);
      const items = order?.restock_order_items || [];
      const missing = items.filter(it => it.current_stock==null || it.owed_qty==null);
      if (missing.length) { showToast('請先填寫所有商品的現有庫存與欠客數量','error'); break; }
      // confirmed_qty：主管有改就用改的，沒改則沿用原始 qty
      const setConfirmed = items.map(it =>
        db.from('restock_order_items').update({
          confirmed_qty: it.confirmed_qty ?? it.qty ?? 1
        }).eq('id', it.id)
      );
      await Promise.all(setConfirmed);

      // 檢查每個商品的鑄件＆零件庫存（使用 loadRestock 已帶入的 BOM+stock 資料）
      let lackCasting = false;
      let lackPart = false;
      items.forEach(it => {
        const confirmedQty = it.confirmed_qty ?? it.qty ?? 1;
        const product = it.products; // loadRestock select 已 join product_castings/parts with stock
        if (!product) return;
        // 鑄件庫存
        (product.product_castings || []).forEach(c => {
          const need = (c.qty || 1) * confirmedQty;
          const stock = c.castings?.stock ?? 0;
          if (stock < need) lackCasting = true;
        });
        // 零件庫存
        (product.product_parts || []).forEach(c => {
          const need = (c.qty || 1) * confirmedQty;
          const stock = c.parts?.stock ?? 0;
          if (stock < need) lackPart = true;
        });
      });

      // 優先順序：缺鑄件 > 缺零件 > 待抓料
      const newStatus = lackCasting ? '缺鑄件' : lackPart ? '缺零件' : '待抓料';

      await db.from('restock_orders').update({
        status: newStatus,
        reviewer_id: state.user?.id,
        reviewed_at: new Date().toISOString(),
      }).eq('id', id);

      const statusMsg = newStatus === '待抓料' ? '✅ 補貨單已覆核，進入待抓料'
        : newStatus === '缺鑄件' ? '⚠️ 補貨單已覆核，鑄件庫存不足'
        : '⚠️ 補貨單已覆核，零件庫存不足';
      showToast(statusMsg);
      await loadRestock();
      renderApp();
      break;
    }
    case 'reject-product-restock': {
      showModal('退回原因', `
        <div class="form-group"><label>退回說明</label>
          <textarea class="form-control" id="pr-reject-note" rows="3" placeholder="請說明退回原因…"></textarea>
        </div>
      `, [
        { label:'確認退回', primary:true, onclick: async () => {

          showToast('補貨單已退回'); closeModal();
          await loadRestock(); renderApp();
        }},
        { label:'取消', onclick: closeModal },
      ]);
      break;

    case 'complete-product-restock':
      if (!canManageRestock()) { showToast('權限不足','error'); break; }
      await db.from('restock_orders').update({ status:'已完成' }).eq('id', id);
      showToast('✅ 商品補貨單已完成');
      await loadRestock(); renderApp();
      break;
    case 'pickup-restock-item': {
      // 找出這張補貨單的所有品項，扣庫存
      const order = (state.data.restock || []).find(r => r.id === id);
      if (!order) { showToast('找不到補貨單', 'error'); break; }
      const products_ = state.data.products || [];
      const castingsData = state.data.castings || [];
      const partsData = state.data.parts || [];

      // 計算每個鑄件/零件需要扣多少
      const castingDeduct = {}; // casting_id → qty
      const partDeduct = {};    // part_id → qty

      (order.restock_order_items || []).forEach(it => {
        const qty = it.confirmed_qty ?? it.qty ?? 1;
        const product = products_.find(p => p.id === it.product_id);
        const castingList = product?.product_castings || it.products?.product_castings || [];
        const partList    = product?.product_parts    || it.products?.product_parts    || [];

        castingList.forEach(c => {
          const cid = c.casting_id || c.castings?.id;
          if (!cid) return;
          castingDeduct[cid] = (castingDeduct[cid] || 0) + (c.qty || 1) * qty;
        });
        partList.forEach(c => {
          const pid2 = c.part_id || c.parts?.id;
          if (!pid2) return;
          partDeduct[pid2] = (partDeduct[pid2] || 0) + (c.qty || 1) * qty;
        });
      });

      // 逐一扣庫存（RPC 不支援批次，用 loop update）
      let deductErr = false;
      for (const [cid, deqty] of Object.entries(castingDeduct)) {
        const cur = castingsData.find(c => c.id === cid);
        if (!cur) continue;
        const newStock = Math.max(0, (cur.stock || 0) - deqty);
        const { error: e } = await db.from('castings').update({ stock: newStock }).eq('id', cid);
        if (e) { deductErr = true; console.error('扣鑄件庫存失敗', cid, e); }
      }
      for (const [pid2, deqty] of Object.entries(partDeduct)) {
        const cur = partsData.find(p => p.id === pid2);
        if (!cur) continue;
        const newStock = Math.max(0, (cur.stock || 0) - deqty);
        const { error: e } = await db.from('parts').update({ stock: newStock }).eq('id', pid2);
        if (e) { deductErr = true; console.error('扣零件庫存失敗', pid2, e); }
      }

      if (deductErr) { showToast('部分庫存扣除失敗，請手動確認', 'warn'); }

      // 更新補貨單狀態 → 待製作
      const { error: pickErr } = await db.from('restock_orders').update({ status: '待製作' }).eq('id', id);
      if (pickErr) { showToast('更新失敗：' + pickErr.message, 'error'); break; }
      showToast('✅ 已抓料完成，庫存已扣除，進入待製作');
      await Promise.all([loadRestock(), loadCastings(), loadParts()]);
      renderApp();
      break;
    }
    case 'del-product-restock': {
      if (!canManageRestock()) { showToast('權限不足','error'); break; }
      const o = (state.data.restock||[]).find(r=>r.id===id);
      if (!o) break;
      if (!confirm(`確定刪除補貨單「${o.order_no||id.slice(0,8)}」？此操作無法復原。`)) break;
      await db.from('restock_order_items').delete().eq('restock_id', id);
      await db.from('restock_orders').delete().eq('id', id);
      showToast('已刪除');
      await loadRestock(); renderApp();
      break;

    case 'view-purchase': {

          <thead><tr><th>零件</th><th style="text-align:center">數量</th><th style="text-align:center">單價</th><th style="text-align:right">小計</th><th>備註</th></tr></thead>
          <tbody>${rows||'<tr><td colspan="5" style="text-align:center;color:var(--muted)">無明細</td></tr>'}</tbody>
        </table>
        ${order.notes?`<div style="margin-top:12px;font-size:13px;color:var(--muted)">備註：${order.notes}</div>`:''}
      `,[{label:'關閉',onclick:closeModal}]);
      break;

    case 'order-purchase':
      await db.from('parts_purchase_orders').update({ status:'採購中' }).eq('id', id);
      showToast('✅ 已標記為採購中');
      await loadRestock(); renderApp();
      break;
    case 'arrive-purchase': {

      if (!order) { showToast('找不到採購單','error'); break; }
      const items = order.parts_purchase_items || [];
      if (!confirm(`確認到貨？系統將自動增加以下零件庫存：\n${items.map(i=>`${i.parts?.name||'?'} +${i.qty}`).join('\n')}`)) break;
      // 逐筆更新零件庫存

        return db.from('parts').update({ stock: newStock }).eq('id', it.part_id);

      showToast('✅ 到貨完成，零件庫存已更新');

    case 'complete-task':

      showToast('階段任務已完成！');

    case 'toggle-user':

    // ── 零件 ──
    case 'edit-part':
      modalEditPart(id);
      break;
    case 'adj-stock-part':

      break;

      modalAdjStockCasting(id);
      break;
    // ── 體驗預約 ──
    case 'booking-prev-week': {
      const curr = state.data.booking?.viewWeekStart;
      const d = new Date((curr||new Date().toISOString().slice(0,10))+'T00:00:00');
      d.setDate(d.getDate()-7);
      if (!state.data.booking) state.data.booking = {};
      state.data.booking.viewWeekStart = _localDateStr(d);
      await loadBooking(); renderApp(); break;
    }
    case 'booking-next-week': {
      const curr = state.data.booking?.viewWeekStart;
      const d = new Date((curr||new Date().toISOString().slice(0,10))+'T00:00:00');
      d.setDate(d.getDate()+7);
      if (!state.data.booking) state.data.booking = {};
      state.data.booking.viewWeekStart = _localDateStr(d);
      await loadBooking(); renderApp(); break;
    }
    case 'booking-this-week': {
      if (!state.data.booking) state.data.booking = {};
      state.data.booking.viewWeekStart = _getBookingWeekStart(_localToday());
      await loadBooking(); renderApp(); break;

    }
    case 'booking-prev-month': {
      if (!state.data.booking) state.data.booking = {};
      const curM = state.data.booking.viewMonthStart || new Date().toISOString().slice(0,7)+'-01';
      const mn1 = new Date(curM+'T00:00:00'); mn1.setMonth(mn1.getMonth()-1);
      state.data.booking.viewMonthStart = mn1.toISOString().slice(0,7)+'-01';
      await loadBooking(); renderApp(); break;
    }
    case 'booking-next-month': {
      if (!state.data.booking) state.data.booking = {};
      const curM = state.data.booking.viewMonthStart || new Date().toISOString().slice(0,7)+'-01';
      const mn2 = new Date(curM+'T00:00:00'); mn2.setMonth(mn2.getMonth()+1);
      state.data.booking.viewMonthStart = mn2.toISOString().slice(0,7)+'-01';
      await loadBooking(); renderApp(); break;
    }
    case 'booking-this-month': {
      if (!state.data.booking) state.data.booking = {};
      state.data.booking.viewMonthStart = new Date().toISOString().slice(0,7)+'-01';
      await loadBooking(); renderApp(); break;
    }
    case 'add-booking':
      modalAddBooking(); break;
    case 'add-booking-slot':
      modalAddBooking(dataset?.date||'', dataset?.slot||''); break;

    case 'del-part': {
      const pt = (state.data.parts||[]).find(x=>x.id===id);
      if (!pt) break;
      // Check how many products use this part
      const usedInProducts = (state.data.products||[]).filter(p =>
        (p.product_parts||[]).some(pp => pp.part_id === id)
      );
      const confirmMsg = usedInProducts.length
        ? `零件「${pt.name}」目前被 ${usedInProducts.length} 件商品使用。\n刪除後這些商品的零件組成將會移除。\n確定刪除？`
        : `確定刪除零件「${pt.name}」？`;
      if (!confirm(confirmMsg)) break;
      // Delete from product_parts first to avoid FK constraint
      const { error: ppErr } = await db.from('product_parts').delete().eq('part_id', id);
      if (ppErr) { showToast('刪除失敗：'+ppErr.message,'error'); break; }
      const { error } = await db.from('parts').delete().eq('id', id);
      if (error) { showToast('刪除失敗：'+error.message,'error'); break; }
      showToast('已刪除');
      await loadParts(); await loadProducts(); renderApp();
      break;
    }
  }
}

// 匯入鑄件工錢清單
function modalImportCastings() {
  showModal('匯入鑄件工錢清單', `
    <div style="font-size:13px;color:var(--muted);margin-bottom:14px;line-height:1.7">
      每行一筆，格式：<code style="background:#f0faf9;padding:2px 6px;border-radius:4px;color:var(--accent-dark)">系列名稱,鑄件名稱,模具工錢</code><br>
      例：<code style="background:#f0faf9;padding:2px 6px;border-radius:4px;color:var(--accent-dark)">Pekkle經典系列,AP-經典晶鑽項鍊,45</code><br>
      <span style="color:var(--warning)">⚠ 鑄件名稱若已存在，只更新工錢；若不存在，則新增。</span>
    </div>
    <textarea class="form-control" id="import-castings-text" rows="12" style="font-size:12px;font-family:monospace" placeholder="Pekkle經典系列,AP-經典晶鑽項鍊,45&#10;Pekkle經典系列,AP-經典晶鑽手鍊,45&#10;訂製&amp;誕生,AP-誕生石項鍊,45"></textarea>
    <div id="import-castings-result" style="margin-top:10px;font-size:12px"></div>
  `, [
    { label: '開始匯入', primary: true, onclick: async () => {
      const text = document.getElementById('import-castings-text').value.trim();
      if (!text) { showToast('請輸入資料','error'); return; }
      const lines = text.split('\n').map(l=>l.trim()).filter(Boolean);
      const resultEl = document.getElementById('import-castings-result');
      resultEl.innerHTML = '處理中…';

      const series = state.data.series || [];
      let ok = 0, updated = 0, created = 0, errors = [];

      for (const line of lines) {
        const cols = line.split(',').map(s=>s.trim());
        if (cols.length < 3) { errors.push(`格式錯誤：${line}`); continue; }
        const [seriesName, rawName, feeStr] = cols;
        const fee = parseFloat(feeStr);
        if (!rawName || isNaN(fee)) { errors.push(`資料有誤：${line}`); continue; }

        // 解析名稱裡的 (數字) → mold_yield，名稱去掉括號
        const yieldMatch = rawName.match(/\((\d+)\)\s*$/);
        const moldYield = yieldMatch ? parseInt(yieldMatch[1]) : 1;
        const castingName = rawName.replace(/\(\d+\)\s*$/, '').trim();

        // 找系列（完全符合優先，再試去空格比對）
        const s = series.find(x=>x.name===seriesName)
               || series.find(x=>x.name.replace(/\s/g,'')===seriesName.replace(/\s/g,''));
        if (!s && seriesName) errors.push(`⚠ 找不到系列「${seriesName}」，${castingName} 無法綁定系列`);

        // 查有無同名鑄件
        const existing = (state.data.castings||[]).find(c=>c.name===castingName);
        if (existing) {
          // 更新工錢、穴數，並補上系列/角色（若之前未設定或本次有帶系列）
          const updatePayload = { mold_fee: fee, mold_yield: moldYield };
          if (s) {
            updatePayload.series_id = s.id;
            if (s.ip_id) updatePayload.ip_id = s.ip_id;
          }
          const { error } = await db.from('castings').update(updatePayload).eq('id', existing.id);
          if (error) { errors.push(`更新失敗 ${castingName}：${error.message}`); }
          else updated++;
        } else {
          const payload = { name: castingName, mold_fee: fee, mold_yield: moldYield, casting_type: '鑄件', stock: 0, safety_stock: 0 };
          if (s) { payload.series_id = s.id; if (s.ip_id) payload.ip_id = s.ip_id; }
          const { error } = await db.from('castings').insert(payload);
          if (error) { errors.push(`新增失敗 ${castingName}：${error.message}`); }
          else created++;
        }
        ok++;
      }

      await loadCastings();
      const msg = `完成：新增 ${created} 筆，更新 ${updated} 筆${errors.length?`，失敗 ${errors.length} 筆`:''}`;
      resultEl.innerHTML = `<div style="color:${errors.length?'var(--warning)':'var(--success)'};font-weight:600">${msg}</div>`
        + (errors.length ? `<div style="color:var(--danger);margin-top:6px">${errors.join('<br>')}</div>` : '');
      renderApp();
    }},
    { label: '關閉', onclick: closeModal },
  ]);
}

// ═══════════════════════════════════════════
// Drag & Drop 排序
// ═══════════════════════════════════════════
(function initDragDrop() {
  let dragSrc = null;

  function onDragStart(e) {
    dragSrc = e.currentTarget;
    e.dataTransfer.effectAllowed = 'move';
    setTimeout(() => dragSrc && (dragSrc.style.opacity = '0.4'), 0);
  }
  function onDragEnd(e) {
    e.currentTarget.style.opacity = '';
    document.querySelectorAll('.drag-row').forEach(r => r.classList.remove('drag-over'));
  }
  function onDragOver(e) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    const row = e.currentTarget;
    if (row !== dragSrc) {
      document.querySelectorAll('.drag-row').forEach(r => r.classList.remove('drag-over'));
      row.classList.add('drag-over');
    }
  }
  function onDrop(e) {
    e.preventDefault();
    const target = e.currentTarget;
    if (!dragSrc || dragSrc === target) return;
    const type = dragSrc.dataset.type;
    if (type !== target.dataset.type) return;

    if (type === 'category') {
      // 重排 DOM
      const list = document.getElementById('cat-drag-list');
      const rows = [...list.querySelectorAll('.drag-row')];
      const fromIdx = rows.indexOf(dragSrc);
      const toIdx = rows.indexOf(target);
      if (fromIdx < toIdx) list.insertBefore(dragSrc, target.nextSibling);
      else list.insertBefore(dragSrc, target);
      // 存回 DB
      saveCategoryOrder();
    } else if (type === 'color') {
      const list = document.getElementById('color-drag-list');
      const rows = [...list.querySelectorAll('.drag-row')];
      const fromIdx = rows.indexOf(dragSrc);
      const toIdx = rows.indexOf(target);
      if (fromIdx < toIdx) list.insertBefore(dragSrc, target.nextSibling);
      else list.insertBefore(dragSrc, target);
      saveColorOrder();
    }
    target.classList.remove('drag-over');
  }

  // 綁定事件（每次 render 後呼叫）
  window.bindDragRows = function() {
    document.querySelectorAll('.drag-row').forEach(row => {
      row.addEventListener('dragstart', onDragStart);
      row.addEventListener('dragend', onDragEnd);
      row.addEventListener('dragover', onDragOver);
      row.addEventListener('drop', onDrop);
    });
  };
})();

async function saveCategoryOrder() {
  const rows = document.querySelectorAll('#cat-drag-list .drag-row');
  const updates = [...rows].map((r, i) => ({ id: r.dataset.id, sort_order: i }));
  // 批次更新
  for (const u of updates) {
    await db.from('categories').update({ sort_order: u.sort_order }).eq('id', u.id);
  }
  // 更新 state 順序
  const cats = state.data.categories || [];
  updates.forEach(u => {
    const c = cats.find(c => c.id === u.id);
    if (c) c.sort_order = u.sort_order;
  });
  state.data.categories = cats.sort((a,b) => a.sort_order - b.sort_order);
  showToast('品類順序已儲存');
}

async function saveColorOrder() {
  const rows = document.querySelectorAll('#color-drag-list .drag-row');
  const newColors = [...rows].map(r => r.querySelector('span:nth-child(2)').textContent.trim());
  await db.from('settings').upsert({ key: 'color_options', value: JSON.stringify(newColors) });
  state.data.colorOptions = newColors;
  showToast('顏色順序已儲存');
}

async function init() {
  root.innerHTML = `<div class="login-wrap"><div class="loading"><div class="spinner"></div> 載入中…</div></div>`;

  // 偵測重設密碼的 token（從 URL hash）
  const hash = window.location.hash;
  if (hash.includes('type=recovery') || hash.includes('access_token')) {
    const { data: { session }, error } = await db.auth.getSession();
    if (session?.user) {
      state.user = session.user;
      // 顯示改密碼表單
      root.innerHTML = `
        <div class="login-wrap">
          <div class="login-box">
            <div class="login-logo"><h1>STORY企業管理系統</h1><p>重設密碼</p></div>
            <div class="form-group">
              <label>新密碼</label>
              <input class="form-control" id="new-pw" type="password" placeholder="輸入新密碼">
            </div>
            <div class="form-group">
              <label>確認密碼</label>
              <input class="form-control" id="new-pw2" type="password" placeholder="再輸入一次">
            </div>
            <div id="pw-err" style="color:var(--danger);font-size:12px;margin-bottom:8px;"></div>
            <button class="login-btn" id="set-pw-btn">儲存新密碼</button>
          </div>
        </div>`;
      document.getElementById('set-pw-btn').onclick = async () => {
        const pw = document.getElementById('new-pw').value;
        const pw2 = document.getElementById('new-pw2').value;
        if (pw.length < 6) { document.getElementById('pw-err').textContent = '密碼至少6個字元'; return; }
        if (pw !== pw2) { document.getElementById('pw-err').textContent = '兩次密碼不一致'; return; }
        const { error } = await db.auth.updateUser({ password: pw });
        if (error) { document.getElementById('pw-err').textContent = error.message; return; }
        showToast('✅ 密碼已更新，請重新登入', 'success', 4000);
        await db.auth.signOut();
        window.location.hash = '';
        init();
      };
      return;
    }
  }

  const { data: { session } } = await db.auth.getSession();
  if (session?.user) {
    state.user = session.user;
    await loadProfile();
    // 恢復上次頁面（需確認該頁面有存取權限）
    const lastPage = localStorage.getItem('story_last_page');
    if (lastPage && lastPage !== 'dashboard') {
      state.page = lastPage;
    }
    await Promise.all([loadDashboard(), loadApprovals(), loadClaudeApiKey()]);
    _resetIdleTimer(); // 恢復登入狀態，啟動閒置計時器
  }
  state.loading = false;
  renderApp();
  if (state.user) {
    bindEvents();
    // 若恢復的頁面不是 dashboard，載入該頁資料
    if (state.page !== 'dashboard') loadPageData(state.page);
  }
  else bindLoginEvents();
}
