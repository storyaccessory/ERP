                <td><strong style="cursor:pointer;color:var(--text)" data-action="edit-casting" data-id="${c.id}">${c.name}${yieldBadge}</strong></td>
                <td>${codeHtml}</td>
                <td style="font-size:12px">${c.series?.name||'—'}</td>
                <td><span class="tag ${c.casting_type==='改蠟'?'tag-orange':'tag-teal'}">${c.casting_type||'鑄件'}</span></td>
                <td><strong>${stock}</strong></td>
                <td>${safe}</td>
                <td style="font-size:13px;font-weight:600;color:var(--accent-dark)">${c.mold_fee!=null?'$'+c.mold_fee:'—'}</td>
                <td><span class="tag ${status[1]}">${status[0]}</span></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
}

// ── Restock ──
const _restockStatusList = ['','待覆核','待抓料','待製作','製作中','缺零件','缺鑄件','已交件','已完成','退回'];
window._setRestockFilter = function(idx) {
  state.data.restockStatusFilter = _restockStatusList[idx] || '';
  renderApp();
};
// 通用搜尋 handler：存值、等組字結束再 render
window._searchHandler = function(stateKey, elId, e) {
  state.data[stateKey] = e.target.value;
  if (e.isComposing) return; // 注音組字中不 render
  renderApp();
  requestAnimationFrame(() => {
    const el = document.getElementById(elId);
    if (el) el.focus();
  });
};
window._restockTriggerSearch = function(val) {
  state.data.restockSearch = val;
  renderApp();
  requestAnimationFrame(() => {
    const el = document.getElementById('restock-search-input');
    if (el) el.focus();
  });
};

function renderRestock() {
  const tab = state.data.restockTab || '商品補貨單';
  const searchQ = (state.data.restockSearch || '').toLowerCase().trim();
  const allRestock = state.data.restock || [];
  const restock = allRestock; // 搜尋在 group 內 item 層級處理
  const castingRestock = state.data.castingRestock || [];
  const purchase = state.data.purchase || [];

  const SC = {
    '待覆核':'tag-orange', '覆核通過':'tag-green', '退回':'tag-red', '已完成':'tag-grey',
    '待抓料':'tag-yellow', '待製作':'tag-blue', '製作中':'tag-blue',
    '缺零件':'tag-red', '缺鑄件':'tag-red', '已交件':'tag-grey',
    '已下單':'tag-blue', '待採購':'tag-orange', '採購中':'tag-blue', '已到貨':'tag-green',
  };

  // ── 商品補貨單列表 ──
  // 同一批前綴（0424補 / 711專）合併成一張卡，不論狀態，商品連續列出
  const renderProductRestock = () => {
    if (!restock.length) return `<div class="empty"><div class="empty-icon">📦</div><p>尚無商品補貨單</p></div>`;
    const _dbgBanner = '';

    // 只用前綴分組（去掉 -N）
    function getBatchPrefix(r) {
      const no = r.order_no || '';
      const m = no.match(/^(.+)-\d+$/);
      return m ? m[1] : (r.order_no || r.id);
    }

    // 判斷標題：0424補 → "0424補貨單"，711專 → "711-專單"
    function prefixLabel(prefix) {
      if (/補$/.test(prefix)) return prefix + '貨單';
      if (/專$/.test(prefix)) {
        // 取專案名稱部分（去掉「專」字）
        const proj = prefix.replace(/專$/, '');
        return proj + '-專單';
      }
      return prefix;
    }

    // 依前綴分組，保持插入順序
    const groups = [];
    const groupMap = {};
    restock.forEach(r => {
      const key = getBatchPrefix(r);
      if (!groupMap[key]) {
        groupMap[key] = { key, orders: [], date: r.order_date, deadline: r.deadline };
        groups.push(groupMap[key]);
      }
      groupMap[key].orders.push(r);
      // 取最早的日期作為代表
      if (r.order_date && (!groupMap[key].date || r.order_date < groupMap[key].date))
        groupMap[key].date = r.order_date;
    });

    // 排序：同 group 內依 order_no 的流水號排
    groups.forEach(g => {
      g.orders.sort((a,b) => {
        const na = parseInt((a.order_no||'').match(/-(\d+)$/)?.[1]||0);
        const nb = parseInt((b.order_no||'').match(/-(\d+)$/)?.[1]||0);
        return na - nb;
      });
    });

    const canMgr = canManageRestock();
    if (!state.data._restockCollapsed) state.data._restockCollapsed = {};

    // 全域 toggle 函數（避免 key 含特殊字元時 onclick 字串出錯）
    window._toggleRestockGroup = function(idx) {
      const g = groups[idx];
      if (!g) return;
      state.data._restockCollapsed[g.key] = !state.data._restockCollapsed[g.key];
      renderApp();
    };

    // 狀態篩選
    const statusFilter = state.data.restockStatusFilter || '';

    const groupHtml = groups.map((g, gIdx) => {
      const label = prefixLabel(g.key);

      // 攤平所有 items，搜尋＋狀態篩選後只保留符合的行
      const allRows = [];
      g.orders.forEach(r => {
        if (statusFilter && r.status !== statusFilter) return;
        (r.restock_order_items || []).forEach(it => {
          if (searchQ) {
            const no = (r.order_no || '').toLowerCase();
            // join 資料
            const pName = (it.products?.name || '').toLowerCase();
            const sName = (it.products?.series?.name || '').toLowerCase();
            const full = sName ? `${sName}-${pName}` : pName;
            // 備用：從 state.data.products 查
            const prod = (state.data.products || []).find(p => p.id === it.product_id);
            const pName2 = (prod?.name || '').toLowerCase();
            const sName2 = (prod?.series?.name || '').toLowerCase();
            const full2 = sName2 ? `${sName2}-${pName2}` : pName2;
            const hit = no.includes(searchQ)
              || pName.includes(searchQ) || sName.includes(searchQ) || full.includes(searchQ)
              || pName2.includes(searchQ) || sName2.includes(searchQ) || full2.includes(searchQ);
            if (!hit) return;
          }
          allRows.push({ r, it });
        });
      });
      if (!allRows.length) return ''; // 篩選後無符合項目就跳過整個 group

      // 有搜尋/篩選時自動展開
      const collapsed = (searchQ || statusFilter)
        ? false
        : !!state.data._restockCollapsed[g.key];

      const rows = allRows.map(({ r, it }) => {
        const isPending = r.status === '待覆核';
        const productName = it.products?.name || it.product_name || '?';
        const series = it.products?.series?.name || '';
        const displayName = series ? `${series}-${productName}` : productName;
        const origQty = it.qty || 1;
        const confirmedQty = it.confirmed_qty;
        const qtyChanged = confirmedQty != null && confirmedQty !== origQty;

        let qtyCell;
        if (isPending && canMgr) {
          const editVal = confirmedQty ?? origQty;
          qtyCell = `<input type="number" min="1" value="${editVal}"
            style="width:55px;font-size:13px;border:1px solid ${qtyChanged?'var(--danger)':'var(--border)'};border-radius:4px;padding:2px 4px;text-align:center;color:${qtyChanged?'var(--danger)':'inherit'}"
            onchange="prInlineUpdate('${r.id}','${it.id}','confirmed_qty',this.value)">`;
        } else if (qtyChanged) {
          qtyCell = `<span style="text-decoration:line-through;color:var(--muted);font-size:12px;margin-right:4px">${origQty}</span><span style="color:var(--danger);font-weight:600">${confirmedQty}</span>`;
        } else {
          qtyCell = `<span style="font-size:13px">${confirmedQty??origQty}</span>`;
        }

        const isPickup = r.status === '待抓料';

        const statusTag = canMgr
          ? `<span class="tag ${SC[r.status]||'tag-grey'}" style="font-size:10px;cursor:pointer;position:relative"
              onclick="prStatusPopup(event,'${r.id}')">▾ ${r.status}</span>`
          : `<span class="tag ${SC[r.status]||'tag-grey'}" style="font-size:10px">${r.status}</span>`;

        return `<tr style="border-top:1px solid var(--border)">
          <td style="padding:7px 8px;max-width:270px">
            <div style="font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r.order_no||''}</div>
            <div style="font-size:13px;word-break:break-all">${displayName}</div>
          </td>
          <td style="padding:7px 4px;text-align:center">${statusTag}</td>
          <td style="padding:7px 2px;text-align:center">${qtyCell}</td>
          <td style="padding:7px 2px;text-align:center;font-size:13px">${it.current_stock??'—'}</td>
          <td style="padding:7px 2px;text-align:center;font-size:13px">${it.owed_qty??'—'}</td>
          <td style="padding:7px 2px;text-align:center;font-size:13px;color:${(it.prev_unfinished||0)>0?'#e65100':'var(--muted)'}">${it.prev_unfinished??'—'}</td>
          <td style="padding:7px 4px;font-size:12px;color:var(--muted)">${it.notes||'—'}</td>
          <td style="padding:6px 4px;white-space:nowrap;vertical-align:middle">
            <div style="display:flex;gap:3px;align-items:center;flex-wrap:nowrap">
              ${isPending&&canMgr?`<button class="btn-table" style="background:#e0f2f1;color:#2e7d32;padding:3px 7px" data-action="approve-product-restock" data-id="${r.id}">核准</button>`:''}
              ${isPending&&canMgr?`<button class="btn-table danger" style="padding:3px 7px" data-action="reject-product-restock" data-id="${r.id}">退回</button>`:''}
              ${!isPending&&r.reviewer_id?`<span style="font-size:10px;color:#2e7d32;font-weight:600;padding:2px 5px;background:#e0f2f1;border-radius:4px;white-space:nowrap">✓已覆核</span>`:''}
              ${canMgr?`<button class="btn-table" style="background:#e3f2fd;color:#1565c0;padding:3px 7px" data-action="edit-product-restock" data-id="${r.id}">編輯</button>`:''}
              ${canMgr?`<button class="btn-table danger" style="padding:3px 7px" data-action="del-product-restock" data-id="${r.id}">刪除</button>`:''}
            </div>
          </td>
        </tr>`;
      }).join('');

      return `
        <div style="margin-bottom:16px;border:1px solid var(--accent);border-radius:10px;overflow:hidden">
          <div style="display:flex;align-items:center;gap:10px;padding:9px 14px;background:var(--accent);cursor:pointer;user-select:none"
            onclick="_toggleRestockGroup(${gIdx})">
            <span style="font-size:12px;color:rgba(255,255,255,.7)">${collapsed ? '▶' : '▼'}</span>
            <strong style="font-size:14px;color:#fff">${label}</strong>
            <span style="font-size:12px;color:rgba(255,255,255,.7)">${g.date||''}</span>
            ${g.deadline?`<span style="font-size:12px;color:rgba(255,255,255,.7)">截止：${g.deadline}</span>`:''}
            <span style="margin-left:auto;font-size:12px;color:rgba(255,255,255,.8);background:rgba(0,0,0,.15);border-radius:10px;padding:1px 8px">${allRows.length} 項</span>
          </div>
          ${collapsed ? '' : `
          <table style="width:100%;border-collapse:collapse">
            <thead>
              <tr style="background:var(--accent-light);font-size:11px;color:var(--accent-dark)">
                <th style="padding:5px 8px;text-align:left;width:270px">商品</th>
                <th style="padding:5px 4px;text-align:center;width:62px">目前狀態</th>
                <th style="padding:5px 2px;text-align:center;width:50px">申請量</th>
                <th style="padding:5px 2px;text-align:center;width:48px">現有庫存</th>
                <th style="padding:5px 2px;text-align:center;width:42px">欠客數</th>
                <th style="padding:5px 2px;text-align:center;width:42px">待製作</th>
                <th style="padding:5px 4px;text-align:left;width:90px">備註</th>
                <th style="padding:5px 4px;width:160px"></th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>`}
        </div>`;
    });
    const result = groupHtml.join('') || (searchQ ? `<div class="empty"><div class="empty-icon">🔍</div><p>找不到符合「${searchQ}」的商品或單號</p></div>` : '');
    return _dbgBanner + result;
  };

  // ── 鑄件補貨單列表 ──
  const renderCastingRestock = () => castingRestock.length === 0
    ? `<tr><td colspan="6"><div class="empty"><div class="empty-icon">⚙️</div><p>尚無鑄件補貨單</p></div></td></tr>`
    : castingRestock.map(r => {
        const items = r.casting_restock_items || [];
        const waxCount = items.filter(i=>i.item_type==='wax'||!i.item_type).length;
        const remeltCount = items.filter(i=>i.item_type==='remelt').length;
        const summary = [waxCount?`下臘 ${waxCount} 項`:'', remeltCount?`改蠟 ${remeltCount} 項`:''].filter(Boolean).join('、') || `${items.length} 項`;
        return `<tr>
          <td><strong>${r.order_no||r.id?.slice(0,8)}</strong></td>
          <td>${r.order_date||r.created_at?.slice(0,10)||'—'}</td>
          <td>${r.deadline||'—'}</td>
          <td style="font-size:12px;color:var(--muted)">${summary}</td>
          <td><span class="tag ${SC[r.status]||'tag-grey'}">${r.status||'草稿'}</span></td>
          <td><div class="action-btns">
            <button class="btn-table" data-action="view-casting-restock" data-id="${r.id}">詳情</button>
            ${r.status==='待覆核'?`<button class="btn-table" style="background:#e0f2f1;color:#2e7d32" data-action="approve-casting-restock" data-id="${r.id}">核准</button>`:''}
            ${r.status==='待覆核'?`<button class="btn-table danger" data-action="reject-casting-restock" data-id="${r.id}">退回</button>`:''}
            ${r.status==='製作中'?`<button class="btn-table" style="background:#e3f2fd;color:#1565c0" data-action="complete-casting-restock" data-id="${r.id}">完成</button>`:''}
          </div></td>
        </tr>`;
      }).join('');

  // ── 外購零件清單列表 ──
  const renderPurchase = () => purchase.length === 0
    ? `<tr><td colspan="6"><div class="empty"><div class="empty-icon">🛒</div><p>尚無採購單</p></div></td></tr>`
    : purchase.map(r => {
        const items = r.parts_purchase_items || [];
        const summary = items.length ? `${items.length} 項零件` : '—';
        const totalAmt = items.reduce((s,i)=>(s + (i.unit_price||0)*(i.qty||0)), 0);
        return `<tr>
          <td><strong>${r.order_no||r.id?.slice(0,8)}</strong></td>
          <td>${r.order_date||r.created_at?.slice(0,10)||'—'}</td>
          <td>${r.supplier||'—'}</td>
          <td style="font-size:12px;color:var(--muted)">${summary}</td>
          <td style="font-size:12px">${totalAmt?'$'+totalAmt.toLocaleString():'—'}</td>
          <td><span class="tag ${SC[r.status]||'tag-grey'}">${r.status||'草稿'}</span></td>
          <td><div class="action-btns">
            <button class="btn-table" data-action="view-purchase" data-id="${r.id}">詳情</button>
            ${r.status==='待採購'?`<button class="btn-table" style="background:#e3f2fd;color:#1565c0" data-action="order-purchase" data-id="${r.id}">已下單</button>`:''}
            ${r.status==='採購中'?`<button class="btn-table" style="background:#e0f2f1;color:#2e7d32" data-action="arrive-purchase" data-id="${r.id}">到貨</button>`:''}
          </div></td>
        </tr>`;
      }).join('');

  return `
    <div class="tabs">
      <div class="tab ${tab==='商品補貨單'?'active':''}" data-restock-tab="商品補貨單">商品補貨單 <span style="font-size:11px;opacity:.7">(${restock.length})</span></div>
      <div class="tab ${tab==='鑄件補貨單'?'active':''}" data-restock-tab="鑄件補貨單">鑄件補貨單 <span style="font-size:11px;opacity:.7">(${castingRestock.length})</span></div>
      <div class="tab ${tab==='外購零件清單'?'active':''}" data-restock-tab="外購零件清單">外購零件清單 <span style="font-size:11px;opacity:.7">(${purchase.length})</span></div>
    </div>
    <div class="search-bar">
      <input class="search-input" id="restock-search-input" placeholder="搜尋單號或品名…" value="${state.data.restockSearch||''}"
        oninput="_searchHandler('restockSearch','restock-search-input',event)"
        oncompositionend="_searchHandler('restockSearch','restock-search-input',event)">
      ${canManageRestock()?`<button class="btn btn-primary" id="add-restock-btn">+ 新增${tab==='外購零件清單'?'採購單':tab}</button>`:''}
      ${tab==='商品補貨單'&&!canManageRestock()?`<span style="font-size:12px;color:var(--muted)">（需要權限才能開立補貨單）</span>`:''}
    </div>
    ${tab==='商品補貨單'?`<div style="display:flex;gap:6px;flex-wrap:wrap;padding:0 2px 10px">
      ${['','待覆核','待抓料','待製作','製作中','缺零件','缺鑄件','已交件','已完成','退回'].map((s,si) => {
        const active = (state.data.restockStatusFilter||'') === s;
        return `<span style="padding:3px 10px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid ${active?'var(--accent)':'var(--border)'};background:${active?'var(--accent)':'#fff'};color:${active?'#fff':'var(--text)'};white-space:nowrap"
          onclick="_setRestockFilter(${si})">${s||'全部'}</span>`;
      }).join('')}
    </div>`:''}

    <div class="card">
      <div class="table-wrap">
        ${tab==='商品補貨單'?`<div style="padding:4px 0">${renderProductRestock()}</div>`:''}
        ${tab==='鑄件補貨單'?`
        <table><thead><tr>
          <th>單號</th><th>日期</th><th>截止日</th><th>明細</th><th>狀態</th><th>操作</th>
        </tr></thead><tbody>${renderCastingRestock()}</tbody></table>`:''}
        ${tab==='外購零件清單'?`
        <table><thead><tr>
          <th>單號</th><th>日期</th><th>廠商</th><th>零件明細</th><th>金額</th><th>狀態</th><th>操作</th>
        </tr></thead><tbody>${renderPurchase()}</tbody></table>`:''}
      </div>
    </div>`;
}

  const products = state.data.products || [];
  const items = order.restock_order_items || [];

  state.data._editRestockRows = items.map(it => ({

        <tbody>
        ${(state.data._editRestockRows||[]).map((r, i) => {
          const pt = products.find(p=>p.id===r.product_id);
          const label = pt ? pt.name : '';
          return `<tr id="er-row-${i}">

              </div>
            </td>
            <td style="padding:4px">
              <input type="number" class="form-control" value="${r.qty}" min="1"
                style="width:100%;font-size:12px;text-align:center" oninput="erRowField(${i},'qty',this.value)">
            </td>
            <td style="padding:4px">
              <input type="number" class="form-control" value="${r.current_stock}" min="0" placeholder="—"
                style="width:100%;font-size:12px;text-align:center" oninput="erRowField(${i},'current_stock',this.value)">
            </td>
            <td style="padding:4px">
              <input type="number" class="form-control" value="${r.owed_qty}" min="0" placeholder="—"
                style="width:100%;font-size:12px;text-align:center" oninput="erRowField(${i},'owed_qty',this.value)">
            </td>
            <td style="padding:4px">
              <input type="number" class="form-control" value="${r.pending_qty}" min="0" placeholder="—"
                style="width:100%;font-size:12px;text-align:center;background:${r.pending_qty>0?'#fff8e1':''}"
                oninput="erRowField(${i},'pending_qty',this.value)">
            </td>
            <td style="padding:4px">
              <input class="form-control" value="${r.note||''}" placeholder="備註"
                style="font-size:12px" oninput="erRowField(${i},'note',this.value)">
            </td>
          </tr>`;
        }).join('')}
        </tbody>
      </table>`;
  }

  const container = document.createElement('div');
  container.innerHTML = `
    <div style="font-size:12px;color:var(--muted);margin-bottom:10px">
      單號：<strong>${order.order_no}</strong>　狀態：<strong>${order.status}</strong>
    </div>
    <div id="er-rows-wrap">${getEditRowsHtml()}</div>`;

  // 互動函數
  window.erRowSearch = function(i, q) {
    const drop = document.getElementById(`er-drop-${i}`);
    if (!drop) return;
    const matched = q.trim()
      ? products.filter(p=>(p.name||'').toLowerCase().includes(q.toLowerCase())).slice(0,30)
      : products.slice(0,30);
    window._erSearchResults = window._erSearchResults || {};
    window._erSearchResults[i] = matched;
    drop.style.display = matched.length ? 'block' : 'none';
    drop.innerHTML = matched.map((p,idx)=>`<div style="padding:7px 12px;cursor:pointer;border-bottom:1px solid #f5f5f5;font-size:13px"
      onmousedown="erRowSelect(${i},${idx})"
      onmouseover="this.style.background='#f0faf9'" onmouseout="this.style.background=''">${p.name}</div>`).join('');
  };
  window.erRowSelect = function(i, idx) {
    const p = (window._erSearchResults||{})[i]?.[idx];
    if (!p) return;
    const hi = document.getElementById(`er-id-${i}`);
    const hs = document.getElementById(`er-search-${i}`);
    const drop = document.getElementById(`er-drop-${i}`);
    if (hi) hi.value = p.id;
    if (hs) { hs.value = p.name; hs.style.borderColor='var(--accent)'; setTimeout(()=>hs.style.borderColor='',1000); }
    if (drop) drop.style.display = 'none';
    if (state.data._editRestockRows[i]) state.data._editRestockRows[i].product_id = p.id;
  };
  window.erRowField = (i, key, v) => {
    if (state.data._editRestockRows[i]) {
      state.data._editRestockRows[i][key] = key==='note' ? v : (v===''?'':parseFloat(v)||0);
    }
  };

  showModal(`✏️ 編輯補貨單 ${order.order_no}`, container, [
    { label:'儲存', primary:true, onclick: async () => {
      const rows = state.data._editRestockRows || [];
      // 必填驗證
      const missing = rows.filter(r => !r.product_id || r.qty==='' || r.current_stock==='' || r.owed_qty==='');
      if (missing.length) { showToast('請填寫所有商品的申請量、現有庫存、欠客數量','error'); return; }

      // 逐筆更新明細
      const updates = rows.map(r => db.from('restock_order_items').update({
        product_id: r.product_id,
        qty: parseInt(r.qty)||1,
        current_stock: r.current_stock!==''?parseInt(r.current_stock):null,
        owed_qty: r.owed_qty!==''?parseInt(r.owed_qty):null,
        prev_unfinished: r.pending_qty!==''?parseInt(r.pending_qty):null,
        notes: r.note||null,
      }).eq('id', r.item_id));
      const results = await Promise.all(updates);
      const errs = results.filter(res=>res.error);
      if (errs.length) { showToast('部分儲存失敗：'+errs[0].error.message,'error'); return; }

      showToast('✅ 補貨單已更新');
      state.data._editRestockRows = null;
      closeModal(); await loadRestock(); renderApp();
    }},
    { label:'取消', onclick:()=>{ state.data._editRestockRows=null; closeModal(); }},
  ], { wide: true });
}

// ══════════════════════════════════════════
// 商品補貨單 — 主管覆核
// ══════════════════════════════════════════
async function modalReviewProductRestock(orderId) {
  // 重新從資料庫撈最新資料（含明細）
  const { data: order, error } = await db.from('restock_orders')
    .select('*, restock_order_items(*, products(name))')
    .eq('id', orderId).single();
  if (error || !order) { showToast('載入失敗','error'); return; }

  const items = order.restock_order_items || [];

  // 找前次同商品未完成的補貨數量
  const allRestock = state.data.restock || [];
  function getPrevUnfinished(productId) {
    let total = 0;
    allRestock.forEach(r => {
      if (r.id === orderId) return;
      if (!['覆核通過','待製作','製作中'].includes(r.status)) return;
      (r.restock_order_items||[]).forEach(it => {
        if (it.product_id === productId) {
          const confirmed = it.confirmed_qty || it.qty || 0;
          const delivered = it.delivered_qty || 0;
          total += Math.max(0, confirmed - delivered);
        }
      });
    });
    return total;
  }

  // 初始化覆核草稿
  const draft = items.map(it => ({
    id: it.id,
    product_id: it.product_id,
    name: it.products?.name || it.product_name || '?',
    original_qty: it.qty || 1,
    current_stock: it.current_stock ?? '',
    owed_qty: it.owed_qty ?? '',
    prev_unfinished: it.prev_unfinished ?? getPrevUnfinished(it.product_id),
    // 待製作從開單時填的 prev_unfinished 帶入（已由開單者填好）
    confirmed_qty: it.confirmed_qty ?? it.qty ?? 1,
    included: true,
    notes: it.notes || '',
  }));
  state.data._reviewDraft = draft;

  function getRowsHtml() {
    return (state.data._reviewDraft || []).map((r, i) => `
      <tr style="opacity:${r.included?1:.45}" id="rv-row-${i}">
        <td style="text-align:center">
          <input type="checkbox" ${r.included?'checked':''} onchange="rvToggle(${i},this.checked)">
        </td>
        <td style="font-size:13px;font-weight:500">${r.name}</td>
        <td style="text-align:center">
          <span style="font-size:12px;color:var(--muted)">原：${r.original_qty}</span>
        </td>
        <td style="text-align:center">
          <input type="number" min="0" value="${r.current_stock}" placeholder="—"
            style="width:60px;font-size:12px;border:1px solid var(--border);border-radius:4px;padding:2px 4px;text-align:center"
            oninput="rvSet(${i},'current_stock',this.value)">
        </td>
        <td style="text-align:center">
          <input type="number" min="0" value="${r.owed_qty}" placeholder="—"
            style="width:60px;font-size:12px;border:1px solid var(--border);border-radius:4px;padding:2px 4px;text-align:center"
            oninput="rvSet(${i},'owed_qty',this.value)">
        </td>
        <td style="text-align:center;font-size:12px;color:${r.prev_unfinished>0?'var(--warning)':'var(--muted)'}">
          ${r.prev_unfinished > 0 ? `<strong>${r.prev_unfinished}</strong>` : '—'}
        </td>
        <td style="text-align:center">
          <input type="number" min="0" value="${r.confirmed_qty}"
            style="width:65px;font-size:13px;font-weight:600;border:1px solid var(--accent);border-radius:4px;padding:2px 4px;text-align:center;color:var(--accent-dark)"
            oninput="rvSet(${i},'confirmed_qty',this.value)">
        </td>
        <td>
          <input style="font-size:12px;border:1px solid var(--border);border-radius:4px;padding:2px 6px;width:100%"
            placeholder="備註" value="${r.notes||''}" oninput="rvSet(${i},'notes',this.value)">
        </td>
      </tr>`).join('');
  }

  const container = document.createElement('div');
  container.innerHTML = `
    <div style="font-size:12px;color:var(--muted);margin-bottom:12px;line-height:1.7">
      請填入各商品的現況資料，確認補貨數量後核准。可取消勾選不需補貨的商品。
    </div>
    <div style="overflow-x:auto">
      <table style="width:100%;border-collapse:collapse;font-size:13px">
        <thead>
          <tr style="background:var(--bg);font-size:11px;color:var(--muted)">
            <th style="padding:6px 4px;text-align:center">納入</th>
            <th style="padding:6px 4px">商品</th>
            <th style="padding:6px 4px;text-align:center">申請量</th>
            <th style="padding:6px 4px;text-align:center">現有庫存</th>
            <th style="padding:6px 4px;text-align:center">欠客數量</th>
            <th style="padding:6px 4px;text-align:center">前次未完成</th>
            <th style="padding:6px 4px;text-align:center">確認補貨量</th>
            <th style="padding:6px 4px">備註</th>
          </tr>
        </thead>
        <tbody id="rv-tbody">${getRowsHtml()}</tbody>
      </table>
    </div>
    <div class="form-group" style="margin-top:14px">
      <label style="font-size:12px">覆核備註</label>
      <textarea class="form-control" id="rv-notes" rows="2" placeholder="整體備註…"></textarea>
    </div>`;

  // 全域互動
  window.rvToggle = (i, v) => {
    if (state.data._reviewDraft[i]) state.data._reviewDraft[i].included = v;
    const row = document.getElementById(`rv-row-${i}`);
    if (row) row.style.opacity = v ? 1 : 0.45;
  };
  window.rvSet = (i, key, val) => {
    if (state.data._reviewDraft[i]) {
      state.data._reviewDraft[i][key] = key==='notes' ? val : (parseFloat(val)||0);
    }
  };

  showModal(`📋 覆核商品補貨單 ${order.order_no||''}`, container, [
    { label:'核准', primary:true, onclick: async () => {
      const draft = state.data._reviewDraft || [];
      const included = draft.filter(r=>r.included);
      if (!included.length) { showToast('請至少保留一項商品','error'); return; }
      const reviewerNotes = document.getElementById('rv-notes')?.value.trim() || null;

      // 更新每筆明細的覆核資料
      const updates = draft.map(r => db.from('restock_order_items').update({
        current_stock: r.current_stock===''?null:r.current_stock,
        owed_qty: r.owed_qty===''?null:r.owed_qty,
        prev_unfinished: r.prev_unfinished||0,
        confirmed_qty: r.included ? (r.confirmed_qty||r.original_qty) : 0,
      }).eq('id', r.id));
      await Promise.all(updates);

      // 刪除不納入的明細
      const excluded = draft.filter(r=>!r.included);
      if (excluded.length) {
        await db.from('restock_order_items').delete().in('id', excluded.map(r=>r.id));
      }

      // 更新主單狀態
      await db.from('restock_orders').update({
        status: '覆核通過',
        reviewer_id: state.user?.id,
        reviewed_at: new Date().toISOString(),
        reviewer_notes: reviewerNotes,
      }).eq('id', orderId);

      showToast('✅ 補貨單已覆核通過');
      state.data._reviewDraft = null;
      closeModal();
      await loadRestock(); renderApp();
    }},
    { label:'退回', onclick: async () => {
      const note = prompt('請填寫退回原因：');
      if (note === null) return;
      await db.from('restock_orders').update({
        status: '退回',
        reviewer_id: state.user?.id,
        reviewed_at: new Date().toISOString(),
        review_notes: note || null,
      }).eq('id', orderId);
      showToast('補貨單已退回');
      state.data._reviewDraft = null;
      closeModal();
      await loadRestock(); renderApp();
    }},
    { label:'取消', onclick: () => { state.data._reviewDraft = null; closeModal(); }},
  ], { wide: true });
}

// ══════════════════════════════════════════
// 商品補貨單 — 人工開立
// ══════════════════════════════════════════
async function modalNewProductRestock() {
  await Promise.all([loadProducts()]);
  const products = state.data.products || [];

  // 用 state 暫存動態新增的商品行
  state.data._productRestockRows = [{ product_id: '', qty: 1, current_stock: '', owed_qty: '', pending_qty: '', note: '' }];

  // 計算待製作數量 = 金工室尚未交件的數量
  // 條件：覆核通過 / 製作中 的補貨單，confirmed_qty - delivered_qty
  function calcPendingQty(productId) {
    if (!productId) return 0;
    const allRestock = state.data.restock || [];
    let total = 0;
    allRestock.forEach(r => {
      if (!['覆核通過','製作中'].includes(r.status)) return;
      (r.restock_order_items||[]).forEach(it => {
        if (it.product_id === productId) {
          const confirmed = it.confirmed_qty || it.qty || 0;
          const delivered = it.delivered_qty || 0;
          total += Math.max(0, confirmed - delivered);
        }
      });
    });
    return total;
  }

  function getRowsHtml() {
    return `
      <table style="width:100%;border-collapse:collapse;font-size:13px">
        <thead>
          <tr style="background:var(--bg);font-size:11px;color:var(--muted)">
            <th style="padding:5px 6px;text-align:left">商品</th>
            <th style="padding:5px 4px;text-align:center;width:70px">申請量 <span style="color:var(--danger)">*</span></th>
            <th style="padding:5px 4px;text-align:center;width:75px">現有庫存 <span style="color:var(--danger)">*</span></th>
            <th style="padding:5px 4px;text-align:center;width:75px">欠客數量 <span style="color:var(--danger)">*</span></th>
            <th style="padding:5px 4px;text-align:center;width:75px">待製作<br><span style="font-size:10px;font-weight:400">（金工未交件）</span></th>
            <th style="padding:5px 4px;text-align:left;width:110px">備註</th>
            <th style="padding:5px 4px;width:28px"></th>
          </tr>
        </thead>
        <tbody>
        ${state.data._productRestockRows.map((r, i) => {
          const pt = products.find(p=>p.id===r.product_id);
          const label = pt ? pt.name : '';
          return `<tr id="pr-row-${i}">
            <td style="padding:4px 6px">
              <div style="position:relative">
                <input class="form-control" id="pr-search-${i}" placeholder="🔍 搜尋商品…" value="${label}" autocomplete="off"
                  oninput="prRowSearch(${i},this.value)" onfocus="prRowSearch(${i},this.value)"
                  onblur="setTimeout(()=>{ const d=document.getElementById('pr-drop-${i}'); if(d) d.style.display='none'; },200)"
                  style="font-size:12px">
                <input type="hidden" id="pr-id-${i}" value="${r.product_id||''}">
                <div id="pr-drop-${i}" style="display:none;position:absolute;z-index:200;left:0;right:0;top:100%;background:#fff;border:1px solid var(--border);border-radius:6px;max-height:180px;overflow-y:auto;box-shadow:0 4px 12px rgba(0,0,0,.12)"></div>
              </div>
            </td>
            <td style="padding:4px">
              <input type="number" class="form-control" id="pr-qty-${i}" value="${r.qty||1}" min="1"
                style="width:100%;font-size:12px;text-align:center" oninput="prRowQty(${i},this.value)">
            </td>
            <td style="padding:4px">
              <input type="number" class="form-control" id="pr-stock-${i}" value="${r.current_stock||''}" min="0" placeholder="—"
                style="width:100%;font-size:12px;text-align:center" oninput="prRowField(${i},'current_stock',this.value)">
            </td>
            <td style="padding:4px">
              <input type="number" class="form-control" id="pr-owed-${i}" value="${r.owed_qty||''}" min="0" placeholder="—"
                style="width:100%;font-size:12px;text-align:center" oninput="prRowField(${i},'owed_qty',this.value)">
            </td>
            <td style="padding:4px">
              <input type="number" class="form-control" id="pr-pending-${i}" value="${r.pending_qty!==''?r.pending_qty:''}" min="0" placeholder="—"
                style="width:100%;font-size:12px;text-align:center;background:${r.pending_qty>0?'#fff8e1':''}" oninput="prRowField(${i},'pending_qty',this.value)">
            </td>
            <td style="padding:4px">
              <input class="form-control" id="pr-note-${i}" value="${r.note||''}" placeholder="備註"
                style="font-size:12px" oninput="prRowNote(${i},this.value)">
            </td>
            <td style="padding:4px">
              <button class="btn btn-sm" style="background:#ffebee;color:var(--danger);padding:3px 7px" onclick="prRowRemove(${i})">✕</button>
            </td>
          </tr>`;
        }).join('')}
        </tbody>
      </table>`;
  }

  const container = document.createElement('div');

  // 單號預覽產生（從資料庫現有單號找最大流水號）
  function genOrderNos(type, projectName, count) {
    const now = new Date();
    const mm = String(now.getMonth()+1).padStart(2,'0');
    const dd = String(now.getDate()).padStart(2,'0');
    const prefix = type === 'restock' ? `${mm}${dd}補` : `${(projectName||'專').trim()}專`;
    // 找現有補貨單中同前綴的最大流水號
    const existing = state.data.restock || [];
    let maxN = 0;
    existing.forEach(r => {
      const no = r.order_no || '';
      if (no.startsWith(prefix + '-')) {
        const n = parseInt(no.slice(prefix.length + 1));
        if (!isNaN(n) && n > maxN) maxN = n;
      }
    });
    return Array.from({length: count}, (_,i) => `${prefix}-${maxN + i + 1}`);
  }

  function updateOrderNoPreview() {
    const type = document.querySelector('input[name="pr-type"]:checked')?.value || 'restock';
    const proj = document.getElementById('pr-project-name')?.value || '';
    const count = (state.data._productRestockRows||[]).filter(r=>r.product_id).length || 1;
    const nos = genOrderNos(type, proj, Math.max(count,1));
    const el = document.getElementById('pr-orderno-preview');
    if (el) el.textContent = nos.slice(0,3).join('、') + (nos.length>3?'…':'');
  }

  function rerenderRows() {
    document.getElementById('pr-rows-wrap').innerHTML = getRowsHtml();
    updateOrderNoPreview();
  }

  container.innerHTML = `
    <div style="margin-bottom:14px">
      <div style="font-size:12px;font-weight:600;color:var(--text);margin-bottom:8px">補貨類型</div>
      <div style="display:flex;gap:16px;align-items:center;flex-wrap:wrap">
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px">
          <input type="radio" name="pr-type" value="restock" checked onchange="prTypeChange()"> 一般補貨單
        </label>
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px">
          <input type="radio" name="pr-type" value="special" onchange="prTypeChange()"> 專單
        </label>
        <div id="pr-project-wrap" style="display:none;flex:1;min-width:160px">
          <input class="form-control" id="pr-project-name" placeholder="專案名稱（例：711、昇恆昌）" style="font-size:13px" oninput="updateOrderNoPreview()">
        </div>
      </div>
      <div style="margin-top:8px;font-size:12px;color:var(--muted)">
        單號預覽：<span id="pr-orderno-preview" style="font-family:monospace;color:var(--accent-dark);font-weight:600"></span>
      </div>
    </div>
    <div style="font-size:12px;font-weight:600;color:var(--text);margin-bottom:8px">商品清單 <span style="font-weight:400;color:var(--muted)">（每個商品一張單，單號自動流水）</span></div>
    <div id="pr-rows-wrap">${getRowsHtml()}</div>
    <button class="btn btn-sm btn-outline" onclick="prRowAdd()" style="margin-bottom:16px">+ 新增商品</button>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="form-group"><label style="font-size:12px">截止日期（選填）</label>
        <input type="date" class="form-control" id="pr-deadline"></div>
      <div class="form-group"><label style="font-size:12px">備註</label>
        <input class="form-control" id="pr-note-main" placeholder="備註…"></div>
    </div>`;

  // 全域互動函數
  window.prTypeChange = function() {
    const type = document.querySelector('input[name="pr-type"]:checked')?.value;
    const wrap = document.getElementById('pr-project-wrap');
    if (wrap) wrap.style.display = type==='special' ? 'block' : 'none';
    updateOrderNoPreview();
  };
  window.updateOrderNoPreview = updateOrderNoPreview;

  window.prRowSearch = function(i, q) {
    const drop = document.getElementById(`pr-drop-${i}`);
    if (!drop) return;
    const matched = q.trim()
      ? products.filter(p=>{
          const full = ((p.series?.name||'')+' '+(p.name||'')).toLowerCase();
          return full.includes(q.toLowerCase());
        }).slice(0,30)
      : products.slice(0,30);
    window._prSearchResults = window._prSearchResults || {};
    window._prSearchResults[i] = matched;
    drop.style.display = matched.length ? 'block' : 'none';
    drop.innerHTML = matched.map((p,idx)=>{
      const sName = p.series?.name || '';
      const label = sName ? `<span style="color:var(--muted);font-size:11px">${sName}-</span>${p.name}` : p.name;
      return `<div style="padding:7px 12px;cursor:pointer;border-bottom:1px solid #f5f5f5;font-size:13px"
        onmousedown="prRowSelect(${i},${idx})"
        onmouseover="this.style.background='#f0faf9'" onmouseout="this.style.background=''">${label}</div>`;
    }).join('');
  };
  window.prRowSelect = function(i, idx) {
    const p = (window._prSearchResults||{})[i]?.[idx];
    if (!p) return;
    const hi = document.getElementById(`pr-id-${i}`);
    const hs = document.getElementById(`pr-search-${i}`);
    const drop = document.getElementById(`pr-drop-${i}`);
    if (hi) hi.value = p.id;
    const displayLabel = p.series?.name ? `${p.series.name}-${p.name}` : p.name;
    if (hs) { hs.value = displayLabel; hs.style.borderColor='var(--accent)'; setTimeout(()=>hs.style.borderColor='',1000); }
    if (drop) drop.style.display = 'none';
    if (state.data._productRestockRows[i]) {
      state.data._productRestockRows[i].product_id = p.id;
      // 自動帶入待製作數量
      const pending = calcPendingQty(p.id);
      state.data._productRestockRows[i].pending_qty = pending;
      const pendingInp = document.getElementById(`pr-pending-${i}`);
      if (pendingInp) {
        pendingInp.value = pending || '';

    }

  };
  window.prRowQty = (i,v) => { if(state.data._productRestockRows[i]) state.data._productRestockRows[i].qty = parseInt(v)||1; };
  window.prRowField = (i,key,v) => { if(state.data._productRestockRows[i]) state.data._productRestockRows[i][key] = parseFloat(v)||0; };
  window.prRowNote = (i,v) => { if(state.data._productRestockRows[i]) state.data._productRestockRows[i].note = v; };
  window.prRowRemove = (i) => {
    state.data._productRestockRows.splice(i,1);
    rerenderRows();
  };
  window.prRowAdd = () => {
    state.data._productRestockRows.push({ product_id:'', qty:1, current_stock:'', owed_qty:'', pending_qty:'', note:'' });
    rerenderRows();
  };

  // 初始預覽
  setTimeout(updateOrderNoPreview, 50);

  showModal('📦 新增補貨單', container, [
    { label:'送出審核', primary:true, onclick: async () => {
      const rows = state.data._productRestockRows || [];
      const filled = rows.filter(r=>r.product_id);
      if (!filled.length) { showToast('請至少選取一項商品','error'); return; }
      // 必填驗證：申請量、現有庫存、欠客數量
      const missing = filled.filter(r => !r.qty || r.current_stock==='' || r.current_stock===null || r.owed_qty==='' || r.owed_qty===null);
      if (missing.length) { showToast(`請填寫所有商品的申請量、現有庫存、欠客數量`, 'error'); return; }

      const type = document.querySelector('input[name="pr-type"]:checked')?.value || 'restock';
      const projName = document.getElementById('pr-project-name')?.value.trim() || '';
      if (type === 'special' && !projName) { showToast('請填寫專案名稱','error'); return; }

      const deadline = document.getElementById('pr-deadline')?.value || null;
      const noteMain = document.getElementById('pr-note-main')?.value.trim() || null;
      const today = new Date().toISOString().slice(0,10);
      // 建立前先 reload 確保拿到最新單號
      await loadRestock();
      const orderNos = genOrderNos(type, projName, filled.length);

      // 每個商品各建一張單
      let successCount = 0;
      for (let idx = 0; idx < filled.length; idx++) {
        const r = filled[idx];
        const orderNo = orderNos[idx];
        const { data: order, error: oErr } = await db.from('restock_orders').insert({
          order_no: orderNo,
          order_date: today,
          deadline,
          review_notes: noteMain,
          status: '待覆核',
          created_by: state.user?.id,
        }).select().single();
        if (oErr) { showToast(`${orderNo} 建立失敗：`+oErr.message,'error'); continue; }
        const { error: liErr } = await db.from('restock_order_items').insert({
          restock_id: order.id,
          product_id: r.product_id,
          qty: r.qty||1,
          current_stock: r.current_stock!=='' ? (parseInt(r.current_stock)||0) : null,
          owed_qty: r.owed_qty!=='' ? (parseInt(r.owed_qty)||0) : null,
          prev_unfinished: r.pending_qty!=='' ? (parseInt(r.pending_qty)||0) : null,
          notes: r.note||null,
        });
        if (liErr) { showToast(`${orderNo} 明細失敗：`+liErr.message,'error'); continue; }
        successCount++;
      }

      if (successCount > 0) showToast(`✅ 已建立 ${successCount} 張補貨單（${orderNos[0]}${successCount>1?` ～ ${orderNos[successCount-1]}`:''}）`);

      closeModal(); await loadRestock(); renderApp();
    }},

  ], { wide: true });

// 鑄件補貨單 — 自動判斷 + 送審
// ══════════════════════════════════════════

// 從鑄件名稱解析戒指尺寸 例：KU-戒指_#9 → 9
function parseRingSize(name) {
  const m = name.match(/_#(\d+)$/);
  return m ? parseInt(m[1]) : null;
}

// 從商品缺貨需求自動產生鑄件補貨明細
function autoGenerateCastingRestockItems() {
  const castings = state.data.castings || [];
  const products = state.data.products || [];

  // ── 來源一：低於安全庫存的鑄件缺口 ──
  // casting_id → { safetyShort }
  const safetyShortMap = {};
  castings.forEach(c => {
    const short = (c.safety_stock||0) - (c.stock||0);
    if (short > 0) safetyShortMap[c.id] = short;
  });

  // ── 來源二：抓料清單（待抓料/缺鑄件/缺零件）中欠的鑄件需求 ──
  // casting_id → { need: 總欠數, orderDetails: [{ order_no, lack }] }
  const pickupNeedMap = {};
  const restockOrders = (state.data.restock || []).filter(r => ['待抓料','缺鑄件','缺零件'].includes(r.status));
  restockOrders.forEach(r => {
    (r.restock_order_items || []).forEach(it => {
      const qty = it.confirmed_qty ?? it.qty ?? 1;
      const product = products.find(p => p.id === it.product_id);
      const castingList = it.products?.product_castings || product?.product_castings || [];
      castingList.forEach(c => {
        const cid = c.casting_id || c.castings?.id;
        if (!cid) return;
        const need = (c.qty||1) * qty;   // 這張補貨單需要的鑄件數量
        const stock = c.castings?.stock ?? castings.find(cs=>cs.id===cid)?.stock ?? 0;
        const lack = Math.max(0, need - stock);  // 實際欠料（用來判斷要不要納入）
        if (lack > 0) {
          if (!pickupNeedMap[cid]) pickupNeedMap[cid] = { need: 0, orderDetails: [] };
          pickupNeedMap[cid].need += lack;
          const existing = pickupNeedMap[cid].orderDetails.find(d => d.order_no === r.order_no);
          if (existing) existing.qty += need;  // 同一張單累加補貨需求量
          else if (r.order_no) pickupNeedMap[cid].orderDetails.push({ order_no: r.order_no, qty: need });
        }
      });
    });
  });

  // ── 合併兩來源，聯集所有需要補貨的鑄件 ──
  const allIds = new Set([...Object.keys(safetyShortMap), ...Object.keys(pickupNeedMap)]);

  const items = [];
  allIds.forEach(cid => {
    const c = castings.find(x => x.id === cid);
    if (!c) return;

    const safetyShort  = safetyShortMap[cid] || 0;
    const pickupNeed   = pickupNeedMap[cid]?.need || 0;
    const orderDetails = pickupNeedMap[cid]?.orderDetails || [];

    // 總缺口 = 安全庫存缺口 + 抓料補貨欠數（兩者相加）
    const short_qty = safetyShort + pickupNeed;

    const yield_ = c.mold_yield || 1;
    const waxNeeded = Math.ceil(short_qty / yield_);
    const ringSize = parseRingSize(c.name);

    // 備註不再自動填（由 renderDraftRow 動態顯示）

    items.push({
      casting_id: c.id,
      casting_name: c.name,
      series_name: c.series?.name || '—',
      ip_code: c.series?.ip_categories?.code || '',
      ip_color: c.series?.ip_categories?.color || '#90a4ae',
      stock: c.stock || 0,
      safety_stock: c.safety_stock || 0,
      short_qty,
      safety_short:   safetyShort,
      pickup_need:    pickupNeed,
      order_details:  orderDetails,  // [{ order_no, lack }]
      mold_yield: yield_,
      wax_qty: waxNeeded,
      mold_fee: c.mold_fee || 0,
      ring_size: ringSize,
      item_type: 'wax',
      remelt_size: null,
      note: '',
      included: true,
    });
  });

  // 依鑄件名稱排序
  items.sort((a, b) => a.casting_name.localeCompare(b.casting_name, 'zh-TW'));
  return items;
}

                else if(v==='M1') { m+=1; }
                else if(v==='M2') { m+=2; }
                else if(v==='M3') { m+=3; }

                dueDateEl.dataset.manual='1';

            oninput="(function(){

              const fee = parseFloat(document.getElementById('acct-wire-fee').value)||0;

        <!-- 列 7：上傳請款發票 -->

          <label>🧾 上傳請款發票（電子發票證明聯 / 手開發票，AI 自動辨識）</label>
          ${existing?.invoice_file_url ? `
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;padding:8px 10px;background:#f0fafa;border-radius:6px;border:1px solid var(--border)">
            <span style="font-size:18px">🧾</span>
            <a href="${existing.invoice_file_url}" target="_blank" style="color:var(--accent);font-size:12px;flex:1">${existing.invoice_file_name||'目前發票'}</a>
            <label style="cursor:pointer;font-size:11px;color:#fff;background:var(--accent-dark);padding:3px 8px;border-radius:4px;white-space:nowrap">
              🔄 替換<input type="file" accept="image/*,.pdf" style="display:none" onchange="document.getElementById('ap-invoice-file').files=this.files;document.getElementById('ap-invoice-file').dispatchEvent(new Event('change'))">
            </label>
          </div>` : ''}
          <input class="form-control" id="ap-invoice-file" type="file" accept="image/*,.pdf" style="padding:6px${existing?.invoice_file_url?';display:none':''}">
          <div id="ap-invoice-status" style="display:none;margin-top:6px;padding:8px 12px;border-radius:6px;font-size:12px"></div>
          <div id="ap-invoice-preview" style="display:none;margin-top:8px">
            <img id="ap-invoice-img" style="max-width:100%;max-height:200px;border-radius:6px;border:1px solid var(--border)">
            <div id="ap-invoice-size" style="font-size:11px;color:var(--muted);margin-top:4px"></div>
          </div>
        </div>

        <!-- 列 8：上傳請款單/對帳單 -->
        <div class="form-group">
          <label>📎 上傳請款單 / 對帳單（PDF、Excel、圖片均可）</label>
          ${existing?.attachment_url ? `
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;padding:8px 10px;background:#f0fafa;border-radius:6px;border:1px solid var(--border)">
            <span style="font-size:18px">📎</span>
            <a href="${existing.attachment_url}" target="_blank" style="color:var(--accent);font-size:12px;flex:1">${existing.attachment_name||'目前請款單'}</a>
            <label style="cursor:pointer;font-size:11px;color:#fff;background:var(--accent-dark);padding:3px 8px;border-radius:4px;white-space:nowrap">
              🔄 替換<input type="file" accept=".pdf,.xlsx,.xls,.csv,image/*" style="display:none" onchange="document.getElementById('ap-statement-file').files=this.files;document.getElementById('ap-statement-file').dispatchEvent(new Event('change'))">
            </label>
          </div>` : ''}
          <input class="form-control" id="ap-statement-file" type="file" accept=".pdf,.xlsx,.xls,.csv,image/*" style="padding:6px;">
          <div id="ap-stmt-preview" style="display:none;margin-top:6px">
            <img id="ap-stmt-preview-img" style="max-width:100%;max-height:120px;border-radius:6px;border:1px solid var(--border)">
            <div id="ap-stmt-preview-name" style="font-size:11px;color:var(--muted);margin-top:4px"></div>
          </div>
          <div id="ap-statement-status" style="display:none;margin-top:6px;padding:8px 12px;border-radius:6px;font-size:12px"></div>
        </div>

        <!-- 列 9：匯款截圖（編輯時才顯示） -->
        ${isEdit ? `
        <div class="form-group">
          <label>💳 匯款截圖</label>
          ${existing?.payment_screenshot_url ? `
          <div id="ap-screenshot-current" style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:#f0fafa;border-radius:6px;border:1px solid var(--border)">
            <img src="${existing.payment_screenshot_url}" style="width:60px;height:45px;object-fit:cover;border-radius:4px;cursor:pointer;border:1px solid var(--border)"
              onclick="window._showImgPreview('${existing.payment_screenshot_url}')" title="點擊放大">
            <div style="flex:1;font-size:12px;color:var(--muted)">${existing.payment_screenshot_name||'匯款截圖'}</div>
            <label style="cursor:pointer;font-size:11px;color:#fff;background:var(--accent-dark);padding:3px 8px;border-radius:4px;white-space:nowrap">

          ` : `<div style="font-size:12px;color:var(--muted)">尚未上傳</div>`}
          <div id="ap-screenshot-new-preview" style="display:none;margin-top:8px">

          </div>
        </div>` : ''}

        <div id="ap-upload-progress" style="display:none;font-size:12px;color:var(--accent)">上傳中…</div>

      { label: isEdit ? '儲存' : '新增', primary: true, onclick: async () => {
        const vendorId   = document.getElementById('acct-vendor-id').value || null;

        if (!vendorName) { showToast('請從清單選擇已建檔廠商', 'error'); document.getElementById('acct-vendor-search').focus(); return; }
        const amount = parseFloat(document.getElementById('acct-amount').value) || 0;
        if (!amount) { showToast('請輸入金額', 'error'); return; }

        // 發票號碼重複檢查（硬擋，不允許重複）
        const invoiceNoVal = document.getElementById('acct-invoice').value.trim();
        if (invoiceNoVal) {
          const apAll = state.data.accounting?.ap || [];
          const dup = apAll.find(r => r.invoice_no === invoiceNoVal && r.id !== (existing?.id || ''));
          if (dup) {
            const dupDate = dup.billing_month || dup.item_date?.slice(0,10) || '—';
            const dupVendor = dup.vendor_name || dup.applicant_name || '—';
            showToast(`❌ 發票號碼「${invoiceNoVal}」已於 ${dupDate} 由「${dupVendor}」請款過，無法重複新增`, 'error');
            return;
          }
        }

        const paidDateRaw = document.getElementById('acct-paid-date').value; // 可能是 '' 或 'YYYY-MM-DD'
        const paidDate = paidDateRaw || null; // null = 空白
        // 取 YYYY-MM 格式，去除任何多餘文字（如 "2026-04-01 ～ 04-30"）
        const billingMonthRaw = document.getElementById('acct-billing-month').value || '';
        const billingMonthMatch = billingMonthRaw.match(/(\d{4}-\d{2})/);
        const billingMonth = billingMonthMatch ? billingMonthMatch[1] : (billingMonthRaw.slice(0,7) || null);
        const wireFee = parseFloat(document.getElementById('acct-wire-fee')?.value) || 0;
        const apPayload = {
          vendor_id: vendorId,
          vendor_name: vendorName,
          applicant_name: vendorName,
          item_date: document.getElementById('acct-date').value || null,
          billing_month: billingMonth,
          payment_due_date: document.getElementById('acct-due-date').value || null,
          paid_at: paidDate ? `${paidDate}T00:00:00` : null,   // 空白 = 清空
          is_paid: !!paidDate,
          amount,
          wire_fee: wireFee,
          actual_amount: amount - wireFee,
          cost_category: document.getElementById('acct-cost-category')?.value || null,
          pay_term: document.getElementById('acct-pay-term')?.value || null,
          item_desc: document.getElementById('acct-desc').value.trim(),
          invoice_no: document.getElementById('acct-invoice').value.trim(),
          subject: document.getElementById('acct-subject').value.trim(),
          remarks: document.getElementById('acct-remarks')?.value.trim() || null,
          year_month: billingMonth ? billingMonth.replace('-','') : ym,
          created_by: myId || null,
          updated_by: myId || null,
          updated_by_name: state.profile?.name || state.profile?.email || '',
          updated_at: new Date().toISOString(),
        };

        const progressEl = document.getElementById('ap-upload-progress');
        const ymStr = ym || new Date().toISOString().slice(0,7).replace('-','');
        const safeName = vendorName.replace(/[^a-zA-Z0-9]/g,'').slice(0,8) || 'vendor';

        // 上傳發票圖片（若有，壓縮至 100KB）
        const apInvFile = window._apInvoiceFile;
        if (apInvFile) {
          progressEl.style.display = 'block'; progressEl.textContent = '壓縮並上傳發票中…';
          const isImg = apInvFile.type.startsWith('image/');
          const uploadFile = isImg ? await compressImage(apInvFile, 100) : apInvFile;
          const ext = (apInvFile.name?.split('.').pop() || 'jpg').toLowerCase().replace(/[^a-z0-9]/g,'') || 'jpg';
          const path = `ap/inv_${ymStr}_${safeName}_${Date.now()}.${ext}`;
          const { error: upErr } = await db.storage.from('ar-attachments').upload(path, uploadFile, { upsert: true });
          if (!upErr) {
            const { data: urlData } = db.storage.from('ar-attachments').getPublicUrl(path);
            apPayload.invoice_file_url = urlData.publicUrl;
            apPayload.invoice_file_name = apInvFile.name;
          } else { showToast('發票上傳失敗：' + upErr.message, 'error'); progressEl.style.display='none'; return; }
        }

        // 上傳請款單 / 對帳單（優先用貼上的截圖）
        const stmtFile = window._apStmtPendingFile || document.getElementById('ap-statement-file')?.files?.[0];
        if (stmtFile) {
          progressEl.style.display = 'block'; progressEl.textContent = '上傳請款單中…';
          const isImg2 = stmtFile.type.startsWith('image/');
          const uploadFile2 = isImg2 ? await compressImage(stmtFile, 100) : stmtFile;
          const ext2 = (stmtFile.name?.split('.').pop() || 'bin').toLowerCase().replace(/[^a-z0-9]/g,'') || 'bin';
          const path2 = `ap/stmt_${ymStr}_${safeName}_${Date.now()}.${ext2}`;
          const { error: upErr2 } = await db.storage.from('ar-attachments').upload(path2, uploadFile2, { upsert: true });
          if (!upErr2) {
            const { data: urlData2 } = db.storage.from('ar-attachments').getPublicUrl(path2);
            apPayload.attachment_url = urlData2.publicUrl;
            apPayload.attachment_name = stmtFile.name;
          } else { showToast('請款單上傳失敗：' + upErr2.message, 'error'); }
        }

        // 處理匯款截圖（刪除 / 替換）
        if (isEdit) {
          if (window._apDeleteScreenshot) {
            apPayload.payment_screenshot_url = null;
            apPayload.payment_screenshot_name = null;
            apPayload.is_paid = false;
            apPayload.paid_at = null;
          } else {
            const ssReplaceFile = document.getElementById('ap-screenshot-replace-file')?.files?.[0];
            if (ssReplaceFile) {
              progressEl.style.display = 'block'; progressEl.textContent = '替換匯款截圖中…';
              const ssCompressed = await compressImage(ssReplaceFile, 100);
              const ssExt = (ssReplaceFile.name?.split('.').pop() || 'jpg').toLowerCase().replace(/[^a-z0-9]/g,'') || 'jpg';
              const ssPath = `ap/ss_${ymStr}_${safeName}_${Date.now()}.${ssExt}`;
              const { error: ssErr } = await db.storage.from('ar-attachments').upload(ssPath, ssCompressed, { upsert: true });
              if (!ssErr) {
                const { data: ssUrl } = db.storage.from('ar-attachments').getPublicUrl(ssPath);
                apPayload.payment_screenshot_url = ssUrl.publicUrl;
                apPayload.payment_screenshot_name = ssReplaceFile.name;
              } else { showToast('截圖替換失敗：' + ssErr.message, 'error'); }
            }
          }
        }

        progressEl.style.display = 'none';
        window._apInvoiceFile = null;
        window._apStmtPendingFile = null;
        window._apDeleteScreenshot = false;

        let error, savedId;
        if (isEdit) {
          ({ error } = await db.from('accounts_payable').update(apPayload).eq('id', existing.id));
          savedId = existing.id;
          if (!error) {
            const diffFields = ['vendor_name','item_date','billing_month','amount','item_desc','invoice_no','subject','payment_due_date','paid_at','remarks'];
            const diffs = apDiff(existing, apPayload, diffFields);
            const uploadParts = [];
            if (apPayload.invoice_file_url && apPayload.invoice_file_url !== existing.invoice_file_url) uploadParts.push('更換發票');
            if (apPayload.attachment_url && apPayload.attachment_url !== existing.attachment_url) uploadParts.push('更換請款單');
            if (window._apDeleteScreenshot) uploadParts.push('刪除匯款截圖');
            else if (apPayload.payment_screenshot_url && apPayload.payment_screenshot_url !== existing.payment_screenshot_url) uploadParts.push('替換匯款截圖');
            const desc = [diffs.map(d=>`${d.field}: ${d.before} → ${d.after}`).join('、'), ...uploadParts].filter(Boolean).join('；') || '更新資料';
            await writeAPLog(savedId, 'update', desc, diffs);
          }
        } else {
          const { data: ins, error: insErr } = await db.from('accounts_payable').insert(apPayload).select().single();
          error = insErr; savedId = ins?.id;
          if (!error && savedId) {

            if (apPayload.invoice_file_url) uploadParts.push('上傳發票');
            if (apPayload.attachment_url) uploadParts.push('上傳請款單');

          }
        }
        if (error) { showToast(`${isEdit?'更新':'新增'}失敗：` + error.message, 'error'); return; }
        showToast(`✅ ${isEdit?'已更新':'已新增'}`);
        closeModal();
        await loadAccounting(); renderApp();
      }},
      { label: '取消', onclick: () => { window._apInvoiceFile = null; closeModal(); } },
    ], { confirmClose: true });

    // ── 廠商搜尋 ────────────────────────────────────────────────
    const searchInput = document.getElementById('acct-vendor-search');
    const listDiv = document.getElementById('acct-vendor-list');
    let vendorSelected = !!existing?.vendor_name;
    if (searchInput && listDiv) {
      searchInput.oninput = () => {
        vendorSelected = false;
        const q = searchInput.value.trim().toLowerCase();
        if (!q) { listDiv.style.display = 'none'; return; }
        const matched = vendors.filter(v => v.is_active !== false && (
          v.name.toLowerCase().includes(q) || (v.company_name||'').toLowerCase().includes(q)
        ));
        if (!matched.length) { listDiv.style.display = 'none'; return; }
        listDiv.innerHTML = matched.map(v => {
          const fullName = v.company_name || v.name;
          return `
          <div data-vid="${v.id}" data-vname="${fullName.replace(/"/g,'&quot;')}" data-shortname="${v.name.replace(/"/g,'&quot;')}"
               style="padding:8px 12px;cursor:pointer;border-bottom:1px solid var(--border);font-size:13px"
               onmouseover="this.style.background='var(--accent-light)'" onmouseout="this.style.background=''">
            ${v.code?`<span style="font-size:11px;color:var(--muted);margin-right:6px">[${v.code}]</span>`:''}
            <strong>${v.name}</strong>${v.company_name && v.company_name!==v.name?`<span style="color:var(--accent-dark);margin-left:6px;font-size:12px">${v.company_name}</span>`:''}
          </div>`;
        }).join('');
        listDiv.querySelectorAll('div[data-vid]').forEach(item => {
          item.addEventListener('mousedown', e => {
            e.preventDefault();
            document.getElementById('acct-vendor-id').value = item.dataset.vid;
            document.getElementById('acct-vendor-name').value = item.dataset.vname; // company_name 優先
            searchInput.value = item.dataset.shortname; // 顯示短名以便辨識
            listDiv.style.display = 'none';
            vendorSelected = true;
          });
        });
        listDiv.style.display = 'block';
      };
      searchInput.onblur = () => setTimeout(() => { listDiv.style.display = 'none'; }, 200);
    }

    // ── 發票圖片上傳 → AI 辨識 ──────────────────────────────────
    window._apInvoiceFile = null;
    document.getElementById('ap-invoice-file')?.addEventListener('change', async e => {
      const file = e.target.files[0]; if (!file) return;
      const statusEl = document.getElementById('ap-invoice-status');
      statusEl.style.display = 'block'; statusEl.style.background = '#e3f2fd'; statusEl.style.color = '#1565c0';
      statusEl.textContent = '⏳ 壓縮中…';
      const isImg = file.type.startsWith('image/');
      const compressed = isImg ? await compressImage(file, 100) : file;
      window._apInvoiceFile = compressed;

      if (isImg) {
        const url = URL.createObjectURL(compressed);
        document.getElementById('ap-invoice-img').src = url;
        document.getElementById('ap-invoice-preview').style.display = 'block';
        const kb = Math.round(compressed.size/1024), origKb = Math.round(file.size/1024);
        document.getElementById('ap-invoice-size').textContent = origKb !== kb ? `壓縮前 ${origKb}KB → 壓縮後 ${kb}KB` : `${kb}KB`;
      }

      if (!getClaudeApiKey()) {
        statusEl.style.background = '#fff8e1'; statusEl.style.color = '#e65100';
        statusEl.textContent = '⚠️ 未設定 Claude API Key，請手動填入發票資訊';
        return;
      }
      statusEl.textContent = '🤖 AI 辨識發票中…';
      try {
        const parsed = await parseInvoiceWithClaude(compressed);
        console.log('[AI發票辨識結果]', parsed);
        if (!parsed) { statusEl.style.background='#ffebee'; statusEl.style.color='#c62828'; statusEl.textContent='❌ 辨識失敗，請手動填入'; return; }

        const calcDueDate = (dateStr) => {
          if (!dateStr) return '';
          const d = new Date(dateStr);
          if (isNaN(d)) return '';
          const y = d.getMonth() >= 11 ? d.getFullYear()+1 : d.getFullYear();
          const m = String((d.getMonth()+2) > 12 ? 1 : (d.getMonth()+2)).padStart(2,'0');
          return `${y}-${m}-10`;
        };

        // ── 廠商比對 ──
        let matchedVendor = null;
        if (parsed.vendor || parsed.vendor_tax_id) {
          const q = (parsed.vendor||'').toLowerCase();
          const taxId = parsed.vendor_tax_id || '';
          matchedVendor = vendors.find(v => v.is_active !== false && (
            (taxId && (v.tax_id||'').replace(/\D/g,'') === taxId) ||
            (q && (v.company_name||'').toLowerCase().includes(q)) ||
            (q && v.name.toLowerCase().includes(q)) ||
            (q && q.includes((v.company_name||'').toLowerCase().replace(/有限公司|股份有限公司|工作室/g,'').trim())) ||
            (q && q.includes(v.name.toLowerCase()))
          )) || null;
        }

        // ── 自動帶入欄位 ──
        const filled = [];
        if (parsed.invoice_no) { document.getElementById('acct-invoice').value = parsed.invoice_no; filled.push(`發票號碼 ${parsed.invoice_no}`); }
        if (parsed.invoice_date) {
          document.getElementById('acct-date').value = parsed.invoice_date; filled.push(`日期 ${parsed.invoice_date}`);
          const dueEl = document.getElementById('acct-due-date');
          if (dueEl && !dueEl.dataset.manual) dueEl.value = calcDueDate(parsed.invoice_date);
        }
        if (parsed.amount) { document.getElementById('acct-amount').value = parsed.amount; filled.push(`金額 $${Number(parsed.amount).toLocaleString()}`); }
        if (parsed.item_desc) { document.getElementById('acct-desc').value = parsed.item_desc; filled.push(`品項 ${parsed.item_desc}`); }
        if (matchedVendor) {
          searchInput && (searchInput.value = matchedVendor.name);
          document.getElementById('acct-vendor-name').value = matchedVendor.name;
          document.getElementById('acct-vendor-id').value = matchedVendor.id;
          filled.push(`廠商 ${matchedVendor.name}`);
        } else if (parsed.vendor) {
          filled.push(`廠商「${parsed.vendor}」未建檔，請搜尋選擇`);
        }

        // ── 狀態文字 ──
        if (filled.length) {
          statusEl.style.background = '#e8f5e9'; statusEl.style.color = '#2e7d32';
          statusEl.textContent = `✅ AI 辨識：${filled.join('、')}`;
        } else {
          statusEl.style.background = '#fff8e1'; statusEl.style.color = '#e65100';
          statusEl.textContent = '⚠️ 辨識不完整，請手動確認';
        }

        // ── 在圖片旁顯示辨識摘要（方便對照）──
        const existingOverlay = document.getElementById('ai-result-overlay');
        if (existingOverlay) existingOverlay.remove();
        const previewDiv = document.getElementById('ap-invoice-preview');
        if (previewDiv && previewDiv.style.display !== 'none') {
          const overlay = document.createElement('div');
          overlay.id = 'ai-result-overlay';
          overlay.style.cssText = 'margin-top:6px;padding:8px 10px;background:#f0fafa;border:1px solid var(--accent);border-radius:6px;font-size:12px;color:var(--text)';
          overlay.innerHTML = `<div style="font-weight:600;margin-bottom:4px;color:var(--accent-dark)">🤖 辨識結果（可直接修改上方欄位）</div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:2px 12px">
              ${parsed.vendor ? `<span>廠商：${matchedVendor?`<strong>${matchedVendor.name}</strong>`:`<span style='color:var(--warning)'>${parsed.vendor}（未建檔）</span>`}</span>` : ''}
              ${parsed.invoice_no ? `<span>發票號碼：<strong>${parsed.invoice_no}</strong></span>` : ''}
              ${parsed.invoice_date ? `<span>日期：<strong>${parsed.invoice_date}</strong></span>` : ''}
              ${parsed.amount ? `<span>金額：<strong>$${Number(parsed.amount).toLocaleString()}</strong></span>` : ''}
              ${parsed.item_desc ? `<span style="grid-column:1/-1">品項：${parsed.item_desc}</span>` : ''}
            </div>`;
          previewDiv.appendChild(overlay);
        }

      } catch(err) { statusEl.style.background = '#ffebee'; statusEl.style.color = '#c62828'; statusEl.textContent = `❌ 辨識失敗：${err.message}`; }
    });

    // ── 請款單：貼上截圖 + 選檔 ────────────────────────────────
    window._apStmtPendingFile = null;
    const showStmtPreview = (file) => {
      window._apStmtPendingFile = file;
      const reader = new FileReader();
      reader.onload = e => {
        const img = document.getElementById('ap-stmt-preview-img');
        if (img && file.type.startsWith('image/')) {
          img.src = e.target.result;
          document.getElementById('ap-stmt-preview').style.display = 'block';
        }
        document.getElementById('ap-stmt-preview-name').textContent = file.name || '檔案';
      };
      reader.readAsDataURL(file);
      const el = document.getElementById('ap-statement-status');
      el.style.display = 'block'; el.style.background = '#e8f5e9'; el.style.color = '#2e7d32';
      el.textContent = `✅ 已選擇：${file.name||'檔案'}（${Math.round(file.size/1024)}KB）`;
    };
    document.getElementById('ap-statement-file')?.addEventListener('change', e => {
      const file = e.target.files[0]; if (!file) return;
      showStmtPreview(file);
    });

    return; // AP 流程結束，不繼續執行下方的舊流程
  }

  // ── 非 AP（餐費、代墊）─────────────────────────────────────────
  const isMeal = tab === '餐費發票';
  const defaultApplyYm = (()=>{ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); })();
  const existingYm = existing?.year_month ? existing.year_month.slice(0,4)+'-'+existing.year_month.slice(4,6) : defaultApplyYm;
  showModal(`${isEdit?'編輯':'新增'} ${tab}`, `
    <div style="display:grid;gap:12px">
      <div style="padding:8px 12px;background:#f0fafa;border-radius:6px;font-size:13px;color:var(--accent-dark);display:flex;align-items:center;gap:8px">
        <span>👤</span><span>申請人：<strong>${myName||'（未設定）'}</strong></span>
      </div>

      <!-- 發票上傳（AI 辨識） -->
      <div class="form-group">
        <label>🧾 上傳${isMeal?'餐費':'代墊'}發票（AI 自動辨識日期 / 金額 / 發票號碼）</label>
        ${existing?.invoice_file_url ? `
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;padding:8px 10px;background:#f0fafa;border-radius:6px;border:1px solid var(--border)">
          <span style="font-size:18px">🧾</span>
          <a href="${existing.invoice_file_url}" target="_blank" style="color:var(--accent);font-size:12px;flex:1">${existing.invoice_file_name||'目前發票'}</a>
          <label style="cursor:pointer;font-size:11px;color:#fff;background:var(--accent-dark);padding:3px 8px;border-radius:4px;white-space:nowrap">
            🔄 替換<input type="file" accept="image/*,.pdf" style="display:none" onchange="document.getElementById('me-invoice-file').files=this.files;document.getElementById('me-invoice-file').dispatchEvent(new Event('change'))">
          </label>
        </div>` : ''}
        <input class="form-control" id="me-invoice-file" type="file" accept="image/*,.pdf" style="padding:6px${existing?.invoice_file_url?';display:none':''}">
        <div id="me-invoice-status" style="display:none;margin-top:6px;padding:8px 12px;border-radius:6px;font-size:12px"></div>
        <div id="me-invoice-preview" style="display:none;margin-top:8px">
          <img id="me-invoice-img" style="max-width:100%;max-height:180px;border-radius:6px;border:1px solid var(--border)">
        </div>
      </div>

      <div class="form-grid-2" style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <!-- 發票日期（必填） -->
        <div class="form-group" style="margin:0">
          <label>發票日期 * <span style="font-size:11px;color:var(--muted)">（AI 辨識帶入）</span></label>
          <input class="form-control" id="me-date" type="date" value="${existing?.item_date?.slice?.(0,10)||new Date().toISOString().slice(0,10)}"
            oninput="window._meDateChanged && window._meDateChanged(this.value)">
        </div>
        <!-- 申請月份 -->
        <div class="form-group" style="margin:0">
          <label>申請月份 * <span style="font-size:11px;color:var(--muted)">（做帳月份）</span></label>
          <input class="form-control" id="me-apply-ym" type="month" value="${existingYm}"
            oninput="window._meCheckYmMismatch && window._meCheckYmMismatch()">
          <div id="me-ym-warn" style="display:none;margin-top:4px;padding:6px 10px;border-radius:6px;font-size:12px;background:#fff3e0;color:#e65100">
            ⚠️ 非當月發票，已通知會計確認
          </div>
        </div>
      </div>

      <div class="form-grid-2" style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <!-- 發票號碼 -->
        <div class="form-group" style="margin:0">
          <label>發票號碼 <span style="font-size:11px;color:var(--muted)">（AI 辨識帶入）</span></label>
          <input class="form-control" id="me-invoice" placeholder="例：AB12345678" value="${existing?.invoice_no||''}">
        </div>
        <!-- 金額（必填） -->
        <div class="form-group" style="margin:0">
          <label>金額 * <span style="font-size:11px;color:var(--muted)">（AI 辨識帶入）</span></label>
          <input class="form-control" id="me-amount" type="number" placeholder="0" value="${existing?.amount||''}">
        </div>
      </div>

      <!-- 品項說明（全寬） -->
      <div class="form-group">
        <label>品項說明 <span style="font-size:11px;color:var(--muted)">（AI 辨識帶入，可手動填寫）</span></label>
        <input class="form-control" id="me-desc" placeholder="掃描後自動帶入，或手動輸入" value="${existing?.item_desc||''}">
      </div>

      <div id="me-upload-progress" style="display:none;font-size:12px;color:var(--accent)">上傳中…</div>
    </div>
  `, [
    { label: isEdit ? '儲存' : '新增', primary: true, onclick: async () => {
      const date = document.getElementById('me-date').value;
      const invoice = document.getElementById('me-invoice').value.trim();
      const amount = parseFloat(document.getElementById('me-amount').value) || 0;
      const desc = document.getElementById('me-desc').value.trim();
      const applyYm = document.getElementById('me-apply-ym').value; // YYYY-MM
      if (!date) { showToast('請填寫發票日期', 'error'); return; }
      if (!amount) { showToast('請填寫金額', 'error'); return; }
      if (!applyYm) { showToast('請選擇申請月份', 'error'); return; }

      const tableMap = { '餐費發票': 'meal_expenses', '代墊金額': 'advance_payments' };
      const table = tableMap[tab];
      const progressEl = document.getElementById('me-upload-progress');
      const ymStr = applyYm.replace('-',''); // 用申請月份，非頁面月份

      // 上傳發票圖片
      let invoiceFileUrl = null, invoiceFileName = null;
      const meFile = document.getElementById('me-invoice-file')?.files?.[0] || window._meInvoiceFile;
      if (meFile) {
        progressEl.style.display = 'block';
        const isImg = meFile.type.startsWith('image/');
        const uploadFile = isImg ? await compressImage(meFile, 100) : meFile;
        const ext = (meFile.name?.split('.').pop() || 'jpg').toLowerCase().replace(/[^a-z0-9]/g,'') || 'jpg';
        const path = `${isMeal?'meal':'adv'}/inv_${ymStr}_${myId?.slice(0,8)||'u'}_${Date.now()}.${ext}`;
        const { error: upErr } = await db.storage.from('ar-attachments').upload(path, uploadFile, { upsert: true });
        if (!upErr) {
          const { data: urlData } = db.storage.from('ar-attachments').getPublicUrl(path);
          invoiceFileUrl = urlData.publicUrl;
          invoiceFileName = meFile.name;
        } else { showToast('發票上傳失敗：' + upErr.message, 'error'); }
      }
      progressEl.style.display = 'none';
      window._meInvoiceFile = null;

      // 非當月判斷（發票日期月份 vs 申請月份）
      const invoiceYm = date.slice(0,7); // YYYY-MM
      const isNonCurrentMonth = invoiceYm !== applyYm;
      // remarks 加非當月備注
      const remarksNote = isNonCurrentMonth
        ? `[非當月申請：發票${invoiceYm}，申請月份${applyYm}]`
        : '';

      const payload = {
        applicant_id: myId || null,
        applicant_name: myName,
        item_date: date,
        amount,
        item_desc: desc || null,
        invoice_no: invoice || null,
        invoice_file_url: invoiceFileUrl || (existing?.invoice_file_url || null),
        invoice_file_name: invoiceFileName || (existing?.invoice_file_name || null),
        year_month: ymStr,
        status: existing?.status || '待審核',
        ...(remarksNote ? { remarks: remarksNote } : {}),
      };

      let error;
      if (isEdit) {
        ({ error } = await db.from(table).update(payload).eq('id', existing.id));
      } else {
        ({ error } = await db.from(table).insert(payload));
      }
      if (error) { showToast((isEdit?'儲存':'新增')+'失敗：' + error.message, 'error'); return; }
      showToast(isEdit ? '✅ 已儲存' : '✅ 已新增');
      closeModal();
      await loadAccounting(); renderApp();
    }},
    { label: '取消', onclick: () => { window._meInvoiceFile = null; closeModal(); } },
  ]);

  // AI 辨識發票
  window._meInvoiceFile = null;
  document.getElementById('me-invoice-file')?.addEventListener('change', async e => {
    const file = e.target.files[0]; if (!file) return;
    window._meInvoiceFile = file;
    const statusEl = document.getElementById('me-invoice-status');
    const previewEl = document.getElementById('me-invoice-preview');
    const imgEl = document.getElementById('me-invoice-img');
    statusEl.style.display = 'block';
    statusEl.style.background = '#e3f2fd'; statusEl.style.color = '#1565c0';
    statusEl.textContent = '⏳ 壓縮中…';
    try {
      const isImg = file.type.startsWith('image/');
      const compressed = isImg ? await compressImage(file, 100) : file;
      if (isImg) {
        imgEl.src = URL.createObjectURL(compressed);
        previewEl.style.display = 'block';
      }
      if (!getClaudeApiKey()) {
        statusEl.style.background = '#fff8e1'; statusEl.style.color = '#e65100';
        statusEl.textContent = '⚠️ 尚未設定 Claude API Key，請手動填入';
        return;
      }
      statusEl.textContent = '🤖 AI 辨識發票中…';
      const parsed = await parseInvoiceWithClaude(compressed);
      const filled = [];
      if (parsed?.invoice_date) {
        const el = document.getElementById('me-date');
        if (el) {
          el.value = parsed.invoice_date;
          filled.push(`日期 ${parsed.invoice_date}`);
          // 自動帶入申請月份（從發票日期推算）
          const ymEl = document.getElementById('me-apply-ym');
          if (ymEl && !ymEl.dataset.manual) {
            ymEl.value = parsed.invoice_date.slice(0,7);
          }
          if (window._meCheckYmMismatch) window._meCheckYmMismatch();
        }
      }
      if (parsed?.invoice_no) { const el=document.getElementById('me-invoice'); if(el&&!el.value){el.value=parsed.invoice_no; filled.push(`號碼 ${parsed.invoice_no}`);} }
      if (parsed?.amount)     { const el=document.getElementById('me-amount'); if(el&&!el.value){el.value=parsed.amount; filled.push(`金額 $${Number(parsed.amount).toLocaleString()}`);} }
      if (parsed?.item_desc)  { const el=document.getElementById('me-desc'); if(el&&!el.value){el.value=parsed.item_desc; filled.push(`品項 ${parsed.item_desc.slice(0,20)}`);} }
      if (filled.length) {
        statusEl.style.background = '#e8f5e9'; statusEl.style.color = '#2e7d32';
        statusEl.textContent = `✅ AI 辨識完成：${filled.join('、')}，請確認後送出`;
      } else {
        statusEl.style.background = '#fff8e1'; statusEl.style.color = '#e65100';
        statusEl.textContent = '⚠️ 無法自動辨識，請手動填入';
      }
    } catch(err) {
      statusEl.style.background = '#ffebee'; statusEl.style.color = '#c62828';
      statusEl.textContent = `❌ 辨識失敗：${err.message}`;
    }
  });

  // 發票日期手動改 → 同步申請月份（若未手動改過申請月份）
  window._meDateChanged = function(dateVal) {
    if (!dateVal) return;
    const ymEl = document.getElementById('me-apply-ym');
    if (ymEl && !ymEl.dataset.manual) {
      ymEl.value = dateVal.slice(0,7);
    }
    if (window._meCheckYmMismatch) window._meCheckYmMismatch();
  };

  // 申請月份手動改 → 標記，並檢查非當月
  const ymElBind = document.getElementById('me-apply-ym');
  if (ymElBind) {
    ymElBind.addEventListener('change', function() {
      this.dataset.manual = '1';
      if (window._meCheckYmMismatch) window._meCheckYmMismatch();
    });
  }

  // 非當月提示邏輯
  window._meCheckYmMismatch = function() {
    const dateVal = document.getElementById('me-date')?.value || '';
    const ymVal   = document.getElementById('me-apply-ym')?.value || '';
    const warnEl  = document.getElementById('me-ym-warn');
    if (!warnEl) return;
    if (dateVal && ymVal && dateVal.slice(0,7) !== ymVal) {
      warnEl.style.display = 'block';
    } else {
      warnEl.style.display = 'none';
    }
  };
  window._meCheckYmMismatch(); // 編輯時初始檢查
}

// 圖片放大預覽
window._showImgPreview = function(url) {
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9999;display:flex;align-items:center;justify-content:center;cursor:zoom-out';
  overlay.innerHTML = `<img src="${url}" style="max-width:90vw;max-height:90vh;border-radius:8px;box-shadow:0 8px 40px rgba(0,0,0,.5)">`;
  overlay.onclick = () => overlay.remove();
  document.body.appendChild(overlay);
};
