<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STORY企業管理系統</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
/* ── Variables ── */
:root {
  --sidebar-bg: #1e2a2a;
  --sidebar-hover: #2a3d3d;
  --sidebar-active: #2d4a4a;
  --accent: #4db6ac;
  --accent-light: #e0f2f1;
  --accent-dark: #00897b;
  --danger: #ef5350;
  --warning: #ff9800;
  --success: #66bb6a;
  --info: #42a5f5;
  --bg: #f7fbfb;
  --card: #ffffff;
  --border: #c8e6e3;
  --text: #263238;
  --muted: #78909c;
  --sidebar-w: 200px;
  --radius: 8px;
  --shadow: 0 1px 4px rgba(0,0,0,.08);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: '微軟正黑體','Microsoft JhengHei',-apple-system,sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; }
button { cursor: pointer; font-family: inherit; border: none; outline: none; }
input, select, textarea { font-family: inherit; font-size: 14px; }
a { text-decoration: none; color: inherit; }

/* ── Layout ── */
.app { display: flex; min-height: 100vh; }
.sidebar {
  width: var(--sidebar-w); background: var(--sidebar-bg); color: #fff;
  display: flex; flex-direction: column; position: fixed;
  top: 0; left: 0; bottom: 0; z-index: 100; overflow: hidden;
  transition: transform .25s ease, width .25s ease;
}
.sidebar-scroll {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  display: flex; flex-direction: column;
}
.sidebar.collapsed { width: 52px; }
.sidebar.collapsed .sidebar-logo h1,
.sidebar.collapsed .sidebar-logo span,
.sidebar.collapsed .nav-section,
.sidebar.collapsed .nav-item span:not(.badge):not(:first-child),
.sidebar.collapsed .sidebar-user > div,
.sidebar.collapsed .sidebar-user > button { display: none; }
.sidebar.collapsed .nav-item { padding: 10px; justify-content: center; }
.sidebar.collapsed .nav-item .drag-handle { display: none; }
.sidebar.collapsed .sidebar-user { justify-content: center; padding: 12px 8px; }
.sidebar-toggle {
  background: none; border: none; color: rgba(255,255,255,.75); cursor: pointer;
  font-size: 20px; line-height: 1; padding: 4px 6px; border-radius: 6px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  transition: background .15s;
}
.sidebar-toggle:hover { background: rgba(255,255,255,.12); color: #fff; }
.sidebar-overlay {
  display: none; position: fixed; inset: 0; z-index: 99;
  background: rgba(0,0,0,.45); backdrop-filter: blur(2px);
}
.sidebar-overlay.show { display: block; }
.sidebar-logo {
  padding: 14px 12px 12px; border-bottom: 1px solid rgba(255,255,255,.08);
  display: flex; align-items: center; gap: 8px;
}
.sidebar-logo h1 { font-size: 15px; font-weight: 700; color: var(--accent); letter-spacing: 0.5px; flex: 1; white-space: nowrap; overflow: hidden; }
.sidebar-logo span { font-size: 11px; opacity: .5; display: block; margin-top: 2px; }
.sidebar.collapsed .sidebar-logo { justify-content: center; }
.sidebar.collapsed .sidebar-logo h1 { display: none; }
@media (max-width: 768px) {
  .sidebar { transform: translateX(-100%); width: var(--sidebar-w) !important; }
  .sidebar.mobile-open { transform: translateX(0) !important; width: var(--sidebar-w) !important; }
  .sidebar.collapsed { width: var(--sidebar-w) !important; transform: translateX(-100%); }
  .sidebar.collapsed.mobile-open { transform: translateX(0) !important; }
  .sidebar-toggle { display: none; }
  .main { margin-left: 0 !important; }
  .mobile-menu-btn { display: flex !important; }
  /* 業績儀表板 KPI 手機版 2×2 */
  .sales-kpi-grid { grid-template-columns: repeat(2, 1fr) !important; }
}
.mobile-menu-btn {
  display: none; align-items: center; justify-content: center;
  width: 36px; height: 36px; border-radius: 8px; background: var(--surface);
  border: 1px solid var(--border); cursor: pointer; font-size: 18px; color: var(--text);
  margin-right: 8px; flex-shrink: 0;
}
.nav { flex: 1; padding: 6px 0; }
.nav-section {
  padding: 14px 14px 4px 12px; font-size: 10px; letter-spacing: 1.5px;
  text-transform: uppercase; color: rgba(255,255,255,.35);
  display: flex; align-items: center; gap: 6px;
}
.nav-section::before {
  content: ''; display: inline-block; width: 14px; height: 2px;
  border-radius: 1px; background: currentColor; flex-shrink: 0;
}
.nav-item {
  display: flex; align-items: center; gap: 9px;
  padding: 8px 14px 8px 12px; cursor: pointer; font-size: 13px;
  opacity: .72; transition: all .15s; color: #fff;
  border-left: 3px solid transparent; position: relative;
}
.nav-item:hover { opacity: 1; }
/* 各 section hover 顏色 */
.nav-item[data-sec="業務追蹤"]:hover { background: rgba(66,165,245,.15); border-left-color: #42a5f5; color: #90caf9; }
.nav-item[data-sec="商品管理"]:hover { background: rgba(171,71,188,.15); border-left-color: #ab47bc; color: #ce93d8; }
.nav-item[data-sec="製作部"]:hover   { background: rgba(255,152,0,.15);  border-left-color: #ffa726; color: #ffcc80; }
.nav-item[data-sec="物料管理"]:hover { background: rgba(38,166,154,.15); border-left-color: #26a69a; color: #80cbc4; }
.nav-item[data-sec="財務"]:hover     { background: rgba(102,187,106,.15); border-left-color: #66bb6a; color: #a5d6a7; }
.nav-item[data-sec="系統"]:hover     { background: rgba(120,144,156,.15); border-left-color: #90a4ae; color: #cfd8dc; }
/* active */
.nav-item.active { opacity: 1; }
.nav-item.active[data-sec="業務追蹤"] { background: rgba(66,165,245,.22); border-left-color: #42a5f5; color: #90caf9; }
.nav-item.active[data-sec="商品管理"] { background: rgba(171,71,188,.22); border-left-color: #ab47bc; color: #ce93d8; }
.nav-item.active[data-sec="製作部"]   { background: rgba(255,152,0,.22);  border-left-color: #ffa726; color: #ffcc80; }
.nav-item.active[data-sec="物料管理"] { background: rgba(38,166,154,.22); border-left-color: #26a69a; color: #80cbc4; }
.nav-item.active[data-sec="財務"]     { background: rgba(102,187,106,.22); border-left-color: #66bb6a; color: #a5d6a7; }
.nav-item.active[data-sec="系統"]     { background: rgba(120,144,156,.22); border-left-color: #90a4ae; color: #cfd8dc; }
.nav-item.active[data-page="dashboard"] { background: var(--sidebar-active); border-left-color: var(--accent); color: var(--accent); }
.nav-item .badge {
  margin-left: auto; background: var(--danger); color: #fff;
  border-radius: 10px; padding: 1px 6px; font-size: 11px; font-weight: 600;
}
.nav-item .badge.warn { background: var(--warning); }
.sidebar-user {
  padding: 12px 14px; border-top: 1px solid rgba(255,255,255,.08);
  display: flex; align-items: center; gap: 9px; font-size: 12px;
}
.avatar {
  width: 28px; height: 28px; border-radius: 50%; background: var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 13px; color: #fff; flex-shrink: 0;
}
.main { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; min-height: 100vh; transition: margin-left .25s ease; }
.main.sidebar-collapsed { margin-left: 52px; }
.topbar {
  background: var(--card); border-bottom: 2px solid #b2dfdb;
  padding: 0 24px; height: 52px; display: flex; align-items: center;
  justify-content: space-between; position: sticky; top: 0; z-index: 50;
}
.topbar h2 { font-size: 16px; font-weight: 600; }
.topbar-actions { display: flex; gap: 8px; align-items: center; }
.content { padding: 24px; flex: 1; }

/* Hide number input spinners */
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
input[type=number] { -moz-appearance: textfield; }

/* ── Cards & Grid ── */
.cards { display: grid; gap: 16px; }
.cards-4 { grid-template-columns: repeat(4, 1fr); }
.cards-3 { grid-template-columns: repeat(3, 1fr); }
.cards-2 { grid-template-columns: repeat(2, 1fr); }
@media (max-width: 1100px) { .cards-4 { grid-template-columns: repeat(2,1fr); } }
@media (max-width: 700px) { .cards-4,.cards-3 { grid-template-columns: repeat(2,1fr); } .cards-2 { grid-template-columns: repeat(2,1fr); } }
/* 行事曆 layout */
.cal-layout { display:grid; grid-template-columns:1fr 280px; gap:16px; align-items:start; }
.cal-cell { min-height:56px; }
.cal-cell-empty { min-height:56px; }
@media (max-width: 700px) {
  .cal-layout { grid-template-columns:1fr; }
  .cal-cell { min-height:44px; }
  .cal-cell-empty { min-height:44px; }
  /* 會計儀表盤 5格 → 手機 2欄 */
  .acct-dashboard-admin { grid-template-columns:repeat(2,1fr) !important; }
}
.acct-dashboard-admin { display:grid; gap:12px; grid-template-columns:repeat(5,1fr); }
.acct-tab-layout { display:grid; grid-template-columns:1fr 220px; gap:12px; }
.acct-tab-summary { align-self:start; }
@media (max-width:700px) { .acct-tab-layout { grid-template-columns:1fr; } .acct-tab-summary { order:-1; } }
.btn-ym-quick { background:none; border:none; padding:5px 10px; border-radius:6px; font-size:12px; cursor:pointer; color:var(--text-muted,#888); font-weight:500; transition:all 0.15s; white-space:nowrap; }
.btn-ym-quick:hover { background:var(--bg,#fff); color:var(--text,#333); }
.btn-ym-quick.active { background:var(--accent,#1976d2); color:#fff; font-weight:600; }
@media (max-width: 600px) {
  .content { padding: 12px; }
  .topbar { padding: 0 12px; }
  .topbar h2 { font-size: 14px; }
  table { font-size: 12px; }
  thead th, tbody td { padding: 7px 8px; }
  .btn { padding: 6px 10px; font-size: 12px; }
  .tabs { gap: 4px; padding: 8px 10px 0; flex-wrap: wrap; }
  .tab { padding: 6px 10px; font-size: 12px; }
  .search-bar { flex-wrap: wrap; gap: 6px; }
  .form-group label { font-size: 12px; }
  .form-control { font-size: 14px; padding: 8px 10px; }
}
/* .card overridden in table section above */
.card-title { font-size: 13px; color: var(--muted); margin-bottom: 6px; font-weight: 500; }
.card-value { font-size: 28px; font-weight: 700; color: var(--text); }
.card-value.danger { color: var(--danger); }
.card-value.warning { color: var(--warning); }
.card-value.success { color: var(--success); }
.card-value.accent { color: var(--accent-dark); }
.card-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }

/* ── Buttons ── */
.btn { padding: 7px 14px; border-radius: 6px; font-size: 13px; font-weight: 500; transition: all .15s; display: inline-flex; align-items: center; gap: 5px; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-dark); }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
.btn-outline:hover { border-color: var(--accent); color: var(--accent); }
.btn-danger { background: var(--danger); color: #fff; }
.btn-danger:hover { background: #c62828; }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn-icon { padding: 5px 8px; }

/* ── Table ── */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
thead th { background: #e8f5f4; font-size: 12px; font-weight: 600; color: #00695c; padding: 10px 12px; text-align: left; border-bottom: 2px solid #b2dfdb; white-space: nowrap; }
tbody td { padding: 10px 12px; border-bottom: 1px solid #e8f5f4; font-size: 13px; vertical-align: middle; }
tbody tr:hover { background: #f0faf9; }
tbody tr:last-child td { border-bottom: none; }
.card { background: var(--card); border: 1px solid #b2dfdb; border-radius: var(--radius); padding: 18px 20px; box-shadow: var(--shadow); }

/* ── Tags / Badges ── */
.tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
.tag-red { background: #ffebee; color: var(--danger); }
.tag-orange { background: #fff3e0; color: #e65100; }
.tag-green { background: #e8f5e9; color: #2e7d32; }
.tag-blue { background: #e3f2fd; color: #1565c0; }
.tag-grey { background: #f5f5f5; color: #616161; }
.tag-teal { background: var(--accent-light); color: var(--accent-dark); }
.tag-purple { background: #f3e5f5; color: #6a1b9a; }
.tag-yellow { background: #fff8e1; color: #e65100; }
/* Drag & Drop */
.drag-row { transition: opacity .15s; }
.drag-row.drag-over { border: 2px dashed var(--accent) !important; background: var(--accent-light) !important; }

/* ── Product Side Panel ── */
.side-panel-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.25);
  z-index: 200; animation: fadeIn .2s ease;
}
.side-panel {
  position: fixed; top: 0; right: 0; bottom: 0;
  width: 400px; background: #fff;
  box-shadow: -4px 0 24px rgba(0,0,0,.12);
  display: flex; flex-direction: column;
  animation: slideInRight .22s ease;
  z-index: 201;
}
@keyframes slideInRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.side-panel-header {
  padding: 16px 20px 14px;
  border-bottom: 2px solid #b2dfdb;
  background: #e8f5f4;
  flex-shrink: 0;
}
.side-panel-header h3 { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
.side-panel-header .sub { font-size: 12px; color: var(--accent-dark); }
.side-panel-body { flex: 1; overflow-y: auto; padding: 18px 20px; }
.side-panel-footer {
  padding: 12px 20px; border-top: 1px solid #c8e6e3;
  display: flex; gap: 8px; justify-content: flex-end;
  background: #f9fdfc; flex-shrink: 0;
}
.sp-section-title {
  font-size: 11px; font-weight: 700; color: #00897b;
  letter-spacing: 1px; text-transform: uppercase;
  margin: 14px 0 7px; padding-bottom: 5px;
  border-bottom: 1px solid #e0f2f1;
}
.sp-chip {
  display: inline-flex; align-items: center; gap: 5px;
  background: #e8f5f4; border: 1px solid #b2dfdb;
  border-radius: 20px; padding: 4px 11px; font-size: 12px;
  font-weight: 500; color: #00695c;
}
.sp-bom-row {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px; border-radius: 8px; margin-bottom: 5px;
  background: #f9fdfc; border: 1px solid #e0f2f1;
}
.sp-bom-row .name { flex: 1; font-size: 13px; font-weight: 500; }
.sp-bom-row .qty { font-size: 12px; color: var(--muted); }
.drag-handle:active { cursor: grabbing; }

/* ── Forms ── */
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 5px; }
.form-control {
  width: 100%; padding: 8px 10px; border: 1px solid var(--border);
  border-radius: 6px; font-size: 13px; outline: none; transition: border .15s;
}
.form-control:focus { border-color: var(--accent); }
.form-row { display: grid; gap: 12px; }
.form-row-2 { grid-template-columns: 1fr 1fr; }
.form-row-3 { grid-template-columns: 1fr 1fr 1fr; }
@media (max-width: 600px) {
  .form-row-2, .form-row-3 { grid-template-columns: 1fr; }
  div[style*="grid-template-columns:1fr 1fr"],
  div[style*="grid-template-columns: 1fr 1fr"] { grid-template-columns: 1fr !important; }
  div[style*="grid-template-columns:1fr 1fr 1fr"],
  div[style*="grid-template-columns: 1fr 1fr 1fr"] { grid-template-columns: 1fr !important; }
  div[style*="grid-template-columns:1fr 1fr 1fr 1fr"],
  div[style*="grid-template-columns: 1fr 1fr 1fr 1fr"] { grid-template-columns: 1fr 1fr !important; }
}

/* ── Modal ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 200;
  display: flex; align-items: center; justify-content: center; padding: 20px;
}
.modal {
  background: var(--card); border-radius: 10px; width: 100%; max-width: 560px;
  max-height: 90vh; overflow-y: auto; box-shadow: 0 8px 32px rgba(0,0,0,.15);
}
@media (max-width: 600px) {
  .modal-overlay { padding: 0; align-items: flex-end; }
  .modal { border-radius: 16px 16px 0 0; max-height: 92vh; }
  .modal-body { padding: 16px; }
  .modal-header { padding: 14px 16px 12px; }
  .modal-footer { padding: 12px 16px; }
  /* form 兩欄 → 單欄 */
  .form-grid-2 { grid-template-columns: 1fr !important; }
}
.modal-header { padding: 18px 20px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.modal-header h3 { font-size: 15px; font-weight: 600; }
.modal-body { padding: 20px; }
.modal-footer { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }
.modal-close { background: none; color: var(--muted); font-size: 18px; padding: 2px 6px; border-radius: 4px; }
.modal-close:hover { background: var(--border); }

/* ── Login ── */
.login-wrap {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  background: var(--sidebar-bg);
}
.login-box {
  background: var(--card); border-radius: 12px; padding: 40px;
  width: 100%; max-width: 380px; box-shadow: 0 8px 32px rgba(0,0,0,.2);
}
.login-logo { text-align: center; margin-bottom: 28px; }
.login-logo h1 { font-size: 24px; font-weight: 700; color: var(--accent); }
.login-logo p { font-size: 13px; color: var(--muted); margin-top: 4px; }
.login-btn {
  width: 100%; padding: 10px; background: var(--accent); color: #fff;
  border-radius: 7px; font-size: 14px; font-weight: 600; margin-top: 6px;
}
.login-btn:hover { background: var(--accent-dark); }

/* ── Dashboard sections ── */
.section-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
.dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 20px; }
@media (max-width: 900px) { .dashboard-grid { grid-template-columns: 1fr; } }

/* ── Progress bar ── */
.progress-bar { background: #e0e0e0; border-radius: 4px; height: 8px; overflow: hidden; margin-top: 6px; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width .3s; }

/* ── Empty state ── */
.empty { text-align: center; padding: 48px 20px; color: var(--muted); }
.empty-icon { font-size: 40px; margin-bottom: 10px; }
.empty p { font-size: 13px; }

/* ── Search bar ── */
.search-bar { display: flex; gap: 8px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
.search-input { flex: 1; min-width: 200px; padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; outline: none; }
.search-input:focus { border-color: var(--accent); }

/* ── Tabs ── */
.tabs { display: flex; gap: 0; border-bottom: 2px solid var(--border); margin-bottom: 18px; }
.tab { padding: 9px 16px; font-size: 13px; font-weight: 500; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; }
.tab.active { color: var(--accent-dark); border-bottom-color: var(--accent); }
.tab:hover { color: var(--text); }

/* ── Loading ── */
.loading { display: flex; align-items: center; justify-content: center; padding: 48px; color: var(--muted); gap: 10px; }
.spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Alert ── */
.alert { padding: 10px 14px; border-radius: 6px; font-size: 13px; margin-bottom: 12px; }
.alert-success { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }
.alert-error { background: #ffebee; color: #c62828; border: 1px solid #ffcdd2; }
.alert-warning { background: #fff3e0; color: #e65100; border: 1px solid #ffe0b2; }
.alert-info { background: #e3f2fd; color: #1565c0; border: 1px solid #bbdefb; }
.cal-cell:hover { background: #f0faf9 !important; border-color: var(--accent) !important; }

/* ── Chip tabs (IP filter) ── */
.chip-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
.chip { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid var(--border); background: var(--card); color: var(--muted); transition: all .15s; display: flex; align-items: center; gap: 4px; }
.chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.chip .count { font-size: 11px; opacity: .8; }

/* ── Dot status ── */
.dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }
.dot-red { background: var(--danger); }
.dot-orange { background: var(--warning); }
.dot-green { background: var(--success); }
.dot-grey { background: var(--muted); }
.dot-teal { background: var(--accent); }

/* ── Action buttons in table ── */

// ═══════════════════════════════════════════
// Session Security：閒置自動登出 + 關閉分頁登出
// ═══════════════════════════════════════════
const SESSION_TIMEOUT_MS = 60 * 60 * 1000; // 60 分鐘
const SESSION_WARN_MS    =  5 * 60 * 1000; //  5 分鐘前警告
let _idleTimer   = null;
let _warnTimer   = null;
let _warnToastEl = null;

function _clearIdleTimers() {
  clearTimeout(_idleTimer);
  clearTimeout(_warnTimer);
  if (_warnToastEl) { _warnToastEl.remove(); _warnToastEl = null; }
}

function _resetIdleTimer() {
  if (!state.user) return;          // 未登入不需計時
  _clearIdleTimers();

  // 5 分鐘前顯示警告 toast
  _warnTimer = setTimeout(() => {
    if (!state.user) return;
    _warnToastEl = document.createElement('div');
    _warnToastEl.className = 'alert alert-warning';
    _warnToastEl.style.cssText = 'position:fixed;top:16px;right:16px;z-index:9999;min-width:280px;max-width:400px;box-shadow:0 4px 12px rgba(0,0,0,.2);cursor:pointer;';
    _warnToastEl.innerHTML = '⚠️ <b>閒置超時警告</b><br>系統將於 5 分鐘後自動登出，點此繼續使用。';
    _warnToastEl.onclick = () => { _resetIdleTimer(); };
    document.body.appendChild(_warnToastEl);
  }, SESSION_TIMEOUT_MS - SESSION_WARN_MS);

  // 時間到強制登出
  _idleTimer = setTimeout(async () => {
    _clearIdleTimers();
    if (!state.user) return;
    showToast('⏰ 閒置超過 60 分鐘，已自動登出', 'warning', 5000);
    await signOut();
  }, SESSION_TIMEOUT_MS);
}

// 監聽使用者任何互動，重置計時器
['mousemove','mousedown','keydown','touchstart','scroll','click'].forEach(evt => {
  document.addEventListener(evt, () => _resetIdleTimer(), { passive: true });
});

// 關閉分頁 / 離開頁面時登出
// 使用 sendBeacon 確保頁面關閉時也能送出登出請求
window.addEventListener('beforeunload', () => {
  if (!state.user) return;
  // 從 localStorage 找 Supabase token（key 格式：sb-<project>-auth-token）
  try {
    let token = '';
    for (const k of Object.keys(localStorage)) {
      if (k.startsWith('sb-') && k.endsWith('-auth-token')) {
        const val = JSON.parse(localStorage.getItem(k) || '{}');
        token = val.access_token || '';
        break;
      }
    }
    if (token) {
      // sendBeacon 是同步送出，不會因頁面關閉而中斷
      const blob = new Blob([JSON.stringify({})], { type: 'application/json' });
      navigator.sendBeacon(
        `${SUPABASE_URL}/auth/v1/logout?scope=local`,
        blob
      );
    }
    // 清除 localStorage 的 Supabase session（讓下次開啟需重新登入）
    Object.keys(localStorage).forEach(k => {
      if (k.startsWith('sb-') || k.includes('supabase')) localStorage.removeItem(k);
    });
    localStorage.removeItem('story_last_page');
  } catch(e) {}
});

async function loadDashboard() {
  const today = new Date().toISOString().split('T')[0];
  const threeDays = new Date(Date.now() + 3*86400000).toISOString().split('T')[0];

  const [orders, restock, todos, cs, repair, dev, bookingPending] = await Promise.all([
    db.from('custom_orders').select('*').in('status',['待排圖','排圖製作中','電鍍中']).order('due_date'),
    db.from('restock_orders').select('*, restock_order_items(*, products(name, series(name)))').eq('status','待覆核'),
    db.from('todos').select('*').eq('status','未完成').or(`assignee_id.eq.${state.user?.id},is_team.eq.true`).order('deadline'),
    db.from('cs_records').select('*').eq('reply_status','未回覆'),
    db.from('repair_orders').select('*').not('status','in','("已完成","已寄回","取消")'),
    db.from('dev_projects').select('*').eq('status','進行中'),
    db.from('experience_bookings').select('id').eq('status','待確認').gte('booking_date', today),
  ]);

  state.data.dashboard = {
    orders: orders.data || [],
    restock: restock.data || [],
    todos: todos.data || [],
    cs: cs.data || [],
    repair: repair.data || [],
    dev: dev.data || [],
    bookingPending: (bookingPending.data||[]).length,
    today,
    threeDays,
  };
}

async function loadProducts() {
  const [{ data }, { data: cats }, { data: castings }, { data: parts }] = await Promise.all([

    db.from('categories').select('*').order('name'),
    db.from('castings').select('id, name, stock').order('name'),
    db.from('parts').select('id, name, stock, unit, spec, category').order('name'),
  ]);
  state.data.products = data || [];
  state.data.categories = cats || [];
  if (castings) state.data.castings = castings;
  if (parts) state.data.parts = parts;
  // 載入顏色選項
  const { data: colorSetting } = await db.from('settings').select('value').eq('key','color_options').maybeSingle();
  if (colorSetting?.value) {
    try { state.data.colorOptions = JSON.parse(colorSetting.value); } catch(e) {}
  }
  if (!state.data.colorOptions) state.data.colorOptions = ['純銀不電鍍','純銀硫化','白K金','玫瑰金','黃18K金','黃22K金'];
  await loadIPTree();
}

async function loadIPTree() {
  // 載入完整 IP 分類樹（4層：大分類→中分類→角色→系列）
  const { data: ipCats } = await db.from('ip_categories').select('*').eq('is_active', true).order('sort_order');
  const { data: series } = await db.from('series').select('*').order('name');
  state.data.ipCategories = ipCats || [];
  state.data.series = series || [];

  // 建立樹狀結構
  const tree = [];
  const catMap = {};
  (ipCats||[]).forEach(c => { catMap[c.id] = { ...c, children: [] }; });
  (ipCats||[]).forEach(c => {
    if (c.parent_id && catMap[c.parent_id]) {
      catMap[c.parent_id].children.push(catMap[c.id]);
    } else if (!c.parent_id) {
      tree.push(catMap[c.id]);
    }
  });
  // 把系列掛到對應的 category
  (series||[]).forEach(s => {
    if (s.category_id && catMap[s.category_id]) {
      if (!catMap[s.category_id].series) catMap[s.category_id].series = [];
      catMap[s.category_id].series.push(s);
    }
  });
  state.data.ipTree = tree;
  state.data.ipCatMap = catMap;
}

  state.data.accounting = { ap: apResult.data||[], meal: meal.data||[], advance: advance.data||[], ym, vendors: vendors.data||[], ar: ar.data||[], ar_all: arAll.data||[] };

// 可以編輯業績數值的人：admin、management，或有 sales_edit 權限
function canEditSales() {
  const role = state.profile?.role;
  const email = state.profile?.email || state.user?.email || '';
  if (role === 'admin' || role === 'management' || email === 'cailing0516@gmail.com') return true;
  const perms = Array.isArray(state.profile?.permissions) ? state.profile.permissions : [];
  return perms.includes('sales_edit');
}

// 可以調整庫存數量的人：admin、主管、製作部
// 可以修改/刪除補貨單的人：admin、主管、有 restock_manage 權限
function canManageRestock() {
  const role = state.profile?.role;
  const email = state.profile?.email || state.user?.email || '';
  const adminEmails = ['cailing0516@gmail.com'];
  if (role === 'admin' || adminEmails.includes(email)) return true;
  const perms = Array.isArray(state.profile?.permissions) ? state.profile.permissions : [];
  return perms.includes('restock_manage');
}

function canAdjustStock() {
  const role = state.profile?.role;
  const email = state.profile?.email || state.user?.email || '';
  const adminEmails = ['cailing0516@gmail.com'];
  if (role === 'admin' || adminEmails.includes(email)) return true;
  const perms = Array.isArray(state.profile?.permissions) ? state.profile.permissions : [];
  // 有製作部頁面權限（castings / parts / restock）視為有調庫存權限
  return perms.includes('castings') || perms.includes('parts') || perms.includes('restock') || perms.length === 0;
}

function canAccessPage(pageKey) {
  const role = state.profile?.role;
  const email = state.profile?.email || state.user?.email || '';
  const adminEmails = ['cailing0516@gmail.com'];
  // admin 帳號全開（role 或 email 任一符合）
  const isAdmin = role === 'admin' || adminEmails.includes(email);
  if (isAdmin) return true;
  // 管理部：幾乎等同 admin，僅排除帳號管理
  if (role === 'management') {
    if (pageKey === 'users') return false;
    return true;
  }
  // pickup 頁面：有 restock 權限的人可以看
  if (pageKey === 'pickup') return (state.profile?.permissions||[]).includes('restock') || !state.profile?.permissions?.length;
  // 未設定 permissions 的帳號：顯示基本頁面
  const perms = Array.isArray(state.profile?.permissions) ? state.profile.permissions : null;
  if (pageKey === 'dashboard') return true;
  if (pageKey === 'settings') return true;
  if (pageKey === 'journal')  return true;  // 工作日誌全員可見
  if (pageKey === 'sales')    return true;  // 業績儀表板全員可見
  if (pageKey === 'users') return role === 'admin' || adminEmails.includes(email);
  // 沒有任何 permissions 設定時，顯示全部（避免鎖死）
  if (!perms || perms.length === 0) return true;
  return perms.includes(pageKey);
}

function renderSidebar() {
  const role = state.profile?.role;

  let sections = {};
  Object.entries(PAGES).forEach(([key, p]) => {
    if (!canAccessPage(key)) return;
    const s = p.section || '__top';
    if (!sections[s]) sections[s] = [];
    sections[s].push({ key, ...p });
  });

  const d = state.data.dashboard || {};
  const pendingApprovals = (state.data.approvalRequests||[]).filter(r=>r.status==='pending').length;
  const badges = {
    orders: d.orders?.filter(o => o.status === '待排圖').length || 0,
    restock: d.restock?.length || 0,
    todos: d.todos?.filter(t => t.status === '未完成').length || 0,
    cs: d.cs?.length || 0,
    repair: d.repair?.filter(r => !['已完成','已寄回','取消'].includes(r.status)).length || 0,
    approvals: pendingApprovals || 0,
  };

  const secColors = { '業務追蹤':'#42a5f5','商品管理':'#ab47bc','製作部':'#ffa726','物料管理':'#26a69a','行銷':'#f472b6','財務':'#66bb6a','系統':'#90a4ae' };
  const secOrder = getNavOrder();
  // 確保有新的 section 也能顯示（包含行銷）
  ['業務追蹤','商品管理','製作部','物料管理','財務','系統'].forEach(s => {
    if (!secOrder.includes(s)) secOrder.push(s);
  });

  const isSidebarCollapsed = localStorage.getItem('sidebarCollapsed') === '1';
  let html = `<div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleMobileSidebar()"></div>
  <div class="sidebar${isSidebarCollapsed ? ' collapsed' : ''}" id="main-sidebar">
    <div class="sidebar-logo">
      <button class="sidebar-toggle" id="sidebar-toggle-btn" onclick="toggleSidebar()" title="收合選單">&#9776;</button>
      <h1>STORY企業管理系統</h1>
    </div>
    <div class="sidebar-scroll"><nav class="nav" id="nav-root">`;

  // Dashboard first（不可拖曳）
  html += `<div class="nav-item ${state.page==='dashboard'?'active':''}" data-page="dashboard" data-sec="">
    <span>🏠</span><span>首頁儀表板</span>
  </div>`;

  secOrder.forEach(sec => {
    if (!sections[sec]) return;
    const sc = secColors[sec] || 'rgba(255,255,255,.35)';

    // 依儲存的 item 順序排列
    const savedItemOrder = getNavItemOrder(sec);
    let items = sections[sec];
    if (savedItemOrder) {
      const ordered = [];
      savedItemOrder.forEach(k => { const it = items.find(i=>i.key===k); if(it) ordered.push(it); });
      items.forEach(it => { if(!ordered.includes(it)) ordered.push(it); });

    }

    html += `<div class="nav-section-group" data-sec-group="${sec}">
      <div class="nav-section" style="color:${sc};cursor:grab;user-select:none" draggable="true" data-drag-sec="${sec}">

      <div class="nav-items-group" data-items-sec="${sec}">`;

    items.forEach(p => {
      const b = badges[p.key];

        <span>${p.icon}</span><span>${p.label}</span>
        ${b ? `<span class="badge${p.key==='restock'?' warn':''}">${b}</span>` : ''}
      </div>`;
    });

    html += `</div></div>`;
  });

  html += `</nav>

      <div>
        <div style="font-size:12px;font-weight:600">${state.profile?.name||'使用者'}</div>

}

  const achievePctRaw = yearGoal > 0 ? (yearActual / yearGoal * 100) : 0;

        <span style="font-size:12px;color:var(--muted)">已達成 <strong>${(yearActual/10000).toFixed(1)}萬</strong>／ 目標 <strong>${(yearGoal/10000).toFixed(0)}萬</strong></span>

    <div class="cards cards-4" style="margin-bottom:16px">

function renderProducts() {
  const products = state.data.products || [];
  const filterIP = state.data.filterIP || '';
  const filterCat = state.data.filterProductCat || '';
  const searchQ = (state.data.productSearch || '').toLowerCase();
  const allIPs = [...new Set(products.map(p => p.ip_licenses?.name).filter(Boolean))];

  let filtered = products;
  if (filterIP) filtered = filtered.filter(p => p.ip_licenses?.name === filterIP);

                ? castingList.map(c => {

                    </div>`;
                  }).join('')
                : '—';

              // 零件顯示：名稱×數量，有缺貨的加紅點
              // 是否顯示規格由分類設定決定
              const partCatShowSpec = state.data.partCatShowSpec || {};
              const partHtml = partList.length
                ? partList.map(c => {
                    const part = (state.data.parts||[]).find(pt=>pt.id===c.part_id);
                    const stock = c.parts?.stock ?? part?.stock ?? 0;
                    const lack = stock < c.qty;
                    const label = c.parts?.name || (part?.name) || '?';
                    const spec = c.parts?.spec || part?.spec || '';
                    const cat = part?.category || '';
                    const showSpec = cat ? (partCatShowSpec[cat] !== false) : false;
                    const unit = part?.unit || c.parts?.unit || '';
                    return `<div style="display:flex;align-items:center;gap:4px;white-space:nowrap">
                      <span>${label}${(showSpec && spec) ? ' '+spec : ''} ×${c.qty}${unit}</span>
                      <span style="width:7px;height:7px;border-radius:50%;background:${lack?'var(--danger)':'var(--success)'}"></span>
                    </div>`;
                  }).join('')
                : '—';

              const pid = p.id;
              return `<tr class="${sel?'selected-row':''}" style="cursor:pointer" data-product-id="${pid}">
                <td onclick="event.stopPropagation()"><input type="checkbox" class="batch-cb" ${sel?'checked':''} onchange="event.stopPropagation();batchToggle('products','${pid}',this.checked)"></td>
                <td onclick="event.stopPropagation()"><div class="action-btns">

                  <button class="btn-table danger" data-action="del-product" data-id="${pid}">刪除</button>
                </div></td>

                  <div style="display:flex;gap:4px">
                    ${p.front_image_url ? `<img src="${p.front_image_url}" style="width:36px;height:36px;object-fit:cover;border-radius:4px;cursor:pointer" onclick="showImgModal('${p.front_image_url}','${p.name}')">` : '<div style="width:36px;height:36px;background:#f0f0f0;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#ccc">正</div>'}
                    ${p.back_image_url ? `<img src="${p.back_image_url}" style="width:36px;height:36px;object-fit:cover;border-radius:4px;cursor:pointer" onclick="showImgModal('${p.back_image_url}','${p.name} - 背面')">` : '<div style="width:36px;height:36px;background:#f0f0f0;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;color:#ccc">CR</div>'}
                  </div>
                </td>
                <td>${(()=>{
                  const code = p.series?.ip_categories?.code;
                  const name = p.series?.ip_categories?.name;
                  // 從 ipTree 找代碼顏色
                  const ipNode = (state.data.ipTree||[]).reduce((acc,n)=>{
                    if(acc)return acc;
                    const found=(n.children||[]).reduce((a2,n2)=>{
                      if(a2)return a2;
                      return (n2.children||[]).find(n3=>n3.code===code&&code)||null;
                    },null);
                    return found;
                  },null);
                  const color = ipNode?.color;
                  if(!code) return '<span style="color:#ccc">—</span>';
                  return `<span style="display:inline-block;font-size:11px;font-weight:700;background:${color||'#90a4ae'};color:#fff;padding:2px 7px;border-radius:4px;white-space:nowrap">${code}</span>`;
                })()}</td>
                <td style="font-size:12px;color:var(--accent-dark);white-space:nowrap">${p.series?.name||'—'}</td>
                <td><strong>${p.name}</strong></td>
                <td>${p.categories?.name ? `<span class="tag tag-blue">${p.categories.name}</span>` : '—'}</td>
                <td style="font-size:12px">${p.color||'—'}</td>
                <td style="font-size:12px">${castingHtml}</td>
                <td style="font-size:12px">${partHtml}</td>
                <td>${hasMissing ? `<span class="tag tag-red">缺料</span>` : '<span class="tag tag-green">充足</span>'}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
}

function showImgModal(url, title) {
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:300;display:flex;align-items:center;justify-content:center;cursor:pointer';
  overlay.innerHTML = `<div style="text-align:center">

// 新增/編輯商品 Modal
// 品類決定顯示「鍊長」或「戒圍」
window.pmUpdateSpecField = function() {
  const catSel   = document.getElementById('pm-cat');
  const label    = document.getElementById('pm-spec-label');
  const chainWrap= document.getElementById('pm-chain-length')?.parentElement;
  const chainInp = document.getElementById('pm-chain-length');
  const autoBtn  = document.getElementById('pm-chain-auto-btn');
  const ringInp  = document.getElementById('pm-ring-size');
  if (!catSel || !label) return;

  const catName = catSel.options[catSel.selectedIndex]?.text || '';
  const isRing  = /戒指|戒環/i.test(catName);
  const hasChain= /項鍊|手鍊|頸鍊|手環|毛衣鍊/i.test(catName);

  if (isRing) {
    label.textContent = '戒圍';
    if (chainInp)  chainInp.style.display  = 'none';
    if (autoBtn)   autoBtn.style.display   = 'none';
    if (ringInp)   ringInp.style.display   = '';
  } else {
    label.textContent = hasChain ? '鍊長' : '鍊長（選填）';
    if (chainInp)  chainInp.style.display  = '';
    if (autoBtn)   autoBtn.style.display   = '';
    if (ringInp)   ringInp.style.display   = 'none';
    // 如果有選鍊子零件，自動帶入
    if (hasChain) setTimeout(pmAutoChainLength, 50);
  }
};

// 品名自動帶品類
window.pmAutoFillFromName = function(name) {
  const catSel = document.getElementById('pm-cat');
  if (!catSel || catSel.value) return; // 已有值就不覆蓋
  const cats = state.data.categories || [];
  const keyMap = [
    { keys: ['項鍊','頸鍊','毛衣鍊'], match: '項鍊' },
    { keys: ['手鍊','手環','手串'],   match: '手鍊' },
    { keys: ['戒指','戒環'],          match: '戒指' },
    { keys: ['耳環','耳夾','耳針','耳扣'], match: '耳環' },
  ];
  for (const { keys, match } of keyMap) {
    if (keys.some(k => name.includes(k))) {
      const cat = cats.find(c => c.name === match);
      if (cat) {
        catSel.value = cat.id;
        catSel.style.borderColor = 'var(--success)';
        setTimeout(() => catSel.style.borderColor = '', 1200);
        pmUpdateSpecField();
      }
      break;
    }
  }
};

// 貨號倒數第三碼自動帶顏色
window.pmAutoFillFromSku = function(sku) {
  const colorSel = document.getElementById('pm-color');
  if (!colorSel) return;
  const skuCode = { S:'純銀不電鍍', W:'白K金', R:'玫瑰金', Y:'黃18K金' };
  const s = sku.toUpperCase().trim();
  if (s.length < 3) return;
  const code = s[s.length - 3]; // 倒數第三碼
  const color = skuCode[code];
  if (color) {
    // 找對應 option
    const opt = [...colorSel.options].find(o => o.value === color || o.text === color);
    if (opt) {
      colorSel.value = opt.value || opt.text;
      colorSel.style.borderColor = 'var(--success)';
      setTimeout(() => colorSel.style.borderColor = '', 1200);
    }
  }
};

// ── IP 樹狀輔助函數 ──

function buildIPLabel(product) {
  if (!product) return '';
  const parts = [];
  // 從 ipCatMap 追溯路徑
  const catMap = state.data.ipCatMap || {};
  if (product.series_id) {
    const s = (state.data.series||[]).find(s=>s.id===product.series_id);
    if (s) {
      const cat = catMap[s.category_id];
      if (cat) {
        const path = getCatPath(cat.id);
        return path.map(c=>c.name).join(' › ') + ' › ' + s.name;
      }
      return s.name;
    }
  }
  return '';
}

function getCatPath(catId) {
  const catMap = state.data.ipCatMap || {};
  const path = [];
  let cur = catMap[catId];
  while (cur) {
    path.unshift(cur);
    cur = cur.parent_id ? catMap[cur.parent_id] : null;
  }
  return path;
}

function renderIPTreeForModal(product, searchQ) {
  const tree = state.data.ipTree || [];
  if (!tree.length) return '<div style="padding:16px;color:var(--muted);font-size:13px;text-align:center">⚠️ 無法載入 IP 分類，請確認登入狀態</div>';
  const q = (searchQ||'').toLowerCase().trim();

  // 深度對應的簡潔樣式
  const depthStyle = [
    { bg:'#e8f5f4', txt:'#00695c', fw:700, fs:13 }, // 大分類
    { bg:'#f0f0f0', txt:'#37474f', fw:600, fs:13 }, // 中分類
    { bg:'#fafafa', txt:'#546e7a', fw:500, fs:12 }, // 角色
  ];

  // 搜尋模式：flat 展示所有符合的角色和系列
  if (q) {
    const results = [];
    function searchTree(node, depth) {
      const nameMatch = node.name.toLowerCase().includes(q);
      const codeMatch = node.code?.toLowerCase().includes(q);
      if (depth === 2 && (nameMatch || codeMatch)) {
        // 顯示角色本身（含其系列）
        results.push({ node, depth });
      }
      // 搜尋系列
      if (node.series) {
        node.series.forEach(s => {
          if (s.name.toLowerCase().includes(q)) results.push({ node, series: s, depth });
        });
      }
      if (node.children) node.children.forEach(c => searchTree(c, depth+1));
    }
    tree.forEach(n => searchTree(n, 0));

    if (!results.length) return `<div style="padding:16px;text-align:center;color:var(--muted);font-size:13px">找不到「${searchQ}」</div>`;

    return results.map(r => {
      const node = r.node;
      const accentColor = node.color;
      // 代碼 badge 用自訂顏色，否則預設角色色
      const codeBg = accentColor || '#90a4ae';
      if (r.series) {
        // 直接顯示系列行
        const label = getCatPath(node.id).map(c=>c.name).join(' › ') + ' › ' + r.series.name;
        return `<div style="padding:8px 12px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:8px;border-bottom:1px solid #f0f0f0"
          onclick="selectIPSeriesNew('${node.id}','${r.series.id}','${label.replace(/'/g,"\\'")}',event)"
          onmouseover="this.style.background='var(--accent-light)'" onmouseout="this.style.background=''">
          ${node.code?`<span style="font-size:10px;font-weight:700;background:${codeBg};color:#fff;padding:1px 5px;border-radius:3px">${node.code}</span>`:''}
          <span style="flex:1">${node.name} <span style="color:var(--muted)">›</span> ${r.series.name}</span>
          <span style="font-size:10px;color:var(--accent-dark)">選擇</span>
        </div>`;
      } else {
        // 顯示角色（展開其系列）
        const hasSeries = node.series?.length > 0;
        return `<div style="border-bottom:1px solid #f0f0f0">
          <div style="padding:8px 12px;font-size:12px;font-weight:600;background:#fafafa;display:flex;align-items:center;gap:8px">
            ${node.code?`<span style="font-size:10px;font-weight:700;background:${codeBg};color:#fff;padding:1px 5px;border-radius:3px">${node.code}</span>`:''}
            <span style="flex:1;color:#546e7a">${node.name}</span>
          </div>
          ${hasSeries ? node.series.map(s=>{
            const label = getCatPath(node.id).map(c=>c.name).join(' › ') + ' › ' + s.name;
            return `<div style="padding:7px 12px 7px 28px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:6px;border-bottom:1px solid #f8f8f8"
              onclick="selectIPSeriesNew('${node.id}','${s.id}','${label.replace(/'/g,"\\'")}',event)"
              onmouseover="this.style.background='var(--accent-light)'" onmouseout="this.style.background=''">
              <span style="color:var(--muted)">└</span><span style="flex:1">${s.name}</span>
              <span style="font-size:10px;color:var(--accent-dark)">選擇</span>
            </div>`;
          }).join('') : `<div style="padding:6px 12px 6px 28px;font-size:11px;color:var(--muted)">尚無系列</div>`}
        </div>`;
      }
    }).join('');
  }

  // 一般樹狀模式
  function renderNode(node, depth) {
    const hasChildren = node.children?.length > 0;
    const hasSeries = node.series?.length > 0;
    const st = depthStyle[Math.min(depth,2)];
    const accentColor = node.color;
    // 底色與文字固定，只有代碼 badge 顏色跟著自訂
    const bg  = st.bg;
    const txt = st.txt;
    const defaultCodeBg = depth===0?'#4db6ac':depth===1?'#80cbc4':'#90a4ae';
    const codeBg = (depth===2 && accentColor) ? accentColor : defaultCodeBg;
    const indent = depth * 14;

    return `<div style="border-bottom:1px solid rgba(0,0,0,.04)">
      <div style="padding:7px 10px 7px ${10+indent}px;font-size:${st.fs}px;font-weight:${st.fw};background:${bg};cursor:pointer;display:flex;align-items:center;gap:6px;user-select:none;transition:background .12s"
        onmouseover="this.style.background='${depth===0?'rgba(77,182,172,.10)':depth===1?'rgba(77,182,172,.06)':'rgba(0,0,0,.04)'}'" onmouseout="this.style.background='${bg}'"
        onclick="toggleIPNode('${node.id}')">
        <span id="ip-arrow-${node.id}" style="font-size:9px;color:${txt};opacity:.6;min-width:10px;text-align:center">${hasChildren||hasSeries?'▶':''}</span>
        ${node.code?`<span style="font-size:10px;font-weight:700;background:${codeBg};color:#fff;padding:1px 5px;border-radius:3px">${node.code}</span>`:''}
        <span style="color:${txt};flex:1">${node.name}</span>
      </div>
      <div id="ip-children-${node.id}" style="display:none">
        ${hasChildren ? node.children.map(c=>renderNode(c, depth+1)).join('') : ''}
        ${hasSeries ? node.series.map(s=>{
          const label = getCatPath(node.id).map(c=>c.name).join(' › ') + ' › ' + s.name;
          return `<div style="padding:7px 10px 7px ${24+indent}px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:6px;border-bottom:1px solid #f5f5f5"
            onclick="selectIPSeriesNew('${node.id}','${s.id}','${label.replace(/'/g,"\\'")}',event)"
            onmouseover="this.style.background='var(--accent-light)'" onmouseout="this.style.background=''">
            <span style="color:var(--muted);font-size:10px">└</span>
            <span style="flex:1">${s.name}</span>
            <span style="font-size:10px;color:var(--accent-dark)">選擇</span>
          </div>`;
        }).join('') : ''}
      </div>
    </div>`;
  }

  return tree.map(n => renderNode(n, 0)).join('');
}

// 自動計算鍊長並填入
window.pmAutoChainLength = function() {
  const parts = state.data.parts || [];
  // chainField 可能被隱藏，但還是要能找到（style.display 不影響 getElementById）
  const chainField = document.getElementById('pm-chain-length');
  if (!chainField) { showToast('找不到鍊長欄位', 'error'); return; }

  // 收集所有已選零件（從 hidden input 讀取 id）
  const bomRows = document.querySelectorAll('#part-bom-list .bom-row');
  const selectedParts = [];
  bomRows.forEach(row => {
    const hiddenId = row.querySelector('input[type="hidden"]');
    const qtyInp   = row.querySelector('input[type="number"]');
    const idVal = hiddenId?.value?.trim();
    if (!idVal) return;
    const pt = parts.find(p => String(p.id) === String(idVal));
    const qty = parseInt(qtyInp?.value) || 1;
    selectedParts.push({ pt: pt||null, id: idVal, qty });
  });

  // debug: 顯示抓到什麼
  if (!selectedParts.length) {
    showToast('零件 BOM 沒有選取任何零件', 'warning'); return;
  }
  const nullParts = selectedParts.filter(x=>!x.pt);
  if (nullParts.length) {
    showToast(`⚠ 有 ${nullParts.length} 筆零件 id 對不到資料（id: ${nullParts.map(x=>x.id.slice(0,8)).join(', ')}）`, 'warning');
  }
  const validParts = selectedParts.filter(x=>x.pt);
  if (!validParts.length) { showToast('所有選取零件都找不到對應資料', 'error'); return; }

  const cats = validParts.map(x=>`${x.pt.name}[${x.pt.category||'無分類'}]`).join('、');
  console.log('pmAutoChainLength parts:', cats);

  // 用零件「分類（category）」判斷鍊子類型
  // 分類含「銀鍊」「鍊子」「銀鏈」→ 主鍊；分類含「延長」→ 延長鍊
  // 長度優先從名稱/spec 解析 cm；若找不到，則用 BOM 數量欄當 cm 數
  // 號數從名稱解析 #N 或 N號
  function parseChainPart(pt, qty) {
    const cat = (pt.category||'').trim();
    const isChain     = /銀鍊|鍊子|銀鏈/.test(cat);
    const isExtension = /延長/.test(cat);
    if (!isChain && !isExtension) return null;
    const fullText = ((pt.name||'') + ' ' + (pt.spec||'')).replace(/\s+/g, ' ');
    const lengthMatch = fullText.match(/(\d+(?:\.\d+)?)\s*(?:cm|公分|CM)/i);
    const sizeMatch   = fullText.match(/#(\d+)|[粗細]?\s*(\d+)\s*號/);
    // 長度：名稱有就用名稱；沒有就用 BOM 數量欄（單位視為 cm）
    const length = lengthMatch ? parseFloat(lengthMatch[1]) : (isExtension ? null : (qty > 1 ? qty : null));
    return {
      length,
      size: sizeMatch ? (sizeMatch[1]||sizeMatch[2]) : null,
      isExtension,
    };
  }

  const chains = [];
  let hasExtension = false;

  selectedParts.forEach(({ pt, qty }) => {
    const info = parseChainPart(pt, qty);
    if (!info) return;
    if (info.isExtension) {
      hasExtension = true;
      return;
    }
    if (info.length != null) {
      chains.push({ length: info.length, size: info.size, name: pt.name || '', qty });
    }
  });

  if (!chains.length) {
    showToast('⚠ 找不到鍊長資訊：請確認零件分類含「銀鍊」，且數量欄填入鍊長（cm）', 'warning');
    return;
  }

  // 主鍊取最長的
  chains.sort((a,b) => b.length - a.length);
  const main = chains[0];

  const lengthStr = `${main.length}cm`;
  const partName  = main.name || '';

  // 格式：長度（+1″）--完整零件名稱
  let result;
  if (hasExtension) {
    result = partName ? `${lengthStr}+1″--${partName}` : `${lengthStr}+1″`;
  } else {
    result = partName ? `${lengthStr}--${partName}` : lengthStr;
  }

  chainField.value = result;
  // 視覺提示
  chainField.style.borderColor = 'var(--accent)';
  chainField.style.background  = '#f0faf9';
  setTimeout(() => { chainField.style.borderColor = ''; chainField.style.background = ''; }, 1500);
};

// 圖片預覽 + 大小檢查
window.previewImg = function(input, previewId) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 300 * 1024) {
    showToast(`圖片過大（${(file.size/1024).toFixed(0)}KB），請壓縮至 300KB 以內`, 'error');
    input.value = ''; return;
  }
  const reader = new FileReader();
  reader.onload = e => {
    const preview = document.getElementById(previewId);
    preview.innerHTML = `<img src="${e.target.result}" style="width:100%;height:100%;object-fit:cover">`;
  };
  reader.readAsDataURL(file);
};

// 上傳圖片到 Supabase Storage
async function uploadProductImage(file, productId, side) {
  if (!file) return null;
  const ext = file.name.split('.').pop().toLowerCase();
  const path = `${productId}/${side}.${ext}`;
  const { error } = await db.storage.from('product-images').upload(path, file, { upsert: true });
  if (error) { showToast('圖片上傳失敗：' + error.message, 'error'); return null; }
  const { data } = db.storage.from('product-images').getPublicUrl(path);
  return data.publicUrl;
}

// 儲存商品
async function saveProduct(productId) {
  const name = document.getElementById('pm-name').value.trim();
  if (!name) { showToast('請填寫品名', 'error'); return; }
  const catId = document.getElementById('pm-cat').value;
  const seriesId = document.getElementById('pm-series-id').value;
  // ip_id 從選取的系列反推（category_id → 找角色層）
  const ipCatId = document.getElementById('pm-ip-cat-id').value;
  const ipId = null; // 改用 series + category 架構，不再用 ip_id

  const btn = document.getElementById('save-product-btn');
  btn.textContent = '儲存中…'; btn.disabled = true;

  const productData = {
    name,
    sku: document.getElementById('pm-sku').value.trim() || null,
    category_id: catId || null,
    ip_id: ipId || null,
    series_id: seriesId || null,
    color: document.getElementById('pm-color').value || null,
    status: document.getElementById('pm-status').value,
    size: document.getElementById('pm-size').value.trim() || null,
    chain_length: document.getElementById('pm-chain-length')?.style.display!=='none' ? (document.getElementById('pm-chain-length').value.trim()||null) : null,
    ring_size: document.getElementById('pm-ring-size')?.style.display!=='none' ? (document.getElementById('pm-ring-size').value.trim()||null) : null,
    shop_url: document.getElementById('pm-shop-url').value.trim() || null,
    notes: document.getElementById('pm-notes').value.trim() || null,
    updated_at: new Date().toISOString(),
  };

  let pid = productId;
  if (!pid) {
    productData.created_by = state.user?.id;
    const { data, error } = await db.from('products').insert(productData).select().single();
    if (error) { showToast('儲存失敗：'+error.message, 'error'); btn.textContent='建立商品'; btn.disabled=false; return; }
    pid = data.id;
  } else {
    const { error } = await db.from('products').update(productData).eq('id', pid);
    if (error) { showToast('儲存失敗：'+error.message, 'error'); btn.textContent='儲存變更'; btn.disabled=false; return; }
  }

  // 上傳圖片
  const frontFile = document.getElementById('pm-front-img').files[0];
  const backFile = document.getElementById('pm-back-img').files[0];
  let imgUpdate = {};
  if (frontFile) { const url = await uploadProductImage(frontFile, pid, 'front'); if (url) imgUpdate.front_image_url = url; }
  if (backFile) { const url = await uploadProductImage(backFile, pid, 'back'); if (url) imgUpdate.back_image_url = url; }
  if (Object.keys(imgUpdate).length) await db.from('products').update(imgUpdate).eq('id', pid);

  // 儲存鑄件 BOM（從 hidden input 讀取 id）
  await db.from('product_castings').delete().eq('product_id', pid);
  const castingRows = document.querySelectorAll('#casting-bom-list .bom-row');
  const castingInserts = [];
  castingRows.forEach(row => {
    const idEl  = row.querySelector('input[type="hidden"]');
    const qtyEl = row.querySelector('input[type="number"]');
    if (idEl?.value) castingInserts.push({ product_id: pid, casting_id: idEl.value, qty: parseInt(qtyEl?.value)||1 });
  });
  if (castingInserts.length) await db.from('product_castings').insert(castingInserts);

  // 儲存零件 BOM（從 hidden input 讀取 id）
  await db.from('product_parts').delete().eq('product_id', pid);
  const partRows = document.querySelectorAll('#part-bom-list .bom-row');
  const partInserts = [];
  partRows.forEach(row => {
    const idEl  = row.querySelector('input[type="hidden"]');
    const qtyEl = row.querySelector('input[type="number"]');
    if (idEl?.value) partInserts.push({ product_id: pid, part_id: idEl.value, qty: parseInt(qtyEl?.value)||1 });
  });
  if (partInserts.length) await db.from('product_parts').insert(partInserts);

  showToast(productId ? '商品已更新！' : '商品已建立！');
  document.getElementById('modal-overlay')?.remove();
  await loadProducts();
  await loadCastings();
  await loadParts();
  renderApp();
}

        // ── 新增模式：直接儲存（新鑄件沒有舊價格，不需審核）──
        const payload = {
          name, ip_id: ipId, series_id: seriesId,
          casting_type: document.getElementById('cs-type').value,
          stock:        parseInt(document.getElementById('cs-stock').value)||0,
          safety_stock: parseInt(document.getElementById('cs-safety').value)||0,
          unit_price:   newUnitPrice,
          mold_fee:     newMoldFee,
          mold_yield:   parseInt(document.getElementById('cs-mold-yield').value)||1,
          notes:        document.getElementById('cs-notes').value.trim()||null,
        };
        const {error:err} = await db.from('castings').insert(payload);
        if (err) { showToast('儲存失敗：'+err.message,'error'); return; }
        showToast('鑄件已新增！');
        closeModal(); await loadCastings(); renderApp();
      }
    }},
    { label: '取消', onclick: closeModal },
  ]);

  // 展開已選系列的父層
  if (c?.series_id) {
    setTimeout(() => {
      const s = (state.data.series||[]).find(x=>x.id===c.series_id);
      if (s?.category_id) {
        const cat = (state.data.ipCategories||[]).find(x=>x.id===s.category_id);
        if (cat?.parent_id) {
          const arrow = document.getElementById(`cs-ip-arrow-${cat.parent_id}`);
          const children = document.getElementById(`cs-ip-children-${cat.parent_id}`);
          if (arrow && children) { arrow.textContent='▼'; children.style.display='block'; }
        }
      }
    }, 50);
  }
}

// 鑄件用的 IP 樹狀渲染（跟商品相同邏輯，id 前綴 cs-）
function renderIPTreeForCasting(casting, searchQ) {
  const tree = state.data.ipTree || [];
  if (!tree.length) return '<div style="padding:16px;color:var(--muted);font-size:13px;text-align:center">⚠️ 無法載入 IP 分類</div>';
  const q = (searchQ||'').toLowerCase().trim();
  const selectedSeriesId = document.getElementById('cs-series-id')?.value || casting?.series_id || '';

  const depthStyle = [
    { bg:'#e8f5f4', txt:'#00695c', fw:700, fs:13 },
    { bg:'#f0f0f0', txt:'#37474f', fw:600, fs:13 },
    { bg:'#fafafa', txt:'#546e7a', fw:500, fs:12 },
  ];

  function renderNode(node, depth) {
    if (depth > 2) return '';
    const st = depthStyle[depth] || depthStyle[2];
    const hasChildren = node.children?.length > 0;
    const hasSeries = node.series?.length > 0;
    const childrenId = `cs-ip-children-${node.id}`;
    const arrowId = `cs-ip-arrow-${node.id}`;

    let html = `<div style="padding:7px 10px 7px ${12+depth*14}px;background:${st.bg};border-bottom:1px solid #e8f5f4;display:flex;align-items:center;gap:6px;cursor:${(hasChildren||hasSeries)?'pointer':'default'}"
      ${(hasChildren||hasSeries)?`onclick="(function(){var c=document.getElementById('${childrenId}');var a=document.getElementById('${arrowId}');if(c){var open=c.style.display!=='none';c.style.display=open?'none':'block';a.textContent=open?'▶':'▼';}})()"` : ''}>
      ${node.code?`<span style="font-size:10px;font-weight:700;background:${node.color||'#90a4ae'};color:#fff;padding:1px 6px;border-radius:3px">${node.code}</span>`:''}
      <span style="font-size:${st.fs}px;font-weight:${st.fw};color:${st.txt};flex:1">${node.name}</span>
      ${(hasChildren||hasSeries)?`<span id="${arrowId}" style="font-size:10px;color:var(--muted)">▶</span>`:''}
    </div>`;

    if (hasChildren || hasSeries) {
      html += `<div id="${childrenId}" style="display:none">`;
      (node.children||[]).forEach(child => { html += renderNode(child, depth+1); });
      (node.series||[]).forEach(s => {
        const isSel = s.id === selectedSeriesId;
        html += `<div style="padding:7px 10px 7px ${12+(depth+1)*14}px;background:${isSel?'#e0f2f1':'#fff'};border-bottom:1px solid #f5f5f5;cursor:pointer;display:flex;align-items:center;gap:6px"
          onclick="csSelectSeries('${s.id}','${s.name.replace(/'/g,"\\'")}')">
          <span style="width:6px;height:6px;border-radius:50%;background:${isSel?'var(--accent)':'#ccc'};flex-shrink:0"></span>
          <span style="font-size:12px;color:${isSel?'var(--accent-dark)':'#546e7a'};font-weight:${isSel?600:400}">${s.name}</span>
          ${isSel?'<span style="margin-left:auto;font-size:11px;color:var(--accent)">✓</span>':''}
        </div>`;
      });
      html += '</div>';
    }
    return html;
  }

  if (q) {
    let html = '';
    function searchNode(node, depth) {
      const match = node.name.toLowerCase().includes(q) || node.code?.toLowerCase().includes(q);
      if (depth === 2 && match) {
        html += renderNode(node, depth);
        const childDiv = document.getElementById(`cs-ip-children-${node.id}`);
        if (childDiv) { childDiv.style.display='block'; }
      }
      (node.children||[]).forEach(child=>searchNode(child, depth+1));
    }
    tree.forEach(n=>searchNode(n,0));
    (state.data.series||[]).filter(s=>s.name.toLowerCase().includes(q)).forEach(s=>{
      html += `<div style="padding:7px 14px;background:#fff;border-bottom:1px solid #f5f5f5;cursor:pointer" onclick="csSelectSeries('${s.id}','${s.name.replace(/'/g,"\\'")}')">
        <span style="font-size:12px;color:#546e7a">${s.name}</span></div>`;
    });
    return html || '<div style="padding:12px;color:var(--muted);font-size:13px;text-align:center">找不到符合的結果</div>';
  }

  return tree.map(n=>renderNode(n,0)).join('');
}

window.csSelectSeries = function(seriesId, seriesName) {
  document.getElementById('cs-series-id').value = seriesId;
  // 找完整路徑顯示
  const s = (state.data.series||[]).find(x=>x.id===seriesId);
  let label = seriesName;
  if (s?.category_id) {
    const path = getCatPath(s.category_id);
    if (path.length) label = path.map(p=>p.name).join(' › ') + ' › ' + seriesName;
  }
  const disp = document.getElementById('cs-ip-display');
  const txt = document.getElementById('cs-ip-display-text');
  if (disp && txt) { txt.textContent = label; disp.style.display='block'; }
  // 重繪樹（更新勾選狀態）
  const tree = document.getElementById('cs-ip-tree');
  if (tree) tree.innerHTML = renderIPTreeForCasting(null);
};

window.csFilterIPTree = function(q) {
  const tree = document.getElementById('cs-ip-tree');
  if (tree) tree.innerHTML = renderIPTreeForCasting(null, q);
};

  // 使用這個鑄件的商品
  const usedIn = (c.product_castings||[]).filter(pc=>pc.products?.id);

  const body = `
    <!-- IP / 系列 -->
    ${c.ip_licenses?.name||c.series?.name ? `
    <div style="font-size:12px;color:var(--accent-dark);margin-bottom:12px">
      ${[c.ip_licenses?.name, c.series?.name].filter(Boolean).join(' · ')}
    </div>` : ''}

    <!-- 類型 -->
    <div style="display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap">
      <div>
        <div style="font-size:11px;color:var(--muted);margin-bottom:4px">類型</div>
        <span class="tag ${c.casting_type==='改蠟'?'tag-orange':'tag-teal'}" style="font-size:13px;padding:4px 10px">${c.casting_type||'鑄件'}</span>
      </div>
      <div>
        <div style="font-size:11px;color:var(--muted);margin-bottom:4px">庫存狀態</div>
        <span class="tag ${statusLabel[1]}" style="font-size:13px;padding:4px 10px">${statusLabel[0]}</span>
      </div>
    </div>

    <!-- 庫存數量 + 工錢 + 補貨計算 -->
    <div style="padding:14px;background:#f8f9fa;border-radius:10px;margin-bottom:16px">
      <div style="display:flex;align-items:flex-end;gap:8px;margin-bottom:8px">
        <div style="font-size:36px;font-weight:700;line-height:1;color:var(--text)">${stock}</div>
        <div style="font-size:13px;color:var(--muted);margin-bottom:4px">件在庫　安全庫存 ${safe} 件</div>
        <div style="margin-left:auto;display:flex;gap:14px">
          ${c.mold_fee!=null ? `<div style="text-align:right"><div style="font-size:11px;color:var(--muted)">模具工錢</div><div style="font-size:18px;font-weight:700;color:var(--accent-dark)">$${c.mold_fee}</div></div>` : ''}
          ${(c.mold_yield||1)>1 ? `<div style="text-align:right"><div style="font-size:11px;color:var(--muted)">每模產出</div><div style="font-size:18px;font-weight:700;color:var(--text)">${c.mold_yield} 件</div></div>` : ''}
        </div>
      </div>
      <div style="background:#e0e0e0;border-radius:4px;height:6px;margin-bottom:${safe>stock?'10px':'0'}">
        <div style="width:${pct}%;background:${barColor};height:6px;border-radius:4px;transition:width .4s"></div>
      </div>
      ${safe > stock ? `
      <div style="margin-top:10px;padding:10px 12px;background:#fff8e1;border:1px solid #ffe082;border-radius:8px;font-size:13px">
        <div style="font-weight:600;color:#e65100;margin-bottom:4px">📋 補貨建議</div>
        <div style="color:#5d4037">
          缺少 <strong>${safe-stock}</strong> 件　→　需下
          <strong style="font-size:16px;color:var(--accent-dark)">${Math.ceil((safe-stock)/(c.mold_yield||1))}</strong> 支臘
          ${(c.mold_yield||1)>1?`<span style="color:var(--muted);font-size:12px">（每模 ${c.mold_yield} 件）</span>`:''}
        </div>
      </div>` : ''}
    </div>

    <!-- 使用此鑄件的商品 -->
    ${usedIn.length ? `
    <div>
      <div style="font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px">使用此鑄件的商品（${usedIn.length} 件）</div>
      ${usedIn.map(pc=>{
        const prod = pc.products;
        const sc = {active:'tag-green',development:'tag-blue',discontinued:'tag-grey'}[prod.status]||'tag-grey';
        const sl = {active:'販售中',development:'開發中',discontinued:'停產'}[prod.status]||'';
        return `<div style="display:flex;align-items:center;gap:8px;padding:7px 10px;background:#fff;border:1px solid var(--border);border-radius:7px;margin-bottom:5px">
