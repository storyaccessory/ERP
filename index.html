// 體驗預約
// ═══════════════════════════════════════════
// 每30分鐘一格，13:00 ～ 18:30
const BOOKING_SLOTS = [
  '13:00','13:30','14:00','14:30','15:00','15:30',
  '16:00','16:30','17:00','17:30','18:00','18:30'
];

// 取得時段結束時間（+30分）
function _slotEnd(slot) {
  const [h, m] = slot.split(':').map(Number);
  const em = m + 30; const eh = h + Math.floor(em/60);
  return `${eh}:${(em%60).toString().padStart(2,'0')}`;
}
// 取得同一小時的「另一格」（同小時互鎖：13:00↔13:30）
function _sisterSlot(slot) {
  const [h, m] = slot.split(':').map(Number);
  return m === 0 ? `${h}:30` : `${h}:00`;
}

// 用本地時間格式化日期，避免 toISOString() UTC 偏移問題
function _localDateStr(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
// 取今日本地日期字串
function _localToday() {
  return _localDateStr(new Date());
}
function _getBookingWeekStart(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const dow = d.getDay(); // 0=Sun → offset 0, 1=Mon → offset 1, …
  d.setDate(d.getDate() - dow);
  return _localDateStr(d);
}

async function loadBooking() {
  const today = _localToday();
  const thisWeekStart = _getBookingWeekStart(today);
  const viewMode = state.data.booking?.viewMode || 'week';
  const viewWeekStart = state.data.booking?.viewWeekStart || thisWeekStart;
  const viewMonthStart = state.data.booking?.viewMonthStart || today.slice(0,7) + '-01';

  let rangeStart, rangeEnd;
  if (viewMode === 'month') {
    const mFirst = new Date(viewMonthStart + 'T00:00:00');
    const firstDow = mFirst.getDay();
    const daysBack = firstDow === 0 ? 6 : firstDow - 1;
    rangeStart = new Date(mFirst.getTime() - daysBack*86400000).toISOString().slice(0,10);
    const mLast = new Date(mFirst.getFullYear(), mFirst.getMonth()+1, 0);
    rangeEnd   = new Date(mLast.getTime() + 7*86400000).toISOString().slice(0,10);
  } else {
    const viewMon = new Date(viewWeekStart + 'T00:00:00');
    rangeStart = new Date(viewMon.getTime() - 7*86400000).toISOString().slice(0,10);
    rangeEnd   = new Date(viewMon.getTime() + 20*86400000).toISOString().slice(0,10);
  }

  const { data } = await db.from('experience_bookings')
    .select('*')
    .gte('booking_date', rangeStart)
    .lte('booking_date', rangeEnd)
    .order('booking_date')
    .order('time_slot');

  state.data.booking = {
    ...(state.data.booking || {}),
    records: data || [],
    thisWeekStart,
    viewWeekStart,
    viewMode,
    viewMonthStart,
  };
}

function renderBooking() {
  const bd = state.data.booking || {};
  const records = bd.records || [];
  const today = _localToday();
  const viewMode = bd.viewMode || 'week';
  const viewStart = bd.viewWeekStart || _getBookingWeekStart(today);
  const viewMonthStart = bd.viewMonthStart || today.slice(0,7) + '-01';
  const pendingCount = records.filter(r => r.status === '待確認').length;

  let navHtml;
  if (viewMode === 'week') {
    const weekEnd = new Date(viewStart + 'T00:00:00');
    weekEnd.setDate(weekEnd.getDate() + 6);
    const fmt = d => { const dt = new Date(d+'T00:00:00'); return `${dt.getMonth()+1}/${dt.getDate()}`; };
    const weekLabel = `${fmt(viewStart)} – ${fmt(_localDateStr(weekEnd))}`;
    navHtml = `
      <button class="btn btn-outline btn-sm" data-action="booking-prev-week">‹ 上週</button>
      <span style="font-weight:600;font-size:15px">${weekLabel}</span>
      <button class="btn btn-outline btn-sm" data-action="booking-next-week">下週 ›</button>
      <button class="btn btn-outline btn-sm" data-action="booking-this-week">本週</button>`;
  } else {
    const mn = new Date(viewMonthStart + 'T00:00:00');
    navHtml = `
      <button class="btn btn-outline btn-sm" data-action="booking-prev-month">‹ 上月</button>
      <span style="font-weight:600;font-size:15px">${mn.getFullYear()}年 ${mn.getMonth()+1}月</span>
      <button class="btn btn-outline btn-sm" data-action="booking-next-month">下月 ›</button>
      <button class="btn btn-outline btn-sm" data-action="booking-this-month">本月</button>`;
  }

  return `
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:16px">
      <div style="display:flex;align-items:center;gap:8px">${navHtml}</div>
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <div style="display:flex;border:1px solid var(--border);border-radius:6px;overflow:hidden">
          <button class="btn btn-sm" style="border-radius:0;border:none;padding:5px 14px;background:${viewMode==='week'?'var(--accent)':'transparent'};color:${viewMode==='week'?'#fff':'var(--text)'}" data-action="booking-view-week">週</button>
          <button class="btn btn-sm" style="border-radius:0;border:none;padding:5px 14px;border-left:1px solid var(--border);background:${viewMode==='month'?'var(--accent)':'transparent'};color:${viewMode==='month'?'#fff':'var(--text)'}" data-action="booking-view-month">月</button>
        </div>
        <input type="date" class="form-control" style="width:142px;font-size:12px;padding:5px 8px" onchange="window.bookingGotoDate(this.value)" title="跳至日期">
        ${pendingCount > 0 ? `<span class="tag tag-orange" onclick="window.modalPendingBookings()" style="cursor:pointer;user-select:none" title="點擊查看待確認預約">待確認 ${pendingCount} 筆</span>` : ''}
        <button class="btn btn-primary btn-sm" data-action="add-booking">+ 新增預約</button>
      </div>
    </div>
  ` + (viewMode === 'month' ? _renderBookingMonth(bd, today) : _renderBookingWeek(bd, today));
}

function _renderBookingMonth(bd, today) {
  const records = bd.records || [];
  const viewMonthStart = bd.viewMonthStart || today.slice(0,7) + '-01';
  // Sunday-first: 日一二三四五六
  const DAY_ZH = ['日','一','二','三','四','五','六'];
  const mn = new Date(viewMonthStart + 'T00:00:00');
  const year = mn.getFullYear(), month = mn.getMonth();
  const firstDow = mn.getDay(); // 0=Sun with Sunday-first grid
  const startOffset = firstDow; // Sun=0 offset, Mon=1 offset, etc.
  const gridStart = new Date(mn.getTime() - startOffset * 86400000);

  const cells = [];
  const cur = new Date(gridStart);
  for (let i = 0; i < 42; i++) { cells.push(_localDateStr(cur)); cur.setDate(cur.getDate()+1); }
  while (cells.length > 7) {
    const last7 = cells.slice(-7);
    if (last7.every(d => new Date(d+'T00:00:00').getMonth() !== month)) cells.splice(-7); else break;
  }

  // Build a per-day record list
  const dayBookings = {};
  records.forEach(r => {
    if (!dayBookings[r.booking_date]) dayBookings[r.booking_date] = [];
    dayBookings[r.booking_date].push(r);
  });

  const weeks = [];
  for (let w = 0; w < Math.ceil(cells.length/7); w++) weeks.push(cells.slice(w*7, w*7+7));

  return `
    <div style="border-radius:8px;border:1px solid var(--border);overflow:hidden">
      <table style="width:100%;border-collapse:collapse;table-layout:fixed">
        <thead>
          <tr style="background:var(--surface2)">
            ${DAY_ZH.map((d,i) => `<th style="padding:8px;text-align:center;font-size:12px;color:${i===0?'#e53935':i===6?'#aaa':'var(--muted)'};border-bottom:2px solid var(--border);font-weight:600">${d}</th>`).join('')}
          </tr>
        </thead>
        <tbody>
          ${weeks.map(week => `<tr>${week.map(d => {
            const dt = new Date(d+'T00:00:00');
            const dow = dt.getDay();
            const isWeekend = dow===0||dow===6;
            const inMonth = dt.getMonth()===month;
            const isToday = d===today;
            const allRecs = dayBookings[d]||[];
            const isHoliday = isWeekend || allRecs.some(r=>r.source==='公休日');
            const holidayRec = allRecs.find(r=>r.source==='公休日');
            const isPast = d<today;
            let bg = '#fff';
            if (!inMonth) bg='#f8f9fa'; else if (isHoliday) bg='#fff5f5'; else if (isPast) bg='#fafafa';

            // Active bookings (not holiday/block/cancelled), sorted by time
            const activeBookings = allRecs
              .filter(r => r.source!=='公休日' && r.source!=='人工封鎖' && r.status!=='已取消')
              .sort((a,b) => (a.time_slot||'').localeCompare(b.time_slot||''));

            let content = '';
            if (isHoliday && !isWeekend && holidayRec) {
              content = `<div style="font-size:10px;color:#e53935;margin-top:2px">${holidayRec.notes||'公休'}</div>`;
            } else if (isWeekend) {
              content = `<div style="font-size:10px;color:#ddd;margin-top:2px">${dow===0?'週日':'週六'}</div>`;
            } else if (activeBookings.length > 0) {
              content = activeBookings.map(b => {
                const isPickup = b.source === '門市取貨';
                const typeTag = isPickup
                  ? `<span style="color:#1565c0;font-weight:600">取貨</span>`
                  : `<span style="color:#2e7d32;font-weight:600">鑑賞</span>`;
                const timeStr = b.time_slot ? b.time_slot.slice(0,5) : '--:--';
                const sc = b.status==='已確認' ? '#2e7d32' : '#e65100';
                return `<div onclick="event.stopPropagation();window.modalViewBooking('${b.id}')"
                  style="font-size:10.5px;line-height:1.4;padding:2px 3px;margin-top:2px;background:${b.status==='已確認'?'#f0faf1':'#fffde7'};border-radius:3px;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:${sc}">
                  ${timeStr} ${typeTag} ${b.customer_name||'—'} ${b.phone||''}
                </div>`;
              }).join('');
            }

            const clickable = inMonth;
            return `<td style="padding:5px 6px;border:1px solid var(--border);vertical-align:top;min-height:64px;background:${bg};cursor:${clickable?'pointer':'default'}"
              onclick="${clickable&&!isHoliday?`window.bookingGotoDate('${d}')`:''}" title="${clickable&&!isHoliday?'點擊切換到週視圖':''}">
              <div style="font-size:12px;font-weight:${isToday?700:400};color:${inMonth?(isWeekend?'#bbb':'var(--text)'):'#ccc'};${isToday?'display:inline-flex;align-items:center;justify-content:center;background:var(--accent-dark);color:#fff;width:20px;height:20px;border-radius:50%;font-size:11px;':''}">
                ${dt.getDate()}
              </div>
              ${content}
            </td>`;
          }).join('')}</tr>`).join('')}
        </tbody>
      </table>
    </div>
    <div style="display:flex;gap:14px;margin-top:12px;font-size:12px;flex-wrap:wrap">
      <div style="display:flex;align-items:center;gap:5px"><span style="background:#f0faf1;color:#2e7d32;border-radius:3px;padding:1px 6px">已確認</span></div>
      <div style="display:flex;align-items:center;gap:5px"><span style="background:#fffde7;color:#e65100;border-radius:3px;padding:1px 6px">待確認</span></div>
      <div style="display:flex;align-items:center;gap:5px"><span style="background:#fff5f5;color:#e53935;border-radius:3px;padding:1px 6px">公休</span>週末/公休</div>
      <span style="color:var(--muted)">點工作日切換到週視圖；點預約列開啟詳情</span>
    </div>`;
}

function _renderBookingWeek(bd, today) {
  const records = bd.records || [];
  const viewStart = bd.viewWeekStart || _getBookingWeekStart(today);
  const DAY_ZH = ['日','一','二','三','四','五','六'];

  // Mon–Sun (7 days)
  const days = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(viewStart + 'T00:00:00');
    d.setDate(d.getDate() + i);
    days.push(_localDateStr(d));
  }

  const bookingMap = {};
  records.forEach(r => {
    const key = `${r.booking_date}_${r.time_slot}`;
    if (!bookingMap[key]) bookingMap[key] = [];
    bookingMap[key].push(r);
  });

  return `
    <div style="overflow-x:auto;border-radius:8px;border:1px solid var(--border)">
      <table style="width:100%;border-collapse:collapse;min-width:600px;table-layout:fixed">
        <thead>
          <tr style="background:var(--surface2)">
            <th style="width:72px;padding:10px 4px;text-align:center;font-size:12px;color:var(--muted);border-right:1px solid var(--border);border-bottom:2px solid var(--border)">時段</th>
            ${days.map(d => {
              const dt = new Date(d + 'T00:00:00');
              const dow = dt.getDay();
              const isWeekend = dow === 0 || dow === 6;
              const isToday = d === today;
              const dayRecords = records.filter(r => r.booking_date === d && r.status !== '已取消');
              const isHoliday = dayRecords.some(r => r.source === '公休日');
              const holidayNote = isHoliday ? (dayRecords.find(r=>r.source==='公休日')?.notes || '公休') : '';
              const bgColor = isHoliday ? '#fef3f3' : isWeekend ? '#f5f5f5' : isToday ? 'var(--accent-light)' : 'inherit';
              const txtColor = isHoliday ? '#e53935' : isWeekend ? '#bbb' : isToday ? 'var(--accent-dark)' : 'var(--text)';
              return `<th style="padding:8px 4px;text-align:center;font-size:12px;border-right:1px solid var(--border);border-bottom:2px solid var(--border);width:calc((100% - 72px)/7);background:${bgColor}">
                <div style="font-weight:700;color:${txtColor}">
                  ${dt.getMonth()+1}/${dt.getDate()} (${DAY_ZH[dt.getDay()]})
                </div>
                ${isHoliday
                  ? `<div style="font-size:10px;color:#e53935;font-weight:600">${holidayNote}</div>
                     <div data-bk-unholiday="${d}" onclick="event.stopPropagation();window.unblockHoliday('${d}')"
                       style="font-size:10px;color:#aaa;cursor:pointer;margin-top:2px">取消公休</div>`
                  : isWeekend
                  ? `<div style="font-size:10px;color:#ccc">公休</div>`
                  : `${isToday ? '<div style="font-size:10px;color:var(--accent-dark);font-weight:600">今天</div>' : ''}
                     <div onclick="event.stopPropagation();window.blockHoliday('${d}')"
                       style="font-size:10px;color:#bbb;cursor:pointer;margin-top:3px;padding:2px 6px;border-radius:4px;border:1px dashed #ddd;display:inline-block">
                       標為公休
                     </div>`
                }
              </th>`;
            }).join('')}
          </tr>
        </thead>
        <tbody>
          ${BOOKING_SLOTS.map(slot => {
            const sister = _sisterSlot(slot);
            const isHalfHour = slot.endsWith(':30');
            const slotHour = parseInt(slot.split(':')[0]);
            return `
            <tr style="${isHalfHour ? 'border-bottom:2px solid var(--border)' : ''}">
              <td style="padding:6px 4px;text-align:center;font-size:11px;color:var(--muted);background:${isHalfHour?'#f5f7f6':'var(--surface2)'};border-right:1px solid var(--border);border-bottom:1px solid var(--border);white-space:nowrap;font-weight:600">
                ${slot}<br><span style="font-size:10px;font-weight:400;color:#aaa">~${_slotEnd(slot)}</span>
              </td>
              ${days.map(d => {
                const dow2 = new Date(d+'T00:00:00').getDay();
                const isWeekendDay = dow2 === 0 || dow2 === 6;
                const key = `${d}_${slot}`;
                const sisterKey = `${d}_${sister}`;
                const bks = bookingMap[key] || [];
                const sisterBks = bookingMap[sisterKey] || [];
                const activeHere   = bks.filter(b => b.status !== '已取消');
                const activeSister = sisterBks.filter(b => b.status !== '已取消');
                const isDirectBooked  = activeHere.length > 0;
                const isSisterBlocked = !isDirectBooked && activeSister.length > 0;
                const isPast = d < today;
                const isHolidayDay = records.some(r => r.booking_date === d && r.source === '公休日' && r.status !== '已取消');
                const isMonRule = !isDirectBooked && dow2===1 && slotHour < 16;

                if (isWeekendDay && !isDirectBooked) {
                  return `<td style="padding:5px;vertical-align:middle;border-right:1px solid var(--border);border-bottom:1px solid var(--border);background:#f5f5f5"></td>`;
                }
                if (isHolidayDay && !isDirectBooked) {
                  return `<td style="padding:5px;vertical-align:middle;border-right:1px solid var(--border);border-bottom:1px solid var(--border);background:#fef3f3">
                    <div style="text-align:center;font-size:10px;color:#ef9a9a;padding:6px 0">公休</div>
                  </td>`;
                }
                if (isSisterBlocked) {
                  return `<td style="padding:5px;vertical-align:middle;border-right:1px solid var(--border);border-bottom:1px solid var(--border);background:#f9fafb">
                    <div style="text-align:center;font-size:10px;color:#bbb;padding:6px 0">同時段已滿</div>
                  </td>`;
                }
                if (isMonRule) {
                  return `<td style="padding:5px;vertical-align:middle;border-right:1px solid var(--border);border-bottom:1px solid var(--border);background:#f0f0f0;cursor:pointer"
                    onclick="window.modalMonRuleOverride('${d}','${slot}')" title="週一保留封鎖（點此可解除）">
                    <div style="text-align:center;font-size:10px;color:#ccc;padding:6px 0">封鎖</div>
                  </td>`;
                }
                return `<td style="padding:5px;vertical-align:top;border-right:1px solid var(--border);border-bottom:1px solid var(--border);background:${isPast?'#fafafa':'#fff'};cursor:pointer;position:relative"
                  onclick="if(!event.target.closest('[data-bk-id]')&&!event.target.closest('[data-bk-block]'))window.modalChooseBookingAction('${d}','${slot}')">
                  ${!isDirectBooked && !isPast ? `
                    <div data-bk-block="1" onclick="event.stopPropagation();window.modalBlockSlot('${d}','${slot}')"
                      style="position:absolute;top:3px;right:3px;font-size:10px;color:#ccc;cursor:pointer;padding:1px 4px;border-radius:4px;line-height:1;border:1px solid #eee"
                      title="封鎖此時段">鎖</div>` : ''}
                  ${!isDirectBooked
                    ? `<div style="height:46px;display:flex;align-items:center;justify-content:center;color:#ddd;font-size:11px">${isPast?'':'＋'}</div>`
                    : activeHere.map(b => {
                        const isBlock = b.source === '人工封鎖';
                        const sc = isBlock
                          ? {bg:'#f3f3f3',bl:'#9e9e9e',tc:'#757575'}
                          : b.status==='已確認' ? {bg:'#e8f5e9',bl:'#4caf50',tc:'#1b5e20'}
                          : b.status==='已取消' ? {bg:'#f5f5f5',bl:'#bdbdbd',tc:'#9e9e9e'}
                          :                       {bg:'#fff8e1',bl:'#ffc107',tc:'#e65100'};
                        const reqShort = (b.request||'').replace(/^(角色\/系列：|商品類型：|門市取貨 )/,'').slice(0,20);
                        return `<div data-bk-id="${b.id}" onclick="event.stopPropagation();window.modalViewBooking('${b.id}')"
                          style="background:${sc.bg};border-left:3px solid ${sc.bl};border-radius:4px;padding:4px 6px;margin-bottom:3px;font-size:11px;cursor:pointer;line-height:1.5;${b.status==='已取消'?'opacity:.5;text-decoration:line-through':''}">
                          ${isBlock
                            ? `<div style="font-weight:700;color:${sc.tc}">封鎖</div><div style="color:#aaa;font-size:10px">${b.notes||'人工封鎖'}</div>`
                            : `<div style="font-weight:700;color:${sc.tc};overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${b.customer_name||'—'}</div>
                               <div style="color:var(--muted);font-size:10.5px">${b.phone||''}</div>
                               <div style="color:var(--muted);font-size:10.5px">${b.attendees||1}人 · ${b.status}</div>
                               ${reqShort ? `<div style="color:#888;font-size:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${reqShort}</div>` : ''}`
                          }
                        </div>`;
                      }).join('')
                  }
                </td>`;
              }).join('')}
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>

    <div style="display:flex;gap:14px;margin-top:12px;font-size:12px;flex-wrap:wrap;align-items:center">
      <div style="display:flex;align-items:center;gap:5px"><div style="width:12px;height:12px;border-radius:2px;background:#fff8e1;border-left:3px solid #ffc107"></div>待確認</div>
      <div style="display:flex;align-items:center;gap:5px"><div style="width:12px;height:12px;border-radius:2px;background:#e8f5e9;border-left:3px solid #4caf50"></div>已確認</div>
      <div style="display:flex;align-items:center;gap:5px"><div style="width:12px;height:12px;border-radius:2px;background:#f3f3f3;border-left:3px solid #9e9e9e"></div>封鎖</div>
      <div style="display:flex;align-items:center;gap:5px"><div style="width:12px;height:12px;border-radius:2px;background:#fef3f3;border-left:3px solid #e53935"></div>公休</div>
      <div style="display:flex;align-items:center;gap:5px"><div style="width:12px;height:12px;border-radius:2px;background:#f5f5f5;border:1px solid #ddd"></div>週一規則（16:00前）</div>
      <div style="display:flex;align-items:center;gap:5px;color:#bbb">同時段已滿 = 同小時另一格已有人</div>
      <span style="color:var(--muted);margin-left:auto;font-size:11px">點格子新增、🔒封鎖、欄位標題可標公休</span>
    </div>`;
}

// 點空格 → 選擇動作
window.modalChooseBookingAction = function(date, slot) {
  const bd = state.data.booking || {};
  const records = bd.records || [];
  const activeInSlot = records.filter(r => r.booking_date===date && r.time_slot===slot && r.status!=='已取消');
  if (activeInSlot.length > 0) { window.modalViewBooking(activeInSlot[0].id); return; }
  modalAddBooking(date, slot);
};

// 封鎖時段
window.modalBlockSlot = function(date, slot) {
  const end = _slotEnd(slot);
  showModal(`🔒 封鎖時段`, `
    <div style="text-align:center;margin-bottom:16px">
      <div style="font-size:16px;font-weight:700;color:var(--text)">${date} ${slot} ～ ${end}</div>
      <div style="font-size:12px;color:var(--muted);margin-top:4px">封鎖後此時段在預約表單上將顯示「已滿」</div>
    </div>
    <div class="form-group"><label>封鎖原因（選填）</label>
      <input class="form-control" id="block-note" placeholder="例如：活動、會議、店休…">
    </div>
  `, [
    { label:'🔒 確認封鎖', primary:true, onclick: async () => {
      const notes = document.getElementById('block-note').value.trim() || '人工封鎖';
      const { error } = await db.from('experience_bookings').insert({
        booking_date: date, time_slot: slot,
        customer_name: '（封鎖）', source: '人工封鎖',
        status: '已確認', notes, attendees: 0,
        created_by: state.user?.id,
      });
      if (error) { showToast('封鎖失敗：'+error.message,'error'); return; }
      showToast('時段已封鎖 🔒'); closeModal(); await loadBooking(); renderApp();
    }},
    { label:'取消', onclick: closeModal },
  ]);
};

  showModal('新增體驗預約', `

      <input class="form-control" id="bk-notes" placeholder="客人不會看到">
    </div>
  `, [
    { label:'確認新增', primary:true, onclick: async () => {
      const booking_date = document.getElementById('bk-date').value;
      const time_slot = document.getElementById('bk-slot').value;
      const customer_name = document.getElementById('bk-name').value.trim();
      const phone = document.getElementById('bk-phone').value.trim();
      const attendees = parseInt(document.getElementById('bk-attendees').value);
      const request = document.getElementById('bk-request').value.trim();
      const product_link = document.getElementById('bk-product-link').value.trim();
      const source = document.getElementById('bk-source').value;
      const notes = document.getElementById('bk-notes').value.trim();
      if (!booking_date) { showToast('請選擇日期','error'); return; }
      if (!customer_name) { showToast('請填入姓名','error'); return; }
      if (!request) { showToast('請填入想要鑑賞的商品','error'); return; }
      const { error } = await db.from('experience_bookings').insert({
        booking_date, time_slot, customer_name, phone, attendees,
        request, product_link: product_link||null, source, notes: notes||null,
        status: '待確認', created_by: state.user?.id,
      });
      if (error) { showToast('新增失敗：'+error.message,'error'); return; }
      showToast('預約已登記 ✅'); closeModal(); await loadBooking(); renderApp();
    }},
    { label:'取消', onclick: closeModal },
  ]);
  // 切換時段時檢查同小時是否有衝突
  setTimeout(() => {
    const slotSel = document.getElementById('bk-slot');
    const dateSel = document.getElementById('bk-date');
    const warnEl  = document.getElementById('bk-conflict-warn');
    if (!slotSel || !warnEl) return;
    const checkConflict = () => {
      const d = dateSel.value;
      const s = slotSel.value;
      if (!d || !s) return;
      const records = state.data.booking?.records || [];
      const sister = _sisterSlot(s);
      const hasConflict = records.some(r =>
        r.booking_date===d && (r.time_slot===s||r.time_slot===sister) && r.status!=='已取消'
      );
      warnEl.style.display = hasConflict ? 'block' : 'none';
    };
    slotSel.addEventListener('change', checkConflict);
    dateSel.addEventListener('change', checkConflict);
    checkConflict();
  }, 50);
};

            }).join('')}
            ${myTasks.length > 0 ? `
            <div style="margin-top:10px;padding-top:8px;border-top:1px solid var(--border)">
              <div style="font-size:11px;font-weight:600;color:var(--muted);margin-bottom:6px">📌 手上任務（${myTasks.length} 件未完成）</div>
              ${myTasks.slice(0,4).map(t => {
                const over = t.deadline && t.deadline < today;
                const warn = t.deadline && t.deadline <= today3d && t.deadline >= today;
                const estOver = t.estimated_completion && t.deadline && t.estimated_completion > t.deadline;
                return `<div style="font-size:12px;padding:3px 0;display:flex;gap:6px;align-items:start">
                  <span>${over?'🔴':warn?'🟡':'🟢'}</span>
                  <div>
                    <div style="font-weight:500">${t.title}</div>
                    <div style="color:var(--muted);font-size:11px">
                      交件：${t.deadline||'未設定'}
                      ${t.estimated_completion?` · 預計：<span style="color:${estOver?'var(--danger)':'#10b981'}">${t.estimated_completion}${estOver?' ⚠️':''}</span>`:'<span style="color:#f59e0b"> · 預計完成日未填</span>'}
                    </div>
                  </div>
                </div>`;
              }).join('')}
              ${myTasks.length > 4 ? `<div style="font-size:11px;color:var(--muted);margin-top:4px">⋯ 還有 ${myTasks.length-4} 件</div>` : ''}
            </div>` : ''}
            ${isMe ? `<div style="margin-top:10px;padding-top:8px;border-top:1px solid var(--border)"><button class="btn btn-sm btn-outline" onclick="modalEditJournal()">✏️ 修改日誌</button></div>` : ''}
          </div>`;
        }).join('')}
        ${missing.map(p => {
          const myTasks = allTodos.filter(t => t.assignee_id === p.id);
          return `<div class="card" style="border-left:4px solid var(--border);opacity:.7">
            <div style="font-size:14px;font-weight:700;color:var(--muted)">${p.name||'—'}</div>
            <div style="font-size:12px;color:var(--muted);margin-top:4px;margin-bottom:8px">尚未填寫日誌</div>
            ${myTasks.length > 0 ? `<div style="font-size:11px;color:var(--muted)">${myTasks.length} 件未完成任務 · 最近截止：${myTasks.find(t=>t.deadline)?.deadline||'—'}</div>` : ''}
          </div>`;
        }).join('')}
      </div>`;
  };

  // ── 任務總覽 (所有人的待辦) ──
  const taskOverview = () => {
    const byPerson = {};
    profiles.forEach(p => { byPerson[p.name] = { profile: p, tasks: [] }; });
    allTodos.forEach(t => {
      const name = t.profiles?.name || '未指派';
      if (!byPerson[name]) byPerson[name] = { profile: null, tasks: [] };
      byPerson[name].tasks.push(t);
    });
    return `
      <div style="margin:12px 0 14px;font-size:12px;color:var(--muted)">顯示所有人的未完成任務 · 含交件日與預計完成日</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px">
        ${Object.entries(byPerson).filter(([,v])=>v.tasks.length>0).sort((a,b)=>a[0]>b[0]?1:-1).map(([name, v]) => {
          const tasks = v.tasks.sort((a,b)=>(a.deadline||'9')>(b.deadline||'9')?1:-1);
          const overdueN = tasks.filter(t=>t.deadline&&t.deadline<today).length;
          return `<div class="card">
            <div style="display:flex;justify-content:space-between;margin-bottom:10px;padding-bottom:8px;border-bottom:2px solid var(--border)">
              <div style="font-size:14px;font-weight:700">${name}</div>
              <div style="font-size:11px;color:var(--muted)">${tasks.length} 件${overdueN>0?` · <span style="color:var(--danger)">${overdueN} 逾期</span>`:''}</div>
            </div>
            ${tasks.map(t => {
              const over = t.deadline && t.deadline < today;
              const warn = t.deadline && t.deadline <= today3d && t.deadline >= today;
              const estOver = t.estimated_completion && t.deadline && t.estimated_completion > t.deadline;
              return `<div style="padding:6px 0;border-bottom:1px solid var(--border)">
                <div style="font-size:13px;font-weight:500">${over?'🔴':warn?'🟡':'🟢'} ${t.title}</div>
                <div style="font-size:11px;color:var(--muted);margin-top:3px;display:flex;gap:8px;flex-wrap:wrap">
                  <span style="color:${over?'var(--danger)':warn?'#f59e0b':'inherit'}">交件：${t.deadline||'未設定'}</span>
                  <span style="color:${estOver?'var(--danger)':t.estimated_completion?'#10b981':'#f59e0b'}">
                    預計：${t.estimated_completion||'未填'}${estOver?' ⚠️超出':''}
                  </span>
                </div>
              </div>`;
            }).join('')}
          </div>`;
        }).join('')}
        ${Object.values(byPerson).every(v=>v.tasks.length===0)?`<div class="card"><div class="empty"><div class="empty-icon">✅</div><p>目前沒有待辦任務</p></div></div>`:''}
      </div>`;
  };

  // ── 我的日誌（歷史） ──
  const myView = () => {
    const grouped = {};
    history.forEach(l => {
      const ym = l.date?.slice(0,7);
      if (!grouped[ym]) grouped[ym] = [];
      grouped[ym].push(l);
    });
    return `
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap">
        <button class="btn btn-primary" onclick="modalEditJournal()">${hasSubmitted?'✏️ 修改今日日誌':'📝 填寫今日日誌'}</button>
        ${hasSubmitted?`<span style="font-size:12px;color:#10b981">✅ 今日已填寫</span>`:''}
        <span style="font-size:12px;color:var(--muted);margin-left:auto">${myTpl.icon} 使用模板：${myTpl.label}</span>
      </div>
      ${Object.keys(grouped).sort().reverse().map(ym => `
        <div style="font-size:13px;font-weight:600;color:var(--accent-dark);margin:18px 0 8px">${ym}</div>
        ${grouped[ym].map(log => {
          const tpl = _getTemplateForLog(log, jd);
          const fields = log.fields || {};
          const filledFields = tpl.fields.filter(f => fields[f.key] || log[f.key]);
          return `<div class="card" style="margin-bottom:10px">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
              <div style="font-size:14px;font-weight:600">📅 ${log.date} <span style="font-size:11px;color:var(--muted);font-weight:400">${tpl.icon} ${tpl.label}</span></div>
              <button class="btn btn-sm btn-outline" onclick="modalEditJournal('${log.id}')">編輯</button>
            </div>
            <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;font-size:12px">
              ${filledFields.map(f => {
                const val = fields[f.key] || log[f.key];
                return val ? `<div>
                  <div style="color:${f.color};font-weight:600;margin-bottom:3px">${f.label}</div>
                  <div style="white-space:pre-wrap;line-height:1.5">${val}</div>
                </div>` : '';
              }).join('')}
            </div>
          </div>`;
        }).join('')}
      `).join('')}
      ${history.length===0?`<div class="card"><div class="empty"><div class="empty-icon">📝</div><p>還沒有日誌記錄，來填寫今天的吧！</p></div></div>`:''}`;
  };

  return `
    <div class="tabs" style="margin-bottom:0">
      <div class="tab ${tab==='今日全覽'?'active':''}" data-journal-tab="今日全覽">👥 全員日誌</div>
      <div class="tab ${tab==='我的日誌'?'active':''}" data-journal-tab="我的日誌">📋 我的日誌</div>
      <div class="tab ${tab==='任務總覽'?'active':''}" data-journal-tab="任務總覽">📌 任務總覽</div>
    </div>
    ${tab==='今日全覽' ? `
    <div style="display:flex;align-items:center;gap:10px;padding:12px 0 14px;flex-wrap:wrap">
      <input type="date" class="form-control" style="width:160px" value="${jd.viewDate||today}" onchange="state.data.journal.viewDate=this.value;loadJournalForDate(this.value)">
      <button class="btn btn-outline btn-sm" onclick="state.data.journal.viewDate='${today}';loadJournalForDate('${today}')">今天</button>
      <button class="btn btn-outline btn-sm" onclick="state.data.journal.viewDate='${new Date(Date.now()-86400000).toISOString().slice(0,10)}';loadJournalForDate(state.data.journal.viewDate)">昨天</button>
      <span style="font-size:12px;color:var(--muted)">${jd.viewDate&&jd.viewDate!==today?`查看：${jd.viewDate}`:'今天'}</span>
    </div>
    ${!hasSubmitted && (jd.viewDate||today)===today ? `
    <div style="background:linear-gradient(135deg,var(--accent),var(--accent-dark));color:#fff;border-radius:10px;padding:14px 16px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center">
      <div>
        <div style="font-weight:700;font-size:14px">你今天還沒填寫日誌 📝</div>
        <div style="font-size:12px;opacity:.85;margin-top:2px">${myTpl.icon} ${myTpl.label} 模板 · 約 3～5 分鐘填完</div>
      </div>
      <button class="btn" style="background:#fff;color:var(--accent-dark);font-weight:700;white-space:nowrap" onclick="modalEditJournal()">立即填寫</button>
    </div>` : ''}
    ${todayView()}` : tab==='任務總覽' ? taskOverview() : myView()}`;
}

window.loadJournalForDate = async function(date) {
  const { data } = await db.from('work_journals').select('*').eq('date', date).order('created_at');
  state.data.journal.today = data || [];
  state.data.journal.viewDate = date;
  renderApp();
};

window.modalEditJournal = async function(existingId = null) {
  const jd = state.data.journal || {};
  const myId = state.user?.id;
  const today = new Date().toISOString().slice(0,10);
  let existing = null;
  if (existingId) {
    existing = (jd.history||[]).find(l=>l.id===existingId);
  } else {
    existing = (jd.today||[]).find(l=>l.user_id===myId);
  }
  const logDate = existing?.date || today;
  const myProfile = (jd.profiles||[]).find(p=>p.id===myId);
  const myName = myProfile?.name || state.user?.email || '—';
  const tplKey = existing?.template_type || myProfile?.journal_template || ROLE_TO_JOURNAL_TEMPLATE[myProfile?.role] || 'general';
  const tpl = JOURNAL_TEMPLATES[tplKey] || JOURNAL_TEMPLATES.general;
  const existingFields = existing?.fields || {};

  showModal(`${tpl.icon} ${existing?'修改':'填寫'}工作日誌`, `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)">
      <div style="font-size:13px;color:var(--muted)">📅 ${logDate} · ${myName}</div>
      <span style="font-size:12px;padding:3px 10px;background:var(--surface2);border-radius:12px;color:var(--accent-dark);font-weight:600">${tpl.label}</span>
    </div>
    ${tpl.fields.map(f => `
    <div class="form-group">
      <label style="color:${f.color};font-weight:600;font-size:13px">${f.label}</label>
      <textarea class="form-control jnl-field" data-field="${f.key}" rows="${f.rows||2}" placeholder="${f.placeholder||''}">${existingFields[f.key]||existing?.[f.key]||''}</textarea>
    </div>`).join('')}
    <div style="font-size:11px;color:var(--muted);text-align:right;margin-top:-4px">建議 3～5 分鐘完成，簡短清楚即可 ✍️</div>
  `, [
    { label:'送出日誌', primary:true, onclick: async () => {
      const fields = {};
      document.querySelectorAll('.jnl-field').forEach(el => {
        const v = el.value.trim();
        if (v) fields[el.dataset.field] = v;
      });
      const payload = {
        user_id: myId,
        user_name: myName,
        date: logDate,
        template_type: tplKey,
        fields,
        updated_at: new Date().toISOString(),
      };
      if (existing) {
        await db.from('work_journals').update(payload).eq('id', existing.id);
      } else {
        await db.from('work_journals').insert(payload);
      }
      showToast('日誌已送出！'); closeModal(); await loadJournal(); renderApp();
    }},
    { label:'取消', onclick: closeModal },
  ]);
};

// 金寶山月結
// ══════════════════════════════════════════════
async function loadJinbaosan() {
  const { data } = await db.from('jinbaosan_ledger').select('*').order('year_month', { ascending: false });
  state.data.jinbaosan = data || [];
}

function renderJinbaosan() { return _renderJinbaosanContent(); }
function _renderJinbaosanContent() {
  const records = state.data.jinbaosan || [];
  const filterYm = state.data.jinbaosanYm || new Date().toISOString().slice(0,7);
  const filtered = records.filter(r => r.year_month === filterYm);
  const grandTotal = filtered.reduce((s,r) => s + (r.total||0), 0);
  const tax = Math.round(grandTotal * 0.05);
  return `
    <div class="search-bar" style="flex-wrap:wrap;gap:8px">
      <input type="month" class="form-control" style="width:160px" value="${filterYm}" onchange="state.data.jinbaosanYm=this.value;renderApp()">
      <button class="btn btn-primary" onclick="modalAddJinbaosan()">+ 新增記錄</button>
    </div>
    ${filtered.length === 0 ?
      `<div class="card"><div class="empty"><div class="empty-icon">🏔️</div><p>本月尚無金寶山月結記錄</p></div></div>` :
      filtered.map(r => {
        const items = r.items || [];
        return `<div class="card" style="margin-bottom:12px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
            <div>
              <div style="font-size:14px;font-weight:600">📅 ${r.record_date || r.year_month}</div>
              ${r.notes ? `<div style="font-size:12px;color:var(--muted)">${r.notes}</div>` : ''}
            </div>
            <div style="text-align:right">
              <div style="font-size:16px;font-weight:700;color:var(--accent-dark)">NT$ ${(r.total||0).toLocaleString()}</div>
              <span class="tag ${r.status==='已結算'?'tag-green':r.status==='確認中'?'tag-yellow':'tag-grey'}">${r.status||'待確認'}</span>
            </div>
          </div>
          ${items.length > 0 ? `
          <table style="width:100%;font-size:12px;border-collapse:collapse">
            <thead><tr style="color:var(--muted);border-bottom:1px solid var(--border)">
              <th style="text-align:left;padding:4px 0">品項</th><th style="text-align:right;padding:4px 0">數量</th><th style="text-align:right;padding:4px 0">金額</th>
            </tr></thead>
            <tbody>${items.map(i=>`<tr>
              <td style="padding:3px 0">${i.name||'—'}</td>
              <td style="text-align:right;padding:3px 0">${i.qty||'—'}</td>
              <td style="text-align:right;padding:3px 0">NT$ ${(i.amount||0).toLocaleString()}</td>
            </tr>`).join('')}</tbody>
          </table>` : ''}
          <div style="margin-top:10px;display:flex;gap:6px">
            <button class="btn btn-sm btn-outline" onclick="editJinbaosan('${r.id}')">編輯</button>
            ${r.status !== '已結算' ? `<button class="btn btn-sm btn-primary" onclick="settleJinbaosan('${r.id}')">✓ 確認結算</button>` : ''}
            <button class="btn btn-sm btn-danger" onclick="deleteJinbaosan('${r.id}')">刪除</button>
          </div>
        </div>`;
      }).join('')
    }
    ${filtered.length > 0 ? `
    <div class="card" style="background:var(--surface2)">
      <div style="font-size:13px;font-weight:600;color:var(--accent-dark);margin-bottom:8px">📊 ${filterYm} 月結匯總</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;font-size:13px">
        <div><div style="color:var(--muted);font-size:11px">未稅總計</div><div style="font-weight:700">NT$ ${grandTotal.toLocaleString()}</div></div>
        <div><div style="color:var(--muted);font-size:11px">5% 稅額</div><div style="font-weight:700">NT$ ${tax.toLocaleString()}</div></div>
        <div><div style="color:var(--muted);font-size:11px">含稅總計</div><div style="font-weight:700;color:var(--accent-dark)">NT$ ${(grandTotal+tax).toLocaleString()}</div></div>
      </div>
    </div>` : ''}`;
}

window.modalAddJinbaosan = function(existing = null) {
  const id = existing?.id;
  const items = existing?.items || [{ name:'', qty:'', amount:0 }];
  const today = new Date().toISOString().slice(0,10);
  const ym = new Date().toISOString().slice(0,7);
  showModal(id ? '編輯金寶山記錄' : '新增金寶山記錄', `
    <div class="form-row form-row-2">
      <div class="form-group"><label>年月 *</label><input class="form-control" id="jbs-ym" type="month" value="${existing?.year_month||ym}"></div>
      <div class="form-group"><label>日期</label><input class="form-control" id="jbs-date" type="date" value="${existing?.record_date||today}"></div>
    </div>
    <div class="form-group"><label>備註</label><input class="form-control" id="jbs-notes" value="${existing?.notes||''}" placeholder="備註說明"></div>
    <div style="font-size:13px;font-weight:600;color:var(--accent-dark);margin:12px 0 8px;padding-bottom:6px;border-bottom:1px solid var(--border)">品項明細</div>
    <div id="jbs-items">
      ${items.map(i=>`
      <div class="jbs-row" style="display:grid;grid-template-columns:1fr 80px 100px auto;gap:6px;margin-bottom:6px">
        <input class="form-control jbs-name" placeholder="品項名稱" value="${i.name||''}">
        <input class="form-control jbs-qty" type="text" placeholder="數量" value="${i.qty||''}">
        <input class="form-control jbs-amount" type="number" placeholder="金額" min="0" value="${i.amount||0}" oninput="updateJbsTotal()">
        <button onclick="this.closest('.jbs-row').remove();updateJbsTotal()" style="background:var(--danger);color:#fff;border:none;border-radius:4px;padding:0 8px;cursor:pointer">✕</button>
      </div>`).join('')}
    </div>
    <button class="btn btn-outline btn-sm" onclick="addJbsRow()" style="margin-bottom:12px">+ 新增品項</button>
    <div style="text-align:right;font-size:14px;font-weight:600;padding:8px;background:var(--surface2);border-radius:6px">
      小計：NT$ <span id="jbs-total-display">0</span>
    </div>
  `, [
    { label:'儲存', primary:true, onclick: async () => {
      const ym2 = document.getElementById('jbs-ym').value;
      if (!ym2) { showToast('請填年月','error'); return; }
      const rows = document.querySelectorAll('.jbs-row');
      const itemsData = [];
      let total = 0;
      rows.forEach(r => {
        const name = r.querySelector('.jbs-name').value.trim();
        const qty = r.querySelector('.jbs-qty').value.trim();
        const amount = parseFloat(r.querySelector('.jbs-amount').value)||0;
        if (name) { itemsData.push({ name, qty, amount }); total += amount; }
      });
      const payload = {
        year_month: ym2,
        record_date: document.getElementById('jbs-date').value || null,
        notes: document.getElementById('jbs-notes').value.trim() || null,
        items: itemsData, total,
      };
      if (id) {
        await db.from('jinbaosan_ledger').update(payload).eq('id', id);
      } else {
        payload.status = '待確認'; payload.created_by = state.user?.id;
        await db.from('jinbaosan_ledger').insert(payload);
      }
      showToast(id ? '已更新' : '已新增！'); closeModal(); await loadJinbaosan(); renderApp();
    }},
    { label:'取消', onclick: closeModal },
  ]);
  requestAnimationFrame(() => updateJbsTotal());
};

window.addJbsRow = function() {
  const div = document.createElement('div');
  div.className = 'jbs-row';
  div.style.cssText = 'display:grid;grid-template-columns:1fr 80px 100px auto;gap:6px;margin-bottom:6px';
  div.innerHTML = `
    <input class="form-control jbs-name" placeholder="品項名稱">
    <input class="form-control jbs-qty" type="text" placeholder="數量">
    <input class="form-control jbs-amount" type="number" placeholder="金額" min="0" value="0" oninput="updateJbsTotal()">
    <button onclick="this.closest('.jbs-row').remove();updateJbsTotal()" style="background:var(--danger);color:#fff;border:none;border-radius:4px;padding:0 8px;cursor:pointer">✕</button>`;
  document.getElementById('jbs-items').appendChild(div);
};

window.updateJbsTotal = function() {
  let total = 0;
  document.querySelectorAll('.jbs-amount').forEach(el => { total += parseFloat(el.value)||0; });
  const el = document.getElementById('jbs-total-display');
  if (el) el.textContent = total.toLocaleString();
};
window.editJinbaosan = function(id) {
  const rec = (state.data.jinbaosan||[]).find(r=>r.id===id);
  if (rec) window.modalAddJinbaosan(rec);
};
window.settleJinbaosan = async function(id) {
  if (!confirm('確認結算此記錄？')) return;
  await db.from('jinbaosan_ledger').update({ status:'已結算' }).eq('id',id);
  showToast('已結算！'); await loadJinbaosan(); renderApp();
};
window.deleteJinbaosan = async function(id) {

function _pltItemHtml(i = {}) {
  const name = (i.product_name||'').replace(/"/g,'&quot;');
  return `<div class="plt-row" style="display:grid;grid-template-columns:1.5fr 80px 60px 100px auto;gap:5px;margin-bottom:8px;align-items:start">
    <div style="position:relative">
      <input class="form-control plt-product" placeholder="輸入關鍵字搜尋商品…" value="${name}" oninput="pltSearch(this)" autocomplete="off" onfocus="pltSearch(this)">
      <input type="hidden" class="plt-product-id" value="${i.product_id||''}">
      <div class="plt-drop" style="display:none;position:absolute;top:100%;left:0;right:0;background:var(--surface);border:1px solid var(--border);border-radius:6px;z-index:200;max-height:160px;overflow-y:auto;box-shadow:0 4px 12px rgba(0,0,0,.15)"></div>
    </div>
    <input class="form-control plt-color" placeholder="顏色" value="${i.color||''}">
    <input class="form-control plt-qty" type="number" placeholder="數量" min="0" value="${i.qty||0}">
    <input class="form-control plt-amount" type="number" placeholder="電鍍費" min="0" value="${i.plate_amount||0}" oninput="updatePltTotal()">
    <button onclick="this.closest('.plt-row').remove();updatePltTotal()" style="background:var(--danger);color:#fff;border:none;border-radius:4px;padding:0 10px;cursor:pointer;height:36px">✕</button>
  </div>`;
}

window.pltSearch = function(input) {
  const q = (input.value||'').toLowerCase().trim();
  const drop = input.closest('div[style*="position:relative"]').querySelector('.plt-drop');
  const products = state.data.products || [];
  const matches = q ? products.filter(p => (p.name||'').toLowerCase().includes(q)).slice(0,10)
                     : products.slice(0,10);
  if (!matches.length) { drop.style.display='none'; return; }
  drop.innerHTML = matches.map(p =>
    `<div style="padding:7px 10px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--border)"
      onmousedown="pltSelectProduct(event,'${(p.name||'').replace(/'/g,"\\'")}','${p.id}')">${p.name}</div>`
  ).join('');
  drop.style.display = 'block';
  // 點外面關閉
  setTimeout(() => {
    const close = (e) => { if (!drop.contains(e.target) && e.target !== input) { drop.style.display='none'; document.removeEventListener('mousedown', close); } };
    document.addEventListener('mousedown', close);
  }, 0);
};

window.pltSelectProduct = function(e, name, id) {
  e.preventDefault();
  const item = e.target.closest('div[style*="position:relative"]');
  item.querySelector('.plt-product').value = name;
  item.querySelector('.plt-product-id').value = id;
  item.querySelector('.plt-drop').style.display = 'none';
};

  `, [

      const rows = document.querySelectorAll('.plt-row');
      const itemsData = []; let total = 0;

        const product_name = r.querySelector('.plt-product').value.trim();
        const product_id = r.querySelector('.plt-product-id').value || null;
        const color = r.querySelector('.plt-color').value.trim();
        const qty = parseInt(r.querySelector('.plt-qty').value)||0;

        if (product_name) { itemsData.push({ product_name, product_id, color, qty, plate_amount }); total += plate_amount; }
      });
      const payload = {
        year_month: ym2,
        invoice_date: document.getElementById('plt-date').value||null,
        internal_order_no: document.getElementById('plt-order').value.trim()||null,
        notes: document.getElementById('plt-notes').value.trim()||null,

const WAGE_RATES = [40, 45, 50, 55, 60, 70, 80, 100, 200, 300];

async function loadFoundry() {
  const { data } = await db.from('foundry_ledger')
    .select('*, foundry_ledger_items(*, castings(name))')
    .order('year_month', { ascending: false });
  state.data.foundry = data || [];
}

function renderFoundry() { return _renderFoundryContent(); }
function _renderFoundryContent() {
  const records = state.data.foundry || [];
  const filterYm = state.data.foundryYm || new Date().toISOString().slice(0,7);
  const filtered = records.filter(r => r.year_month === filterYm);

  let totalSilverCost = 0, totalWages = 0;
  const wageByRate = {};
  WAGE_RATES.forEach(r => wageByRate[r] = { qty:0, amount:0 });
  filtered.forEach(batch => {
    const netWeight = (batch.silver_weight||0) - (batch.return_weight||0);
    totalSilverCost += netWeight * (batch.silver_price||0);
    (batch.foundry_ledger_items||[]).forEach(item => {
      const rate = item.wage_rate||0, qty = item.qty||0;
      const sub = item.subtotal||(qty*rate);
      totalWages += sub;
      if (wageByRate[rate]) { wageByRate[rate].qty += qty; wageByRate[rate].amount += sub; }
    });
  });
  const grandTotal = totalSilverCost + totalWages;
  const usedRates = WAGE_RATES.filter(r => wageByRate[r].qty > 0);

  return `
    <div class="search-bar" style="flex-wrap:wrap;gap:8px">
      <input type="month" class="form-control" style="width:160px" value="${filterYm}" onchange="state.data.foundryYm=this.value;renderApp()">
      <button class="btn btn-primary" onclick="modalAddFoundry()">+ 新增藍單</button>
    </div>
    ${filtered.length > 0 ? `
    <div class="card" style="background:var(--surface2);margin-bottom:12px">
      <div style="font-size:13px;font-weight:600;color:var(--accent-dark);margin-bottom:10px">📊 ${filterYm} 月結匯總</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:10px">
        <div class="card" style="margin:0"><div style="font-size:11px;color:var(--muted)">銀料費</div><div style="font-size:15px;font-weight:700">NT$ ${Math.round(totalSilverCost).toLocaleString()}</div></div>
        <div class="card" style="margin:0"><div style="font-size:11px;color:var(--muted)">鑄口工資</div><div style="font-size:15px;font-weight:700">NT$ ${Math.round(totalWages).toLocaleString()}</div></div>
        <div class="card" style="margin:0;border:2px solid var(--accent)"><div style="font-size:11px;color:var(--muted)">未稅總計</div><div style="font-size:15px;font-weight:700;color:var(--accent-dark)">NT$ ${Math.round(grandTotal).toLocaleString()}</div></div>
      </div>
      ${usedRates.length > 0 ? `
      <div style="font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px">工資費率分佈</div>
      <table style="width:100%;font-size:12px;border-collapse:collapse">
        <thead><tr style="color:var(--muted);border-bottom:1px solid var(--border)">
          <th style="text-align:left;padding:3px 0">費率</th><th style="text-align:right;padding:3px 0">數量</th><th style="text-align:right;padding:3px 0">金額</th>
        </tr></thead>
        <tbody>${usedRates.map(r=>`<tr>
          <td style="padding:3px 0">NT$ ${r}/件</td>
          <td style="text-align:right">${wageByRate[r].qty}</td>
          <td style="text-align:right">NT$ ${wageByRate[r].amount.toLocaleString()}</td>
        </tr>`).join('')}</tbody>
      </table>` : ''}
    </div>` : ''}
    ${filtered.length === 0 ?
      `<div class="card"><div class="empty"><div class="empty-icon">🔥</div><p>本月尚無鑄造廠月結記錄</p></div></div>` :
      filtered.map(batch => {
        const items = batch.foundry_ledger_items || [];
        const netWeight = (batch.silver_weight||0) - (batch.return_weight||0);
        const silverCost = netWeight * (batch.silver_price||0);
        const wagesTotal = items.reduce((s,i)=>s+(i.subtotal||((i.qty||0)*(i.wage_rate||0))),0);
        return `<div class="card" style="margin-bottom:12px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
            <div>
              <div style="font-size:14px;font-weight:600">藍單 ${batch.batch_no||'—'} · ${batch.batch_date||batch.year_month}</div>
              <div style="font-size:12px;color:var(--muted)">銀價 NT$${batch.silver_price}/TL · 銀重 ${batch.silver_weight}TL${batch.return_weight ? ` · 退水口 ${batch.return_weight}TL` : ''} · 淨重 ${netWeight.toFixed(3)}TL</div>
              ${batch.notes ? `<div style="font-size:12px;color:var(--muted)">${batch.notes}</div>` : ''}
            </div>
            <div style="text-align:right">
              <div style="font-size:12px;color:var(--muted)">銀料 NT$ ${Math.round(silverCost).toLocaleString()}</div>
              <div style="font-size:12px;color:var(--muted)">工資 NT$ ${Math.round(wagesTotal).toLocaleString()}</div>
              <div style="font-size:15px;font-weight:700;color:var(--accent-dark)">NT$ ${Math.round(silverCost+wagesTotal).toLocaleString()}</div>
              <span class="tag ${batch.status==='已結算'?'tag-green':batch.status==='確認中'?'tag-yellow':'tag-grey'}">${batch.status||'待確認'}</span>
            </div>
          </div>
          ${items.length > 0 ? `
          <table style="width:100%;font-size:12px;border-collapse:collapse">
            <thead><tr style="color:var(--muted);border-bottom:1px solid var(--border)">
              <th style="text-align:left;padding:4px 0">鑄件</th><th style="text-align:right;padding:4px 0">數量</th>
              <th style="text-align:right;padding:4px 0">費率</th><th style="text-align:right;padding:4px 0">小計</th>
            </tr></thead>
            <tbody>${items.map(i=>`<tr>
              <td style="padding:3px 0">${i.castings?.name||i.item_name||'—'}</td>
              <td style="text-align:right">${i.qty}</td>
              <td style="text-align:right">NT$${i.wage_rate}/件</td>
              <td style="text-align:right">NT$ ${(i.subtotal||((i.qty||0)*(i.wage_rate||0))).toLocaleString()}</td>
            </tr>`).join('')}</tbody>
          </table>` : ''}
          <div style="margin-top:10px;display:flex;gap:6px">
            <button class="btn btn-sm btn-outline" onclick="editFoundry('${batch.id}')">編輯</button>
            ${batch.status !== '已結算' ? `<button class="btn btn-sm btn-primary" onclick="settleFoundry('${batch.id}')">✓ 確認結算</button>` : ''}
            <button class="btn btn-sm btn-danger" onclick="deleteFoundry('${batch.id}')">刪除</button>
          </div>
        </div>`;
      }).join('')
    }`;
}

        batch_no: document.getElementById('fdy-batchno').value.trim()||null,
        silver_price: silverPrice, silver_weight: silverWeight, return_weight: returnWeight,
        notes: document.getElementById('fdy-notes').value.trim()||null,
        status: existing?.status || '待確認',
      };
      let batchId = id;
      if (id) {
        await db.from('foundry_ledger').update(batchPayload).eq('id', id);
        await db.from('foundry_ledger_items').delete().eq('ledger_id', id);
      } else {
        batchPayload.created_by = state.user?.id;
        const { data: bd, error } = await db.from('foundry_ledger').insert(batchPayload).select().single();
        if (error) { showToast('儲存失敗：'+error.message,'error'); return; }
        batchId = bd.id;
      }
      const rows = document.querySelectorAll('.fdy-row');
      const itemsData = [];
      rows.forEach(r => {
        const cid = r.querySelector('.fdy-casting').value;
        const qty = parseInt(r.querySelector('.fdy-qty').value)||0;
        const rate = parseFloat(r.querySelector('.fdy-rate').value)||0;
        if (qty > 0) itemsData.push({ ledger_id: batchId, casting_id: cid||null, qty, wage_rate: rate, subtotal: qty*rate });
      });
      if (itemsData.length) await db.from('foundry_ledger_items').insert(itemsData);
      showToast(id?'已更新':'已新增！'); closeModal(); await loadFoundry(); renderApp();
    }},
    { label:'取消', onclick: closeModal },

window.updateFdyTotal = function() {
  const silverPrice = parseFloat(document.getElementById('fdy-silver-price')?.value)||0;
  const silverWeight = parseFloat(document.getElementById('fdy-silver-weight')?.value)||0;
  const returnWeight = parseFloat(document.getElementById('fdy-return-weight')?.value)||0;
  const netWeight = silverWeight - returnWeight;
  const silverCost = Math.round(netWeight * silverPrice);
  let wageTotal = 0;
  document.querySelectorAll('.fdy-row').forEach(r => {
    const qty = parseInt(r.querySelector('.fdy-qty')?.value)||0;
    const rate = parseFloat(r.querySelector('.fdy-rate')?.value)||0;
    const sub = qty * rate;
    const subEl = r.querySelector('.fdy-subtotal');
    if (subEl) subEl.value = sub;
    wageTotal += sub;
  });
  const grand = silverCost + wageTotal;
  const setEl = (id2, val) => { const el = document.getElementById(id2); if(el) el.textContent = val; };
  setEl('fdy-net-weight', netWeight.toFixed(3));
  setEl('fdy-silver-cost', 'NT$ '+silverCost.toLocaleString());
  setEl('fdy-wage-total', 'NT$ '+wageTotal.toLocaleString());
  setEl('fdy-grand-total', 'NT$ '+grand.toLocaleString());
};

// ── Calendar ──
async function loadCalendarEvents() {
  const cal = state.data.calNav || (() => { const n=new Date(); return {y:n.getFullYear(),m:n.getMonth()}; })();
  const firstOfMonth = `${cal.y}-${String(cal.m+1).padStart(2,'0')}-01`;
  const lastOfMonth  = `${cal.y}-${String(cal.m+1).padStart(2,'0')}-${new Date(cal.y,cal.m+1,0).getDate()}`;
  const { data } = await db.from('calendar_events')
    .select('*')
    .lte('start_date', lastOfMonth)
    .gte('end_date', firstOfMonth)
    .order('start_date');
  // Also fetch single-day events in range
  const { data: singleDay } = await db.from('calendar_events')
    .select('*')
    .gte('start_date', firstOfMonth)
    .lte('start_date', lastOfMonth)
    .is('end_date', null);
  const all = [...(data||[]), ...(singleDay||[])];
  // dedupe by id
  const seen = new Set();
  state.data.calEvents = all.filter(e => { if(seen.has(e.id)) return false; seen.add(e.id); return true; });
}

const CAL_EVENT_TYPES = {
  general:   { label:'一般',   color:'#90a4ae', bg:'#eceff1' },
  order:     { label:'訂單',   color:'#1976d2', bg:'#e3f2fd' },
  restock:   { label:'補貨',   color:'#7b1fa2', bg:'#f3e5f5' },
  dev:       { label:'開發',   color:'#f57c00', bg:'#fff3e0' },
  repair:    { label:'維修',   color:'#00796b', bg:'#e0f2f1' },
  urgent:    { label:'緊急',   color:'#c62828', bg:'#ffebee' },
  goldsmith: { label:'金工',   color:'#558b2f', bg:'#f1f8e9' },
  meeting:   { label:'會議',   color:'#5e35b1', bg:'#ede7f6' },
};

function renderCalendar() {
  if (!state.data.calNav) {
    const n = new Date();
    state.data.calNav = { y: n.getFullYear(), m: n.getMonth() };
  }
  const { y, m } = state.data.calNav;
  const now = new Date();
  const todayStr = now.toISOString().slice(0,10);
  const firstDay = new Date(y, m, 1).getDay(); // 0=Sun
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const monthNames = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  const events = state.data.calEvents || [];

  // build a map: dateStr → events[]
  const eventMap = {};
  events.forEach(ev => {
    const start = ev.start_date;
    const end   = ev.end_date || ev.start_date;
    // paint every day in range
    let cur = new Date(start);
    const endD = new Date(end);
    while (cur <= endD) {
      const ds = cur.toISOString().slice(0,10);
      if (!eventMap[ds]) eventMap[ds] = [];
      eventMap[ds].push(ev);
      cur.setDate(cur.getDate()+1);
    }
  });

  // Build calendar grid
  const cells = [];
  for (let i=0; i<firstDay; i++) cells.push(`<div class="cal-cell-empty"></div>`);
  for (let d=1; d<=daysInMonth; d++) {
    const ds = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = ds === todayStr;
    const dayEvents = eventMap[ds] || [];
    const shown = dayEvents.slice(0,2);
    const more = dayEvents.length - shown.length;
    const isWeekend = new Date(y,m,d).getDay() === 0 || new Date(y,m,d).getDay() === 6;

    cells.push(`<div class="cal-cell" data-date="${ds}" style="border:1px solid var(--border);border-radius:6px;padding:3px;cursor:pointer;background:${isToday?'#e8f5f4':isWeekend?'#fafafa':'#fff'};${isToday?'outline:2px solid var(--accent);':''}">
      <div style="font-size:11px;font-weight:${isToday?700:400};color:${isToday?'var(--accent-dark)':isWeekend?'#9e9e9e':'var(--text)'};margin-bottom:2px">${d}</div>
      ${shown.map(ev => {
        const t = CAL_EVENT_TYPES[ev.event_type] || CAL_EVENT_TYPES.general;
        return `<div style="font-size:9px;line-height:1.3;padding:1px 3px;border-radius:2px;margin-bottom:1px;background:${t.bg};color:${t.color};font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer" data-event-id="${ev.id}" onclick="event.stopPropagation();calViewEvent('${ev.id}')">${ev.title}</div>`;
      }).join('')}
      ${more>0?`<div style="font-size:9px;color:var(--muted)">+${more}</div>`:''}
    </div>`);
  }

  // upcoming events list
  const upcoming = events.filter(e => (e.end_date||e.start_date) >= todayStr).slice(0,8);

  return `
  <div class="cal-layout">
    <div>
      <div class="card" style="padding:12px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:8px">
          <button class="btn btn-outline btn-sm" id="cal-prev" style="white-space:nowrap">‹ 上月</button>

function closeModal() {
  document.getElementById('modal-overlay')?.remove();
}

function showModal(title, body, footer = '', opts = {}) {
  // footer 可以是 HTML string，或 [{label, primary, onclick}] 的 array
  let footerHtml = '';
  if (Array.isArray(footer)) {
    footerHtml = `<div class="modal-footer">${footer.map((b,i)=>`<button class="btn ${b.primary?'btn-primary':'btn-outline'}" id="modal-btn-${i}">${b.label}</button>`).join('')}</div>`;
  } else if (footer) {
    footerHtml = `<div class="modal-footer">${footer}</div>`;
  }
  closeModal(); // 關掉已有的
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'modal-overlay';
  // body 可以是 HTML string 或 DOM 元素
  const bodyHtmlStr = (body instanceof Element) ? '' : body;
  const widthStyle = opts.wide ? 'max-width:900px;width:95vw;' : opts.width ? `max-width:${opts.width};width:95vw;` : '';
  overlay.innerHTML = `
    <div class="modal" style="${widthStyle}">
      <div class="modal-header">
        <h3>${title}</h3>
        <button class="modal-close" id="modal-close-btn">✕</button>
      </div>
      <div class="modal-body" id="modal-body-slot">${bodyHtmlStr}</div>
      ${footerHtml}
    </div>`;
  document.body.appendChild(overlay);
  // 如果 body 是 DOM 元素，append 進去
  if (body instanceof Element) {
    overlay.querySelector('#modal-body-slot').appendChild(body);
  }
  document.getElementById('modal-close-btn').onclick = () => {
    if (opts.confirmClose) {
      if (confirm('尚未儲存，確定要離開嗎？')) overlay.remove();
    } else {
      overlay.remove();
    }
  };
  overlay.onclick = (e) => {
    if (e.target !== overlay) return;
    if (opts.confirmClose) {
      if (confirm('尚未儲存，確定要離開嗎？')) overlay.remove();
    } else {
      overlay.remove();
    }
  };
  // 綁定 array buttons 的 onclick
  if (Array.isArray(footer)) {
    footer.forEach((b,i) => {
      document.getElementById(`modal-btn-${i}`)?.addEventListener('click', b.onclick);
    });
  }
  return overlay;
}

function addWorkdays(date, days) {
  let d = new Date(date); let count = 0;
  while (count < days) {
    d.setDate(d.getDate() + 1);
    const dow = d.getDay();
    if (dow !== 0 && dow !== 6) count++;
  }
  return d;
}

function bindLoginEvents() {
  const btn = document.getElementById('login-btn');
  if (!btn) return;
  btn.onclick = async () => {
    const email = document.getElementById('login-email').value;
    const pw = document.getElementById('login-pw').value;
    const remember = document.getElementById('login-remember')?.checked;
    btn.textContent = '登入中…'; btn.disabled = true;
    await signIn(email, pw);
    if (state.user) {
      if (remember) {
        localStorage.setItem('story_login', JSON.stringify({ email, pw }));
      } else {
        localStorage.removeItem('story_login');
      }
    }
    btn.textContent = '登入'; btn.disabled = false;
  };
  document.getElementById('login-pw').onkeydown = (e) => { if (e.key === 'Enter') btn.click(); };

  // 忘記密碼：寄重設密碼 email
  const resetBtn = document.getElementById('login-reset-btn');
  if (resetBtn) {
    resetBtn.onclick = async () => {
      const email = document.getElementById('login-email').value.trim();
      if (!email) { showToast('請先輸入電子郵件', 'error'); return; }
      resetBtn.textContent = '寄送中…'; resetBtn.disabled = true;
      const { error } = await db.auth.resetPasswordForEmail(email, {
        redirectTo: location.href,
      });
      if (error) {
        showToast('寄送失敗：' + error.message, 'error');
      } else {
        showToast('重設密碼連結已寄出，請查收信箱', 'success', 5000);
      }
      resetBtn.textContent = '忘記密碼？重設密碼'; resetBtn.disabled = false;
    };
  }
}

// ── 廠商拖曳排序 ──
function initVendorDragSort() {
  const tbody = document.getElementById('vendor-sort-tbody');
  if (!tbody) return;
  let dragRow = null;

  // 只有按住 ⠿ handle 才啟用 tr 的 draggable
  tbody.querySelectorAll('tr[data-vendor-id]').forEach(row => {
    const handle = row.querySelector('.drag-handle');
    if (!handle) return;

    handle.addEventListener('mousedown', e => {
      row.draggable = true;
      // 讓 handle 那格也不影響文字選取其他格
      e.preventDefault();
    });

    handle.addEventListener('mouseup', () => {
      // 若沒真正 dragstart，還原
      setTimeout(() => { if (!dragRow) row.draggable = false; }, 200);
    });

    row.addEventListener('dragstart', e => {
      if (!row.draggable) { e.preventDefault(); return; }
      dragRow = row;
      setTimeout(() => row.classList.add('dragging'), 0);
      e.dataTransfer.effectAllowed = 'move';
    });

    row.addEventListener('dragend', () => {
      row.draggable = false;
      row.classList.remove('dragging');
      tbody.querySelectorAll('tr').forEach(r => r.classList.remove('drag-over'));
      dragRow = null;
      saveVendorOrder();
    });
  });

  // dragover / drop 用事件委派掛在 tbody
  tbody.addEventListener('dragover', e => {
    e.preventDefault();
    if (!dragRow) return;
    const target = e.target.closest('tr[data-vendor-id]');
    if (!target || target === dragRow) return;

    tbody.querySelectorAll('tr').forEach(r => r.classList.remove('drag-over'));
    target.classList.add('drag-over');

    const rect = target.getBoundingClientRect();
    const mid = rect.top + rect.height / 2;
    if (e.clientY < mid) {
      target.before(dragRow);
    } else {
      target.after(dragRow);
    }
  });

  tbody.addEventListener('drop', e => e.preventDefault());
}

async function saveVendorOrder() {
  const tbody = document.getElementById('vendor-sort-tbody');
  if (!tbody) return;
  const rows = [...tbody.querySelectorAll('tr[data-vendor-id]')];
  const updates = rows.map((r, i) => ({ id: r.dataset.vendorId, sort_order: i + 1 }));
  // 批次更新 sort_order
  for (const u of updates) {
    await db.from('vendors').update({ sort_order: u.sort_order }).eq('id', u.id);
  }
  // 更新本地 state 順序
  if (state.data.accounting?.vendors) {
    const sorted = updates.map(u => state.data.accounting.vendors.find(v => v.id === u.id)).filter(Boolean);
    state.data.accounting.vendors = sorted;
  }
  showToast('✅ 排序已儲存');
}

window.batchEditCastingStock = function() {
  const sel = [...(state.batch.castings || new Set())];
  if (!sel.length) return;
  const names = sel.map(id => (state.data.castings||[]).find(c=>c.id===id)?.name||id).join('、');
  showModal(`批次設定在庫數量（${sel.length} 筆）`, `
    <div style="font-size:12px;color:var(--muted);margin-bottom:12px;line-height:1.6">
      鑄件：${names.length > 60 ? names.slice(0,60)+'…' : names}
    </div>
    <div class="form-group">
      <label>統一設定在庫數量為</label>
      <input class="form-control" id="batch-cs-stock" type="number" min="0" value="0" placeholder="輸入數量">
    </div>
    <div style="font-size:12px;color:var(--warning)">⚠ 此操作會將所有選取鑄件的在庫數量設為同一值，並記錄為「盤點」異動。</div>
  `, [
    { label: '套用', primary: true, onclick: async () => {
      const qty = parseInt(document.getElementById('batch-cs-stock').value);
      if (isNaN(qty) || qty < 0) { showToast('請輸入有效數量','error'); return; }
      let errCount = 0;
      for (const id of sel) {
        const c = (state.data.castings||[]).find(x=>x.id===id);
        const before = c?.stock || 0;
        const { error } = await db.from('castings').update({ stock: qty }).eq('id', id);
        if (error) { errCount++; continue; }
        await db.from('stock_logs').insert({
          item_type: 'casting', item_id: id,
          action: 'inventory', qty_change: qty - before,
          qty_before: before, qty_after: qty,
          note: `批次盤點`, created_by: state.user?.id,
        });
      }
      if (errCount) showToast(`完成，${errCount} 筆更新失敗`, 'warning');
      else showToast(`已更新 ${sel.length} 筆在庫數量`);
      state.batch.castings = new Set();
      closeModal(); await loadCastings(); renderApp();
    }},
    { label: '取消', onclick: closeModal },
  ]);
};

window.batchAdjStock = function(type) {
  const sel = [...(state.batch[type] || new Set())];
  if (!sel.length) return;
  showModal(`批次調整庫存（${sel.length} 筆）`, `
    <div class="form-group">
      <label>操作類型</label>
      <select class="form-control" id="batch-adj-type">
        <option value="add">＋ 全部加上</option>
        <option value="sub">－ 全部扣除</option>
        <option value="set">＝ 設定為</option>
      </select>
    </div>
    <div class="form-group">
      <label>數量</label>
      <input class="form-control" id="batch-adj-qty" type="number" min="0" value="0">
    </div>
  `, [
    { label: '套用', primary: true, onclick: async () => {
      const adjType = document.getElementById('batch-adj-type').value;
      const qty = parseInt(document.getElementById('batch-adj-qty').value) || 0;
      const parts = state.data.parts || [];
      const updates = sel.map(id => {
        const pt = parts.find(p => p.id === id);
        const cur = pt?.stock || 0;
        const newStock = adjType==='add' ? cur+qty : adjType==='sub' ? Math.max(0,cur-qty) : qty;
        return db.from('parts').update({ stock: newStock }).eq('id', id);
      });
      await Promise.all(updates);
      showToast(`已更新 ${sel.length} 筆庫存`);
      state.batch[type] = new Set();
      closeModal(); await loadParts(); renderApp();
    }},
    { label: '取消', onclick: closeModal },
  ]);
};
