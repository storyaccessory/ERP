    reader.onload = e => {
      document.getElementById('ar-pay-preview-img').src = e.target.result;
      document.getElementById('ar-pay-preview-name').textContent = file.name || '貼上的截圖';
      document.getElementById('ar-pay-preview').style.display = 'block';
      pasteZone.style.borderColor = 'var(--accent)';
      pasteZone.style.background = 'var(--accent-light)';
    };
    reader.readAsDataURL(compressed);

    // AI 辨識付款日期
    if (getClaudeApiKey()) {
      try {
        const parsed = await parsePaymentScreenshotWithClaude(compressed);
        if (parsed?.payment_date) {
          const dateInp = document.getElementById('ar-pay-date');
          if (dateInp) { dateInp.value = parsed.payment_date; }
          showToast(`🤖 AI 辨識付款日期：${parsed.payment_date}`);
        }
      } catch(e) {}
    }
  };

  // 點擊 paste zone 聚焦
  pasteZone?.addEventListener('click', () => pasteZone.focus());
  pasteZone?.setAttribute('tabindex', '0');

  // 監聽貼上事件（document 層級）
  const pasteHandler = (e) => {
    const items = e.clipboardData?.items;
    if (!items) return;
    for (const item of items) {
      if (item.type.startsWith('image/')) {
        e.preventDefault();
        const blob = item.getAsFile();
        const file = new File([blob], `screenshot_${Date.now()}.png`, { type: blob.type });
        showPreview(file);
        return;
      }
    }
  };
  document.addEventListener('paste', pasteHandler);
  // modal 關閉時移除 listener
  setTimeout(() => {
    const closeBtn = document.querySelector('.modal-close, #modal-btn-1');
    closeBtn?.addEventListener('click', () => document.removeEventListener('paste', pasteHandler), { once: true });
  }, 100);

  // 選擇檔案
  document.getElementById('ar-pay-file')?.addEventListener('change', e => {
    const file = e.target.files[0];
    if (file) showPreview(file);
  });
}

async function writeAPLog(apId, action, description, diffArr) {

    ap_id: apId,
    changed_by: me.id,
    changed_by_name: me.name || me.email || '',
    changed_at: new Date().toISOString(),

    description,
    diff: diffArr ? JSON.stringify(diffArr) : null,
  });
  if (error) console.warn('[AP Log 寫入失敗]', error.message, '→ 請確認已執行 add_ap_audit_log.sql');
}

function apDiff(before, after, fields) {
  return fields
    .filter(f => String(before?.[f]??'') !== String(after?.[f]??''))
    .map(f => ({ field: f, before: before?.[f]??null, after: after?.[f]??null }));
}

// 解析請款對帳單 Excel，回傳 { customerName, amount, amountExclTax, itemDesc, shipmentDate, orderNo, ym }
function parseARStatement(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const wb = XLSX.read(e.target.result, { type: 'array', cellDates: true });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });

        const result = { customerName:'', amount:0, amountExclTax:0, itemDesc:'', shipmentDate:'', ym:'' };

        // 掃描所有 rows 找關鍵欄位（前60行）
        for (let i = 0; i < Math.min(rows.length, 60); i++) {
          const row = rows[i].map(v => String(v||'').trim());
          const rowStr = row.join('|');

          // 客戶名稱：「客戶名稱」旁邊的值
          // 格式可能是：「客戶名稱：」→ 下一格 = "CSR2037 萬泊國際貿易有限公司"
          // 需去除開頭的客戶代碼（英數字+空格）
          if (!result.customerName && rowStr.includes('客戶名稱')) {
            for (let j = 0; j < row.length; j++) {
              if (row[j].includes('客戶名稱')) {
                // 往右找第一個非空值
                for (let k = j+1; k < row.length; k++) {
                  if (row[k]) {
                    // 去除開頭的客戶代碼（如 "CSR2037 " 或 "A001 "）
                    result.customerName = row[k].replace(/^[A-Za-z0-9]+\s+/, '').trim();
                    result.customerCode = row[k].match(/^([A-Za-z0-9]+)\s+/)?.[1] || '';
                    break;
                  }
                }
                break;
              }
            }
          }

          // 結帳月份 / 請款月份
          if (!result.ym && (rowStr.includes('結帳月份') || rowStr.includes('結帳月分') || rowStr.includes('請款月份'))) {
            for (let j = 0; j < row.length; j++) {
              if ((row[j].includes('結帳月份') || row[j].includes('結帳月分') || row[j].includes('請款月份'))) {
                // 找右方第一個非空值
                let val = '';
                for (let k = j+1; k < row.length; k++) {
                  if (row[k]) { val = row[k]; break; }
                }
                if (!val && rows[i+1]) {
                  // 嘗試下一行同欄
                  val = String(rows[i+1][j] || '');
                }
                const ym = val.replace(/\D/g,'').slice(0,6);
                if (ym.length === 6) result.ym = ym;
              }
            }
          }

          // 結帳日期 / 出貨日期 / 期間 → 解析成區間字串
          const dateKeywords = ['結帳日期','結帳期間','出貨期間','出貨日期','交貨日期','期間','結帳區間'];
          if (!result.shipmentDate && dateKeywords.some(k => rowStr.includes(k))) {
            // 將 XLSX cellDates 解析出的原始值轉成 YYYY-MM-DD
            const rawRowOrig = rows[i]; // 未 toString 的原始值
            const toDateStr = v => {
              if (!v && v !== 0) return '';
              if (v instanceof Date) {
                const y = v.getFullYear(), m = String(v.getMonth()+1).padStart(2,'0'), d2 = String(v.getDate()).padStart(2,'0');
                return `${y}-${m}-${d2}`;
              }
              const s = String(v).trim();
              // YYYYMMDD
              if (/^\d{8}$/.test(s)) return `${s.slice(0,4)}-${s.slice(4,6)}-${s.slice(6,8)}`;
              // YYYY/MM/DD 或 YYYY.MM.DD 或 YYYY-MM-DD
              const m1 = s.match(/(\d{4})[\/\.\-](\d{1,2})[\/\.\-](\d{1,2})/);
              if (m1) return `${m1[1]}-${m1[2].padStart(2,'0')}-${m1[3].padStart(2,'0')}`;
              // MM/DD/YYYY（美式）
              const m2 = s.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);
              if (m2) return `${m2[3]}-${m2[1].padStart(2,'0')}-${m2[2].padStart(2,'0')}`;
              return '';
            };
            for (let j = 0; j < row.length; j++) {
              if (dateKeywords.some(k => row[j].includes(k))) {
                const found = [];

                // ① 同格就含日期區間（如 "結帳日期：2026/03/01~2026/03/31"）
                const selfStr = row[j];
                if (/[~～]/.test(selfStr)) {
                  const parts = selfStr.split(/[~～]/);
                  const d1 = toDateStr(parts[0].replace(/[^0-9\/\-\.]/g,''));
                  const d2t = toDateStr((parts[1]||'').replace(/[^0-9\/\-\.]/g,''));
                  if (d1) found.push(d1);
                  if (d2t) found.push(d2t);
                } else {
                  // ② 往右最多掃 4 格，收集所有日期值
                  for (let k = j+1; k < Math.min(j+5, row.length); k++) {
                    const ds = toDateStr(rawRowOrig[k]);
                    if (ds) {
                      found.push(ds);
                    } else if (row[k] && /[~～]/.test(row[k])) {
                      // 單格包含區間
                      const parts = row[k].split(/[~～]/);
                      const d1 = toDateStr(parts[0].trim());
                      const d2t = toDateStr((parts[1]||'').trim());
                      if (d1) found.push(d1);
                      if (d2t) found.push(d2t);
                      break;
                    }
                  }
                }

                if (found.length === 1) {
                  result.shipmentDate = found[0];
                } else if (found.length >= 2) {
                  const [s1, s2] = found;
                  const sameYM = s1.slice(0,7) === s2.slice(0,7);
                  result.shipmentDate = sameYM
                    ? `${s1} ～ ${s2.slice(5)}`
                    : `${s1} ～ ${s2}`;
                }
                if (result.shipmentDate) break;
              }
            }
          }
        }

        // 掃描找「本期應收」或「銀貨金額」總計
        let taxAmt = 0, baseAmt = 0;
        for (let i = 0; i < rows.length; i++) {
          const row = rows[i].map(v => String(v||'').trim());
          const rowStr = row.join('|');

          // 找本期應收 / 合計應收
          if (rowStr.includes('本期應收') || rowStr.includes('本期應收:') || rowStr.includes('本期應收：')) {
            for (let j = 0; j < row.length; j++) {
              if ((row[j].includes('本期應收')) && row[j+1]) {
                const n = parseFloat(String(row[j+1]).replace(/[,\s]/g,''));
                if (!isNaN(n) && n > 0) result.amount = n;
              }
            }
          }
          // 銀貨金額（未稅）
          if (rowStr.includes('銀貨金額') && !rowStr.includes('前期')) {
            for (let j = 0; j < row.length; j++) {
              if (row[j] === '銀貨金額:' || row[j] === '銀貨金額：' || row[j] === '銀貨金額') {
                const n = parseFloat(String(row[j+1]||'').replace(/[,\s]/g,''));
                if (!isNaN(n) && n > 0) baseAmt = n;
              }
            }
          }
          // 稅金
          if (rowStr.includes('稅金') || rowStr.includes('稅金:')) {
            for (let j = 0; j < row.length; j++) {
              if (row[j].includes('稅金')) {
                const n = parseFloat(String(row[j+1]||'').replace(/[,\s]/g,''));
                if (!isNaN(n) && n > 0) taxAmt = n;
              }
            }
          }
        }

        // 如果沒找到本期應收，用 銀貨+稅金 估算
        if (!result.amount && baseAmt) result.amount = baseAmt + taxAmt;
        if (baseAmt) result.amountExclTax = baseAmt;

        // 收集品項（出貨明細的品名）
        const items = [];
        for (let i = 0; i < rows.length; i++) {
          const row = rows[i].map(v => String(v||'').trim());
          if ((row[0]==='出貨'||row[0]==='退貨') && row[4]) {
            items.push(row[4]);
          }
        }
        if (items.length) result.itemDesc = items.slice(0,3).join('、') + (items.length > 3 ? `等${items.length}項` : '');

        resolve(result);
      } catch(err) {
        reject(err);
      }
    };
    reader.onerror = reject;
    reader.readAsArrayBuffer(file);
  });
}

// 圖片壓縮到指定大小以內（預設 100KB）
async function compressImage(file, maxKB = 100) {
  return new Promise((resolve) => {
    const maxBytes = maxKB * 1024;
    if (file.size <= maxBytes) { resolve(file); return; }
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      const canvas = document.createElement('canvas');
      let w = img.width, h = img.height;
      // 先縮小尺寸
      const maxDim = 1600;
      if (w > maxDim || h > maxDim) {
        const ratio = Math.min(maxDim/w, maxDim/h);
        w = Math.round(w * ratio); h = Math.round(h * ratio);
      }
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      // 逐步降低品質直到符合大小
      let quality = 0.85;
      const tryCompress = () => {
        canvas.toBlob(blob => {
          if (!blob) { resolve(file); return; }
          if (blob.size <= maxBytes || quality <= 0.1) {
            resolve(new File([blob], file.name, { type: blob.type }));
          } else {
            quality -= 0.1;
            tryCompress();
          }
        }, 'image/jpeg', quality);
      };
      tryCompress();
    };
    img.onerror = () => resolve(file);
    img.src = url;
  });
}

      if (file) {
        progressEl.style.display = 'block';
        progressEl.textContent = '上傳請款單中…';
        const ext = file.name.split('.').pop().toLowerCase().replace(/[^a-z0-9]/g, '') || 'bin';
        const fileName = `ar/${ym}_${safeCustomer}_${Date.now()}.${ext}`;
        const { error: upErr } = await db.storage.from('ar-attachments').upload(fileName, file, { upsert: true });
        if (upErr) { showToast('請款單上傳失敗：' + upErr.message, 'error'); progressEl.style.display='none'; return; }
        const { data: urlData } = db.storage.from('ar-attachments').getPublicUrl(fileName);
        payload.attachment_url = urlData.publicUrl;
        payload.attachment_name = file.name;
      }

      // 上傳發票圖片（壓縮後）
      const invFileInput = document.getElementById('ar-invoice-file');
      const invFile = invFileInput?.files?.[0];
      if (invFile) {
        progressEl.style.display = 'block';
        progressEl.textContent = '壓縮並上傳發票中…';
        const isImg = invFile.type.startsWith('image/');
        const uploadFile = isImg ? await compressImage(invFile, 100) : invFile;
        const ext = uploadFile.name.split('.').pop().toLowerCase().replace(/[^a-z0-9]/g,'') || 'jpg';
        const fileName = `ar/inv_${ym}_${safeCustomer}_${Date.now()}.${ext}`;
        const { error: invErr } = await db.storage.from('ar-attachments').upload(fileName, uploadFile, { upsert: true });
        if (invErr) { showToast('發票上傳失敗：' + invErr.message, 'error'); progressEl.style.display='none'; return; }
        const { data: invUrl } = db.storage.from('ar-attachments').getPublicUrl(fileName);
        payload.invoice_file_url = invUrl.publicUrl;
        payload.invoice_file_name = invFile.name;
      }

      // 上傳匯款截圖
      const ssFile = window._arSsPendingFile;
      if (ssFile) {
        progressEl.style.display = 'block';
        progressEl.textContent = '壓縮並上傳匯款截圖中…';
        const compressed = await compressImage(ssFile, 100);
        const ext = (compressed.name||'png').split('.').pop().toLowerCase().replace(/[^a-z0-9]/g,'') || 'png';
        const ssFileName = `ar/ss_${ym}_${safeCustomer}_${Date.now()}.${ext}`;
        const { error: ssErr } = await db.storage.from('ar-attachments').upload(ssFileName, compressed, { upsert: true });
        if (ssErr) { showToast('截圖上傳失敗：' + ssErr.message, 'error'); progressEl.style.display='none'; return; }
        const { data: ssUrl } = db.storage.from('ar-attachments').getPublicUrl(ssFileName);
        payload.payment_screenshot_url = ssUrl.publicUrl;
        payload.payment_screenshot_name = ssFile.name;
        window._arSsPendingFile = null;
      }

      progressEl.style.display = 'none';
      let error;
      if (isEdit) {
        ({ error } = await db.from('accounts_receivable').update(payload).eq('id', existing.id));
      } else {
        ({ error } = await db.from('accounts_receivable').insert(payload));
      }
      if (error) { showToast('儲存失敗：' + error.message, 'error'); return; }
      window._arInvoiceUploaded = false;
      window._arScreenshotUploaded = false;
      showToast(`✅ ${isEdit?'已更新':'已新增'}`);
      closeModal();
      await loadAccounting(); renderApp();
    }},
    { label: '取消', onclick: () => { window._arSsPendingFile = null; window._arInvoiceUploaded = false; window._arScreenshotUploaded = false; closeModal(); } },
  ], { confirmClose: true });

  // ── 客戶關鍵字搜尋（限已建檔廠商）────────────────────────
  const arInput = document.getElementById('ar-customer');
  const arList = document.getElementById('ar-customer-list');
  const arWarn = document.getElementById('ar-customer-warn');
  let arSelectedFromList = !!existing?.customer_name;

  if (arInput && arList) {
    arInput.oninput = () => {
      arSelectedFromList = false;
      arWarn.style.display = 'none';
      const q = arInput.value.trim().toLowerCase();
      if (!q) { arList.style.display = 'none'; return; }
      const matched = allActiveVendors.filter(v =>
        v.name.toLowerCase().includes(q) ||
        (v.company_name||'').toLowerCase().includes(q) ||
        (v.code||'').toLowerCase().includes(q)
      );
      if (!matched.length) { arList.style.display = 'none'; return; }
      arList.innerHTML = matched.map(v => {
        const displayName = v.company_name || v.name;
        return `
        <div data-name="${v.name.replace(/"/g,'&quot;')}" data-display="${displayName.replace(/"/g,'&quot;')}"
             style="padding:8px 12px;cursor:pointer;border-bottom:1px solid var(--border);font-size:13px"
             onmouseover="this.style.background='var(--accent-light)'"
             onmouseout="this.style.background=''">
          ${v.code ? `<span style="font-size:11px;color:var(--muted);margin-right:6px">[${v.code}]</span>` : ''}
          <strong>${displayName}</strong>${v.company_name && v.company_name !== v.name ? `<span style="color:var(--muted);margin-left:6px;font-size:12px">${v.name}</span>` : ''}
        </div>`;
      }).join('');
      arList.querySelectorAll('div[data-name]').forEach(item => {
        item.addEventListener('mousedown', e => {
          e.preventDefault();
          arInput.value = item.dataset.display;   // 顯示完整名稱
          arInput.dataset.shortname = item.dataset.name; // 存簡稱供 save 查找
          arList.style.display = 'none';
          arWarn.style.display = 'none';
          arSelectedFromList = true;
        });
      });
      arList.style.display = 'block';
    };
    arInput.onblur = () => {
      setTimeout(() => {
        arList.style.display = 'none';
        if (arInput.value && !arSelectedFromList) {
          arWarn.style.display = 'block';
        }
      }, 200);
    };
    document.addEventListener('click', (e) => {
      if (!arInput.contains(e.target) && !arList.contains(e.target)) arList.style.display = 'none';
    });
  }

  // 上傳請款單 → 自動解析
  document.getElementById('ar-file')?.addEventListener('change', async e => {
    const file = e.target.files[0];
    if (!file) return;
    const statusEl = document.getElementById('ar-parse-status');
    statusEl.style.display = 'block';
    statusEl.style.background = '#e3f2fd';
    statusEl.style.color = '#1565c0';
    statusEl.textContent = '⏳ 解析中…';

    try {
      const parsed = await parseARStatement(file);
      let filled = [];
      const allVendors = state.data.accounting?.vendors || [];

      // ── 從檔名解析年月 & 公司名稱 ──────────────────────────
      // 格式：202604_行邑出貨對帳單.xls  或  202604_COZY請款對帳單.xls
      const fname = file.name.replace(/\.[^.]+$/, ''); // 去副檔名
      const fnameMatch = fname.match(/^(\d{6})[_\s-](.+?)(?:出貨對帳單|請款對帳單|對帳單|出貨|請款)?$/);
      if (fnameMatch) {
        // 從檔名取年月（優先於表頭解析）
        if (!parsed.ym) parsed.ym = fnameMatch[1];
        // 從檔名取公司名稱（優先於表頭解析）
        if (!parsed.customerName) parsed.customerName = fnameMatch[2].trim();
      }

      // ── 帶入請款月份（billing_month YYYY-MM）───────────────
      if (parsed.ym && parsed.ym.length === 6) {
        const ymVal = parsed.ym; // YYYYMM
        const billingMonthVal = ymVal.slice(0,4) + '-' + ymVal.slice(4,6); // YYYY-MM
        const bmInput = document.getElementById('ar-billing-month');
        if (bmInput) {
          bmInput.value = billingMonthVal;
          filled.push(`請款月份 ${billingMonthVal}`);
        }
      }

      // ── 帶入客戶名稱 ──────────────────────────────────────
      const custInput = document.getElementById('ar-customer');
      if (parsed.customerName && !custInput.value) {
        const cn = parsed.customerName;       // 公司全名（已去除代碼）
        const cc = parsed.customerCode || ''; // 客戶代碼如 CSR2037
        // 比對順序：代碼 → 公司全名完全 → 簡稱完全 → 公司全名包含 → 簡稱包含
        const matched = (cc && allVendors.find(v => v.code === cc))
                     || allVendors.find(v => v.company_name === cn)
                     || allVendors.find(v => v.name === cn)
                     || allVendors.find(v => v.company_name && cn.includes(v.company_name))
                     || allVendors.find(v => v.company_name && v.company_name.includes(cn))
                     || allVendors.find(v => cn.includes(v.name) && v.name.length >= 2);
        custInput.value = matched ? matched.name : cn;
        filled.push('客戶名稱');
      }

      // ── 金額 ──────────────────────────────────────────────
      if (parsed.amount) {
        document.getElementById('ar-amount').value = parsed.amount;
        filled.push(`含稅金額 $${parsed.amount.toLocaleString()}`);
      }
      if (parsed.amountExclTax) {
        document.getElementById('ar-amount-excl').value = parsed.amountExclTax;
      }

      // ── 品項 ──────────────────────────────────────────────
      if (parsed.itemDesc && !document.getElementById('ar-desc').value) {
        document.getElementById('ar-desc').value = parsed.itemDesc;
        const descWrap = document.getElementById('ar-desc-wrap');
        if (descWrap) descWrap.style.display = 'block';
        filled.push('品項說明');
      }

      // ── 出貨日期 ──────────────────────────────────────────
      if (parsed.shipmentDate && !document.getElementById('ar-ship-date').value) {
        document.getElementById('ar-ship-date').value = parsed.shipmentDate;
        filled.push('出貨日期');
      }

      // ── 客戶名稱比對（只接受已建檔廠商）──────────────────
      const custInputEl = document.getElementById('ar-customer');
      const arWarnEl = document.getElementById('ar-customer-warn');
      if (custInputEl?.value) {
        const allV2 = state.data.accounting?.vendors || [];
        const isValid = allV2.some(v => v.name === custInputEl.value);
        if (!isValid) {
          arWarnEl && (arWarnEl.style.display = 'block');
        } else {
          arWarnEl && (arWarnEl.style.display = 'none');
        }
      }

      if (filled.length) {
        statusEl.style.background = '#e8f5e9';
        statusEl.style.color = '#2e7d32';
        statusEl.textContent = `✅ 已自動填入：${filled.join('、')}`;
      } else {
        statusEl.style.background = '#fff8e1';
        statusEl.style.color = '#e65100';
        statusEl.textContent = '⚠️ 無法自動解析，請手動填入金額';
      }
    } catch(err) {
      statusEl.style.background = '#ffebee';
      statusEl.style.color = '#c62828';
      statusEl.textContent = '❌ 解析失敗，請手動填入';
    }
  });

  // ── 發票圖片上傳：預覽 + 自動辨識 ─────────────────────────
  document.getElementById('ar-invoice-file')?.addEventListener('change', async e => {
    const file = e.target.files[0];
    if (!file) return;
    const statusEl = document.getElementById('ar-invoice-parse-status');
    const previewEl = document.getElementById('ar-invoice-preview');
    const imgEl = document.getElementById('ar-invoice-img');
    const sizeEl = document.getElementById('ar-invoice-size');
    statusEl.style.display = 'block';
    statusEl.style.background = '#e3f2fd';
    statusEl.style.color = '#1565c0';
    statusEl.textContent = '⏳ 壓縮中…';

    try {
      // 壓縮
      const isImg = file.type.startsWith('image/');
      const compressed = isImg ? await compressImage(file, 100) : file;

      // 預覽
      if (isImg) {
        const objUrl = URL.createObjectURL(compressed);
        imgEl.src = objUrl;
        previewEl.style.display = 'block';
        const kb = Math.round(compressed.size / 1024);
        const origKb = Math.round(file.size / 1024);
        sizeEl.textContent = origKb !== kb
          ? `壓縮前 ${origKb}KB → 壓縮後 ${kb}KB`
          : `${kb}KB`;
      }

      // AI 辨識發票資訊（Claude Vision）
      statusEl.textContent = '🤖 AI 辨識發票中…';
      if (isImg) {
        if (!getClaudeApiKey()) {
          statusEl.style.background = '#fff8e1'; statusEl.style.color = '#e65100';
          statusEl.textContent = '⚠️ 尚未設定 Claude API Key，請手動填入發票資訊';
        } else {
          try {
            const parsed = await parseInvoiceWithClaude(compressed);
            const filled = [];
            if (parsed?.invoice_no) {
              const invInput = document.getElementById('ar-invoice');
              if (invInput) { invInput.value = parsed.invoice_no; filled.push(`發票號碼 ${parsed.invoice_no}`); }
            }
            if (parsed?.invoice_date) {
              const dateInput = document.getElementById('ar-invoice-date');
              if (dateInput) {
                dateInput.value = parsed.invoice_date;
                filled.push(`發票日期 ${parsed.invoice_date}`);
                // 自動計算付款期限：發票日 +2 個月
                const d = new Date(parsed.invoice_date);
                if (!isNaN(d)) {
                  const y = d.getMonth() >= 10 ? d.getFullYear()+1 : d.getFullYear();
                  const m = String(((d.getMonth()+2)%12)+1).padStart(2,'0');
                  const due = y+'-'+m+'-'+String(d.getDate()).padStart(2,'0');
                  const dueEl = document.getElementById('ar-due-date');
                  if (dueEl) { dueEl.value = due; filled.push(`付款期限 ${due}`); }
                }
              }
            }
            // 比對發票金額 vs 含稅金額
            if (parsed?.amount) {
              const existingAmt = parseFloat(document.getElementById('ar-amount')?.value) || 0;
              const invoiceAmt = Number(parsed.amount);
              if (existingAmt && invoiceAmt && existingAmt !== invoiceAmt) {
                // 金額不符 → 提示但不覆蓋
                statusEl.style.background = '#fff3e0'; statusEl.style.color = '#e65100';
                statusEl.textContent = `⚠️ 發票金額 $${invoiceAmt.toLocaleString()} 與含稅金額 $${existingAmt.toLocaleString()} 不符，請確認！` +
                  (filled.length ? `（已帶入：${filled.join('、')}）` : '');
                return; // 不繼續顯示成功訊息
              } else if (!existingAmt) {
                // 沒有既有金額才自動帶入
                const amtInput = document.getElementById('ar-amount');
                if (amtInput) { amtInput.value = invoiceAmt; filled.push(`金額 $${invoiceAmt.toLocaleString()}`); }
              }
            }
            // 品項說明（發票 AI 辨識帶入）
            if (parsed?.item_desc) {
              const descInput = document.getElementById('ar-desc');
              const descWrap = document.getElementById('ar-desc-wrap');
              if (descInput && !descInput.value) {
                descInput.value = parsed.item_desc;
                if (descWrap) descWrap.style.display = 'block';
                filled.push('品項說明');
              }
            }
            // 上傳發票 → 自動更新付款狀態為「已開票」
            const paidStatusEl = document.getElementById('ar-paid-status');
            if (paidStatusEl && !document.getElementById('ar-paid-date')?.value) {
              paidStatusEl.innerHTML = `<span style="color:var(--info);font-weight:600">🧾 已開票</span>`;
            }
            window._arInvoiceUploaded = true;

            if (filled.length) {
              statusEl.style.background = '#e8f5e9'; statusEl.style.color = '#2e7d32';
              statusEl.textContent = `✅ AI 辨識完成：${filled.join('、')}`;
            } else {
              statusEl.style.background = '#fff8e1'; statusEl.style.color = '#e65100';
              statusEl.textContent = '📋 已上傳發票，請手動確認號碼與金額';
            }
          } catch(err) {
            statusEl.style.background = '#ffebee'; statusEl.style.color = '#c62828';
            statusEl.textContent = `❌ AI 辨識失敗：${err.message}`;
          }
        }
      } else {
        // PDF 格式：直接標記已開票
        const paidStatusEl2 = document.getElementById('ar-paid-status');
        if (paidStatusEl2 && !document.getElementById('ar-paid-date')?.value) {
          paidStatusEl2.innerHTML = `<span style="color:var(--info);font-weight:600">🧾 已開票</span>`;
        }
        window._arInvoiceUploaded = true;
        statusEl.style.background = '#e8f5e9';
        statusEl.style.color = '#2e7d32';
        statusEl.textContent = '✅ 發票已選擇（PDF 格式）';
      }
    } catch(err) {
      statusEl.style.background = '#ffebee';
      statusEl.style.color = '#c62828';
      statusEl.textContent = '⚠️ 預覽失敗，仍可儲存上傳';
    }
  });

  // ── 匯款截圖：貼上 & 選擇檔案 → AI 辨識付款日 & 金額比對 ──────
  window._arSsPendingFile = null;

  async function processARScreenshot(file) {
    if (!file) return;
    const statusEl = document.getElementById('ar-ss-status');
    const previewEl = document.getElementById('ar-ss-preview');
    const imgEl = document.getElementById('ar-ss-img');
    if (!statusEl) return;
    statusEl.style.display = 'block';
    statusEl.style.background = '#e3f2fd';
    statusEl.style.color = '#1565c0';
    statusEl.textContent = '⏳ 壓縮截圖中…';

    try {
      const compressed = await compressImage(file, 100);
      // 預覽
      const objUrl = URL.createObjectURL(compressed);
      if (imgEl) { imgEl.src = objUrl; }
      if (previewEl) previewEl.style.display = 'block';

      if (!getClaudeApiKey()) {
        statusEl.style.background = '#fff8e1'; statusEl.style.color = '#e65100';
        statusEl.textContent = '⚠️ 尚未設定 Claude API Key，請手動填入付款日期';
        return;
      }
      statusEl.textContent = '🤖 AI 辨識截圖中…';

      const parsed = await parsePaymentScreenshotWithClaude(compressed);
      const filled = [];

      // 自動填入付款日期
      if (parsed?.payment_date) {
        const dateStr = parsed.payment_date;
        const paidDateInput = document.getElementById('ar-paid-date');
        if (paidDateInput && dateStr) {
          paidDateInput.value = dateStr;
          filled.push(`付款日期 ${dateStr}`);
        }
      }
      // 截圖上傳 → 自動更新付款狀態為「已收款」
      const ssStatusDisp = document.getElementById('ar-paid-status');
      if (ssStatusDisp) {
        const dateVal = document.getElementById('ar-paid-date')?.value || '';
        ssStatusDisp.innerHTML = dateVal
          ? `<span style="color:var(--success);font-weight:600">✅ 已收款　${dateVal}</span>`
          : `<span style="color:var(--success);font-weight:600">✅ 已收款</span>`;
      }
      window._arScreenshotUploaded = true;

      // 比對轉帳金額 vs 含稅金額
      if (parsed?.amount) {
        const expectedAmt = parseFloat(document.getElementById('ar-amount')?.value) || 0;
        const ssAmt = Number(parsed.amount);
        if (expectedAmt && ssAmt && Math.abs(expectedAmt - ssAmt) > 1) {
          statusEl.style.background = '#fff3e0'; statusEl.style.color = '#e65100';
          statusEl.textContent = `⚠️ 截圖金額 $${ssAmt.toLocaleString()} 與應收金額 $${expectedAmt.toLocaleString()} 不符，請確認！` +
            (filled.length ? `（已帶入：${filled.join('、')}）` : '');
          return;
        } else {
          filled.push(`金額 $${ssAmt.toLocaleString()} ✓`);
        }
      }

      if (filled.length) {
        statusEl.style.background = '#e8f5e9'; statusEl.style.color = '#2e7d32';
        statusEl.textContent = `✅ AI 辨識完成：${filled.join('、')}`;
      } else {
        statusEl.style.background = '#fff8e1'; statusEl.style.color = '#e65100';
        statusEl.textContent = '📋 截圖已選擇，請手動確認付款日期';
      }
    } catch(err) {
      statusEl.style.background = '#ffebee'; statusEl.style.color = '#c62828';
      statusEl.textContent = `❌ AI 辨識失敗：${err.message}`;
    }
  }

  // 貼上截圖
  const arSsPasteZone = document.getElementById('ar-ss-paste-zone');
  if (arSsPasteZone) {
    arSsPasteZone.addEventListener('click', () => arSsPasteZone.focus());
    arSsPasteZone.addEventListener('paste', async e => {
      const items = e.clipboardData?.items || [];
      for (const item of items) {
        if (item.type.startsWith('image/')) {
          const file = item.getAsFile();
          if (file) {
            window._arSsPendingFile = new File([file], `ar_ss_${Date.now()}.png`, { type: file.type });
            arSsPasteZone.innerHTML = `<span style="color:var(--success)">✅ 已貼上截圖（${Math.round(file.size/1024)}KB）</span>`;
            await processARScreenshot(window._arSsPendingFile);
          }
          break;
        }
      }
    });
    document.addEventListener('paste', async e => {
      if (!document.getElementById('ar-ss-paste-zone')) return;
      const items = e.clipboardData?.items || [];
      for (const item of items) {
        if (item.type.startsWith('image/')) {
          const file = item.getAsFile();
          if (file) {
            window._arSsPendingFile = new File([file], `ar_ss_${Date.now()}.png`, { type: file.type });
            const pz = document.getElementById('ar-ss-paste-zone');
            if (pz) pz.innerHTML = `<span style="color:var(--success)">✅ 已貼上截圖（${Math.round(file.size/1024)}KB）</span>`;
            await processARScreenshot(window._arSsPendingFile);
          }
          break;
        }
      }
    });
  }

  // 選擇截圖檔案
  document.getElementById('ar-ss-file')?.addEventListener('change', async e => {
    const file = e.target.files[0];
    if (!file) return;
    window._arSsPendingFile = file;
    await processARScreenshot(file);
  });

  // 替換截圖（已有截圖時的替換按鈕）
  document.getElementById('ar-ss-replace-file')?.addEventListener('change', async e => {
    const file = e.target.files[0];
    if (!file) return;
    window._arSsPendingFile = file;
    await processARScreenshot(file);
    // 隱藏目前截圖區塊
    const cur = document.getElementById('ar-ss-current');
    if (cur) cur.style.display = 'none';
  });
}

// ── Claude Vision API ─────────────────────────────────────────────
function getClaudeApiKey() {
  // 優先用 Supabase 存的（所有裝置共用），fallback 到 localStorage
  return state.data._claudeApiKey || localStorage.getItem('claude_api_key') || '';
}
async function loadClaudeApiKey() {
  try {
    const { data } = await db.from('settings').select('value').eq('key','claude_api_key').maybeSingle();
    if (data?.value) state.data._claudeApiKey = data.value;

// PDF 第一頁轉成圖片 Blob（用 pdf.js canvas render，不依賴文字擷取）
async function pdfToImageBlob(file) {
  if (!window.pdfjsLib) {
    await new Promise((res, rej) => {
      const s = document.createElement('script');
      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
      s.onload = () => {
        window.pdfjsLib.GlobalWorkerOptions.workerSrc =
          'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        res();
      };
      s.onerror = rej;
      document.head.appendChild(s);
    });
  }
  const arrayBuffer = await file.arrayBuffer();
  const pdf = await window.pdfjsLib.getDocument({
    data: arrayBuffer,
  }).promise;
  const page = await pdf.getPage(1);
  const viewport = page.getViewport({ scale: 2.5 });
  const canvas = document.createElement('canvas');
  canvas.width = viewport.width;
  canvas.height = viewport.height;
  await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
  return await new Promise(res => canvas.toBlob(res, 'image/jpeg', 0.95));
}

async function callClaudeVision(file, prompt) {
  const key = getClaudeApiKey();
  if (!key) throw new Error('尚未設定 Claude API Key（請至系統設定 → AI 設定）');

  // 轉 base64
  const base64 = await new Promise((res, rej) => {
    const reader = new FileReader();
    reader.onload = e => res(e.target.result.split(',')[1]);
    reader.onerror = rej;
    reader.readAsDataURL(file);
  });

  const mediaType = (file.type && file.type.startsWith('image/')) ? file.type : 'image/jpeg';
  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'x-api-key': key,
      'anthropic-version': '2023-06-01',
      'content-type': 'application/json',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: 'claude-haiku-4-5-20251001',
      max_tokens: 512,
      messages: [{
        role: 'user',
        content: [
          { type: 'image', source: { type: 'base64', media_type: mediaType, data: base64 } },
          { type: 'text', text: prompt }
        ]
      }]
    })
  });
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    throw new Error(err?.error?.message || `HTTP ${resp.status}`);
  }
  const data = await resp.json();
  return data.content?.[0]?.text || '';
}

// 直接從 PDF 文字用 regex 解析台灣電子發票
function parseTWInvoiceFromText(text) {
  const result = {};
  // 發票號碼：2碼英文 + 8碼數字
  const invMatch = text.match(/[A-Z]{2}\d{8}/);
  if (invMatch) result.invoice_no = invMatch[0];
  // 日期：YYYY-MM-DD 或 YYYY/MM/DD
  const dateMatch = text.match(/(\d{4})[\/\-](\d{2})[\/\-](\d{2})/);
  if (dateMatch) result.invoice_date = `${dateMatch[1]}-${dateMatch[2]}-${dateMatch[3]}`;
  // 賣方名稱（支援全形空格）
  const vendorMatch = text.match(/賣[\s　]*方[\s　]*[：:]\s*([^\n\r]+)/);
  if (vendorMatch) result.vendor = vendorMatch[1].trim();
  // 賣方統編（賣方統編在「統一編號」後，排除買方統編24372938）
  const taxMatches = [...text.matchAll(/統一編號[\s　]*[：:]\s*(\d{8})/g)];
  const vendorTax = taxMatches.find(m => m[1] !== '24372938');
  if (vendorTax) result.vendor_tax_id = vendorTax[1];
  // 總計金額：優先找「總計」或「壹...元整」大寫金額附近的數字
  // 策略1：找「總計」關鍵字後的數字
  const totalMatch = text.match(/總計[\s\n\r]{0,5}([\d,]+)/);
  if (totalMatch) {
    result.amount = parseFloat(totalMatch[1].replace(/,/g,''));
  } else {
    // 策略2：找含逗號的金額格式（如 1,036），排除年份（2020~2030）和統編（8碼）
    const commaAmounts = [...text.matchAll(/(\d{1,3},\d{3})/g)]
      .map(m => parseFloat(m[1].replace(/,/g,'')))
      .filter(n => n >= 100 && !(n >= 2020 && n <= 2030));
    if (commaAmounts.length) result.amount = Math.max(...commaAmounts);
  }
  // 品項：找 YYYY Q# 格式或品名欄
  const descMatch = text.match(/(\d{4}\s*Q[1-4][^\n\r（(]{0,30}[（(][^）)]{0,20}[）)]?)/i)
    || text.match(/授權金[^\n\r]{0,40}/);
  if (descMatch) result.item_desc = descMatch[1]?.trim() || descMatch[0]?.trim();
  return Object.keys(result).length > 0 ? result : null;
}

// 清理 Claude 回傳的值（過濾掉「無法識別」「null字串」等無效值）
function cleanParsed(obj) {
  if (!obj) return null;
  const invalid = ['null','undefined','無法識別','不明','unknown','n/a','none',''];
  const out = {};
  for (const [k, v] of Object.entries(obj)) {
    if (v === null || v === undefined) continue;
    const s = String(v).trim().toLowerCase();
    if (invalid.includes(s)) continue;
    if (k === 'amount' || k === 'amount_excl_tax' || k === 'tax') {
      const n = parseFloat(String(v).replace(/,/g,''));
      if (!isNaN(n) && n > 0) out[k] = n;
    } else {
      out[k] = v;
    }
  }
  return Object.keys(out).length ? out : null;
}

// 解析發票（台灣電子發票 / 手開發票）
async function parseInvoiceWithClaude(file) {
  const key = getClaudeApiKey();
  if (!key) return null;
  try {
    const isPdf = file.type === 'application/pdf' || file.name?.toLowerCase().endsWith('.pdf');
    if (isPdf) {
      // 直接把 PDF 以 base64 送給 Claude（Claude 原生支援 PDF 文件）
      try {
        const pdfBase64 = await new Promise((res, rej) => {
          const reader = new FileReader();
          reader.onload = e => res(e.target.result.split(',')[1]);
          reader.onerror = rej;
          reader.readAsDataURL(file);
        });
        const resp = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'x-api-key': key,
            'anthropic-version': '2023-06-01',
            'content-type': 'application/json',
            'anthropic-dangerous-direct-browser-access': 'true',
          },
          body: JSON.stringify({
            model: 'claude-opus-4-6',
            max_tokens: 512,
            messages: [{
              role: 'user',
              content: [
                {
                  type: 'document',
                  source: { type: 'base64', media_type: 'application/pdf', data: pdfBase64 }
                },
                {
                  type: 'text',
                  text: `你是台灣發票辨識專家。這是台灣發票 PDF（可能是電子發票證明聯或手開發票）。
請仔細擷取以下資訊並只回傳 JSON，找不到填 null：
{"invoice_no":"發票號碼（2碼英文大寫+8碼數字，如ZK14300978）","invoice_date":"開立日期YYYY-MM-DD","amount":含稅總金額純數字,"vendor":"賣方/商家名稱","vendor_tax_id":"賣方8碼統編","item_desc":"品名或備註"}
規則：民國年+1911=西元（115年=2026）；金額找「合計」「總計」後的數字；買方統編24372938是清流文創(買方)，賣方才是廠商。只回傳JSON。`
                }
              ]
            }]
          })
        });
        if (resp.ok) {
          const d = await resp.json();
          const raw2 = d.content?.[0]?.text || '';
          console.log('[Claude PDF原生回傳]', raw2);
          const m2 = raw2.match(/\{[\s\S]*\}/);
          if (m2) return cleanParsed(JSON.parse(m2[0]));
        } else {
          const err = await resp.json().catch(()=>({}));
          console.error('[Claude PDF原生失敗]', err);
        }
      } catch(e) {
        console.error('[PDF送Claude失敗]', e);
      }
      return null;
    }

    // 圖片：送 Claude Vision
    const raw = await callClaudeVision(file,
      `你是台灣發票辨識專家。這張圖片可能是台灣電子發票證明聯（B2C，如餐廳/超商/零售）、手開發票（B2B）或一般收據。

請仔細辨識所有文字，以 JSON 格式回傳以下資訊，找不到的欄位填 null，禁止填「無法識別」：
{"invoice_no":"發票號碼（2碼大寫英文+8碼數字，如BJ99000890）","invoice_date":"開立日期（YYYY-MM-DD）","amount":含稅總金額純數字不含符號,"vendor":"商家或賣方名稱","vendor_tax_id":"賣方8碼統編（找不到填null）","item_desc":"品名/品項說明/餐廳名/備註"}

辨識規則：
1. 發票號碼：格式固定為2碼英文大寫+8碼數字（如BJ99000890、AB12345678）
2. 民國年轉西元：民國年+1911=西元（115年=2026年、114年=2025年、113年=2024年）；「115年05月20日」→「2026-05-20」
3. 金額：優先找「合計」「小計」「總計」「Total」後面的數字；若無則找最大金額數字
4. 電子發票證明聯通常無賣方統編，填null即可
5. 買方統編24372938是清流文創（買方），賣方才是廠商

只回傳JSON，不要任何說明文字。`
    );
    const jsonMatch = raw.match(/\{[\s\S]*\}/);
    if (!jsonMatch) return null;
    return cleanParsed(JSON.parse(jsonMatch[0]));
  } catch(e) {
    console.error('[parseInvoiceWithClaude]', e);
    return null;
  }
}

        <td>
          ${it.ip_code?`<span style="background:${it.ip_color||'#90a4ae'};color:#fff;border-radius:3px;padding:1px 6px;font-size:11px;font-weight:700;margin-right:4px">${it.ip_code}</span>`:''}
          ${isManual
            ? `<select style="font-size:13px;border:1px solid var(--border);border-radius:4px;padding:2px 6px;max-width:200px" onchange="restockDraftCasting(${i},this.value)">
                <option value="">— 選擇鑄件 —</option>
                ${(state.data.castings||[]).map(c=>`<option value="${c.id}" ${it.casting_id===c.id?'selected':''}>${c.name}</option>`).join('')}
               </select>`
            : `<span style="font-size:13px">${it.casting_name}</span>${(it.mold_yield||1)>1?`<span style="font-size:13px;color:var(--text);margin-left:2px">(${it.mold_yield})</span>`:''}`
          }
          ${it.ring_size!=null?`<span style="font-size:11px;background:#e8f5f4;color:#00695c;border-radius:3px;padding:1px 5px;margin-left:4px">戒 #${it.ring_size}</span>`:''}
        </td>
        <td style="text-align:center;font-size:12px">${isManual?'—':`${it.stock??'—'} / <strong>${it.safety_stock||'—'}</strong>`}</td>
        <td style="text-align:center;color:var(--danger);font-weight:700">${isManual?'—':`-${it.short_qty}`}</td>
        <td style="text-align:center">
          <select style="font-size:12px;border:1px solid var(--border);border-radius:4px;padding:2px 6px;background:${it.item_type==='remelt'?'#fff8e1':'#f0faf9'};color:${it.item_type==='remelt'?'#e65100':'#00695c'}" onchange="restockDraftType(${i},this.value)">
            <option value="wax" ${it.item_type==='wax'?'selected':''}>⚪ 下臘</option>
            <option value="remelt" ${it.item_type==='remelt'?'selected':''}>🔸 改蠟</option>
          </select>
        </td>
        <td style="text-align:center">
          ${it.item_type==='remelt'
            ? `<input type="number" min="1" max="30" style="width:60px;font-size:12px;border:1px solid var(--border);border-radius:4px;padding:2px 4px;text-align:center" placeholder="#尺寸" value="${it.remelt_size||''}" oninput="restockDraftRemeltSize(${i},this.value)">`
            : `<input type="number" min="1" style="width:60px;font-size:12px;border:1px solid var(--border);border-radius:4px;padding:2px 4px;text-align:center" value="${it.wax_qty||1}" oninput="restockDraftWax(${i},this.value)"> 支`
          }
        </td>
        <td style="text-align:right;font-size:12px">${it.mold_fee?'$'+it.mold_fee:'—'}</td>
        <td>
          ${(it.order_details||[]).map(d=>`<div style="font-size:10px;color:#b71c1c;margin-bottom:2px">📋 ${d.order_no}＊${d.qty}</div>`).join('')}
          <input style="font-size:12px;border:1px solid var(--border);border-radius:4px;padding:2px 6px;width:100%" placeholder="備註" value="${it.note||''}" oninput="restockDraftNote(${i},this.value)">
        </td>
        <td style="text-align:center">
          <button style="font-size:11px;color:#b71c1c;background:none;border:none;cursor:pointer;padding:2px 4px" onclick="restockDraftRemove(${i})">✕</button>
        </td>
      </tr>`;
  }

  window._castingRestockRenderDraftTable = function() {
    const draft = state.data._restockDraft || [];
    const allChecked = draft.length > 0 && draft.every(it => it.included);
    const thead = `
      <tr style="background:var(--bg);font-size:12px;color:var(--muted)">
        <th style="padding:6px 4px;text-align:center">
          <input type="checkbox" title="全選/全不選" ${allChecked?'checked':''} onchange="restockDraftToggleAll(this.checked)">
        </th>
        <th style="padding:6px 4px">鑄件</th>
        <th style="padding:6px 4px;text-align:center">在庫/安庫</th>
        <th style="padding:6px 4px;text-align:center">缺少</th>
        <th style="padding:6px 4px;text-align:center">類型</th>
        <th style="padding:6px 4px;text-align:center">支臘/尺寸</th>
        <th style="padding:6px 4px;text-align:right">模具工錢</th>
        <th style="padding:6px 4px">備註</th>
        <th style="padding:6px 4px;width:24px"></th>
      </tr>`;
    return `
      <div style="overflow-x:auto;border:1px solid var(--border);border-radius:6px">
        <table style="width:100%;border-collapse:collapse;font-size:13px">
          <thead>${thead}</thead>
          <tbody>${draft.map((it, i) => renderDraftRow(it, i)).join('')}</tbody>
        </table>
      </div>`;
  };

  const container = document.createElement('div');
  container.innerHTML = `
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px;font-size:13px;color:var(--muted)">
      <span><span style="color:#00695c">⚪ 下臘</span> = 直接補鑄件；<span style="color:#e65100">🔸 改蠟</span> = 需開蠟改製</span>
      <button onclick="restockDraftAddRow()" style="margin-left:auto;font-size:12px;background:#f0faf9;color:#00695c;border:1px solid #b2dfdb;border-radius:4px;padding:4px 10px;cursor:pointer">+ 手動新增一筆</button>
    </div>
    <div id="restock-draft-sections">
      ${window._castingRestockRenderDraftTable()}
    </div>
    <div style="margin-top:12px;display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="form-group">
        <label style="font-size:12px">截止日期（選填）</label>
        <input type="date" class="form-control" id="rstock-deadline" style="font-size:13px">
      </div>
      <div class="form-group">
        <label style="font-size:12px">備註</label>
        <input class="form-control" id="rstock-note" placeholder="整單備註…" style="font-size:13px">
      </div>
    </div>
  `;

  showModal('🔄 新增鑄件補貨單', container, [
    { label: '送出審核', primary: true, onclick: async () => {
      const draft = (state.data._restockDraft||[]).filter(it=>it.included);
      if (!draft.length) { showToast('請至少選取一筆','error'); return; }

      // 改蠟項目需填尺寸
      const remeltNeedSize = draft.filter(it=>it.item_type==='remelt'&&!it.remelt_size);
      if (remeltNeedSize.length) {
        showToast(`請填寫改蠟目標尺寸：${remeltNeedSize.map(it=>it.casting_name).join('、')}`, 'error', 5000);
        return;
      }

      const deadline = document.getElementById('rstock-deadline')?.value || null;
      const note = document.getElementById('rstock-note')?.value.trim() || null;
      const today = new Date().toISOString().slice(0,10);
      const orderNo = 'CR-' + Date.now().toString().slice(-8);

      // 建立補貨單主記錄
      const { data: order, error: oErr } = await db.from('casting_restock_orders').insert({
        order_no: orderNo,
        order_date: today,
        deadline,
        note,
        status: '待覆核',
        created_by: state.user?.id,
      }).select().single();
      if (oErr) { showToast('建立失敗：'+oErr.message,'error'); return; }

      // 建立明細
      const lineItems = draft.map(it => ({
        order_id: order.id,
        casting_id: it.casting_id,
        item_type: it.item_type,           // 'wax' | 'remelt'
        wax_qty: it.item_type==='wax' ? (it.wax_qty||1) : null,
        remelt_size: it.item_type==='remelt' ? it.remelt_size : null,
        short_qty: it.short_qty,
        mold_fee: it.mold_fee || null,
        note: it.note || null,
      }));
      const { error: liErr } = await db.from('casting_restock_items').insert(lineItems);
      if (liErr) { showToast('明細儲存失敗：'+liErr.message,'error'); return; }

      // 同時提交審核申請
      await db.from('approval_requests').insert({
        request_type: 'casting_restock',
        item_type: 'casting_restock_order',
        item_id: order.id,
        item_name: orderNo,
        change_data: { items: lineItems.length, order_no: orderNo },
        status: 'pending',
        note: `鑄件補貨單 ${orderNo}，共 ${lineItems.length} 項（下臘 ${draft.filter(i=>i.item_type==='wax').length}，改蠟 ${draft.filter(i=>i.item_type==='remelt').length}）`,
      });

      showToast(`✅ 補貨單 ${orderNo} 已送出審核`);
      state.data._restockDraft = null;
      closeModal();
      await loadRestock();
      await loadApprovals();
      renderApp();
    }},
    { label: '取消', onclick: () => { state.data._restockDraft = null; closeModal(); } },
  ], { wide: true });
}

// 點狀態 tag 彈出浮動選單
window.prStatusPopup = function(e, orderId) {
  e.stopPropagation();
  // 移除已存在的 popup
  document.querySelectorAll('.status-popup').forEach(el => el.remove());

  const statuses = ['待覆核','待抓料','待製作','製作中','缺零件','缺鑄件','已交件','已完成','退回'];
  const popup = document.createElement('div');
  popup.className = 'status-popup';
  popup.style.cssText = `position:fixed;z-index:9999;background:#fff;border:1px solid var(--border);
    border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.15);padding:4px 0;min-width:110px;`;

  statuses.forEach(s => {
    const item = document.createElement('div');
    item.textContent = s;
    item.style.cssText = `padding:7px 14px;font-size:13px;cursor:pointer;`;
    item.onmouseover = () => item.style.background = '#f0faf9';
    item.onmouseout  = () => item.style.background = '';
    item.onclick = async () => {
      popup.remove();
      await prChangeStatus(orderId, s);
    };
    popup.appendChild(item);
  });

  // 定位在 tag 旁邊
  const rect = e.target.getBoundingClientRect();
  popup.style.left = rect.left + 'px';
  popup.style.top  = (rect.bottom + 4) + 'px';
  document.body.appendChild(popup);

  // 點其他地方關閉
  setTimeout(() => document.addEventListener('click', () => popup.remove(), { once: true }), 0);
};

// 管理員直接改補貨單狀態
window.prChangeStatus = async function(orderId, newStatus) {
  if (!newStatus) return;
  const { error } = await db.from('restock_orders').update({ status: newStatus }).eq('id', orderId);
  if (error) { showToast('更新失敗：' + error.message, 'error'); return; }
  showToast(`狀態已改為「${newStatus}」`);
  await loadRestock(); renderApp();
};

// 商品補貨單列表直接編輯（inline update）
window.prInlineUpdate = async function(orderId, itemId, field, value) {
  const val = value === '' ? null : (field==='notes' ? value : (parseInt(value)||0));
  const { error } = await db.from('restock_order_items').update({ [field]: val }).eq('id', itemId);
  if (error) { showToast('更新失敗：'+error.message,'error'); return; }
  // 更新本地 state
  const order = (state.data.restock||[]).find(r=>r.id===orderId);
  if (order) {
    const item = (order.restock_order_items||[]).find(it=>it.id===itemId);
    if (item) item[field] = val;
  }
};

// ── 草稿明細互動函數（全域）──
function _redrawDraftTable() {
  const sec = document.getElementById('restock-draft-sections');
  if (!sec || !window._castingRestockRenderDraftTable) return;
  sec.innerHTML = window._castingRestockRenderDraftTable();
}

window.restockDraftToggle = function(i, checked) {
  if (state.data._restockDraft?.[i]) state.data._restockDraft[i].included = checked;
  const row = document.getElementById(`rdi-${i}`);
  if (row) row.style.opacity = checked ? 1 : 0.4;
  // 同步更新全選 checkbox
  const draft = state.data._restockDraft || [];
  const allCb = document.querySelector('#restock-draft-sections thead input[type=checkbox]');
  if (allCb) allCb.checked = draft.length > 0 && draft.every(it => it.included);
};
window.restockDraftToggleAll = function(checked) {
  (state.data._restockDraft||[]).forEach(it => { it.included = checked; });
  _redrawDraftTable();
};
window.restockDraftType = function(i, val) {
  if (state.data._restockDraft?.[i]) state.data._restockDraft[i].item_type = val;
  const it = state.data._restockDraft[i];
  const row = document.getElementById(`rdi-${i}`);
  if (!row) return;
  const tds = row.querySelectorAll('td');
  const sel = tds[4]?.querySelector('select');
  const waxCell = tds[5];
  if (sel) { sel.style.background = val==='remelt'?'#fff8e1':'#f0faf9'; sel.style.color = val==='remelt'?'#e65100':'#00695c'; }
  if (waxCell) {
    if (val === 'remelt') {
      waxCell.innerHTML = `<input type="number" min="1" max="30" style="width:60px;font-size:12px;border:1px solid var(--border);border-radius:4px;padding:2px 4px;text-align:center" placeholder="#尺寸" value="${it.remelt_size||''}" oninput="restockDraftRemeltSize(${i},this.value)">`;
    } else {
      waxCell.innerHTML = `<input type="number" min="1" style="width:60px;font-size:12px;border:1px solid var(--border);border-radius:4px;padding:2px 4px;text-align:center" value="${it.wax_qty||1}" oninput="restockDraftWax(${i},this.value)"> 支`;
    }
  }
};
window.restockDraftWax = function(i, val) {
  if (state.data._restockDraft?.[i]) state.data._restockDraft[i].wax_qty = parseInt(val)||1;
};
window.restockDraftRemeltSize = function(i, val) {
  if (state.data._restockDraft?.[i]) state.data._restockDraft[i].remelt_size = parseInt(val)||null;
};
window.restockDraftNote = function(i, val) {
  if (state.data._restockDraft?.[i]) state.data._restockDraft[i].note = val;
};
window.restockDraftRemove = function(i) {
  if (!state.data._restockDraft) return;
  state.data._restockDraft.splice(i, 1);
  _redrawDraftTable();
};
window.restockDraftCasting = function(i, cid) {
  const draft = state.data._restockDraft;
  if (!draft?.[i]) return;
  const c = (state.data.castings||[]).find(x => x.id === cid);
  if (!c) { draft[i].casting_id = null; draft[i].casting_name = ''; return; }
  draft[i].casting_id  = c.id;
  draft[i].casting_name = c.name;
  draft[i].mold_yield  = c.mold_yield || 1;
  draft[i].mold_fee    = c.mold_fee || 0;
  draft[i].stock       = c.stock || 0;
  draft[i].safety_stock = c.safety_stock || 0;
  draft[i].wax_qty     = 1;
  // 更新品名欄
  const row = document.getElementById(`rdi-${i}`);
  if (row) row.style.background = '#fffde7';
};
window.restockDraftAddRow = function() {
  if (!state.data._restockDraft) state.data._restockDraft = [];
  state.data._restockDraft.push({
    casting_id: null, casting_name: '', mold_yield: 1, mold_fee: 0,
    stock: null, safety_stock: null, short_qty: null,
    safety_short: 0, pickup_need: 0, order_details: [],
    item_type: 'wax', wax_qty: 1, remelt_size: null,
    note: '', included: true, _manual: true,
  });
  _redrawDraftTable();
};

// ── 抓料清單 ──
function renderPickup() {
  const restock = (state.data.restock || []).filter(r => ['待抓料','缺鑄件','缺零件'].includes(r.status));
  const parts   = state.data.parts || [];
  const products = state.data.products || [];
  if (!state.data._pickupCollapsed) state.data._pickupCollapsed = {};

  if (!restock.length) return `
    <div class="page-header"><h2>📋 抓料清單</h2></div>
    <div class="card"><div class="empty"><div class="empty-icon">✅</div><p>目前沒有待抓料的補貨單</p></div></div>`;

  function bomDetail(castings, parts) {
    const rows = [...castings.map(c => ({...c, type:'鑄件'})), ...parts.map(c => ({...c, type:'零件'}))];
    return rows.map(c => `
      <div style="display:flex;align-items:center;gap:6px;padding:1px 0">
        <span style="width:7px;height:7px;border-radius:50%;flex-shrink:0;background:${c.unknown?'#bdbdbd':c.ok?'#66bb6a':'#ef5350'}"></span>
        <span style="font-size:11px;color:var(--muted)">${c.type}</span>
        <span style="font-size:12px">${c.name}</span>
        <span style="font-size:11px;color:var(--muted)">× ${c.need}</span>
        <span style="font-size:11px;font-weight:500;color:${c.ok?'#2e7d32':'var(--danger)'}">
          ${c.unknown ? '庫存未知' : c.ok ? `庫存 ${c.stock}` : `缺 ${c.need - c.stock}`}
        </span>
      </div>`).join('');
  }

  // 依補貨單分組
  const groups = [];
  const gmap = {};
  restock.forEach(r => {
    const prefix = (r.order_no||'').replace(/-\d+$/, '') || r.id;
    if (!gmap[prefix]) { gmap[prefix] = { prefix, orders: [] }; groups.push(gmap[prefix]); }
    gmap[prefix].orders.push(r);
  });
  groups.forEach(g => g.orders.sort((a,b) => {
    const na = parseInt((a.order_no||'').match(/-(\d+)$/)?.[1]||0);
    const nb = parseInt((b.order_no||'').match(/-(\d+)$/)?.[1]||0);
    return na - nb;
  }));

  const cards = groups.map(g => {
    const collapsed = !!state.data._pickupCollapsed[g.prefix];

    // 統計這批的狀況
    let totalOk = 0, totalMissCast = 0, totalMissPart = 0;
    const itemRows = [];

    g.orders.forEach(r => {
      (r.restock_order_items || []).forEach(it => {
        const qty = it.confirmed_qty ?? it.qty ?? 1;
        const product = products.find(p => p.id === it.product_id);
        const seriesName = product?.series?.name || it.products?.series?.name || '';
        const productName = it.products?.name || it.product_name || '?';
        const displayName = seriesName ? `${seriesName}-${productName}` : productName;

        const castings = (product?.product_castings || it.products?.product_castings || []).map(c => {
          const need = (c.qty||1) * qty;
          const stock = c.castings?.stock ?? null;
          const ok = stock != null && stock >= need;
          return { name: c.castings?.name||'?', need, stock, ok, unknown: stock==null };
        });
        const partsList = (product?.product_parts || it.products?.product_parts || []).map(c => {
          const pt = parts.find(p => p.id === c.part_id);
          const need = (c.qty||1) * qty;
          const stock = pt?.stock ?? c.parts?.stock ?? null;
          const ok = stock != null && stock >= need;
          return { name: c.parts?.name || pt?.name||'?', need, stock, ok, unknown: stock==null };
        });

        const missCast = castings.filter(c => !c.ok);
        const missPart = partsList.filter(c => !c.ok);
        const canGo = missCast.length === 0 && missPart.length === 0;
        if (canGo) totalOk++;
        else if (missCast.length) totalMissCast++;
        else totalMissPart++;

        let statusChip = canGo
          ? `<span style="font-size:10px;color:#2e7d32;background:#e0f2f1;padding:1px 6px;border-radius:4px">可抓料</span>`
          : missCast.length
            ? `<span style="font-size:10px;color:#b71c1c;background:#ffebee;padding:1px 6px;border-radius:4px">欠鑄件</span>`
            : `<span style="font-size:10px;color:#e65100;background:#fff3e0;padding:1px 6px;border-radius:4px">欠零件</span>`;

        itemRows.push(`
          <div style="display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-top:1px solid var(--border)">
            <div style="flex:1;min-width:0">
              <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:4px">
                <span style="font-size:11px;color:var(--muted)">${r.order_no||''}</span>
                <span style="font-size:13px;font-weight:500">${displayName}</span>
                <span style="font-size:12px;color:var(--muted)">× ${qty}</span>
                ${statusChip}
              </div>
              ${bomDetail(castings, partsList)}
            </div>
            <div style="display:flex;flex-direction:column;gap:4px;flex-shrink:0;margin-top:2px">
              ${canGo ? `<button class="btn-table" style="background:#e0f2f1;color:#2e7d32;white-space:nowrap"
                data-action="pickup-restock-item" data-id="${r.id}" data-item="${it.id}">抓料完成</button>` : ''}
              ${missCast.length ? `<button class="btn-table" style="background:#ffebee;color:#b71c1c;white-space:nowrap"
                onclick="modalNewCastingRestock()">⚙ 生成鑄件補貨單</button>` : ''}
            </div>
          </div>`);
      });
    });

    // 標題摘要
    const chips = [
      totalOk      ? `<span style="font-size:11px;color:#2e7d32">✅ 可抓 ${totalOk}</span>` : '',
      totalMissCast ? `<span style="font-size:11px;color:#b71c1c">⚙️ 欠鑄件 ${totalMissCast}</span>` : '',
      totalMissPart ? `<span style="font-size:11px;color:#e65100">🔩 欠零件 ${totalMissPart}</span>` : '',
    ].filter(Boolean).join('<span style="color:var(--border)"> | </span>');

    return `
      <div style="margin-bottom:12px;border:1px solid var(--accent);border-radius:10px;overflow:hidden">
        <div style="display:flex;align-items:center;gap:10px;padding:9px 14px;background:var(--accent);border-bottom:1px solid var(--accent);cursor:pointer;user-select:none"
          onclick="state.data._pickupCollapsed['${g.prefix}']=!state.data._pickupCollapsed['${g.prefix}']; renderApp()">
          <span style="font-size:13px;color:rgba(255,255,255,.7);margin-right:2px">${collapsed ? '▶' : '▼'}</span>
          <strong style="font-size:14px;color:#fff">${g.prefix}補貨單</strong>
          <span style="font-size:12px;color:rgba(255,255,255,.7)">${g.orders[0]?.order_date||''}</span>
          <span style="margin-left:auto;display:flex;gap:8px;align-items:center">${chips}</span>
        </div>
        ${collapsed ? '' : itemRows.join('')}
      </div>`;
  }).join('');

  return `
    <div class="page-header">
      <h2>📋 抓料清單</h2>
      <p style="color:var(--muted);font-size:13px">共 ${restock.length} 張補貨單待抓料</p>
    </div>
    ${cards}`;
}

function renderTodos() {

  const overdueCount = todos.filter(td=>td.deadline&&td.deadline<today&&td.status!=='完成').length;

  const filtered = tab === '個人' ? todos.filter(t=>!t.is_team) :
                   tab === '團隊' ? todos.filter(t=>t.is_team) :

      placeholder="鋯石-1.2mm圓_1月石榴紅&#10;鋯石-1.2mm圓_2月紫水晶&#10;五金配件-彈弓扣&#10;鍊條-O形鍊_42cm"

    <div id="import-parts-preview" style="margin-top:10px"></div>
  `, [

    { label: '取消', onclick: closeModal },
  ]);

function parsePartLine(line) {
  line = line.trim();
  if (!line) return null;
  let category = '', name = '', spec = '';
  // 分類用 - 分開，規格用 _ 分開
  const dashIdx = line.indexOf('-');
  if (dashIdx > 0) {
    category = line.slice(0, dashIdx).trim();
    line = line.slice(dashIdx + 1);
  }
  const underIdx = line.indexOf('_');
  if (underIdx > 0) {
    name = line.slice(0, underIdx).trim();
    spec = line.slice(underIdx + 1).trim();
  } else {
    name = line.trim();
  }
  if (!name) return null;
  return { category: category || null, name, spec: spec || null };
}

function previewImportParts() {
  const text = document.getElementById('import-parts-text')?.value || '';
  const lines = text.split('\n');
  const parsed = lines.map(parsePartLine).filter(Boolean);
  const preview = document.getElementById('import-parts-preview');
  if (!preview) return;
  if (!parsed.length) {
    preview.innerHTML = `<div style="color:var(--danger);font-size:12px">沒有可解析的內容，請確認格式</div>`;
    return;
  }
  preview.innerHTML = `
    <div style="font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px">預覽 ${parsed.length} 筆：</div>
    <div style="border:1px solid var(--border);border-radius:6px;overflow:hidden;max-height:220px;overflow-y:auto">
      <table style="width:100%;font-size:12px;border-collapse:collapse">
        <thead><tr style="background:#f5f5f5">
          <th style="padding:6px 10px;text-align:left;font-weight:600;border-bottom:1px solid var(--border)">分類</th>
          <th style="padding:6px 10px;text-align:left;font-weight:600;border-bottom:1px solid var(--border)">品名</th>
          <th style="padding:6px 10px;text-align:left;font-weight:600;border-bottom:1px solid var(--border)">規格</th>
        </tr></thead>
        <tbody>
          ${parsed.map((p,i) => `<tr style="border-bottom:1px solid #f5f5f5;background:${i%2?'#fafafa':'#fff'}">
            <td style="padding:5px 10px;color:var(--muted)">${p.category||'<span style="color:#ccc">—</span>'}</td>
            <td style="padding:5px 10px;font-weight:500">${p.name}</td>
            <td style="padding:5px 10px;color:var(--muted)">${p.spec||'<span style="color:#ccc">—</span>'}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
}

async function confirmImportParts() {
  const text = document.getElementById('import-parts-text')?.value || '';
  const lines = text.split('\n');
  const parsed = lines.map(parsePartLine).filter(Boolean);
  if (!parsed.length) { showToast('沒有可匯入的資料', 'error'); return; }

  // 去掉與現有零件完全同名同分類的重複項
  const existing = state.data.parts || [];
  const toInsert = parsed.filter(p =>
    !existing.some(e => e.name === p.name && (e.category||'') === (p.category||'') && (e.spec||'') === (p.spec||''))
  );
  const skipped = parsed.length - toInsert.length;

  if (!toInsert.length) {
    showToast(`全部 ${parsed.length} 筆已存在，無需匯入`, 'error');
    return;
  }

  const inserts = toInsert.map(p => ({
    name: p.name,
    category: p.category || null,
    spec: p.spec || null,
    stock: 0,
    safety_stock: 0,
    unit: '顆',
  }));

  const { error } = await db.from('parts').insert(inserts);
  if (error) { showToast('匯入失敗：' + error.message, 'error'); return; }

  const msg = skipped > 0
    ? `成功匯入 ${toInsert.length} 筆，跳過重複 ${skipped} 筆`
    : `成功匯入 ${toInsert.length} 筆零件！`;
  showToast(msg);
  closeModal();
  await loadParts();
  renderApp();
}

    restock:      { label:'📦 補貨入庫',    color:'var(--success)',  sign:+1, hint:'填入本次補貨數量' },
    transfer_out: { label:'🔧 領料轉出',    color:'var(--danger)',   sign:-1, hint:'填入本次領用數量' },
    inventory:    { label:'📋 盤點校正',    color:'var(--info)',     sign: 0, hint:'填入實際點貨後的正確數量' },
  };

  const root = document.createElement('div');
  root.innerHTML = `
    <!-- 目前庫存 -->
    <div style="display:flex;align-items:center;gap:16px;padding:12px 14px;background:#f0faf9;border-radius:10px;margin-bottom:18px">
      <div>
        <div style="font-size:11px;color:var(--muted)">目前庫存</div>
        <div style="font-size:32px;font-weight:700;color:var(--text);line-height:1">${cur} <span style="font-size:14px;color:var(--muted)">${unit}</span></div>
      </div>
      ${item.safety_stock ? `<div style="border-left:1px solid #b2dfdb;padding-left:16px">
        <div style="font-size:11px;color:var(--muted)">安全庫存</div>
        <div style="font-size:20px;font-weight:600;color:${cur<item.safety_stock?'var(--danger)':'var(--success)'}">${item.safety_stock} ${unit}</div>
      </div>` : ''}
    </div>

    <!-- 操作類型 -->
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px" id="action-btns">
      ${Object.entries(actionConfig).map(([k,v])=>`
        <button class="stock-action-btn" data-action="${k}" style="padding:10px 6px;border-radius:8px;border:2px solid var(--border);background:#fff;cursor:pointer;font-size:12px;font-weight:600;color:var(--muted);text-align:center;transition:all .15s" onclick="selectStockAction('${k}')">
          ${v.label}
        </button>`).join('')}
    </div>

    <div id="stock-action-form" style="display:none">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:10px">
        <div class="form-group">
          <label id="qty-label">數量</label>
          <input class="form-control" id="stock-qty" type="number" min="0" value="" placeholder="輸入數量">
        </div>
        <div class="form-group" id="ref-order-group" style="display:none">
          <label>關聯訂單/批次（選填）</label>
          <input class="form-control" id="stock-ref" placeholder="例：ORD-2024-001">
        </div>
      </div>
      <div class="form-group">
        <label>備註 <span id="note-required" style="color:var(--danger);display:none">*</span></label>
        <input class="form-control" id="stock-note" placeholder="">
      </div>
      <div id="stock-preview" style="display:none;padding:10px 14px;border-radius:8px;font-size:13px;margin-top:4px"></div>
    </div>
  `;

  let selectedAction = null;

  window.selectStockAction = function(action) {
    selectedAction = action;
    const cfg = actionConfig[action];
    // 高亮選中按鈕
    root.querySelectorAll('.stock-action-btn').forEach(btn => {
      const isThis = btn.dataset.action === action;
      btn.style.borderColor = isThis ? cfg.color : 'var(--border)';
      btn.style.background  = isThis ? cfg.color+'22' : '#fff';
      btn.style.color       = isThis ? cfg.color : 'var(--muted)';
    });
    // 顯示表單
    const form = root.querySelector('#stock-action-form');
    form.style.display = 'block';
    root.querySelector('#qty-label').textContent = action==='inventory' ? '實際數量（點貨後）' : '數量';
    root.querySelector('#ref-order-group').style.display = action==='transfer_out' ? 'block' : 'none';
    root.querySelector('#note-required').style.display   = action==='inventory' ? 'inline' : 'none';
    root.querySelector('#stock-note').placeholder = action==='restock' ? '供應商、批號…' : action==='transfer_out' ? '用途、訂單…' : '差異原因（必填）';
    // 即時預覽
    const qtyInput = root.querySelector('#stock-qty');
    qtyInput.oninput = () => updateStockPreview(action, cfg, cur, unit, root);
    updateStockPreview(action, cfg, cur, unit, root);
  };

  showModal(`庫存異動：${item.name}`, root, [
    { label: '確認', primary: true, onclick: async () => {
      if (!selectedAction) { showToast('請選擇操作類型','error'); return; }
      const cfg  = actionConfig[selectedAction];
      const qty  = parseInt(root.querySelector('#stock-qty').value);
      const note = root.querySelector('#stock-note').value.trim();
      const ref  = root.querySelector('#stock-ref')?.value.trim()||null;

      if (isNaN(qty) || qty < 0) { showToast('請輸入有效數量','error'); return; }
      if (selectedAction==='inventory' && !note) { showToast('盤點需填寫差異原因','error'); return; }

      let newStock;
      let qtyChange;
      if (selectedAction==='restock')      { newStock = cur + qty; qtyChange = +qty; }
      else if (selectedAction==='transfer_out') { newStock = Math.max(0, cur - qty); qtyChange = -(cur - newStock); }
      else                                 { newStock = qty; qtyChange = qty - cur; }

      // 更新庫存
      const table = isCasting ? 'castings' : 'parts';
      const { error } = await db.from(table).update({ stock: newStock }).eq('id', id);
      if (error) { showToast('更新失敗：'+error.message,'error'); return; }

      // 寫入 stock_logs
      await db.from('stock_logs').insert({
        item_type: isCasting ? 'casting' : 'part',
        item_id: id,
        action: selectedAction,
        qty_change: qtyChange,
        qty_before: cur,
        qty_after: newStock,
        note: note||null,
        ref_order: ref,
        created_by: state.user?.id,
      });

      showToast(`${cfg.label}：${cur} → ${newStock} ${unit}`);
      closeModal();
      if (isCasting) { await loadCastings(); } else { await loadParts(); }
      renderApp();
    }},
    { label: '取消', onclick: closeModal },
  ]);
}

function updateStockPreview(action, cfg, cur, unit, root) {
  const qty = parseInt(root.querySelector('#stock-qty').value);
  const preview = root.querySelector('#stock-preview');
  if (isNaN(qty) || qty < 0) { preview.style.display='none'; return; }
  let newStock, arrow;
  if (action==='restock')       { newStock = cur + qty; arrow = `+${qty}`; }
  else if (action==='transfer_out') { newStock = Math.max(0, cur-qty); arrow = `-${cur-newStock}`; }
  else                          { newStock = qty; arrow = qty>cur?`+${qty-cur}`:`-${cur-qty}`; }
  preview.style.display = 'block';
  preview.style.background = cfg.color+'18';
  preview.style.border = `1px solid ${cfg.color}44`;
  preview.innerHTML = `<span style="color:var(--muted)">庫存將變為：</span> <strong style="font-size:16px;color:${cfg.color}">${newStock} ${unit}</strong> <span style="color:var(--muted);font-size:12px">（${arrow}）</span>`;
}

// ── Accounting ──
function renderAccounting() {
  const { ap, meal, advance, ym, vendors, ar } = state.data.accounting || { ap:[], meal:[], advance:[], ym:'', vendors:[], ar:[] };
  const tab = state.data.acctTab || '應付帳款';

  // AP 總計：依月份快捷（本月/前月/全部）或下拉選單 + 廠商/狀態 篩選
  const now2 = new Date();
  const thisYm = now2.getFullYear().toString() + String(now2.getMonth()+1).padStart(2,'0');
  const prevYm = (() => { const d = new Date(now2.getFullYear(), now2.getMonth()-1, 1); return d.getFullYear().toString() + String(d.getMonth()+1).padStart(2,'0'); })();
  // acctYmMode: 'this'=本月 'prev'=前月 'all'=全部 'pick'=自選月份
  const ymMode = state.data._acctYmMode || 'this';
  const selectedYm = ymMode === 'this' ? thisYm : ymMode === 'prev' ? prevYm : ymMode === 'all' ? '' : (ym || thisYm);
  const savedF = state.data._apFilter || {};
  const filterVendor = savedF.vendor || '';
  const filterPaid   = savedF.paid   || '';
  const apFiltered = ap.filter(r => {
    const rYm = (r.billing_month||r.item_date||'').slice(0,7).replace('-','');
    const rVendor = r.vendor_name||r.applicant_name||'';
    const rPaid = r.paid_at ? '1' : '0';
    const okYm = selectedYm === '' || rYm === selectedYm;
    return okYm
      && (!filterVendor||rVendor.includes(filterVendor)||rVendor===filterVendor)
      && (!filterPaid||rPaid===filterPaid);
  });
  const apTotal = apFiltered.reduce((s,r)=>s+(r.amount||0),0);
  // 餐費/代墊依同一個 selectedYm 篩選
  const mealFiltered = meal.filter(r => {
    if (!selectedYm) return true;
    const rYm = (r.year_month||'').slice(0,6) || (r.item_date||'').slice(0,7).replace('-','');
    return rYm === selectedYm;
  });
  const advanceFiltered = advance.filter(r => {
    if (!selectedYm) return true;
    const rYm = (r.year_month||'').slice(0,6) || (r.item_date||'').slice(0,7).replace('-','');
    return rYm === selectedYm;
  });
  const mealTotal = mealFiltered.reduce((s,r)=>s+(r.amount||0),0);
  const advanceTotal = advanceFiltered.reduce((s,r)=>s+(r.amount||0),0);
  const arTotal = (ar||[]).reduce((s,r)=>s+(r.amount||0),0);
  const arReceived = (ar||[]).filter(r=>r.status==='已收款').reduce((s,r)=>s+(r.amount||0),0);
  const arPending = arTotal - arReceived;

  // 月份選單（最近24個月）
  const ymOptions = [];
  const now = new Date();
  for (let i = 0; i < 24; i++) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const m = d.getFullYear().toString() + String(d.getMonth()+1).padStart(2,'0');
    ymOptions.push(m);
  }

  // 廠商統計（應付帳款右側）
  const vendorSummary = {};
  const vendorMap = {};
  const vendorBankMap = {};  // 短名/全名 → { company_name, bank_name, bank_account }
  (vendors||[]).forEach(v => {
    vendorMap[v.id] = v;
    const info = { company_name: v.company_name||v.name, bank_name: v.bank_name||'', bank_account: v.bank_account||'' };
    if (v.name)         vendorBankMap[v.name]         = info;
    if (v.company_name) vendorBankMap[v.company_name] = info;
  });
  apFiltered.forEach(r => {
    const vname = r.vendor_name || r.applicant_name || '其他';
    const vinfo = r.vendor_id ? vendorMap[r.vendor_id] : (vendorBankMap[vname] || null);
    // 統一以公司全名為 key
    const displayName = vinfo?.company_name || vname;
    if (!vendorSummary[displayName]) vendorSummary[displayName] = { total: 0, bank_name: vinfo?.bank_name||'', bank_account: vinfo?.bank_account||'' };
    vendorSummary[displayName].total += r.amount||0;
  });

  // 員工統計（依篩選後的資料）
  const empMealSummary = {};
  mealFiltered.forEach(r => {
    const n = r.applicant_name||'未知';
    empMealSummary[n] = (empMealSummary[n]||0) + (r.amount||0);
  });
  const empAdvSummary = {};
  advanceFiltered.forEach(r => {
    const n = r.applicant_name||'未知';
    empAdvSummary[n] = (empAdvSummary[n]||0) + (r.amount||0);
  });

  const isAdmin = ['admin','accounting','management'].includes(state.profile?.role) || state.profile?.email === 'cailing0516@gmail.com';
  // 儀表板：admin + accounting + management 可見（一般員工不顯示）
  const canSeeDashboard = isAdmin;
  // 應付／應收：僅 admin/accounting/management 可見
  const canSeeAP = isAdmin;
  const canSeeAR = isAdmin;
  // 餐費／代墊：所有人可見，但只能編輯自己的（isAdmin 可編輯全部）
  // 若無 AP 權限且目前 tab 是 AP/AR，自動切到餐費
  if (!canSeeAP && (tab === '應付帳款' || tab === '應收帳款')) {
    state.data.acctTab = '餐費發票';
  }
  const activeTab = state.data.acctTab || (canSeeAP ? '應付帳款' : '餐費發票');


  return `
    ${canSeeDashboard ? `
    <div class="cards acct-dashboard-admin" style="margin-bottom:16px;">
      <div class="card"><div class="card-title">應付帳款合計</div><div class="card-value ap-total-value" style="font-size:18px">$${apTotal.toLocaleString()}</div></div>
      <div class="card"><div class="card-title">餐費發票合計</div><div class="card-value" style="font-size:18px">$${mealTotal.toLocaleString()}</div></div>
      <div class="card"><div class="card-title">代墊金額合計</div><div class="card-value" style="font-size:18px">$${advanceTotal.toLocaleString()}</div></div>
      <div class="card"><div class="card-title">應收帳款合計</div><div class="card-value" style="font-size:18px;color:var(--info)">$${arTotal.toLocaleString()}</div></div>
      <div class="card"><div class="card-title">待收款</div><div class="card-value" style="font-size:18px;color:${arPending>0?'var(--warning)':'var(--success)'}">$${arPending.toLocaleString()}</div></div>
    </div>` : ''}
    <div class="tabs">
      ${canSeeAP ? `<div class="tab ${activeTab==='應付帳款'?'active':''}" data-acct-tab="應付帳款">應付帳款</div>` : ''}
      ${canSeeAR ? `<div class="tab ${activeTab==='應收帳款'?'active':''}" data-acct-tab="應收帳款">應收帳款</div>` : ''}
      <div class="tab ${activeTab==='餐費發票'?'active':''}" data-acct-tab="餐費發票">餐費發票</div>
      <div class="tab ${activeTab==='代墊金額'?'active':''}" data-acct-tab="代墊金額">代墊金額</div>
      ${canSeeAP ? `<div class="tab ${activeTab==='本月待付款'?'active':''}" data-acct-tab="本月待付款" style="color:var(--warning)">💳 本月待付款</div>` : ''}
    </div>
    <!-- 工具列：第一列（月份快捷 + 操作按鈕） -->
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:nowrap">
      <div style="display:flex;gap:2px;background:var(--bg-alt,#f5f5f5);border-radius:8px;padding:3px;flex-shrink:0">
        <button class="btn-ym-quick ${ymMode==='this'?'active':''}" data-ym-mode="this">本月</button>
        <button class="btn-ym-quick ${ymMode==='prev'?'active':''}" data-ym-mode="prev">前月</button>
        <button class="btn-ym-quick ${ymMode==='all'?'active':''}" data-ym-mode="all">全部</button>
        <button class="btn-ym-quick ${ymMode==='pick'?'active':''}" data-ym-mode="pick">選月份</button>
      </div>
      ${ymMode==='pick' ? `<select class="form-control" id="ym-select" style="width:100px;font-size:12px">
        ${ymOptions.map(m=>`<option ${m===(ym||thisYm)?'selected':''}>${m}</option>`).join('')}
      </select>` : `<span style="font-size:12px;color:var(--muted);font-weight:500;white-space:nowrap">${ymMode==='all'?'全部':ymMode==='this'?thisYm:prevYm}</span>`}
      <div style="display:flex;gap:6px;align-items:center;margin-left:auto;flex-shrink:0">
        ${(canSeeAP || activeTab === '餐費發票' || activeTab === '代墊金額') ? `<button class="btn btn-primary" id="add-acct-btn" style="white-space:nowrap">+ 新增</button>` : ''}
        ${(canSeeAP && activeTab === '應付帳款') ? `<button class="btn btn-outline" id="ap-template-btn" style="color:var(--accent);white-space:nowrap" title="套用範本">📋</button>` : ''}
        ${isAdmin ? `<button class="btn btn-outline" id="export-acct-btn" style="white-space:nowrap" title="匯出 Excel">↓</button>` : ''}
      </div>
